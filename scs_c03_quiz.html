<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SCS-C03 練習題庫</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222638; --border: #2e3250;
    --accent2: #4f8ef7; --green: #2ecc71; --red: #e74c3c;
    --text: #e8eaf6; --text2: #8892b0; --text3: #ccd6f6; --aws-orange: #ff9900;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-badge { background: var(--aws-orange); color: #000; font-weight: 800; font-size: 11px; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; }
  .logo-text { font-size: 15px; font-weight: 600; color: var(--text3); }
  .header-stats { font-size: 13px; color: var(--text2); }
  .app { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .mode-screen { text-align: center; padding: 60px 20px; }
  .mode-title { font-size: 28px; font-weight: 700; color: var(--text3); margin-bottom: 8px; }
  .mode-sub { color: var(--text2); margin-bottom: 40px; font-size: 15px; }
  .mode-cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .mode-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 32px 28px; cursor: pointer; width: 260px; transition: all 0.2s; text-align: left; }
  .mode-card:hover { border-color: var(--accent2); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(79,142,247,0.15); }
  .mode-icon { font-size: 36px; margin-bottom: 16px; }
  .mode-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text3); }
  .mode-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .settings-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .settings-bar select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .settings-bar label { color: var(--text2); font-size: 13px; }
  .progress-wrap { margin-bottom: 20px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--aws-orange)); border-radius: 4px; transition: width 0.4s ease; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 16px; }
  .q-meta { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; letter-spacing: 0.5px; }
  .badge-cat { background: rgba(79,142,247,0.15); color: var(--accent2); border: 1px solid rgba(79,142,247,0.3); }
  .badge-num { background: rgba(255,153,0,0.12); color: var(--aws-orange); border: 1px solid rgba(255,153,0,0.3); }
  .badge-special { background: rgba(155,89,182,0.15); color: #c39bd3; border: 1px solid rgba(155,89,182,0.3); }
  .q-en { font-size: 15px; line-height: 1.7; color: var(--text3); margin-bottom: 12px; white-space: pre-wrap; }
  .q-cn { font-size: 14px; line-height: 1.7; color: var(--text2); padding: 12px 16px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--border); white-space: pre-wrap; }
  .options { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .option { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
  .option:hover:not(.disabled) { border-color: var(--accent2); background: rgba(79,142,247,0.08); }
  .option.selected { border-color: var(--accent2); background: rgba(79,142,247,0.12); }
  .option.correct { border-color: var(--green) !important; background: rgba(46,204,113,0.1) !important; }
  .option.wrong { border-color: var(--red) !important; background: rgba(231,76,60,0.1) !important; }
  .option.disabled { cursor: default; }
  .opt-letter { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: var(--border); color: var(--text2); font-size: 12px; font-weight: 700; margin-right: 10px; flex-shrink: 0; }
  .option.correct .opt-letter { background: var(--green); color: #fff; }
  .option.wrong .opt-letter { background: var(--red); color: #fff; }
  .option.selected:not(.correct):not(.wrong) .opt-letter { background: var(--accent2); color: #fff; }
  .opt-en { font-size: 14px; color: var(--text3); }
  .opt-cn { font-size: 13px; color: var(--text2); margin-top: 4px; margin-left: 36px; }
  .opt-row { display: flex; align-items: flex-start; }
  .answer-box { margin-top: 16px; padding: 20px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); display: none; }
  .answer-box.show { display: block; }
  .answer-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
  .answer-correct { font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 12px; white-space: pre-wrap; }
  .exp-en { font-size: 13px; line-height: 1.7; color: var(--text3); white-space: pre-wrap; }
  .exp-cn { font-size: 13px; line-height: 1.7; color: var(--text2); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); white-space: pre-wrap; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-primary:hover { background: #6ba3ff; }
  .btn-orange { background: var(--aws-orange); color: #000; }
  .btn-orange:hover { background: #ffb133; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text3); border-color: var(--text2); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .shuffle-on { color: var(--aws-orange) !important; border-color: var(--aws-orange) !important; }
  .result-screen { text-align: center; padding: 40px 20px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); }
  .result-emoji { font-size: 60px; margin-bottom: 16px; }
  .result-score { font-size: 48px; font-weight: 800; color: var(--aws-orange); }
  .result-label { font-size: 16px; color: var(--text2); margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
  .result-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; min-width: 130px; }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .stat-green { color: var(--green); }
  .stat-red { color: var(--red); }
  .review-list { margin-top: 24px; }
  .review-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); }
  .review-item:hover { border-color: var(--accent2); }
  .review-icon { font-size: 16px; flex-shrink: 0; }
  .review-qnum { font-size: 12px; color: var(--text2); min-width: 50px; }
  .review-q { font-size: 13px; color: var(--text3); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .review-ans { font-size: 12px; font-weight: 700; white-space: nowrap; }
  .review-ans.wrong { color: var(--red); }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
  .special-note { background: rgba(155,89,182,0.1); border: 1px solid rgba(155,89,182,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c39bd3; margin-top: 12px; }
  .cat-breakdown { margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 14px; letter-spacing: 0.3px; }
  .review-list { margin-top: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
  .cat-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .cat-row:last-child { border-bottom: none; }
  .cat-name { width: 200px; flex-shrink: 0; }
  .cat-cn { display: block; font-size: 13px; font-weight: 600; color: var(--text3); }
  .cat-en { display: block; font-size: 11px; color: var(--text2); margin-top: 2px; }
  .cat-bar-wrap { flex: 1; min-width: 80px; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .cat-nums { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .cat-correct { color: var(--green); font-weight: 600; }
  .cat-wrong { color: var(--red); font-weight: 600; }
  .cat-total { color: var(--text2); }
  .cat-pct { font-weight: 700; min-width: 38px; text-align: right; }
  @media (max-width: 600px) { .cat-name { width: 100%; } .cat-row { gap: 8px; } }

    @media (max-width: 600px) { .mode-cards { flex-direction: column; align-items: center; } .mode-card { width: 100%; max-width: 320px; } }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <span class="logo-badge">AWS</span>
    <span class="logo-text">SCS-C03 Security Specialty 練習題庫</span>
  </div>
  <div class="header-stats" id="headerStats">共 126 題</div>
</div>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<script>
const QUESTIONS = [{"num": 1, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company needs to deploy AWS CloudFormation templates that configure sensitive database credentials. The company already uses AWS Key Management Service (AWS KMS) and AWS Secrets Manager.\nWhich solution will meet the requirements?", "question_cn": "一家公司需要部署配置敏感数据库凭证的 AWS CloudFormation 模板。该公司已经在使用 AWS 密\n钥管理服务 (AWS KMS) 和 AWS Secrets Manager。\n哪种解决方案能满足要求？", "options": [{"letter": "A", "en": "Use a dynamic reference in the CloudFormation template to reference the database credentials in\nSecrets Manager.", "cn": "在 CloudFormation 模板中使用动态引用，以引用 Secrets Manager 中的数据库凭证。"}, {"letter": "B", "en": "Use encrypted parameters in the CloudFormation template.", "cn": "在 CloudFormation 模板中使用加密参数。"}, {"letter": "C", "en": "Use SecureString parameters to reference Secrets Manager.", "cn": "使用 SecureString 参数来引用 Secrets Manager。"}, {"letter": "D", "en": "Use SecureString parameters encrypted by AWS KMS.", "cn": "使用由 AWS KMS 加密的 SecureString 参数。"}], "answer": "A", "explanation_en": "AWS CloudFormation supports dynamic references to AWS Secrets Manager, which allow sensitive values to be retrieved securely at stack runtime. According to AWS Certified Security - Specialty guidance, dynamic references prevent secrets from being stored in plaintext in templates, stack metadata, or logs.\nUsing dynamic references ensures that secrets remain encrypted at rest and are accessed only when required. CloudFormation does not support SecureString parameters for Secrets Manager references, and encrypting templates does not prevent exposure during execution.", "explanation_cn": "AWS CloudFormation 支持对 AWS Secrets Manager 的动态引用，这允许在堆栈运行时安全地检索\n敏感值。根据 AWS 认证安全 - 专业指南，动态引用可防止机密信息以明文形式存储在模板、堆栈\n元数据或日志中。\n使用动态引用可确保机密信息在静止时保持加密状态，并且仅在需要时才进行访问。CloudFormation 不支持用于 Secrets Manager 引用的 SecureString 参数，并且加密模板并不能防止在执行期间\n暴露。"}, {"num": 2, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A security engineer is responding to an incident that is affecting an AWS account. The ID of the account\nis 123456789012. The attack created workloads that are distributed across multiple AWS Regions.\nThe security engineer contains the attack and removes all compute and storage resources from all affected\nRegions. However, the attacker also created an AWS KMS key. The key policy on the KMS key explicitly allows\nIAM principal kms:* permissions.\nThe key was scheduled to be deleted the previous day. However, the key is still enabled and usable. The\nkey has an ARN of\narn:aws:kms:us-east-2:123456789012:key/mrk-0bb0212cd9864fdea0dcamzo26efb5670.\narn:aws:kms:us-east-2:123456789012:key/mrk-0bb02l2cd9864fdea0dcamzo26efb5670。\nThe security engineer must delete the key as quickly as possible.\n\n\nWhich solution will meet this requirement?", "question_cn": "一名安全工程师正在应对一起影响 AWS 账户的事件。该账户的 ID 为 123456789012。此次攻击创\n建了分布在多个 AWS 区域的工作负载。\n安全工程师控制了攻击，并从所有受影响区域移除了所有计算和存储资源。然而，攻击者还创建了\n一个 AWS KMS 密钥。该 KMS 密钥的密钥策略明确允许 IAM 主体拥有 kms:* 权限。\n该密钥原计划在前一天删除。然而，该密钥仍然启用且可用。该密钥的 ARN 为\n安全工程师必须尽快删除该密钥。\n哪种解决方案能满足此要求？", "options": [{"letter": "A", "en": "Log in to the account by using the account root user credentials. Re-issue the deletion request for the\nKMS key with a waiting period of 7 days.", "cn": "使用账户根用户凭证登录账户。重新发出删除 KMS 密钥的请求，并设置 7 天的等待期。"}, {"letter": "B", "en": "Identify the other Regions where the KMS key ID is present and schedule the key for deletion in 7\ndays.", "cn": "确定 KMS 密钥 ID 所在的其他区域，并安排在 7 天内删除该密钥。"}, {"letter": "C", "en": "Update the IAM principal to allow kms:* permissions on the KMS key ARN. Re-issue the deletion\nrequest for the KMS key with a waiting period of 7 days.", "cn": "更新 IAM 主体，以允许对 KMS 密钥 ARN 拥有 kms:* 权限。重新发出删除 KMS 密钥的请求，并\n设置 7 天的等待期。"}, {"letter": "D", "en": "Disable the KMS key. Re-issue the deletion request for the KMS key in 30 days.", "cn": "禁用 KMS 密钥。在 30 天内重新发出删除 KMS 密钥的请求。"}], "answer": "A", "explanation_en": "AWS KMS enforces a mandatory minimum waiting period of 7 days before a customer managed key can\nbe deleted. According to AWS Certified Security - Specialty incident response guidance, no method exists\nto immediately delete a KMS key. The fastest possible deletion is achieved by scheduling deletion with the\nminimum 7-day waiting period.\nIn this scenario, although deletion was previously scheduled, the key remains enabled and usable. The\nmost authoritative and reliable method to regain control and reissue deletion immediately is to use the AWS\n\n\naccount root user, which has implicit permissions to manage KMS keys regardless of compromised IAM principals.\nOption B is incorrect because KMS keys are regional resources; multi-Region keys require coordinated\ndeletion but do not shorten the waiting period. Option C is unnecessary because the key policy already allows\nkms:*. Option D increases the deletion waiting period to 30 days, which violates the requirement to delete the\nkey as quickly as possible.\nAWS documentation clearly states that root user access is the ultimate authority for KMS key management and that 7 days is the minimum deletion window, making this the fastest valid option.\nA MS Certified Security - Specialty Official Study Guide\nExams Prep\nAWS Key Management Service Developer Guide\nAWS Incident Response Best Practices", "explanation_cn": "AWS KMS 在客户管理的密钥可以被删除之前强制实施至少 7 天的等待期。根据 AWS 安全认证专\n家事件响应指南，不存在立即删除 KMS 密钥的方法。通过设置最短 7 天的等待期来安排删除，可\n实现最快的删除。\n在这种情况下，尽管之前已安排删除，但密钥仍然启用且可用。重新获得控制权并立即重新发出删\n除请求的最具权威性和可靠性的方法是使用 AWS 账户根用户，该用户具有管理 KMS 密钥的隐含\n权限，而不受受损 IAM 主体的影响。\n选项 B 不正确，因为 KMS 密钥是区域资源；多区域密钥需要协调删除，但不会缩短等待期。选项\nC 不必要，因为密钥策略已经允许 kms:*。选项 D 将删除等待期增加到 30 天，这违反了尽快删除密\n钥的要求。\nAWS 文档明确指出，根用户访问是 KMS 密钥管理的最终权限，7 天是最短删除窗口，这使其成为\n最快的有效选项。\n一本微软认证安全 - 专业官方学习指南\n考试准备\nAWS 密钥管理服务开发者指南\nAWS 事件响应最佳实践"}, {"num": 3, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A security team manages a company’s AWS Key Management Service (AWS KMS) customer managed\nkeys. Only members of the security team can administer the KMS keys. The company’s application team has\na software process that needs temporary access to the keys occasionally. The security team needs to provide\nthe application team’s software process with access to the keys.\n\nWhich solution will meet these requirements with the LEAST operational overhead?", "question_cn": "一个安全团队管理公司的 AWS 密钥管理服务 (AWS KMS) 客户管理密钥。只有安全团队的成员才\n能管理 KMS 密钥。公司的应用程序团队有一个软件流程，偶尔需要临时访问这些密钥。安全团队\n需要为应用程序团队的软件流程提供对密钥的访问权限。\n哪种解决方案能够以最少的运营开销满足这些要求？", "options": [{"letter": "A", "en": "Export the KMS key material to an on-premises hardware security module (HSM). Give the application\nteam access to the key material.", "cn": "将 KMS 密钥材料导出到本地硬件安全模块 (HSM)。给予应用程序团队对密钥材料的访问权限。"}, {"letter": "B", "en": "Edit the key policy that grants the security team access to the KMS keys by adding the application team\nas principals. Revert this change when the application team no longer needs access.", "cn": "通过将应用程序团队添加为主体来编辑授予安全团队访问 KMS 密钥权限的关键策略。当应用程\n序团队不再需要访问权限时，撤销此更改。"}, {"letter": "C", "en": "Create a key grant to allow the application team to use the KMS keys. Revoke the grant when the\napplication team no longer needs access.", "cn": "创建密钥授予，允许应用程序团队使用 KMS 密钥。当应用程序团队不再需要访问权限时，撤销\n该授予。"}, {"letter": "D", "en": "Create a new KMS key by generating key material on premises. Import the key material to AWS KMS\nwhenever the application team needs access. Grant the application team permissions to use the key.", "cn": "通过在本地生成密钥材料来创建新的 KMS 密钥。每当应用程序团队需要访问时，将密钥材料导\n入到 AWS KMS。授予应用程序团队使用该密钥的权限。"}], "answer": "C", "explanation_en": "AWS KMS key grants are specifically designed to provide temporary, granular permissions to use customer managed keys without modifying key policies. According to the AWS Certified Security - Specialty\nStudy Guide, grants are the preferred mechanism for delegating key usage permissions to AWS principals for\nshort-term or programmatic access scenarios. Grants allow permissions such as Encrypt, Decrypt, or GenerateDataKey and can be created and revoked dynamically.\n\nUsing a key grant avoids the operational risk and overhead of editing key policies, which are long-term\ncontrol mechanisms and should remain stable. AWS documentation emphasizes that frequent key policy\nchanges increase the risk of misconfiguration and accidental privilege escalation. Grants can be revoked\nimmediately when access is no longer required, ensuring strong adherence to the principle of least privilege.\nOptions A and D violate AWS security best practices because AWS KMS does not allow direct export of\nkey material unless the key was explicitly created as an importable key, and exporting key material increases\nexposure risk. Option B requires manual policy changes and rollback, which introduces operational overhead\nand audit complexity.\nAWS recommends key grants as the most efficient and secure way to provide temporary access to KMS\nkeys for applications.", "explanation_cn": "AWS KMS 密钥授予专门设计用于在不修改密钥策略的情况下提供临时、细粒度的权限来使用客户\n管理的密钥。根据《AWS Certified Security - Specialty Study Guide》，授予是在短期或编程访问场\n景中向 AWS 主体委托密钥使用权限的首选机制。授予允许诸如加密、解密或生成数据密钥等权限，\n并且可以动态创建和撤销。\n使用密钥授予可避免编辑密钥策略带来的操作风险和开销，密钥策略是长期控制机制，应保持稳定。\nAWS 文档强调，频繁更改密钥策略会增加配置错误和意外权限提升的风险。当不再需要访问权限\n时，可以立即撤销授予，确保严格遵守最小权限原则。\n选项 A 和 D 违反了 AWS 安全最佳实践，因为除非密钥被明确创建为可导入密钥，否则 AWS KMS\n不允许直接导出密钥材料，并且导出密钥材料会增加暴露风险。选项 B 需要手动进行策略更改和回\n滚，这会带来操作开销和审计复杂性。\nAWS 建议使用密钥授予作为为应用程序提供对 KMS 密钥的临时访问权限的最有效和最安全的方\n法。"}, {"num": 4, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company hosts its public website on Amazon EC2 instances behind an Application Load Balancer\n(ALB). The website is experiencing a global DDoS attack from a specific IoT device brand that uses a unique\nuser agent. A security engineer is creating an AWS WAF web ACL and will associate it with the ALB.\nWhich rule statement will mitigate the current attack and future attacks from these IoT devices without\nblocking legitimate customers?", "question_cn": "一家公司在应用程序负载均衡器 (ALB) 后面的 Amazon EC2 实例上托管其公共网站。该网站正遭\n受来自特定物联网设备品牌的全球 DDoS 攻击，该品牌使用独特的用户代理。一名安全工程师正在\n创建一个 AWS WAF 网络访问控制列表，并将其与 ALB 关联。\n哪种规则语句将缓解当前攻击以及来自这些物联网设备的未来攻击，同时不阻止合法客户？", "options": [{"letter": "A", "en": "Use an IP set match rule statement.", "cn": "使用 IP 集匹配规则语句。"}, {"letter": "B", "en": "Use a geographic match rule statement.", "cn": "使用地理匹配规则语句。"}, {"letter": "C", "en": "Use a rate-based rule statement.", "cn": "使用基于速率的规则语句。"}, {"letter": "D", "en": "Use a string match rule statement on the user agent.", "cn": "在用户代理上使用字符串匹配规则语句。"}], "answer": "D", "explanation_en": "AWS WAF string match rule statements allow inspection of HTTP headers, including the User-Agent\nheader. According to AWS Certified Security - Specialty guidance, when malicious traffic can be uniquely\nidentified by a consistent request attribute, such as a device-specific user agent, a string match rule provides\nprecise mitigation with minimal false positives.\n\n\nIP-based blocking is ineffective for globally distributed botnets. Geographic blocking risks denying access\nto legitimate users. Rate-based rules limit request volume but do not prevent low-and-slow attacks.\nBy matching the unique IoT device brand in the User-Agent header, the security engineer can block only\nmalicious requests while preserving customer access.", "explanation_cn": "AWS WAF 字符串匹配规则语句允许检查 HTTP 标头，包括用户代理标头。根据 AWS 安全认证 - 专\n业指南，当恶意流量可以通过一致的请求属性 (如特定设备的用户代理) 唯一识别时，字符串匹配规\n则可以以最小的误报提供精确的缓解。\n基于 IP 的阻止对于全球分布的僵尸网络无效。地理阻止有拒绝合法用户访问的风险。基于速率的\n规则限制请求量，但不能防止低速和慢速攻击。\n通过匹配用户代理标头中唯一的物联网设备品牌，安全工程师可以在保留客户访问权限的同时仅阻\n止恶意请求。"}, {"num": 5, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "Top IT Certification Prep Material\nA company has an AWS account that hosts a production application. The company receives an email\nnotification that Amazon GuardDuty has detected an Impact:IAMUser/AnomalousBehavior finding in the\naccount. A security engineer needs to run the investigation playbook for this security incident and must\ncollect and analyze the information without affecting the application.\n\n\nWhich solution will meet these requirements MOST quickly?", "question_cn": "顶级 IT 认证备考资料\n一家公司有一个托管生产应用程序的 AWS 账户。该公司收到一封电子邮件通知，称 Amazon GuardDuty 在该账户中检测到一个影响:IAM 用户/异常行为的发现。一名安全工程师需要针对此安全事\n件运行调查手册，并且必须在不影响应用程序的情况下收集和分析信息。\n哪种解决方案能最快满足这些要求？", "options": [{"letter": "A", "en": "Log in to the AWS account by using read-only credentials. Review the GuardDuty finding for details\nabout the IAM credentials that were used. Use the IAM console to add a DenyAll policy to the IAM principal.", "cn": "使用只读凭据登录 AWS 账户。查看 GuardDuty 的发现，了解所使用的 IAM 凭据的详细信息。使\n用 IAM 控制台向 IAM 主体添加拒绝所有策略。"}, {"letter": "B", "en": "Log in to the AWS account by using read-only credentials. Review the GuardDuty finding to determine\nwhich API calls initiated the finding. Use Amazon Detective to review the API calls in context.", "cn": "使用只读凭据登录 AWS 账户。查看 GuardDuty 的发现，以确定引发该发现的 API 调用。使用\nAmazon Detective 在上下文中查看 API 调用。"}, {"letter": "C", "en": "Log in to the AWS account by using administrator credentials. Review the GuardDuty finding for\ndetails about the IAM credentials that were used. Use the IAM console to add a DenyAll policy to the IAM\nprincipal.", "cn": "使用管理员凭据登录 AWS 账户。查看 GuardDuty 的发现，了解所使用的 IAM 凭据的详细信息。\n使用 IAM 控制台向 IAM 主体添加拒绝所有策略。"}, {"letter": "D", "en": "Log in to the AWS account by using read-only credentials. Review the GuardDuty finding to determine\nwhich API calls initiated the finding. Use AWS CloudTrail Insights and AWS CloudTrail Lake to review the\nAPI calls in context.", "cn": "使用只读凭据登录 AWS 账户。查看 GuardDuty 的发现，以确定引发该发现的 API 调用。使用\nAWS CloudTrail Insights 和 AWS CloudTrail Lake 在上下文中查看 API 调用。"}], "answer": "B", "explanation_en": "Amazon GuardDuty findings provide high-level detection of suspicious activity but are not designed\nfor deep investigation on their own. The AWS Certified Security - Specialty documentation explains that\n\n\nAmazon Detective is purpose-built to support rapid investigations by automatically collecting, correlating, and\nvisualizing data from GuardDuty, AWS CloudTrail, and VPC Flow Logs. Detective enables security engineers\nto analyze API calls, user behavior, and resource interactions in context without making any changes to the\nenvironment.\nUsing read-only credentials ensures that the investigation does not impact the production application.\nAmazon Detective allows investigators to pivot directly from a GuardDuty finding into a detailed activity\ngraph, showing which IAM user made anomalous calls, what resources were accessed, and how behavior\ndeviated from the baseline. This significantly accelerates incident investigation.\nOptions A and C involve applying DenyAll policies, which are containment actions and could affect application availability. Option D requires manual analysis and setup and is slower than using Amazon Detective,\nwhich is designed for immediate investigative workflows.\nAWS incident response guidance recommends using Detective for rapid, non-intrusive analysis after\nGuardDuty findings.", "explanation_cn": "Amazon GuardDuty 的发现提供了对可疑活动的高级检测，但本身并非用于深入调查。AWS 安全认\n证 - 专业版文档解释说，Amazon Detective 专为支持快速调查而构建，它可以自动收集、关联和可\n视化来自 GuardDuty、AWS CloudTrail 和 VPC 流日志的数据。Detective 使安全工程师能够在不更\n改环境的情况下在上下文中分析 API 调用、用户行为和资源交互。\n 使用只读凭证可确保调查不会影响生产应用程序。Amazon Detective 允许调查人员直接从\nGuardDuty 调查结果转向详细的活动图，显示哪个 IAM 用户进行了异常调用、访问了哪些资源以\n及行为如何偏离基线。这显著加快了事件调查的速度。\n 选项 A 和 C 涉及应用 DenyAll 策略，这是一种遏制措施，可能会影响应用程序的可用性。选\n项 D 需要手动分析和设置，并且比使用专为即时调查工作流程设计的 Amazon Detective 慢。\nAWS 事件响应指南建议在 GuardDuty 调查结果之后使用 Detective 进行快速、非侵入式分\n析。"}, {"num": 6, "category_en": "Infrastructure Security", "category_cn": "基礎設施安全", "question_en": "A company runs ECS services behind an internet-facing ALB that is the origin for CloudFront. An AWS\nWAF web ACL is associated with CloudFront, but clients can bypass it by accessing the ALB directly.\nWhich solution will prevent direct access to the ALB?", "question_cn": "## 问题编号:6 - [基础设施安全]\n 一家公司在面向互联网的 ALB 后面运行 ECS 服务，该 ALB 是 CloudFront 的源站。一个 AWS\nWAF 网络 ACL 与 CloudFront 相关联，但客户可以通过直接访问 ALB 来绕过它。\n 哪种解决方案可以防止直接访问 ALB？", "options": [{"letter": "A", "en": "Use AWS PrivateLink with the ALB.", "cn": "将 AWS PrivateLink 与 ALB 一起使用。"}, {"letter": "B", "en": "Replace the ALB with an internal ALB.", "cn": "将 ALB 替换为内部 ALB。"}, {"letter": "C", "en": "Restrict ALB listener rules to CloudFront IP ranges.", "cn": "将 ALB 监听器规则限制为 CloudFront IP 范围。"}, {"letter": "D", "en": "Require a custom header from CloudFront and validate it at the ALB.", "cn": "要求 CloudFront 提供自定义标头并在 ALB 处进行验证。"}], "answer": "D", "explanation_en": "AWS best practices recommend using a shared secret header between CloudFront and ALB origins to\nprevent direct access. CloudFront injects a custom header, and the ALB listener rules validate its presence.\n\n\nIP-based controls are brittle due to CloudFront IP changes. PrivateLink and internal ALBs are not supported as CloudFront origins. Header validation is the most reliable and widely recommended pattern.", "explanation_cn": "AWS 最佳实践建议在 CloudFront 和 ALB 源之间使用共享密钥标头，以防止直接访问。CloudFront\n会注入一个自定义标头，ALB 监听器规则会验证其是否存在。\n由于 CloudFront 的 IP 会发生变化，基于 IP 的控制很脆弱。不支持将 PrivateLink 和内部 ALB 用作\nCloudFront 源。标头验证是最可靠且被广泛推荐的模式。"}, {"num": 7, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A security administrator is setting up a new AWS account. The security administrator wants to secure\nthe data that a company stores in an Amazon S3 bucket. The security administrator also wants to reduce\nthe chance of unintended data exposure and the potential for misconfiguration of objects that are in the S3\nbucket.\nWhich solution will meet these requirements with the LEAST operational overhead?", "question_cn": "一位安全管理员正在设置一个新的 AWS 账户。该安全管理员希望保护公司存储在 Amazon S3 存储\n桶中的数据。该安全管理员还希望减少意外数据暴露的可能性以及 S3 存储桶中对象配置错误的可\n能性。\n哪种解决方案能以最少的操作开销满足这些要求？", "options": [{"letter": "A", "en": "Configure the S3 Block Public Access feature for the AWS account.", "cn": "为 AWS 账户配置 S3 阻止公共访问功能。"}, {"letter": "B", "en": "Configure the S3 Block Public Access feature for all objects that are in the bucket.", "cn": "为存储桶中的所有对象配置 S3 阻止公共访问功能。"}, {"letter": "C", "en": "Deactivate ACLs for objects that are in the bucket.", "cn": "停用存储桶中对象的 ACL。\nExams Prep\n考试准备"}, {"letter": "D", "en": "Use AWS PrivateLink for Amazon S3 to access the bucket.", "cn": "使用 AWS PrivateLink for Amazon S3 来访问存储桶。"}], "answer": "A", "explanation_en": "Amazon S3 Block Public Access configured at the AWS account level is the recommended and most effective approach to protect data stored in Amazon S3 while minimizing operational overhead. AWS Security\nSpecialty documentation explains that S3 Block Public Access provides centralized, preventative controls designed to block public access to S3 buckets and objects regardless of individual bucket policies or object-level\nACL configurations. When enabled at the account level, these controls automatically apply to all existing\nand newly created buckets, significantly reducing the risk of accidental exposure caused by misconfigured\npermissions.\nThe AWS Certified Security - Specialty Study Guide emphasizes that public access misconfiguration is a\nleading cause of data leaks in cloud environments. Account-level S3 Block Public Access acts as a guardrail by\noverriding any attempt to grant public permissions through bucket policies or ACLs. This eliminates the need\nto manage security settings on a per-bucket or per-object basis, thereby reducing administrative complexity\nand human error.\n\n\nConfiguring Block Public Access at the object level, as in option B, requires continuous monitoring and\nmanual configuration, which increases operational overhead. Disabling ACLs alone, as described in option\nC, does not fully prevent public access because bucket policies can still allow public permissions. Using AWS\nPrivateLink, as in option D, controls network access but does not protect against public exposure through\nmisconfigured S3 policies.\nAWS security best practices explicitly recommend enabling S3 Block Public Access at the account level\nas the primary mechanism for preventing unintended public data exposure with minimal management effort.", "explanation_cn": "在 AWS 账户级别配置的 Amazon S3 阻止公共访问是保护存储在 Amazon S3 中的数据同时将操作\n开销降至最低的推荐且最有效的方法。AWS 安全专家文档解释说，S3 阻止公共访问提供了集中式\n的预防性控制，旨在阻止对 S3 存储桶和对象的公共访问，而不管单个存储桶策略或对象级 ACL 配\n置如何。在账户级别启用时，这些控制会自动应用于所有现有和新创建的存储桶，显著降低因权限\n配置错误而导致意外暴露的风险。\n《AWS 认证安全 - 专业认证学习指南》强调，公共访问配置错误是云环境中数据泄露的主要原因。账\n户级别的 S3 阻止公共访问通过覆盖任何通过存储桶策略或 ACL 授予公共权限的尝试，起到了护栏\n的作用。这消除了在每个存储桶或每个对象基础上管理安全设置的需要，从而降低了管理复杂性和\n人为错误。\n在对象级别配置阻止公共访问 (如选项 B 中所述) 需要持续监控和手动配置，这会增加运营开销。如\n选项 C 中所述，仅禁用 ACL 并不能完全防止公共访问，因为存储桶策略仍可允许公共权限。如选\n项 D 中所述，使用 AWS PrivateLink 可控制网络访问，但无法防止因 S3 策略配置错误而导致的公\n共暴露。\nAWS 安全最佳实践明确建议在账户级别启用 S3 阻止公共访问，作为以最小管理工作量防止意外公\n开数据暴露的主要机制。"}, {"num": 8, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company has the following security policy for its Amazon Aurora MySQL databases for a single AWS\naccount:\n\n\n• Database storage must be encrypted at rest.\n• Deletion protection must be enabled.\n• Databases must not be publicly accessible.\n• Database audit logs must be published to Amazon CloudWatch Logs.\nA security engineer must implement a solution that continuously monitors all Aurora MySQL resources\nfor compliance with this policy. The solution must be able to display a database’s compliance state for each\npart of the policy at any time.\nWhich solution will meet these requirements?", "question_cn": "一家公司针对其单个 AWS 账户中的 Amazon Aurora MySQL 数据库制定了以下安全策略:\n• 数据库存储必须在静止时进行加密。\n• 必须启用删除保护。\n• 数据库不得公开访问。\n• 数据库审计日志必须发布到 Amazon CloudWatch Logs。\n安全工程师必须实施一种解决方案，持续监控所有 Aurora MySQL 资源是否符合此策略。该解决方\n案必须能够随时显示数据库在策略各部分的合规状态。\n哪种解决方案能满足这些要求？", "options": [{"letter": "A", "en": "Enable AWS Audit Manager. Configure Audit Manager to use a custom framework that matches the\nsecurity requirements. Create an assessment report to view the compliance state.", "cn": "启用 AWS 审计管理器。配置审计管理器以使用与安全要求匹配的自定义框架。创建评估报告以\n查看合规状态。"}, {"letter": "B", "en": "Enable AWS Config. Implement AWS Config managed rules that monitor all Aurora MySQL resources\nfor the security requirements. View the compliance state in the AWS Config dashboard.", "cn": "启用 AWS 配置。实施 AWS 配置托管规则，以监控所有 Aurora MySQL 资源的安全要求。在 AWS\n配置仪表板中查看合规状态。"}, {"letter": "C", "en": "Enable AWS Security Hub. Create a configuration policy that includes the security requirements.\nApply the configuration policy to all Aurora MySQL resources. View the compliance state in Security Hub.", "cn": "启用 AWS 安全中心。创建一个包含安全要求的配置策略。将配置策略应用于所有 Aurora MySQL\n资源。在安全中心查看合规状态。"}, {"letter": "D", "en": "Create an Amazon EventBridge rule that runs when an Aurora MySQL resource is created or modified.\nCreate an AWS Lambda function to verify the security requirements and to send the compliance state to a\nCloudWatch custom metric.", "cn": "创建一个在创建或修改 Aurora MySQL 资源时运行的 Amazon EventBridge 规则。创建一个 AWS\nLambda 函数来验证安全要求并将合规状态发送到 CloudWatch 自定义指标。"}], "answer": "B", "explanation_en": "AWS Config is a fully managed service that provides continuous monitoring and evaluation of AWS resource configurations against desired configuration baselines. According to the AWS Certified Security - Specialty Official Study Guide, AWS Config is the primary service used to track configuration changes, evaluate\ncompliance in near real time, and display compliance states for individual AWS resources.\nAWS Config provides managed rules that directly map to the listed Aurora MySQL security requirements,\nincluding encryption at rest, public accessibility, deletion protection, and log exports to CloudWatch Logs.\nThese managed rules continuously evaluate resources and mark them as compliant or noncompliant whenever a configuration change occurs.\nThe AWS Config dashboard enables security engineers to view per-resource and per-rule compliance\nstates at any point in time, satisfying the requirement to display compliance status for each part of the policy.\nAWS Audit Manager (Option A) is designed for audit evidence collection and reporting, not continuous\nmonitoring. AWS Security Hub (Option C) aggregates findings from other services but relies on AWS Config\nfor configuration compliance data. Option D introduces unnecessary custom logic and does not provide a\nnative compliance dashboard.\n\n\nAWS documentation explicitly identifies AWS Config as the authoritative service for continuous compliance monitoring and visibility.\n• AWS Certified Security - Specialty Official Study Guide\nAWS Config Developer Guide\nAmazon Aurora Security Best Practices\n• AWS Well-Architected Framework - Security Pillar", "explanation_cn": "AWS 配置是一项完全托管的服务，可根据所需的配置基线对 AWS 资源配置进行持续监控和评估。\n根据《AWS 安全认证专业官方学习指南》\n，AWS 配置是用于跟踪配置更改、近乎实时评估合规性以\n及显示单个 AWS 资源的合规状态的主要服务。\nAWS 配置提供直接映射到列出的 Aurora MySQL 安全要求的托管规则，包括静态加密、公共可访问\n性、删除保护以及将日志导出到 CloudWatch 日志。这些托管规则会持续评估资源，并在发生配置\n更改时将它们标记为合规或不合规。\nAWS 配置仪表板使安全工程师能够在任何时间点查看每个资源和每个规则的合规状态，满足显示\n策略各部分合规状态的要求。\nAWS 审计管理器 (选项 A) 专为审计证据收集和报告而设计，而非持续监控。AWS 安全中心 (选项\nC) 聚合来自其他服务的调查结果，但依赖 AWS 配置获取配置合规性数据。选项 D 引入了不必要的\n自定义逻辑，并且不提供原生合规仪表板。\nAWS 文档明确将 AWS 配置标识为用于持续合规监控和可见性的权威服务。\n•《AWS 安全认证专业官方学习指南》\nAWS 配置开发者指南\nAmazon Aurora 安全最佳实践\n•《AWS 架构良好框架 - 安全支柱》"}, {"num": 9, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A security engineer is designing a solution that will provide end-to-end encryption between clients and\nDocker containers running in Amazon Elastic Container Service (Amazon ECS). This solution must also handle volatile traffic patterns.\nWhich solution would have the MOST scalability and LOWEST latency?", "question_cn": "一位安全工程师正在设计一个解决方案，该方案将在客户端与在亚马逊弹性容器服务 (Amazon\nECS) 中运行的 Docker 容器之间提供端到端加密。此解决方案还必须处理多变的流量模式。\n哪种解决方案具有最高的可扩展性和最低的延迟？", "options": [{"letter": "A", "en": "Configure a Network Load Balancer to terminate the TLS traffic and then re-encrypt the traffic to the\ncontainers.", "cn": "配置网络负载均衡器以终止 TLS 流量，然后将流量重新加密到容器。"}, {"letter": "B", "en": "Configure an Application Load Balancer to terminate the TLS traffic and then re-encrypt the traffic to\nthe containers.", "cn": "配置应用程序负载均衡器以终止 TLS 流量，然后将流量重新加密到容器。"}, {"letter": "C", "en": "Configure a Network Load Balancer with a TCP listener to pass through TLS traffic to the containers.", "cn": "配置一个带有 TCP 监听器的网络负载均衡器，以将 TLS 流量直通到容器。"}, {"letter": "D", "en": "Configure Amazon Route 53 to use multivalue answer routing to send traffic to the containers.", "cn": "配置亚马逊 Route 53 以使用多值答案路由将流量发送到容器。"}], "answer": "C", "explanation_en": "Network Load Balancers operate at Layer 4 and are optimized for extreme performance, ultra-low latency,\nand handling sudden traffic spikes. According to AWS Certified Security - Specialty documentation, using a\nTCP listener on an NLB allows TLS traffic to pass through directly to backend containers without termination,\npreserving true end-to-end encryption.\nThis approach eliminates the overhead of decrypting and re-encrypting traffic at the load balancer, reducing latency and maximizing throughput. NLBs scale automatically to handle volatile traffic patterns and\nmillions of requests per second.\nApplication Load Balancers operate at Layer 7 and introduce additional latency due to TLS termination\nand HTTP processing. Route 53 multivalue routing does not provide load balancing at the transport layer and\ndoes not ensure encryption handling.\nAWS recommends NLB TCP pass-through for high-performance, end-to-end encrypted container workloads.", "explanation_cn": "网络负载均衡器在第 4 层运行，针对极致性能、超低延迟和处理突发流量高峰进行了优化。根据\nAWS 认证安全 - 专业文档，在 NLB 上使用 TCP 监听器可使 TLS 流量直接直通到后端容器而不终止，\n从而保留真正的端到端加密。\n这种方法消除了在负载均衡器处解密和重新加密流量的开销，减少了延迟并最大化了吞吐量。NLB\n会自动扩展以处理多变的流量模式和每秒数百万的请求。\n应用程序负载均衡器在第 7 层运行，由于 TLS 终止和 HTTP 处理会引入额外的延迟。Route 53 多值\n路由在传输层不提供负载均衡，也不能确保加密处理。\nAWS 建议对高性能、端到端加密的容器工作负载使用 NLB TCP 直通。"}, {"num": 10, "category_en": "Identity and Access Management", "category_cn": "身份与访问管理", "question_en": "A company stores infrastructure and application code in web-based, third-party, Git-compatible code\nrepositories outside of AWS. The company wants to give the code repositories the ability to securely authenticate and assume an existing IAM role within the company’s AWS account by using OpenID Connect (OIDC).\nWhich solution will meet these requirements?", "question_cn": "一家公司将基础设施和应用程序代码存储在基于网络的第三方与 Git 兼容的代码存储库中，这些存\n储库位于 AWS 之外。该公司希望代码存储库能够通过使用 OpenID Connect (OIDC) 来安全地进行\n身份验证并承担公司 AWS 账户内现有的 IAM 角色。\n哪种解决方案能够满足这些要求？", "options": [{"letter": "A", "en": "Create an OIDC identity provider (IdP) by using AWS Identity and Access Management (IAM) federation. Modify the trust policy of the IAM role to allow the code repositories to assume the IAM role.", "cn": "使用 AWS 身份与访问管理 (IAM) 联合创建一个 OIDC 身份提供商 (IdP)。修改 IAM 角色的信任\n策略，以允许代码存储库承担该 IAM 角色。"}, {"letter": "B", "en": "Use AWS Identity and Access Management (IAM) Roles Anywhere to create a trust anchor that uses\nOIDC. Modify the trust policy of the IAM role to allow the code repositories to assume the IAM role.", "cn": "使用 AWS 身份与访问管理 (IAM) 随处可用角色创建一个使用 OIDC 的信任锚。修改 IAM 角色\n的信任策略，以允许代码存储库承担该 IAM 角色。"}, {"letter": "C", "en": "Set up an account instance of AWS IAM Identity Center. Configure access to the code repositories as\na customer managed OIDC application. Grant the application access to the IAM role.", "cn": "设置 AWS IAM 身份中心的账户实例。将对代码存储库的访问配置为客户管理的 OIDC 应用程序。\n授予该应用程序对 IAM 角色的访问权限。"}, {"letter": "D", "en": "Use AWS Resource Access Manager (AWS RAM) to create a new resource share that uses OIDC. Limit\nthe resource share to the specified code repositories. Grant the IAM role access to the resource share.", "cn": "使用 AWS 资源访问管理器 (AWS RAM) 创建一个使用 OIDC 的新资源共享。将资源共享限制为\n指定的代码存储库。授予 IAM 角色对资源共享的访问权限。"}], "answer": "A", "explanation_en": "AWS IAM supports identity federation by allowing external identity providers that use OpenID Connect\n(OIDC) to authenticate and assume IAM roles. According to the AWS Certified Security - Specialty documentation, IAM OIDC identity providers are the recommended approach for enabling third-party systems, such\nas external CI/CD pipelines or Git-based repositories, to securely obtain temporary AWS credentials without\nusing long-term access keys.\nBy creating an OIDC identity provider in IAM and configuring the IAM role trust policy to trust the external IdP, the company enables secure, token-based authentication. The trust policy can include conditions\nthat restrict which repositories, branches, or workflows are allowed to assume the role, enforcing least privilege. AWS Security Specialty guidance emphasizes that this method eliminates static credentials and relies\non short-lived tokens issued by the OIDC provider.\nOption B is incorrect because IAM Roles Anywhere is designed for workloads running outside AWS\nthat use X.509 certificates, not OIDC. Option C is intended for workforce identity federation, not machineto-machine authentication. Option D is invalid because AWS RAM does not provide identity federation or\nauthentication capabilities.\n\n\nThis solution aligns with AWS best practices for secure, scalable, and low-overhead authentication for\nexternal workloads.", "explanation_cn": "AWS IAM 通过允许使用 OpenID Connect (OIDC) 的外部身份提供商进行身份验证并承担 IAM 角\n色来支持身份联合。根据 AWS 安全专业认证文档，IAM OIDC 身份提供商是使第三方系统 (如外\n部 CI/CD 管道或基于 Git 的存储库) 能够在不使用长期访问密钥的情况下安全获取临时 AWS 凭证\n的推荐方法。\n通过在 IAM 中创建 OIDC 身份提供商并配置 IAM 角色信任策略以信任外部 IdP，公司实现了基于\n令牌的安全身份验证。信任策略可以包括限制哪些存储库、分支或工作流程可以承担该角色的条件，\n从而实施最小权限原则。AWS 安全专业指南强调，此方法消除了静态凭证，并依赖于 OIDC 提供商\n颁发的短期令牌。\n选项 B 不正确，因为 IAM 随处可用角色是为在 AWS 外部运行且使用 X.509 证书的工作负载设计\n的，而非 OIDC。选项 C 用于员工身份联合，而非机器对机器的身份验证。选项 D 无效，因为 AWS\nRAM 不提供身份联合或身份验证功能。\n此解决方案符合 AWS 针对外部工作负载进行安全、可扩展且低开销身份验证的最佳实践。"}, {"num": 11, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company runs an application on a fleet of Amazon EC2 instances. The company can remove instances\nfrom the fleet without risk to the application. All EC2 instances use the same security group named ProdFleet.\nAmazon GuardDuty and AWS Config are active in the company’s AWS account.\nA security engineer needs to provide a solution that will prevent an EC2 instance from sending outbound\ntraffic if GuardDuty generates a cryptocurrency finding event. The security engineer creates a new security\ngroup named Isolate that contains no outbound rules. The security engineer configures an AWS Lambda\nfunction to remove an EC2 instance from the ProdFleet security group and add it to the Isolate security group.\n\n\nWhich additional step will meet this requirement?", "question_cn": "一家公司在一批 Amazon EC2 实例上运行一个应用程序。该公司可以从该批实例中移除实例而不\n会对应用程序造成风险。所有 EC2 实例都使用名为 ProdFleet 的相同安全组。Amazon GuardDuty\n和 AWS Config 在该公司的 AWS 账户中处于活动状态。\n一名安全工程师需要提供一种解决方案，在 GuardDuty 生成加密货币发现事件时防止 EC2 实例发\n送出站流量。该安全工程师创建了一个名为 Isolate 的新安全组，其中不包含出站规则。该安全工\n程师配置了一个 AWS Lambda 函数，以便从 ProdFleet 安全组中移除一个 EC2 实例并将其添加到\nIsolate 安全组。\n还需要采取哪一步骤来满足此要求？", "options": [{"letter": "A", "en": "Configure GuardDuty to directly invoke the Lambda function if GuardDuty generates a CryptoCurrency:EC2/* finding event.", "cn": "如果 GuardDuty 生成 CryptoCurrency:EC2/* 发现事件，配置 GuardDuty 直接调用 Lambda 函数。"}, {"letter": "B", "en": "Configure an AWS Config rule that invokes the Lambda function if a CryptoCurrency:EC2/* configuration change event occurs for an EC2 instance.", "cn": "配置一个 AWS Config 规则，\n在 EC2 实例发生 CryptoCurrency:EC2/* 配置更改事件时调用 Lambda\n函数。"}, {"letter": "C", "en": "Configure an Amazon EventBridge rule that invokes the Lambda function if GuardDuty generates a\nCryptoCurrency:EC2/* finding event.", "cn": "配置一个 Amazon EventBridge 规则，在 GuardDuty 生成 CryptoCurrency:EC2/* 发现事件时调用\nLambda 函数。"}, {"letter": "D", "en": "Configure an Amazon EventBridge rule that invokes the Lambda function if AWS Config detects a\nCryptoCurrency:EC2/* configuration change event for an EC2 instance.", "cn": "配置一个 Amazon EventBridge 规则，在 AWS Config 检测到 EC2 实例的 CryptoCurrency:EC2/*\n配置更改事件时调用 Lambda 函数。"}], "answer": "C", "explanation_en": "Amazon GuardDuty generates security findings when it detects suspicious or malicious activity, including CryptoCurrency:EC2/* findings that indicate an EC2 instance may be involved in unauthorized cryptocurrency mining. According to AWS Certified Security - Specialty documentation, GuardDuty findings are\npublished as events to Amazon EventBridge (formerly Amazon CloudWatch Events).\n\n\nAmazon EventBridge is the recommended service for building automated incident response workflows.\nBy creating an EventBridge rule that listens for GuardDuty findings of type CryptoCurrency:EC2/*, the security engineer can automatically invoke a Lambda function to isolate the affected EC2 instance by modifying\nits security group attachments.\nOption A is incorrect because GuardDuty does not directly invoke Lambda functions. Option B and\nOption D are incorrect because AWS Config tracks configuration compliance and resource changes, not realtime threat detection events. Cryptocurrency findings are security detections, not configuration changes.\nAWS documentation explicitly describes this pattern-GuardDuty # EventBridge # Lambda # remediation\naction - as a best practice for automated threat response and containment.\nExams Prep\nAWS Certified Security - Specialty Official Study Guide\nAmazon GuardDuty User Guide - Findings\nAmazon EventBridge User Guide\nAWS Incident Response Best Practices", "explanation_cn": "当 Amazon GuardDuty 检测到可疑或恶意活动时会生成安全发现，包括 CryptoCurrency:EC2/* 发\n现，这表明一个 EC2 实例可能参与了未经授权的加密货币挖掘。根据 AWS 安全认证 - 专业文档，\nGuardDuty 发现会作为事件发布到 Amazon EventBridge(以前称为 Amazon CloudWatch Events)。\nAmazon EventBridge 是构建自动化事件响应工作流程的推荐服务。通过创建一个监听类型为 CryptoCurrency:EC2/* 的 GuardDuty 发现的 EventBridge 规则，安全工程师可以通过修改其安全组附件\n来自动调用 Lambda 函数以隔离受影响的 EC2 实例。\n选项 A 不正确，因为 GuardDuty 不会直接调用 Lambda 函数。选项 B 和选项 D 不正确，因为 AWS\nConfig 跟踪配置合规性和资源更改，而不是实时威胁检测事件。加密货币发现是安全检测，而不是\n配置更改。\nAWS 文档明确将此模式——GuardDuty # EventBridge # Lambda # 补救措施——描述为自动威胁响\n应和遏制的最佳实践。\n考试准备\nAWS 安全认证 - 专业版官方学习指南\nAmazon GuardDuty 用户指南 - 发现\nAmazon EventBridge 用户指南\nAWS 事件响应最佳实践"}, {"num": 12, "category_en": "Detection", "category_cn": "检测", "question_en": "A security engineer configured VPC Flow Logs to publish to Amazon CloudWatch Logs. After 10 minutes, no logs appear. The issue is isolated to the IAM role associated with VPC Flow Logs.\nWhat could be the reason?", "question_cn": "一位安全工程师配置了 VPC 流日志以发布到 Amazon CloudWatch Logs。10 分钟后，没有日志出\n现。问题被隔离到与 VPC 流日志相关联的 IAM 角色。\n可能的原因是什么？", "options": [{"letter": "A", "en": "logs:GetLogEvents is missing.", "cn": "缺少 logs:GetLogEvents 权限。"}, {"letter": "B", "en": "The engineer cannot assume the role.", "cn": "工程师无法承担该角色。"}, {"letter": "C", "en": "The vpc-flow-logs.amazonaws.com principal cannot assume the role.", "cn": "vpc-flow-logs.amazonaws.com 主体无法承担该角色。"}, {"letter": "D", "en": "The role cannot tag the log stream.", "cn": "该角色无法标记日志流。"}], "answer": "C", "explanation_en": "VPC Flow Logs require an IAM role that CloudWatch Logs can use to publish flow log records. AWS documentation and AWS Certified Security - Specialty materials explain that the VPC Flow Logs service must be\nable to assume the IAM role through its trust policy. The trust relationship must include the service principal\nvpc-flow-logs.amazonaws.com. If the trust policy does not allow this principal to assume the role, flow logs\ncannot be delivered and no records will appear in the CloudWatch Logs log group even when traffic exists.\nlogs:GetLogEvents is not required for delivery; it is used for reading logs. The security engineer’s ability to\n\n\nassume the role is not relevant because the service, not the engineer, assumes it. Tagging permissions are not\nrequired for basic log delivery. Therefore, the most likely cause is an incorrect trust policy that prevents the\nVPC Flow Logs service principal from assuming the role.", "explanation_cn": "VPC 流日志需要一个 IAM 角色，CloudWatch Logs 可以使用该角色来发布流日志记录。AWS 文档\n和 AWS 安全认证 - 专业版资料解释说，VPC 流日志服务必须能够通过其信任策略承担 IAM 角色。\n信任关系必须包括服务主体 vpc-flow-logs.amazonaws.com。如果信任策略不允许此主体承担该角\n色，即使有流量存在，流日志也无法传递，并且 CloudWatch Logs 日志组中不会出现任何记录。传\n递日志不需要 logs:GetLogEvents 权限；它用于读取日志。工程师承担角色的能力无关紧要，因为是\n服务而不是工程师承担该角色。基本日志传递不需要标记权限。因此，最可能的原因是信任策略不\n正确，阻止了 VPC 流日志服务主体承担该角色。"}, {"num": 13, "category_en": "Detection", "category_cn": "检测", "question_en": "A company uses an organization in AWS Organizations to manage its 250 member accounts. The company also uses AWS IAM Identity Center with a SAML external identity provider (IdP). IAM Identity Center\nhas been delegated to a member account. The company’s security team has access to the delegated account.\nThe security team has been investigating a malicious internal user who might be accessing sensitive\naccounts. The security team needs to know when the user logged into the organization during the last 7 days.\nWhich solution will quickly identify the access attempts?", "question_cn": "一家公司使用 AWS Organizations 中的组织来管理其 250 个成员账户。\n该公司还将 AWS IAM Identity\nCenter 与 SAML 外部身份提供商 (IdP) 一起使用。IAM Identity Center 已被委托给一个成员账户。\n该公司的安全团队可以访问该委托账户。\n安全团队一直在调查一个可能正在访问敏感账户的恶意内部用户。安全团队需要知道该用户在过\n去 7 天内何时登录到该组织。\n哪种解决方案将快速识别访问尝试？", "options": [{"letter": "A", "en": "In the delegated account, use Amazon CloudWatch Logs to search for events that match the user\ndetails for all successful attempts.", "cn": "在委托账户中，使用 Amazon CloudWatch Logs 搜索与所有成功尝试中的用户详细信息匹配的事\n件。"}, {"letter": "B", "en": "In each member account, use the IAM Identity Center console to search for events that match the user\ndetails for all attempts.", "cn": "在每个成员账户中，使用 IAM Identity Center 控制台搜索与所有尝试中的用户详细信息匹配的\n事件。"}, {"letter": "C", "en": "In the external IdP, use Amazon EventBridge to search for events that match the user details for all\nattempts.", "cn": "在外部 IdP 中，使用 Amazon EventBridge 搜索与所有尝试中的用户详细信息匹配的事件。"}, {"letter": "D", "en": "In the organization’s management account, use AWS CloudTrail to search for events that match the\nuser details for all successful attempts.", "cn": "在组织的管理账户中，使用 AWS CloudTrail 搜索与所有成功尝试中的用户详细信息匹配的事件。"}], "answer": "D", "explanation_en": "AWS CloudTrail is the authoritative source for identity-related activity across an AWS Organization. According to the AWS Certified Security - Specialty Official Study Guide, CloudTrail records all AWS API calls\nand authentication events, including federated sign-ins that occur through AWS IAM Identity Center with an\nexternal SAML identity provider.\nWhen IAM Identity Center is used, successful federated login events are logged in CloudTrail as ConsoleLogin and AssumeRoleWithSAML events. These events are recorded in the organization’s management\n\n\naccount when CloudTrail is configured as an organization trail. This allows security teams to centrally search\nand correlate authentication activity across all member accounts.\nOption A is incorrect because CloudWatch Logs do not natively aggregate authentication events across\nan organization unless custom pipelines are built. Option B is not scalable and does not provide historical,\norganization-wide visibility. Option C is invalid because AWS does not ingest external IdP logs into EventBridge automatically, and IdP logs do not reflect AWS-side role assumptions.\nAWS documentation explicitly states that CloudTrail organization trails provide centralized visibility into\nuser authentication and access activity across all accounts, making this the fastest and most reliable way to\nidentify when a user logged in during a specific time window.\nAWS Certified Security - Specialty Official Study Guide\nAWS CloudTrail User Guide\nAWS IAM Identity Center Documentation\nAWS Organizations Best Practices", "explanation_cn": "AWS CloudTrail 是跨 AWS 组织的身份相关活动的权威来源。根据 AWS 安全认证 - 专业版官方学习\n指南，CloudTrail 记录所有 AWS API 调用和身份验证事件，包括通过带有外部 SAML 身份提供商\n的 AWS IAM Identity Center 进行的联合登录。\n当使用 IAM Identity Center 时，成功的联合登录事件在 CloudTrail 中作为 ConsoleLogin 和 AssumeRoleWithSAML 事件进行记录。当 CloudTrail 配置为组织跟踪时这些事件记录在组织的管理\n账户中。这使安全团队能够集中搜索和关联所有成员账户中的身份验证活动。\n选项 A 不正确，因为除非构建自定义管道，否则 CloudWatch Logs 不会跨组织原生聚合认证事件。\n选项 B 不可扩展，并且不提供整个组织范围的历史可见性。选项 C 无效，因为 AWS 不会自动将外\n部身份提供商 (IdP) 日志导入 EventBridge，并且 IdP 日志不反映 AWS 端的角色假设。\nAWS 文档明确指出，CloudTrail 组织跟踪提供对所有账户中用户认证和访问活动的集中可见性，这\n使其成为识别用户在特定时间窗口内登录时间的最快且最可靠的方法。\nAWS 安全认证 - 专业版官方学习指南\nAWS CloudTrail 用户指南\nAWS IAM 身份中心文档\nAWS 组织最佳实践"}, {"num": 14, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company is expanding its group of stores. On the day that each new store opens, the company wants\nto launch a customized web application for that store. Each store’s application will have a non-production\n\n\nenvironment and a production environment. Each environment will be deployed in a separate AWS account.\nThe company uses AWS Organizations and has an OU that is used only for these accounts.\nThe company distributes most of the development work to third-party development teams. A security\nengineer needs to ensure that each team follows the company’s deployment plan for AWS resources. The\nsecurity engineer also must limit access to the deployment plan to only the developers who need access. The\nsecurity engineer already has created an AWS CloudFormation template that implements the deployment\nplan.\nWhat should the security engineer do next to meet the requirements in the MOST secure way?", "question_cn": "一家公司正在扩大其店铺群组。在每家新店铺开业当天，公司希望为该店铺推出定制化的 Web 应\n用程序。每家店铺的应用程序将有一个非生产环境和一个生产环境。每个环境将部署在一个单独的\nAWS 账户中。该公司使用 AWS 组织，并有一个仅用于这些账户的组织单元 (OU)。\n该公司将大部分开发工作分配给第三方开发团队。一名安全工程师需要确保每个团队遵循公司针\n对 AWS 资源的部署计划。该安全工程师还必须将对部署计划的访问权限限制为仅需要访问的开发\n人员。该安全工程师已经创建了一个实施部署计划的 AWS CloudFormation 模板。\n为了以最安全的方式满足要求，安全工程师接下来应该怎么做？", "options": [{"letter": "A", "en": "Create an AWS Service Catalog portfolio in the organization’s management account. Upload the\nCloudFormation template. Add the template to the portfolio’s product list. Share the portfolio with the OU.", "cn": "在组织的管理账户中创建一个 AWS 服务目录组合。上传 CloudFormation 模板。将模板添加到\n组合的产品列表中。与组织单元 (OU) 共享该组合。"}, {"letter": "B", "en": "Use the CloudFormation CLI to create a module from the CloudFormation template. Register the\nmodule as a private extension in the CloudFormation registry. Publish the extension. In the OU, create an\nSCP that allows access to the extension.", "cn": "使用 CloudFormation CLI 从 CloudFormation 模板创建一个模块。在 CloudFormation 注册表中\n将该模块注册为私有扩展。发布该扩展。在组织单元 (OU) 中，创建一个允许访问该扩展的服务控\n制策略 (SCP)。"}, {"letter": "C", "en": "Create an AWS Service Catalog portfolio in the organization’s management account. Upload the\nCloudFormation template. Add the template to the portfolio’s product list. Create an IAM role that has a trust\npolicy that allows cross-account access to the portfolio for users in the OU accounts. Attach the AWSServiceCatalogEndUserFullAccess managed policy to the role.", "cn": "在组织的管理账户中创建一个 AWS 服务目录组合。上传 CloudFormation 模板。将模板添加到组\n合的产品列表中。创建一个 IAM 角色，其信任策略允许组织单元 (OU) 账户中的用户跨账户访问该\n组合。将 AWSServiceCatalogEndUserFullAccess 托管策略附加到该角色。"}, {"letter": "D", "en": "Use the CloudFormation CLI to create a module from the CloudFormation template. Register the\nmodule as a private extension in the CloudFormation registry. Publish the extension. Share the extension\n\n\nwith the OU.", "cn": "使用 CloudFormation CLI 从 CloudFormation 模板创建一个模块。在 CloudFormation 注册表中\n将该模块注册为私有扩展。发布该扩展。与组织单元 (OU) 共享该扩展。"}], "answer": "A", "explanation_en": "AWS Service Catalog is designed to allow organizations to create and manage approved sets of CloudFormation templates, known as products, and make them available to specific accounts or organizational units\n(OUs). According to the AWS Certified Security - Specialty Study Guide, Service Catalog is the preferred governance mechanism for enforcing standardized infrastructure deployments while maintaining strong access\ncontrols.\nBy creating a Service Catalog portfolio in the management account and sharing it with a specific OU,\nthe security engineer ensures that only accounts within that OU can deploy the approved CloudFormation\ntemplate. This guarantees that third-party developers can deploy infrastructure only in accordance with the\ncompany’s predefined deployment plan, without modifying or directly accessing the template itself.\nOption B and D use CloudFormation modules, which are intended for reusable resource definitions but\ndo not provide the same level of deployment governance, access control, and lifecycle management as Service\nCatalog. Option C introduces unnecessary cross-account IAM roles, increasing the attack surface and\noperational complexity, which violates the ”most secure” requirement.\n\n\nAWS documentation explicitly states that Service Catalog is the recommended service for distributing\nstandardized CloudFormation templates across AWS Organizations, while controlling who can deploy them\nand where.\nAWS Certified Security - Specialty Official Study Guide\nAWS Service Catalog Administrator Guide\nAWS Organizations Best Practices\n• AWS Well-Architected Framework - Security Pillar", "explanation_cn": "AWS 服务目录旨在允许组织创建和管理经过批准的 CloudFormation 模板集 (称为产品)，并\n将其提供给特定账户或组织单位 (OU)。根据《AWS 认证安全 - 专业考试指南》\n，服务目录是实施标\n准化基础设施部署并同时保持强大访问控制的首选治理机制。\n 通过在管理账户中创建服务目录组合并与特定 OU 共享，安全工程师确保只有该 OU 内的\n账户才能部署经过批准的 CloudFormation 模板。这保证了第三方开发人员只能根据公司预定义的\n部署计划来部署基础设施，而无需修改或直接访问模板本身。\n 选项 B 和 D 使用 CloudFormation 模块，这些模块用于可重复使用的资源定义，但不提供与\n服务目录相同级别的部署治理、访问控制和生命周期管理。\n 选项 C 引入了不必要的跨账户 IAM 角色，增加了攻击面和操作复杂性，这违反了“最安全”\n的要求。\nAWS 文档明确指出，服务目录是在 AWS 组织中分发标准化 CloudFormation 模板，同时控\n制谁可以在何处部署这些模板的推荐服务。\n《AWS 认证安全 - 专业官方考试指南》\n《AWS 服务目录管理员指南》\n《AWS 组织最佳实践》\n- AWS 架构良好的框架 - 安全支柱"}, {"num": 15, "category_en": "Security Foundations and Governance", "category_cn": "安全基礎與治理", "question_en": "AWS Config cannot deliver configuration snapshots to Amazon S3.\nWhich TWO actions will remediate this issue?", "question_cn": "问题编号:15 - [安全基础与治理]\nAWS 配置无法将配置快照交付到 Amazon S3。\n 哪两项操作将解决此问题？", "options": [{"letter": "A", "en": "Verify the S3 bucket policy allows config.amazonaws.com.", "cn": "验证 S3 存储桶策略是否允许 config.amazonaws.com。"}, {"letter": "B", "en": "Verify the IAM role has s3:GetBucketAcl and s3:PutObject permissions.", "cn": "验证 IAM 角色是否具有 s3:GetBucketAcl 和 s3:PutObject 权限。"}, {"letter": "C", "en": "Verify the S3 bucket can assume the IAM role.", "cn": "验证 S3 存储桶是否可以承担 IAM 角色。"}, {"letter": "D", "en": "Verify IAM policy allows AWS Config to write logs.", "cn": "验证 IAM 策略是否允许 AWS 配置写入日志。"}, {"letter": "E", "en": "Modify AWS Config API permissions.", "cn": "修改 AWS Config API 权限。"}], "answer": "A", "explanation_en": "AWS Config requires permissions at two levels to deliver configuration data: the AWS Config service role\nand the S3 bucket policy. The AWS Certified Security - Specialty Study Guide states that the S3 bucket policy\nmust explicitly allow the config.amazonaws.com service principal to write objects. Additionally, the IAM role\nused by AWS Config must allow s3:GetBucketAcl and s3:PutObject.\nIf either permission is missing, AWS Config cannot deliver snapshots and will log delivery errors in\nCloudTrail. This dual-permission model ensures least privilege while maintaining secure delivery of compliance data.\nOther options reference incorrect principals or irrelevant permissions.", "explanation_cn": "AWS Config 需要两个级别的权限来交付配置数据:AWS Config 服务角色和 S3 存储桶策略。《AWS\n认证安全 - 专业指南》指出，S3 存储桶策略必须明确允许 config.amazonaws.com 服务主体写入对\n象。此外，AWS Config 使用的 IAM 角色必须允许 s3:GetBucketAcl 和 s3:PutObject。\n如果缺少任何一个权限，AWS Config 将无法交付快照，并会在 CloudTrail 中记录交付错误。这种\n双重权限模型在保持合规数据安全交付的同时确保了最小权限。\n其他选项引用了不正确的主体或不相关的权限。"}, {"num": 16, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company is using AWS Organizations with nested OUs to manage AWS accounts. The company has\na custom compliance monitoring service for the accounts. The monitoring service runs as an AWS Lambda\nfunction and is invoked by Amazon EventBridge Scheduler.\nThe company needs to deploy the monitoring service in all existing and future accounts in the organization. The company must avoid using the organization’s management account when the management account\nis not required.\nWhich solution will meet these requirements?", "question_cn": "一家公司正在使用带有嵌套组织单位 (OU) 的 AWS Organizations 来管理 AWS 账户。该公司有一个\n针对这些账户的自定义合规监控服务。该监控服务作为一个 AWS Lambda 函数运行，并由 Amazon\nEventBridge Scheduler 调用。\n该公司需要在组织中的所有现有和未来账户中部署监控服务。在不需要管理账户时，该公司必须避\n免使用组织的管理账户。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Create a CloudFormation stack set in the organization’s management account and manually add new\naccounts.", "cn": "在组织的管理账户中创建一个 CloudFormation 堆栈集，并手动添加新账户。"}, {"letter": "B", "en": "Configure a delegated administrator account for AWS CloudFormation. Create a CloudFormation\nStackSet in the delegated administrator account targeting the organization root with automatic deployment\nenabled.", "cn": "为 AWS CloudFormation 配置一个委托管理员账户。在委托管理员账户中创建一个针对组织根的\nCloudFormation 堆栈集，并启用自动部署。"}, {"letter": "C", "en": "Use Systems Manager delegated administration and Automation to deploy the Lambda function and\nschedule.", "cn": "使用 Systems Manager 委托管理和自动化来部署 Lambda 函数并进行调度。"}, {"letter": "D", "en": "Create a Systems Manager Automation runbook in the management account and share it to accounts.", "cn": "在管理账户中创建一个 Systems Manager 自动化运行手册并将其共享到各个账户。"}], "answer": "B", "explanation_en": "AWS Organizations and CloudFormation StackSets provide an organizational deployment mechanism\nfor consistent infrastructure across accounts. AWS Certified Security - Specialty guidance emphasizes minimizing use of the management account and using delegated administrator capabilities where available for\ncentralized governance while reducing blast radius. By configuring a delegated administrator account for\nAWS CloudFormation, the company can create and manage StackSets without performing day-to-day deployment operations from the management account. Targeting the organization root ensures the StackSet\ndeploys to all existing accounts. Enabling automatic deployment ensures that any future accounts that join\nthe organization (or move into targeted OUs, depending on configuration) automatically receive the monitoring service without manual intervention. This directly meets the requirement to deploy to all existing and\nfuture accounts with minimal effort. Option A requires ongoing manual updates when accounts are added,\nincreasing operational overhead. Options C and D rely on Systems Manager Automation, which can work but\nintroduces additional operational complexity and is not the standard AWS mechanism for organization-wide\ninfrastructure rollout compared to StackSets with auto-deployment. StackSets also provide consistent chang\ncontrol, drift detection, and centralized update mechanisms, which align with governance expectations for\ncompliance tooling.", "explanation_cn": "AWS 组织和 CloudFormation StackSets 提供了一种组织部署机制，用于在各个账户中实现一致的基\n础设施。AWS 认证安全 - 专业指南强调尽量减少对管理账户的使用，并在可用时使用委托管理员功\n能进行集中治理，同时减小影响范围。通过为 AWS CloudFormation 配置委托管理员账户，公司可以\n创建和管理 StackSets，而无需从管理账户执行日常部署操作。将目标设置为组织根可确保 StackSet\n部署到所有现有账户。启用自动部署可确保任何未来加入组织的账户 (或根据配置移动到目标组织\n单位的账户) 自动接收监控服务，而无需人工干预。这直接满足了以最小工作量部署到所有现有和\n未来账户的要求。选项 A 在添加账户时需要进行持续的手动更新，增加了运营开销。选项 C 和 D\n依赖于 Systems Manager 自动化，这虽然可行，但会引入额外的运营复杂性，并且与具有自动部署\n功能的 StackSets 相比，它不是用于全组织范围基础设施推出的标准 AWS 机制。StackSets 还提供一\n致的变更控制、漂移检测和集中更新机制，这与合规工具的治理期望一致。"}, {"num": 17, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company needs a cloud-based, managed desktop solution for its workforce of remote employees. The\ncompany wants to ensure that the employees can access the desktops only by using company-provided devices.\nA security engineer must design a solution that will minimize cost and management overhead.\nWhich solution will meet these requirements?", "question_cn": "一家公司需要为其远程员工团队提供基于云的托管桌面解决方案。该公司希望确保员工只能使用\n公司提供的设备访问桌面。安全工程师必须设计一个成本和管理开销最小化的解决方案。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Deploy a custom virtual desktop infrastructure (VDI) solution with a restriction policy to allow access\nonly from corporate devices.", "cn": "部署一个自定义虚拟桌面基础架构 (VDI) 解决方案，并设置限制策略，仅允许从公司设备访问。"}, {"letter": "B", "en": "Deploy a fleet of Amazon EC2 instances. Assign an instance to each employee with certificate-based\ndevice authentication that uses Windows Active Directory.", "cn": "部署一批 Amazon EC2 实例。为每个员工分配一个实例，并使用基于证书的设备认证，该认证使\n用 Windows 活动目录。"}, {"letter": "C", "en": "Deploy Amazon WorkSpaces. Set up a trusted device policy with IP blocking on the authentication\ngateway by using AWS Identity and Access Management (IAM).", "cn": "部署 Amazon WorkSpaces。通过使用 AWS 身份和访问管理 (IAM) 在认证网关上设置具有 IP 阻\n止功能的可信设备策略。"}, {"letter": "D", "en": "Deploy Amazon WorkSpaces. Create client certificates, and deploy them to trusted devices. Enable\nrestricted access at the directory level.", "cn": "部署 Amazon WorkSpaces。创建客户端证书，并将其部署到可信设备。在目录级别启用受限访\n问。"}], "answer": "D", "explanation_en": "Amazon WorkSpaces is a fully managed desktop-as-a-service solution designed to minimize infrastructure and operational overhead. According to AWS Certified Security - Specialty documentation, WorkSpaces\nsupports device trust by using client certificates to restrict access to approved devices.\nBy deploying client certificates only to company-managed devices and enforcing restricted access at the\ndirectory level, the organization ensures that only trusted endpoints can authenticate. This approach avoids\nthe cost and complexity of building and maintaining a custom VDI or managing individual EC2 instances.\nOption A and B significantly increase management overhead. Option C is incorrect because IAM does\nnot manage WorkSpaces authentication gateway policies or device trust.\nAWS best practices highlight Amazon WorkSpaces with certificate-based device trust as the most efficient\nsolution for secure, managed desktops.", "explanation_cn": "Amazon WorkSpaces 是一种完全托管的桌面即服务解决方案，旨在最大限度地减少基础设施和运\n营开销。根据 AWS 认证安全 - 专业文档，WorkSpaces 通过使用客户端证书来限制对批准设备的访\n问，从而支持设备信任。\n通过仅将客户端证书部署到公司管理的设备，并在目录级别强制执行受限访问，组织可确保只有受\n信任的端点才能进行身份验证。这种方法避免了构建和维护自定义 VDI 或管理单个 EC2 实例的成\n本和复杂性。\n选项 A 和 B 会显著增加管理开销。选项 C 不正确，因为 IAM 不管理 WorkSpaces 身份验证网关策\n略或设备信任。\nAWS 最佳实践强调，基于证书的设备信任的 Amazon WorkSpaces 是安全、托管桌面的最有效解决\n方案。"}, {"num": 18, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company is running a containerized application on an Amazon Elastic Container Service (Amazon\nECS) cluster that uses AWS Fargate. The application runs as several ECS services. The ECS services are in\nindividual target groups for an internet-facing Application Load Balancer (ALB). The ALB is the origin for an\nAmazon CloudFront distribution. An AWS WAF web ACL is associated with the CloudFront distribution.\nWeb clients access the ECS services through the CloudFront distribution. The company learns that the\nweb clients can bypass the web ACL and can access the ALB directly.\nWhich solution will prevent the web clients from directly accessing the ALB?", "question_cn": "一家公司在使用 AWS Fargate 且运行在 Amazon Elastic Container Service(Amazon ECS) 集群上的\n容器化应用程序。该应用程序作为几个 ECS 服务运行。这些 ECS 服务位于面向 Internet 的应用程\n序负载均衡器 (ALB) 的各个目标组中。ALB 是 Amazon CloudFront 分发的源。一个 AWS WAF 网\n络访问控制列表与 CloudFront 分发相关联。\nWeb 客户端通过 CloudFront 分发访问 ECS 服务。该公司了解到 Web 客户端可以绕过网络访问控制\n列表并直接访问 ALB。\n哪种解决方案将阻止 Web 客户端直接访问 ALB？", "options": [{"letter": "A", "en": "Create an AWS PrivateLink endpoint. Specify the existing ALB as the target. Update the CloudFront\ndistribution by setting the PrivateLink endpoint as the origin.", "cn": "创建一个 AWS PrivateLink 端点。指定现有的 ALB 作为目标。通过将 PrivateLink 端点设置为源\n来更新 CloudFront 分发。"}, {"letter": "B", "en": "Create a new internal ALB. Move all the ECS services to the internal ALB. Delete the internet-facing\nALB. Update the CloudFront distribution by setting the internal ALB as the origin.", "cn": "创建一个新的内部 ALB。将所有 ECS 服务移动到内部 ALB。删除面向 Internet 的 ALB。通过将\n内部 ALB 设置为源来更新 CloudFront 分发。"}, {"letter": "C", "en": "Modify the listener rules for the existing ALB. Add a condition to forward only the requests that come\nfrom IP addresses in the CloudFront origin prefix list.", "cn": "修改现有 ALB 的监听器规则。添加一个条件，仅转发来自 CloudFront 源前缀列表中 IP 地址的\n请求。"}, {"letter": "D", "en": "Update the CloudFront distribution by adding an X-Shared-Secret custom header for the origin. Modify the listener rules for the existing ALB to forward only the requests in which the X-Shared-Secret header\nhas the correct value.", "cn": "通过为源添加 X-Shared-Secret 自定义标头来更新 CloudFront 分发。修改现有 ALB 的侦听器规\n则，以便仅转发 X-Shared-Secret 标头具有正确值的请求。"}], "answer": "D", "explanation_en": "The correct solution is option D because it effectively prevents direct access to the internet-facing ALB\nwhile allowing legitimate traffic that originates from Amazon CloudFront. By configuring CloudFront to\ninclude a custom HTTP header (such as X-Shared-Secret) in all origin requests, and then configuring ALB\nlistener rules to only forward requests that contain the expected header value, the ALB will reject any requests\nthat bypass CloudFront.\nThis approach is a documented AWS best practice when CloudFront is placed in front of an ALB and\nAWS WAF is associated with the CloudFront distribution. AWS WAF only evaluates traffic that flows through\nCloudFront; therefore, preventing direct access to the ALB is critical to ensure that all requests are inspected\nby the web ACL.\nOption A is invalid because CloudFront does not support AWS PrivateLink endpoints as origins. Option\nB is incorrect because CloudFront cannot use an internal ALB as an origin; CloudFront requires a publicly\nreachable origin. Option C is not recommended because CloudFront IP ranges change frequently, making IPbased allow lists operationally complex and error-prone, and AWS does not provide a supported CloudFront\nprefix list for ALB listener rules.\n\n\nAWS Security Specialty guidance explicitly recommends using custom origin headers to restrict ALB\naccess to CloudFront-only traffic, making option D the correct and secure solution.", "explanation_cn": "正确的解决方案是选项 D，因为它有效地防止了对面向 Internet 的 ALB 的直接访问，同时允许源\n自 Amazon CloudFront 的合法流量。通过配置 CloudFront 在所有源请求中包含自定义 HTTP 标头\n(如 X-Shared-Secret)，然后配置 ALB 侦听器规则以仅转发包含预期标头值的请求，ALB 将拒绝任何\n绕过 CloudFront 的请求。\n当 CloudFront 位于 ALB 前面且 AWS WAF 与 CloudFront 分发相关联时，此方法是记录在案的 AWS\n最佳实践。AWS WAF 仅评估流经 CloudFront 的流量；因此，防止对 ALB 的直接访问对于确保所\n有请求都由 Web ACL 检查至关重要。\n选项 A 无效，因为 CloudFront 不支持将 AWS PrivateLink 端点用作源。选项 B 不正确，因为 CloudFront 不能使用内部 ALB 作为源；CloudFront 需要一个可公开访问的源。不建议使用选项 C，因为\nCloudFront IP 范围经常变化，这使得基于 IP 的允许列表在操作上复杂且容易出错，并且 AWS 没\n有为 ALB 侦听器规则提供受支持的 CloudFront 前缀列表。\nAWS 安全专业指南明确建议使用自定义源标头将 ALB 访问限制为仅 CloudFront 流量，这使得选项\nD 成为正确且安全的解决方案。"}, {"num": 19, "category_en": "Detection", "category_cn": "检测", "question_en": "A company runs its microservices architecture in Kubernetes containers on AWS by using Amazon Elastic Kubernetes Service (Amazon EKS) and Amazon Aurora. The company has an organization in AWS Organizations to manage hundreds of AWS accounts that host different microservices.\nThe company needs to implement a monitoring solution for logs from all AWS resources across all accounts. The solution must include automatic detection of security-related issues.\nWhich solution will meet these requirements with the LEAST operational effort?", "question_cn": "一家公司通过使用 Amazon Elastic Kubernetes Service(Amazon EKS) 和 Amazon Aurora 在 AWS 上\n的 Kubernetes 容器中运行其微服务架构。该公司在 AWS Organizations 中有一个组织，用于管理托\n管不同微服务的数百个 AWS 账户。\n该公司需要为所有账户中的所有 AWS 资源的日志实施一个监控解决方案。该解决方案必须包括自\n动检测安全相关问题。\n哪种解决方案将以最少的操作工作量满足这些要求？", "options": [{"letter": "A", "en": "Designate an Amazon GuardDuty administrator account in the organization’s management account.\nEnable GuardDuty for all accounts. Enable EKS Protection and RDS Protection in the GuardDuty administrator account.", "cn": "在组织的管理账户中指定一个 Amazon GuardDuty 管理员账户。为所有账户启用 GuardDuty。在\nGuardDuty 管理员账户中启用 EKS 保护和 RDS 保护。"}, {"letter": "B", "en": "Designate a monitoring account. Share Amazon CloudWatch Logs from all accounts. Use Amazon\nInspector to evaluate the logs.", "cn": "指定一个监控账户。共享所有账户的 Amazon CloudWatch Logs。使用 Amazon Inspector 评估日\n志。"}, {"letter": "C", "en": "Centralize CloudTrail logs in Amazon S3 and analyze them with Amazon Athena.", "cn": "将 CloudTrail 日志集中到 Amazon S3 中，并使用 Amazon Athena 进行分析。"}, {"letter": "D", "en": "Stream CloudWatch Logs to Amazon Kinesis and analyze them with custom AWS Lambda functions.", "cn": "将 CloudWatch Logs 流式传输到 Amazon Kinesis，并使用自定义 AWS Lambda 函数进行分析。"}], "answer": "A", "explanation_en": "Amazon GuardDuty is a fully managed, organization-aware threat detection service that continuously\nanalyzes AWS logs such as CloudTrail events, VPC Flow Logs, DNS logs, EKS audit logs, and RDS activity.\nAccording to the AWS Certified Security - Specialty Official Study Guide, GuardDuty is designed to operate at\nscale across AWS Organizations with minimal operational overhead.\nBy designating a GuardDuty administrator account in the organization’s management account and enabling GuardDuty organization-wide, the company can automatically enable threat detection across hundreds\nof AWS accounts. Enabling EKS Protection allows GuardDuty to analyze Kubernetes audit logs for suspicious\nactivity, while RDS Protection provides anomaly detection for Amazon Aurora databases.\nOptions B, C, and D require custom log aggregation, processing, and analytics pipelines, which significantly increase operational effort and maintenance complexity. Amazon Inspector does not analyze logs,\nAthena-based analysis is manual, and Kinesis plus Lambda requires custom detection logic.\n\n\nAWS documentation explicitly identifies GuardDuty with AWS Organizations integration as the recommended solution for centralized, automated threat detection across multi-account environments with minimal operational effort.\n• AWS Certified Security - Specialty Official Study Guide\nAmazon GuardDuty User Guide\nGuardDuty Organization Administration Documentation", "explanation_cn": "Amazon GuardDuty 是一项完全托管的、具备组织感知能力的威胁检测服务，它会持续分析诸如\nCloudTrail 事件、VPC 流日志、DNS 日志、EKS 审计日志和 RDS 活动等 AWS 日志。根据《AWS\nCertified Security - Specialty 官方学习指南》，GuardDuty 旨在以最小的运营开销在整个 AWS 组织\n中大规模运行。\n通过在组织的管理账户中指定一个 GuardDuty 管理员账户并在全组织范围内启用 GuardDuty，公\n司可以自动在数百个 AWS 账户中启用威胁检测。启用 EKS 保护可使 GuardDuty 分析 Kubernetes\n审计日志以检测可疑活动，而 RDS 保护则为 Amazon Aurora 数据库提供异常检测。\n选项 B、C 和 D 需要自定义日志聚合、处理和分析管道，这会显著增加运营工作量和维护复杂性。\nAmazon Inspector 不分析日志，基于 Athena 的分析是手动的，而 Kinesis 加 Lambda 需要自定义检\n测逻辑。\nAWS 文档明确将 GuardDuty 与 AWS 组织集成确定为在多账户环境中以最小运营工作量进行集中\n式、自动化威胁检测的推荐解决方案。\n•《AWS Certified Security - Specialty 官方学习指南》\nAmazon GuardDuty 用户指南\nGuardDuty 组织管理文档"}, {"num": 20, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "An application is running on an Amazon EC2 instance that has an IAM role attached. The IAM role\nprovides access to an AWS Key Management Service (AWS KMS) customer managed key and an Amazon S3\nbucket. The key is used to access 2 TB of sensitive data that is stored in the S3 bucket. A security engineer\ndiscovers a potential vulnerability on the EC2 instance that could result in the compromise of the sensitive\ndata. Due to other critical operations, the security engineer cannot immediately shut down the EC2 instance\nfor vulnerability patching.\nWhat is the FASTEST way to prevent the sensitive data from being exposed?", "question_cn": "一个应用程序在一个附加了 IAM 角色的 Amazon EC2 实例上运行。该 IAM 角色提供对一个 AWS\n密钥管理服务 (AWS KMS) 客户管理密钥和一个 Amazon S3 存储桶的访问权限。该密钥用于访问存\n储在 S3 存储桶中的 2TB 敏感数据。一名安全工程师在该 EC2 实例上发现了一个潜在漏洞，这可能\n导致敏感数据被泄露。由于其他关键操作，安全工程师无法立即关闭该 EC2 实例进行漏洞修复。\n防止敏感数据被暴露的最快方法是什么？", "options": [{"letter": "A", "en": "Download the data from the existing S3 bucket to a new EC2 instance. Then delete the data from the\nS3 bucket. Re-encrypt the data with a client-based key. Upload the data to a new S3 bucket.", "cn": "从现有 S3 存储桶将数据下载到一个新的 EC2 实例。然后从 S3 存储桶中删除数据。使用基于客\n户端的密钥重新加密数据。将数据上传到一个新的 S3 存储桶。"}, {"letter": "B", "en": "Block access to the public range of S3 endpoint IP addresses by using a host-based firewall. Ensure\nthat internet-bound traffic from the affected EC2 instance is routed through the host-based firewall.", "cn": "使用基于主机的防火墙阻止对 S3 端点 IP 地址公共范围的访问。确保来自受影响的 EC2 实例的\n互联网流量通过基于主机的防火墙进行路由。"}, {"letter": "C", "en": "Revoke the IAM role’s active session permissions. Update the S3 bucket policy to deny access to the\nIAM role. Remove the IAM role from the EC2 instance profile.", "cn": "撤销 IAM 角色的活动会话权限。更新 S3 存储桶策略以拒绝 IAM 角色的访问。从 EC2 实例配置\n文件中删除 IAM 角色。"}, {"letter": "D", "en": "Disable the current key. Create a new KMS key that the IAM role does not have access to, and reencrypt all the data with the new key. Schedule the compromised key for deletion.", "cn": "禁用当前密钥。创建一个 IAM 角色无法访问的新 KMS 密钥，并用新密钥重新加密所有数据。安\n排删除受损密钥。"}], "answer": "C", "explanation_en": "AWS incident response best practices emphasize rapid containment to prevent further data exposure.\nAccording to the AWS Certified Security - Specialty Study Guide, the fastest and least disruptive containment\nmethod for compromised compute resources is to immediately revoke credentials and permissions rather than\nmodifying data or infrastructure.\nRevoking the IAM role’s active sessions prevents the EC2 instance from continuing to access AWS services. Updating the S3 bucket policy to explicitly deny access to the IAM role ensures immediate enforcement,\neven if temporary credentials remain cached. Removing the IAM role from the instance profile further prevents new credentials from being issued.\n\n\nOption A and D involve large-scale data movement or re-encryption, which is time-consuming and operationally expensive. Option B relies on network-level controls that do not prevent access through private\nAWS endpoints.\nAWS guidance explicitly recommends credential revocation and policy-based denial as the fastest containment step during active incidents.", "explanation_cn": "AWS 事件响应最佳实践强调快速遏制，以防止进一步的数据暴露。根据《AWS 认证安全 - 专业认\n证学习指南》，对于受影响的计算资源，最快且干扰最小的遏制方法是立即撤销凭证和权限，而不\n是修改数据或基础设施。\n撤销 I
