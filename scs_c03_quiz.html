 是用于集中式日志聚合以及\n对应用程序和系统日志进行近实时分析的推荐服务。\n通过将所有 EC2 实例配置为将日志发送到单个云观察日志 (CloudWatch Logs) 日志组，安全工程师\n确保所有实例的日志都可在一个集中位置获取。可以使用身份和访问管理 (IAM) 策略限制对日志\n组的访问，确保只有授权用户才能查看和分析日志。\n云观察日志洞察 (CloudWatch Logs Insights) 提供了一种具有类似 SQL 语法的强大查询语言，使用\n户能够高效地搜索、过滤、聚合和分析日志数据。这直接满足了使用 SQL 风格查询来识别事件模式\n并进行根本原因分析的要求，而无需移动数据或使用额外的服务。\n选项 B 不正确，因为云观察日志洞察 (CloudWatch Logs Insights) 无法查询存储在亚马逊 S3 中的日\n志文件。选项 C 效率低下且操作复杂，因为雅典娜 (Athena) 无法直接查询云观察日志 (CloudWatch\nLogs) 日志组。选项 D 无效，因为亚马逊侦探 (Amazon Detective) 是为使用 GuardDuty 调查结果进\n行安全调查而设计的，而非用于一般的应用程序日志分析。\nAWS 文档明确指出，云观察日志 (CloudWatch Logs) 与云观察日志洞察 (CloudWatch Logs Insights)\n相结合是基于 EC2 的架构中进行集中式日志分析的最有效和最安全的方法。\nA 《微软认证安全 - 专业官方学习指南》\n考试准备\n亚马逊云 Watch 日志文档\n• CloudWatch 日志洞察查询指南"}, {"num": 71, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company has AWS accounts in an organization in AWS Organizations. The organization includes a\ndedicated security account.\nAll AWS account activity across all member accounts must be logged and reported to the dedicated security account. The company must retain all the activity logs in a secure storage location within the dedicated\nsecurity account for 2 years. No changes or deletions of the logs are allowed.\nWhich combination of steps will meet these requirements with the LEAST operational overhead? (Select\nTWO.)", "question_cn": "一家公司在 AWS 组织中有多个 AWS 账户。该组织包括一个专用安全账户。\n所有成员账户的所有 AWS 账户活动都必须记录并报告给专用安全账户。公司必须在专用安全账户\n内的安全存储位置保留所有活动日志 2 年。不允许对日志进行更改或删除。\n以下哪些步骤组合能以最少的操作开销满足这些要求？(选择两项。)", "options": [{"letter": "A", "en": "In the dedicated security account, create an Amazon S3 bucket. Configure S3 Object Lock in compliance mode with a retention period of 2 years. Set the bucket policy to allow the organization’s management\naccount to write to the S3 bucket.", "cn": "在专用安全账户中，创建一个亚马逊 S3 存储桶。将 S3 对象锁定配置为合规模式，保留期为 2 年。\n设置存储桶策略，允许组织的管理账户写入 S3 存储桶。"}, {"letter": "B", "en": "In the dedicated security account, create an Amazon S3 bucket. Configure S3 Object Lock in compliance mode with a retention period of 2 years. Set the bucket policy to allow the organization’s member\naccounts to write to the S3 bucket.", "cn": "在专用安全账户中，创建一个亚马逊 S3 存储桶。将 S3 对象锁定配置为合规模式，保留期为 2 年。\n设置存储桶策略，允许组织的成员账户写入 S3 存储桶。"}, {"letter": "C", "en": "In the dedicated security account, create an Amazon S3 bucket with an S3 Lifecycle configuration that\nexpires objects after 2 years. Allow member accounts to write to the bucket.", "cn": "在专用安全账户中，创建一个具有 S3 生命周期配置的亚马逊 S3 存储桶，该配置会在 2 年后过期\n对象。允许成员账户写入该存储桶。"}, {"letter": "D", "en": "Create an AWS CloudTrail organization trail. Configure logs to be delivered to the Amazon S3 bucket\nin the dedicated security account.", "cn": "创建一个 AWS CloudTrail 组织跟踪。配置日志以发送到专用安全账户中的亚马逊 S3 存储桶。"}, {"letter": "E", "en": "Turn on AWS CloudTrail in each account and forward logs to the dedicated security account by using\nAWS Lambda and Amazon Data Firehose.", "cn": "在每个账户中启用 AWS CloudTrail，并使用 AWS Lambda 和亚马逊数据消防软管将日志转发到\n专用安全账户。"}], "answer": "A", "explanation_en": "AWS CloudTrail organization trails are specifically designed to provide centralized, organization-wide\nlogging with minimal operational effort. According to the AWS Certified Security - Specialty Official Study\nGuide, an organization trail records all management events for all member accounts and delivers them to a\nsingle Amazon S3 bucket.\nTo ensure that logs cannot be altered or deleted, Amazon S3 Object Lock in compliance mode must be\nused. Compliance mode enforces write-once-read-many (WORM) protection, meaning no user, including the\nroot user, can delete or modify objects before the retention period expires. This directly satisfies the requirement that no changes or deletions are allowed for 2 years.\n\n\nThe S3 bucket must reside in the dedicated security account to provide isolation and strong security\nboundaries. Granting write permissions to the organization’s management account (Option A) aligns with\nAWS best practices, because the management account owns and manages the organization trail and centrally\ndelivers logs on behalf of all member accounts.\nOption B increases attack surface by allowing all member accounts to write directly. Option C does\nnot meet immutability requirements because lifecycle policies do not prevent deletion. Option E introduces\nunnecessary services and operational complexity.\nAWS documentation explicitly identifies the combination of CloudTrail organization trails + S3 Object\nLock (compliance mode) as the recommended, lowest-overhead solution for long-term, immutable audit log\nretention.\nAWS Certified Security - Specialty Official Study Guide\nAWS CloudTrail Organization Trail Documentation\nAmazon S3 Object Lock Documentation\nAWS Well-Architected Framework - Security Pillar", "explanation_cn": "AWS CloudTrail 组织跟踪专门设计用于以最少的操作努力提供集中的、全组织范围的日志记录。根\n据《AWS 认证安全 - 专业官方学习指南》，组织跟踪会记录所有成员账户的所有管理事件，并将它\n们发送到单个亚马逊 S3 存储桶。\n为确保日志不能被更改或删除，必须使用合规模式下的亚马逊 S3 对象锁定。合规模式强制执行一\n次写入多次读取 (WORM) 保护，这意味着在保留期到期之前，包括根用户在内的任何用户都不能\n删除或修改对象。这直接满足了 2 年内不允许进行更改或删除日志的要求。\nS3 存储桶必须位于专用安全账户中，以提供隔离和强大的安全边界。向组织的管理账户授予\n写入权限 (选项 A) 符合 AWS 最佳实践，因为管理账户拥有并管理组织跟踪，并代表所有成员账户\n集中交付日志。\n 选项 B 通过允许所有成员账户直接写入来增加攻击面。选项 C 不符合不可变要求，因为生\n命周期策略无法防止删除。选项 E 引入了不必要的服务和操作复杂性。\nAWS 文档明确将 CloudTrail 组织跟踪 + S3 对象锁定 (合规模式) 组合确定为长期、不可变审\n计日志保留的推荐的、开销最低的解决方案。\nAWS 安全认证 - 专业版官方学习指南 \nAWS CloudTrail 组织跟踪文档 \nAmazon S3 对象锁定文档 \nAWS 架构良好的框架 - 安全支柱"}, {"num": 72, "category_en": "Incident Response", "category_cn": "事件響應", "question_en": "A company’s security engineer is designing an isolation procedure for Amazon EC2 instances as part\nof an incident response plan. The security engineer needs to isolate a target instance to block any traffic to\nand from the target instance, except for traffic from the company’s forensics team. Each of the company’s\n\n\nEC2 instances has its own dedicated security group. The EC2 instances are deployed in subnets of a VPC. A\nsubnet can contain multiple instances.\nThe security engineer is testing the procedure for EC2 isolation and opens an SSH session to the target\ninstance. The procedure starts to simulate access to the target instance by an attacker. The security engineer\nremoves the existing security group rules and adds security group rules to give the forensics team access to\nthe target instance on port 22.\nAfter these changes, the security engineer notices that the SSH connection is still active and usable. When\nthe security engineer runs a ping command to the public IP address of the target instance, the ping command\nis blocked.\nWhat should the security engineer do to isolate the target instance?", "question_cn": "## 问题编号:72 - [事件响应]\n 一家公司的安全工程师正在设计一个针对 Amazon EC2 实例的隔离程序，作为事件响应计\n划的一部分。安全工程师需要隔离一个目标实例，以阻止去往和来自该目标实例的任何流量，但来\n自公司取证团队的流量除外。该公司的每个 EC2 实例都有自己的专用安全组。EC2 实例部署在 VPC\n的子网中。一个子网可以包含多个实例。\n 安全工程师正在测试 EC2 隔离程序，并打开了到目标实例的 SSH 会话。该程序开始模拟攻\n击者对目标实例的访问。安全工程师删除了现有的安全组规则，并添加了安全组规则，以便取证团\n队能够通过端口 22 访问目标实例。\n 进行这些更改后，安全工程师注意到 SSH 连接仍然活跃且可用。当安全工程师对目标实例\n的公共 IP 地址运行 ping 命令时，ping 命令被阻止。\n 安全工程师应采取什么措施来隔离目标实例？", "options": [{"letter": "A", "en": "Add an inbound rule to the security group to allow traffic from 0.0.0.0/0 for all ports. Add an outbound\nrule to the security group to allow traffic to 0.0.0.0/0 for all ports. Then immediately delete these rules.", "cn": "向安全组添加入站规则，以允许来自 0.0.0.0/0 的所有端口的流量。向安全组添加出站规\n则，以允许去往 0.0.0.0/0 的所有端口的流量。然后立即删除这些规则。"}, {"letter": "B", "en": "Remove the port 22 security group rule. Attach an instance role policy that allows AWS Systems Manager Session Manager connections so that the forensics team can access the target instance.", "cn": "删除端口 22 安全组规则。附加一个允许 AWS 系统管理器会话管理器连接的实例角色策\n略，以便取证团队可以访问目标实例。"}, {"letter": "C", "en": "Create a network ACL that is associated with the target instance’s subnet. Add a rule at the top of the\ninbound rule set to deny all traffic from 0.0.0.0/0. Add a rule at the top of the outbound rule set to deny all\ntraffic to 0.0.0.0/0.", "cn": "创建一个与目标实例的子网相关联的网络 ACL。在入站规则集顶部添加一条规则，以拒\n绝来自 0.0.0.0/0 的所有流量。在出站规则集顶部添加一条规则，以拒绝去往 0.0.0.0/0 的所有流量。"}, {"letter": "D", "en": "Create an AWS Systems Manager document that adds a host-level firewall rule to block all inbound\ntraffic and outbound traffic. Run the document on the target instance.", "cn": "创建一个 AWS 系统管理器文档，该文档添加一个主机级防火墙规则以阻止所有入站流量\n和出站流量。在目标实例上运行该文档。"}], "answer": "C", "explanation_en": "Amazon EC2 security groups are stateful, meaning that once a connection is established, return traffic\nis automatically allowed, even if the inbound rule that originally permitted the connection is later removed.\nAccording to the AWS Certified Security - Specialty Official Study Guide and Amazon EC2 security documentation, existing connections are not terminated when security group rules change. This explains why the SSH\nsession remains active even after the security group rules were modified, while new traffic such as ICMP ping\nis blocked.\nTo immediately and fully isolate an EC2 instance during an incident response scenario, AWS recommends using stateless network controls. Amazon VPC network ACLs (NACLs) are stateless, which means\nthat every packet is evaluated against the ACL rules regardless of whether the traffic is part of an existing\nconnection. When a deny rule is added, all traffic is immediately blocked, including active sessions.\nBy creating a network ACL and associating it with the subnet that contains the target instance, and by\nadding explicit deny rules with the lowest rule numbers for both inbound and outbound traffic, the security\nengineer ensures that all network communication to and from the instance is immediately interrupted. This\n\n\napproach satisfies the requirement to isolate the instance while preserving its runtime state and memory for\nforensic analysis.\nOther options fail to meet the requirement because security group modifications do not terminate existing sessions, Systems Manager does not enforce network isolation, and host-level firewall changes require\ninstance-level access and do not provide immediate, network-enforced isolation.\nAWS Certified Security - Specialty Official Study Guide\nAmazon EC2 Security Groups Documentation\nAmazon VPC Network ACL Documentation\nAWS Incident Response Best Practices", "explanation_cn": "亚马逊 EC2 安全组是有状态的，这意味着一旦建立连接，即使最初允许连接的入站规则后来被删\n除，返回流量也会自动被允许。根据《AWS 认证安全 - 专业官方学习指南》和亚马逊 EC2 安全文\n档，当安全组规则更改时，现有连接不会终止。这就解释了为什么即使安全组规则被修改后，SSH\n会话仍然处于活动状态，而诸如 ICMP ping 等新流量却被阻止。\n在事件响应场景中，为了立即并完全隔离 EC2 实例，AWS 建议使用无状态网络控制。亚马逊 VPC\n网络访问控制列表 (NACL) 是无状态的，这意味着每个数据包都会根据 ACL 规则进行评估，而不管\n该流量是否是现有连接的一部分。当添加拒绝规则时，所有流量都会立即被阻止，包括活动会话。\n通过创建一个网络访问控制列表并将其与包含目标实例的子网相关联，并通过为入站和出站流量添\n加具有最低规则编号的显式拒绝规则，安全工程师可确保与该实例的所有网络通信立即中断。这种\n方法满足了隔离实例的要求，同时保留其运行时状态和内存以进行取证分析。\n其他选项无法满足要求，因为安全组修改不会终止现有会话，系统管理器不强制执行网络隔离，而\n主机级防火墙更改需要实例级访问权限，并且不提供即时的、网络强制隔离。\n《AWS 认证安全 - 专业官方学习指南》\n亚马逊 EC2 安全组文档\n亚马逊 VPC 网络访问控制列表文档\nAWS 事件响应最佳实践"}, {"num": 73, "category_en": "Detection", "category_cn": "检测", "question_en": "A company sends Apache logs from EC2 Auto Scaling instances to a CloudWatch Logs log group with\n1-year retention. A suspicious IP address appears in logs. A security engineer needs to analyze the past week\nof logs to count requests from that IP and list requested URLs.\nWhat should the engineer do with the LEAST effort?", "question_cn": "一家公司将来自 EC2 自动缩放实例的 Apache 日志发送到一个保留期为 1 年的 CloudWatch Logs 日\n志组。一个可疑 IP 地址出现在日志中。一名安全工程师需要分析过去一周的日志，以统计来自该\nIP 的请求并列出请求的 URL。\n工程师应如何以最少的工作量完成此操作？", "options": [{"letter": "A", "en": "Export to S3 and use Macie.", "cn": "导出到 S3 并使用 Macie。"}, {"letter": "B", "en": "Stream to OpenSearch and analyze.", "cn": "流式传输到 OpenSearch 并进行分析。"}, {"letter": "C", "en": "Use CloudWatch Logs Insights with queries.", "cn": "使用 CloudWatch Logs Insights 进行查询。"}, {"letter": "D", "en": "Export to S3 and use AWS Glue.", "cn": "导出到 S3 并使用 AWS Glue。"}], "answer": "C", "explanation_en": "CloudWatch Logs Insights is a managed, on-demand query capability designed to search and analyze log\ndata stored in CloudWatch Logs without moving the data elsewhere. AWS Certified Security - Specialty documentation highlights Logs Insights as the lowest-effort method for rapid investigations, because it supports\nfiltering, parsing, aggregation, and time-range queries directly over existing log groups. In this scenario, the\nlogs already exist in CloudWatch Logs with sufficient retention. The engineer can write a query that filters for\nthe suspicious IP address, counts occurrences over the last 7 days, and extracts requested URLs using parsing functions. This satisfies both requirements (count and URLs) immediately, without building pipelines or\nexporting data. Option B adds operational overhead by provisioning and maintaining OpenSearch ingestion\nand indexing. Options A and D require exporting data and additional services that are not necessary for a\none-week forensic query. Therefore, Logs Insights is the most efficient and cost-effective approach.", "explanation_cn": "CloudWatch Logs Insights 是一种托管的按需查询功能，旨在搜索和分析存储在 CloudWatch Logs\n中的日志数据，而无需将数据移动到其他地方。AWS Certified Security - Specialty 文档强调 Logs\nInsights 是快速调查的最低工作量方法，因为它支持直接在现有日志组上进行过滤、解析、聚合和\n时间范围查询。在这种情况下，日志已经存在于 CloudWatch Logs 中，并且具有足够的保留期。工\n程师可以编写一个查询，过滤可疑 IP 地址，统计过去 7 天内的出现次数，并使用解析函数提取请\n求的 URL。这立即满足了两个要求 (计数和 URL)，而无需构建管道或导出数据。选项 B 通过配置\n和维护 OpenSearch 摄取和索引增加了操作开销。选项 A 和 D 需要导出数据以及额外的服务，而这\n些对于为期一周的取证查询来说并非必要。因此，Logs Insights 是最有效且最具成本效益的方法。"}, {"num": 74, "category_en": "Detection", "category_cn": "检测", "question_en": "A company needs to identify the root cause of security findings and investigate IAM roles involved in\nthose findings. The company has enabled VPC Flow Logs, Amazon GuardDuty, and AWS CloudTrail.\nWhich solution will meet these requirements?", "question_cn": "一家公司需要确定安全调查结果的根本原因，并调查与这些结果相关的 IAM 角色。该公司已启用\nVPC 流日志、Amazon GuardDuty 和 AWS CloudTrail。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Use Amazon Detective to investigate IAM roles and visualize findings.", "cn": "使用 Amazon Detective 调查 IAM 角色并可视化调查结果。"}, {"letter": "B", "en": "Use Amazon Inspector and CloudWatch dashboards.", "cn": "使用 Amazon Inspector 和 CloudWatch 仪表板。"}, {"letter": "C", "en": "Export GuardDuty findings to S3 and analyze with Athena.", "cn": "将 GuardDuty 调查结果导出到 S3 并使用 Athena 进行分析。"}, {"letter": "D", "en": "Use Security Hub custom actions to investigate IAM roles.", "cn": "使用 Security Hub 自定义操作调查 IAM 角色。"}], "answer": "A", "explanation_en": "Amazon Detective is specifically designed to help security teams investigate and visualize the root cause\nof security findings. According to AWS Certified Security - Specialty documentation, Detective automatically\naggregates and correlates data from GuardDuty, CloudTrail, and VPC Flow Logs to provide interactive visualizations and timelines.\nCloudTrail\nDetective enables investigators to pivot from GuardDuty findings to IAM roles, API calls, network traffic,\nand resource behavior. This makes it the most efficient tool for understanding how IAM roles were used\nduring suspicious activity.\nAmazon Inspector focuses on vulnerability assessment, not behavioral investigation. Security Hub aggregates findings but does not provide deep investigation graphs. Manual analysis with Athena requires significantly more effort.\nAWS guidance explicitly recommends Amazon Detective for root cause analysis and visualization of security incidents.", "explanation_cn": "Amazon Detective 专门设计用于帮助安全团队调查安全发现的根本原因并进行可视化展示。\n根据 AWS Certified Security - Specialty 文档，\nDetective 会自动聚合和关联来自 GuardDuty、\n和 VPC 流日志的数据，以提供交互式可视化和时间线。\nDetective 使调查人员能够从 GuardDuty 发现转向 IAM 角色、API 调用、网络流量和资源行\n为。这使其成为了解可疑活动期间 IAM 角色使用情况的最有效工具。\nAmazon Inspector 专注于漏洞评估，而非行为调查。Security Hub 聚合发现，但不提供深度\n调查图表。使用 Athena 进行手动分析需要付出更多努力。\nAWS 指南明确推荐使用 Amazon Detective 进行安全事件的根本原因分析和可视化。"}, {"num": 75, "category_en": "Infrastructure Security", "category_cn": "基礎設施安全", "question_en": "A company runs a global ecommerce website that is hosted on AWS. The company uses Amazon CloudFront to serve content to its user base. The company wants to block inbound traffic from a specific set of\ncountries to comply with recent data regulation policies.\nWhich solution will meet these requirements MOST cost-effectively?", "question_cn": "## 问题编号:75 - [基础设施安全]\n 一家公司在 AWS 上运行一个全球电子商务网站。该公司使用 Amazon CloudFront 向其用户\n群提供内容。该公司希望阻止来自特定国家/地区的入站流量，以符合最新的数据监管政策。\n 哪种解决方案最具成本效益地满足这些要求？", "options": [{"letter": "A", "en": "Create an AWS WAF web ACL with an IP match condition to deny the countries’ IP ranges. Associate\nthe web ACL with the CloudFront distribution.", "cn": "创建一个具有 IP 匹配条件的 AWS WAF 网络访问控制列表 (web ACL)，\n以拒绝这些国家/地\n区的 IP 范围。将网络访问控制列表与 CloudFront 分配关联。"}, {"letter": "B", "en": "Create an AWS WAF web ACL with a geo match condition to deny the specific countries. Associate\nthe web ACL with the CloudFront distribution.", "cn": "创建一个具有地理匹配条件的 AWS WAF 网络访问控制列表，以拒绝特定国家/地区。将\n网络访问控制列表与 CloudFront 分配关联。"}, {"letter": "C", "en": "Use the geo restriction feature in CloudFront to deny the specific countries.", "cn": "使用 CloudFront 中的地理限制功能拒绝特定国家/地区。"}, {"letter": "D", "en": "Use geolocation headers in CloudFront to deny the specific countries.", "cn": "在 CloudFront 中使用地理定位标头拒绝特定国家/地区。"}], "answer": "C", "explanation_en": "Amazon CloudFront includes a native geo restriction (geoblocking) capability that allows content owners\nto control access to their distributions based on the geographic location of the viewer. The viewer’s country is\ndetermined using the IP address from which the request originates. According to the AWS Certified Security\n- Specialty Official Study Guide and the Amazon CloudFront Developer Guide, geo restriction is specifically\ndesigned for scenarios where organizations must comply with regional regulations, licensing requirements,\nor data sovereignty policies.\nFrom a cost perspective, CloudFront geo restriction is the most cost-effective solution because it is configured directly within the CloudFront distribution and does not require AWS WAF. AWS WAF introduces\nadditional costs for web ACLs, rules, and request processing, which is unnecessary when the requirement is\nlimited strictly to blocking or allowing access based on country.\nOption A is incorrect because maintaining IP ranges for entire countries is operationally complex, errorprone, and not scalable. Country-level IP ranges frequently change, making this approach unsuitable and\ninefficient. Option B, although technically valid, is not the most cost-effective choice because AWS WAF\ngeo match rules incur additional charges and are intended for advanced Layer 7 security controls such as\napplication-layer attacks. Option D is incorrect because geolocation headers provided by CloudFront are\ninformational only and cannot independently enforce access control decisions.\nAWS documentation explicitly recommends CloudFront geo restriction when the sole requirement is\ncountry-based access control, reserving AWS WAF for advanced security inspection and threat mitigation use\ncases.\nAWS Certified Security - Specialty Official Study Guide\n\n\nAmazon CloudFront Developer Guide - Geo Restriction\nAWS Well-Architected Framework - Security Pillar\nAWS Security Best Practices Documentation", "explanation_cn": "亚马逊云 Front(Amazon CloudFront) 具备原生的地理限制 (地理封锁) 功能，允许内容所有者根据\n观众的地理位置来控制对其分发内容的访问。观众所在国家是通过请求发起的 IP 地址来确定的。根\n据《AWS 认证安全 - 专业官方学习指南》和《亚马逊云 Front 开发者指南》，地理限制是专门为组\n织必须遵守区域法规、许可要求或数据主权政策的场景而设计的。\n从成本角度来看，云 Front 地理限制是最具成本效益的解决方案，因为它是直接在云 Front 分发中\n进行配置的，不需要 AWS WAF。AWS WAF 会为 Web ACL、规则和请求处理引入额外成本，而当\n需求严格限于基于国家来阻止或允许访问时，这些成本是不必要的。\n选项 A 不正确，因为维护整个国家的 IP 范围在操作上很复杂，容易出错且不可扩展。国家层面的\nIP 范围经常变化，使得这种方法不合适且效率低下。选项 B 虽然在技术上是有效的，但不是最具成\n本效益的选择，因为 AWS WAF 地理匹配规则会产生额外费用，并且用于诸如应用层攻击等高级第\n7 层安全控制。选项 D 不正确，因为云 Front 提供的地理位置标头仅用于提供信息，不能独立执行\n访问控制决策。\n当唯一要求是基于国家的访问控制时，AWS 文档明确推荐使用云 Front 地理限制，而将 AWS WAF\n保留用于高级安全检查和威胁缓解用例。\n《AWS 认证安全 - 专业官方学习指南》\n《亚马逊云 Front 开发者指南 - 地理限制》\n《AWS 架构良好框架 - 安全支柱》\n《AWS 安全最佳实践文档》"}, {"num": 76, "category_en": "Detection", "category_cn": "检测", "question_en": "A company detects bot activity targeting Amazon Cognito user pool endpoints. The solution must block\nmalicious requests while maintaining access for legitimate users.\nWhich solution meets these requirements?", "question_cn": "一家公司检测到针对亚马逊 Cognito 用户池端点的机器人活动。该解决方案必须阻止恶意请求，同\n时保持合法用户的访问权限。\n哪种解决方案满足这些要求？", "options": [{"letter": "A", "en": "Enable Amazon Cognito threat protection.", "cn": "启用亚马逊 Cognito 威胁保护。"}, {"letter": "B", "en": "Restrict access to authenticated users only.", "cn": "仅限制对已认证用户的访问。"}, {"letter": "C", "en": "Associate AWS WAF with the Cognito user pool.", "cn": "将 AWS WAF 与 Cognito 用户池关联。"}, {"letter": "D", "en": "Monitor requests with CloudWatch.", "cn": "使用 CloudWatch 监控请求。"}], "answer": "A", "explanation_en": "Amazon Cognito threat protection is purpose-built to detect and mitigate malicious authentication activity such as credential stuffing and bot traffic. It uses adaptive risk-based analysis without disrupting legitimate\nusers.\nAWS WAF cannot be directly associated with Cognito user pools.", "explanation_cn": "亚马逊认知身份威胁防护专为检测和缓解恶意认证活动 (如凭证填充和机器人流量) 而构建。它使\n用基于风险的自适应分析，同时不会干扰合法用户。\nAWS WAF 不能直接与认知身份用户池相关联。"}, {"num": 77, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company wants to establish separate AWS Key Management Service (AWS KMS) keys to use for different AWS services. The company’s security engineer created the following key policy to allow the infrastructure\ndeployment team to create encrypted Amazon Elastic Block Store (Amazon EBS) volumes by assuming the\nInfrastructureDeployment IAM role:\n{\n”Version”: ”2012-10-17”,\n\n”Id”: ”key-policy-ebs”,\n”Id”: ”key-policy-ebs”,\n”Statement”: [\n{\n”Sid”: ”Enable IAM User Permissions”,\n”Effect”: ”Allow”,\n”Principal”: {\n”AWS”: ”arn:aws:iam::123456789012:root”\n”AWS”: ”arn:aws:iam::12345...:root”\n},\n”Action”: ”kms:*”,\n”Resource”: ”*”\n},\n{\n”Sid”: ”Allow use of the key”,\n”Effect”: ”Allow”,\n”Principal”: {\n\n\n”AWS”: ”arn:aws:iam::123456789012:role/aws-reserved/sso.amazonaws.com/InfrastructureDeployment”\n},\n”AWS”: ”arn:aws:iam::123456789012:role/aws-reserved/sso.amazonaws.com/InfrastructureDeployment”\n},\nExams Prep\n”Action”: [\n”kms:Encrypt”,\n”kms:Decrypt”,\n”kms:ReEncrypt*”,\n”kms:GenerateDataKey*”,\n”kms:DescribeKey”,\n”kms:CreateGrant”,\n”kms:ListGrants”,\n”kms:RevokeGrant”\n\n\n],\n”Resource”: ”*”,\n”Condition”: {\n”StringEquals”: {\n”kms:ViaService”: ”ec2.us-west-2.amazonaws.com”\n}\n}\n}\n]\n}\nThe security engineer recently discovered that IAM roles other than the InfrastructureDeployment role\nused this key for other services.\nWhich change to the policy should the security engineer make to resolve these issues?", "question_cn": "一家公司希望为不同的 AWS 服务建立单独的 AWS 密钥管理服务 (AWS KMS) 密钥。该公司的安全\n工程师创建了以下密钥策略，以允许基础设施部署团队通过假定基础设施部署 IAM 角色来创建加\n密的亚马逊弹性块存储 (Amazon EBS) 卷:\n” 版本”: ”2012-10-17”,\n” 声明”: [\n”Sid”: ” 启用 IAM 用户权限”,\n” 效果”: ” 允许”,\n” 主体”: {\n” 操作”: ”kms:*”,\n” 资源”: ”*”\n” 描述符”: ” 允许使用密钥”,\n” 效果”: ” 允许”,\n” 主体”: {\n考试准备\n” 操作”: [\n”kms: 加密”,\n”kms: 解密”,\n”kms: 重新加密 *”,\n”kms: 生成数据密钥 *”,\n”kms: 描述密钥”,\n”kms: 创建授权”,\n”kms: 列出授权”,\n”kms: 撤销授权”\n” 资源”: ”*”,\n” 条件”: {\n” 字符串相等”: {\n”kms: 通过服务”: ”ec2.us-west-2.amazonaws.com”\n安全工程师最近发现，除了基础设施部署角色之外的 IAM 角色将此密钥用于其他服务。\n安全工程师应如何更改策略以解决这些问题？", "options": [{"letter": "A", "en": "In the statement block that contains the Sid ”Allow use of the key”, under the Condition block, change\nStringEquals to StringLike.", "cn": "在包含 Sid“允许使用密钥”的语句块中，在条件块下，将字符串相等改为字符串匹配。"}, {"letter": "B", "en": "In the policy document, remove the statement block that contains the Sid ” Enable IAM User Permissions”. Add key management policies to the KMS policy.", "cn": "在策略文档中，删除包含 Sid“启用 IAM 用户权限”的语句块。将密钥管理策略添加到 KMS 策\n略中。"}, {"letter": "C", "en": "In the statement block that contains the Sid ” Allow use of the key”, under the Condition block, change\nthe kms:ViaService value to ec2.us-east-1.amazonaws.com.", "cn": "在包含 Sid“允许使用密钥”的语句块中，在条件块下，将 kms: 通过服务的值改为 ec2.us-east1.amazonaws.com。"}, {"letter": "D", "en": "In the policy document, add a new statement block that grants the kms:Disable* permission to the\nsecurity engineer’s IAM role.", "cn": "在策略文档中，添加一个新的语句块，授予安全工程师的 IAM 角色 kms: 禁用 * 权限。"}], "answer": "A", "explanation_en": "AWS KMS key policies can restrict how and when a key is used by applying conditions such as kms:\nViaService, which limits usage to requests that originate from a specific AWS service. According to the AWS\nCertified Security - Specialty Official Study Guide and AWS KMS documentation, the kms:ViaService condition is evaluated against the service that calls KMS on behalf of the principal.\nUsing StringEquals with kms:ViaService restricts usage to exactly one service endpoint. However, AWS\nservices can invoke KMS through service variants, internal endpoints, or additional service integrations.\nWhen StringEquals is used, these variations can unintentionally bypass the condition, allowing the key to\nbe used by other services through different internal service paths.\nChanging the condition operator from StringEquals to StringLike ensures that only EC2-related service\ncalls that match the intended service pattern are allowed, while still preventing use by unrelated AWS services.\nThis aligns with AWS guidance to use StringLike when service invocation patterns may vary.\nOption B is incorrect because the root principal statement is required to retain administrative control\nover the key. Option C is invalid because changing Regions does not address unauthorized service usage.\nOption D does not restrict key usage and does not mitigate the issue.\n\n\nAWS documentation explicitly recommends tightening condition operators in KMS key policies to prevent unintended service access while maintaining required functionality.\n• AWS Certified Security - Specialty Official Study Guide\nAWS Key Management Service Developer Guide\nAWS KMS Key Policy Best Practices", "explanation_cn": "AWS KMS 密钥策略可以通过应用诸如 kms: 通过服务之类的条件来限制密钥的使用方式和时间，该\n条件将使用限制为源自特定 AWS 服务的请求。根据《AWS 认证安全 - 专业官方学习指南》和 AWS\nKMS 文档，kms: 通过服务条件是针对代表主体调用 KMS 的服务进行评估的。\n将字符串相等与 kms: 通过服务一起使用会将使用严格限制为恰好一个服务端点。但是，AWS 服务\n可以通过服务变体、内部端点或其他服务集成来调用 KMS。使用字符串相等时，这些变体可能会\n无意中绕过条件，从而允许密钥通过不同的内部服务路径被其他服务使用。\n将条件运算符从字符串相等更改为字符串匹配可确保仅允许与预期服务模式匹配的与 EC2 相关的\n服务调用，同时仍防止无关的 AWS 服务使用。这与 AWS 在服务调用模式可能变化时使用字符串匹\n配的指导方针一致。\n选项 B 不正确，因为根主体语句是保留对密钥的管理控制所必需的。选项 C 无效，因为更改区域并\n不能解决未经授权的服务使用问题。选项 D 不会限制密钥使用，也不会缓解问题。\nAWS 文档明确建议收紧 KMS 密钥策略中的条件运算符，以防止意外的服务访问，同时保持所需的\n功能。\n•《AWS 认证安全 - 专业官方学习指南》\n《AWS 密钥管理服务开发者指南》\n《AWS KMS 密钥策略最佳实践》"}, {"num": 78, "category_en": "Incident Response", "category_cn": " incident 响应", "question_en": "A company runs a web application on a fleet of Amazon EC2 instances that are in an Auto Scaling group.\nThe EC2 instances are in the same VPC subnet as other workloads.\nA security engineer deploys Amazon GuardDuty and integrates it with AWS Security Hub. The security\nengineer needs to implement an automated solution to detect and respond to anomalous traffic patterns. The\nsolution must follow AWS best practices for initial incident response and must minimize disruption to the\nweb application.\nWhich solution will meet these requirements?", "question_cn": "一家公司在一个自动缩放组中的一批 Amazon EC2 实例上运行一个 Web 应用程序。这些 EC2 实例\n与其他工作负载位于同一个 VPC 子网中。\n一位安全工程师部署了 Amazon GuardDuty 并将其与 AWS Security Hub 集成。该安全工程师需要\n实现一个自动化解决方案来检测和响应异常流量模式。该解决方案必须遵循 AWS 关于初始事件响\n应的最佳实践，并且必须尽量减少对 Web 应用程序的干扰。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Disable the instance profile access keys by using AWS Lambda.", "cn": "使用 AWS Lambda 禁用实例配置文件访问密钥。"}, {"letter": "B", "en": "Remove the affected instance from the Auto Scaling group and isolate it with a restricted security group\nby using AWS Lambda.", "cn": "使用 AWS Lambda 将受影响的实例从自动缩放组中移除，并使用受限安全组将其隔离。"}, {"letter": "C", "en": "Update the network ACL to block the detected traffic source.", "cn": "更新网络 ACL 以阻止检测到的流量源。"}, {"letter": "D", "en": "Send GuardDuty findings to Amazon SNS for email notification.", "cn": "将 GuardDuty 调查结果发送到 Amazon SNS 进行电子邮件通知。"}], "answer": "B", "explanation_en": "AWS incident response best practices emphasize containment with minimal blast radius while preserving business continuity. According to the AWS Certified Security - Specialty Official Study Guide, isolating\na compromised resource while allowing the application to continue operating is the recommended initial\nresponse.\nBy creating an Amazon EventBridge rule that reacts to GuardDuty anomalous traffic findings and invokes\nan AWS Lambda function, the security engineer can automatically remove the affected EC2 instance from the\nAuto Scaling group and attach a restricted security group. This immediately stops malicious activity while\nallowing Auto Scaling to replace the instance and keep the application available.\nOption A is inappropriate because EC2 instance profiles do not use long-term access keys. Option C\napplies subnet-wide changes that could disrupt unrelated workloads. Option D provides notification only\nand does not meet the automated response requirement.\n\nAWS documentation explicitly identifies instance isolation via security groups as a preferred containment\ntechnique that preserves application availability and forensic integrity.\nA MS Certified Security - Specialty Official Study Guide\nAmazon GuardDuty User Guide\nAWS Incident Response Best Practices", "explanation_cn": "AWS 事件响应最佳实践强调在保持业务连续性的同时，以最小的影响范围进行遏制。根据《AWS\n认证安全 - 专业官方学习指南》，在允许应用程序继续运行的同时隔离受损资源是推荐的初始响应\n措施。\n通过创建一个 Amazon EventBridge 规则，该规则对 GuardDuty 异常流量调查结果做出反应并调用\n一个 AWS Lambda 函数，安全工程师可以自动将受影响的 EC2 实例从自动缩放组中移除，并附加\n一个受限安全组。这立即停止了恶意活动，同时允许自动缩放替换实例并保持应用程序可用。\n选项 A 不合适，因为 EC2 实例配置文件不使用长期访问密钥。选项 C 应用子网范围的更改，可能\n会干扰不相关的工作负载。选项 D 仅提供通知，不符合自动响应要求。\nAWS 文档明确将通过安全组进行实例隔离确定为一种首选的隔离技术，该技术可保持应用程序可\n用性和取证完整性。\n一本微软认证安全 - 专业官方学习指南\n亚马逊 GuardDuty 用户指南\nAWS 事件响应最佳实践"}, {"num": 79, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company stores sensitive data in an Amazon S3 bucket. The company encrypts the data at rest by\nusing server-side encryption with Amazon S3 managed keys (SSE-S3). A security engineer must prevent any\nmodifications to the data in the S3 bucket.\nWhich solution will meet this requirement?", "question_cn": "一家公司将敏感数据存储在亚马逊 S3 存储桶中。该公司通过使用亚马逊 S3 托管密钥 (SSE - S3) 进\n行服务器端加密来对静态数据进行加密。一名安全工程师必须防止对 S3 存储桶中的数据进行任何\n修改。\n哪种解决方案将满足此要求？", "options": [{"letter": "A", "en": "Configure S3 bucket policies to deny DELETE and PUT object permissions.", "cn": "配置 S3 存储桶策略以拒绝 DELETE 和 PUT 对象权限。"}, {"letter": "B", "en": "Configure S3 Object Lock in compliance mode with S3 bucket versioning enabled.", "cn": "在启用 S3 存储桶版本控制的情况下，以合规模式配置 S3 对象锁定。"}, {"letter": "C", "en": "Change the encryption on the S3 bucket to use AWS Key Management Service (AWS KMS) customer\nmanaged keys.", "cn": "将 S3 存储桶上的加密更改为使用 AWS 密钥管理服务 (AWS KMS) 客户管理的密钥。"}, {"letter": "D", "en": "Configure the S3 bucket with multi-factor authentication (MFA) delete protection.", "cn": "为 S3 存储桶配置多因素身份验证 (MFA) 删除保护。"}], "answer": "B", "explanation_en": "Amazon S3 Object Lock in compliance mode provides write-once-read-many (WORM) protection, which\nprevents objects from being modified or deleted for a specified retention period. According to the AWS Certified Security - Specialty Study Guide, compliance mode enforces immutability even for the root user and\ncannot be overridden.\nEnabling S3 Object Lock requires S3 bucket versioning and ensures that once an object is written, it\ncannot be changed or removed until the retention period expires. This is the strongest protection against data\nmodification and is commonly used for regulatory and legal retention requirements.\nOption A can be bypassed by administrators. Option D only protects against deletions, not overwrites.\nOption C changes encryption but does not prevent modification.\nAWS documentation explicitly identifies S3 Object Lock in compliance mode as the correct solution for\nimmutable data storage.", "explanation_cn": "处于合规模式的亚马逊 S3 对象锁定提供一次写入多次读取 (WORM) 保护，可防止对象在指定保留\n期内被修改或删除。根据 AWS 认证安全 - 专业学习指南，合规模式即使对根用户也强制实施不可\n变，且无法被覆盖。\n启用 S3 对象锁定需要 S3 存储桶版本控制，并确保一旦写入对象，在保留期到期之前不能更改或删\n除。这是防止数据修改的最强保护措施，通常用于监管和法律保留要求。\n选项 A 可以被管理员绕过。选项 D 仅防止删除，不防止覆盖。选项 C 更改加密但不防止修改。\nAWS 文档明确将合规模式下的 S3 对象锁定标识为不可变数据存储的正确解决方案。"}, {"num": 80, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company’s security engineer receives an alert that indicates that an unexpected principal is accessing\na company-owned Amazon Simple Queue Service (Amazon SQS) queue. All the company’s accounts are\nwithin an organization in AWS Organizations. The security engineer must implement a mitigation solution\nthat minimizes compliance violations and investment in tools outside of AWS.\nWhat should the security engineer do to meet these requirements?", "question_cn": "一家公司的安全工程师收到一条警报，表明有一个意外的主体正在访问公司拥有的亚马逊简单队列\n服务 (Amazon SQS) 队列。该公司的所有账户都在 AWS 组织中的一个组织内。安全工程师必须实\n施一种缓解解决方案，以尽量减少合规违规和对 AWS 之外工具的投资。\n安全工程师应采取什么措施来满足这些要求？", "options": [{"letter": "A", "en": "Create security groups and attach them to all SQS queues.", "cn": "创建安全组并将其附加到所有 SQS 队列。"}, {"letter": "B", "en": "Modify network ACLs in all VPCs to restrict inbound traffic.", "cn": "修改所有 VPC 中的网络访问控制列表 (ACL) 以限制入站流量。"}, {"letter": "C", "en": "Create interface VPC endpoints for Amazon SQS. Restrict access using aws:SourceVpce and aws: PrincipalOrgId conditions.", "cn": "为亚马逊 SQS 创建接口 VPC 终端节点。使用 aws:SourceVpce 和 aws:PrincipalOrgId 条件限制访\n问。"}, {"letter": "D", "en": "Use a third-party cloud access security broker (CASB).", "cn": "使用第三方云访问安全代理 (CASB)。"}], "answer": "C", "explanation_en": "Amazon SQS is a regional service that supports AWS PrivateLink through interface VPC endpoints. According to AWS Certified Security - Specialty documentation, the most secure and compliant way to restrict\naccess to AWS services is by using VPC endpoints combined with resource-based policies.\nBy creating interface VPC endpoints for Amazon SQS in all VPCs, traffic to SQS remains on the AWS\nnetwork and does not traverse the public internet. Using the aws:SourceVpce condition in the SQS queue\npolicy ensures that only requests originating from approved VPC endpoints can access the queue. Adding the\naws:PrincipalOrgId condition further restricts access to principals that belong to the same AWS Organization.\nSecurity groups and network ACLs do not apply to SQS because SQS is not deployed inside a VPC. Thirdparty CASB tools add cost and operational overhead.", "explanation_cn": "亚马逊 SQS 是一项区域服务，通过接口 VPC 终端节点支持 AWS PrivateLink。根据 AWS 安全认证\n- 专业文档，限制对 AWS 服务访问的最安全和合规的方法是使用 VPC 终端节点结合基于资源的策\n略。\n通过在所有 VPC 中为 Amazon SQS 创建接口 VPC 终结点，发往 SQS 的流量将保留在 AWS 网络上，\n不会穿越公共互联网。在 SQS 队列策略中使用 aws:SourceVpce 条件可确保只有源自已批准 VPC\n终结点的请求才能访问队列。添加 aws:PrincipalOrgId 条件可进一步将访问权限限制为仅属于同一\nAWS 组织的主体。\n安全组和网络 ACL 不适用于 SQS，因为 SQS 未部署在 VPC 内部。第三方 CASB 工具会增加成本和\n运营开销。"}, {"num": 81, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company is expanding its group of stores. On the day that each new store opens, the company wants\nto launch a customized web application for that store. Each store’s application will have a non-production\nenvironment and a production environment. Each environment will be deployed in a separate AWS account.\nThe company uses AWS Organizations and has an OU that is used only for these accounts.\nThe company distributes most of the development work to third-party development teams. A security\nengineer needs to ensure that each team follows the company’s deployment plan for AWS resources. The\nsecurity engineer also must limit access to the deployment plan to only the developers who need access. The\nsecurity engineer already has created an AWS CloudFormation template that implements the deployment\nplan.\nWhat should the security engineer do next to meet the requirements in the MOST secure way?", "question_cn": "一家公司正在扩大其门店群。在每家新门店开业当天，公司希望为该门店推出定制化的 Web 应用\n程序。每个门店的应用程序将有一个非生产环境和一个生产环境。每个环境将部署在单独的 AWS\n账户中。该公司使用 AWS 组织，并有一个仅用于这些账户的 OU。\n该公司将大部分开发工作分配给第三方开发团队。一名安全工程师需要确保每个团队遵循公司针\n对 AWS 资源的部署计划。安全工程师还必须将对部署计划的访问权限限制为仅需要访问的开发人\n员。安全工程师已经创建了一个实施部署计划的 AWS CloudFormation 模板。\n安全工程师接下来应采取什么措施以最安全的方式满足要求？", "options": [{"letter": "A", "en": "Create an AWS Service Catalog portfolio in the organization’s management account. Upload the\nCloudFormation template. Add the template to the portfolio’s product list. Share the portfolio with the OU.", "cn": "在组织的管理账户中创建一个 AWS 服务目录组合。上传 CloudFormation 模板。将模板添加到\n组合的产品列表中。与 OU 共享该组合。"}, {"letter": "B", "en": "Use the CloudFormation CLI to create a module from the CloudFormation template. Register the\nmodule as a private extension in the CloudFormation registry. Publish the extension. Create an SCP that\nallows access to the extension.", "cn": "使用 CloudFormation CLI 从 CloudFormation 模板创建一个模块。在 CloudFormation 注册表中\n将该模块注册为私有扩展。发布该扩展。创建一个允许访问该扩展的 SCP。"}, {"letter": "C", "en": "Create an AWS Service Catalog portfolio and create an IAM role for cross-account access. Attach the\nAWSServiceCatalogEndUserFullAccess managed policy to the role.", "cn": "创建一个 AWS 服务目录组合并创建一个用于跨账户访问的 IAM 角色。将 AWSServiceCatalogEndUserFullAccess 托管策略附加到该角色。"}, {"letter": "D", "en": "Use the CloudFormation CLI to create a module and share the extension directly with the OU.", "cn": "使用 CloudFormation CLI 创建一个模块并直接与 OU 共享该扩展。"}], "answer": "A", "explanation_en": "AWS Service Catalog is specifically designed to help organizations govern and control how AWS resources\nare provisioned at scale. According to the AWS Certified Security - Specialty Official Study Guide, Service Catalog enables administrators to define approved CloudFormation templates as products and to control which\naccounts, users, or organizational units can deploy those products.\nBy creating a Service Catalog portfolio in the management account and sharing it with a specific OU, the\nsecurity engineer ensures that only accounts within that OU can deploy the approved infrastructure. Thirdparty developers can deploy resources only by using the predefined CloudFormation template and cannot\nalter the deployment plan, which enforces consistency and compliance.\nThis approach also limits access to the deployment plan itself, because developers interact with the Service Catalog product rather than the raw template. No cross-account IAM roles or excessive permissions are\nrequired, which reduces the attack surface.\nCloudFormation modules and extensions (Options B and D) provide reuse but do not enforce deployment\ngovernance or access control. Option C introduces unnecessary cross-account IAM roles, which is less secure\nthan native Service Catalog sharing.\n\n\nAWS documentation explicitly identifies AWS Service Catalog + AWS Organizations as the recommended\npattern for secure, standardized multi-account deployments.\n\n• AWS Certified Security - Specialty Official Study Guide\nAWS Service Catalog Administrator Guide\nAWS Organizations Best Practices", "explanation_cn": "AWS 服务目录专门设计用于帮助组织大规模管理和控制 AWS 资源的供应方式。根据《AWS\n认证安全 - 专业官方学习指南》\n，服务目录使管理员能够将批准的 CloudFormation 模板定义为产品，\n并控制哪些账户、用户或组织单位可以部署这些产品。\n 通过在管理账户中创建服务目录组合并与特定的组织单位共享，安全工程师确保只有该组\n织单位内的账户才能部署批准的基础设施。第三方开发人员只能使用预定义的 CloudFormation 模\n板来部署资源，并且不能更改部署计划，从而确保了一致性和合规性。\n 这种方法还限制了对部署计划本身的访问，因为开发人员与服务目录产品而不是原始模板\n进行交互。不需要跨账户的 IAM 角色或过多的权限，从而减少了攻击面。\nCloudFormation 模块和扩展 (选项 B 和 D) 提供了重用性，但没有实施部署治理或访问控制。\n选项 C 引入了不必要的跨账户 IAM 角色，这比原生的服务目录共享安全性更低。\nAWS 文档明确将 AWS 服务目录 + AWS 组织标识为安全、标准化多账户部署的推荐模式。\n- 《AWS 认证安全 - 专业官方学习指南》\nAWS 服务目录管理员指南 \nAWS 组织最佳实践"}, {"num": 82, "category_en": "Detection", "category_cn": "偵測", "question_en": "A company runs a public web application on Amazon EKS behind Amazon CloudFront and an Application Load Balancer (ALB). A security engineer must send a notification to an existing Amazon SNS topic\nwhen the application receives 10,000 requests from the same end-user IP address within any 5-minute period.\nWhich solution will meet these requirements?", "question_cn": "## 问题编号:82 - [检测]\n 一家公司在 Amazon CloudFront 和应用负载均衡器 (ALB) 后面的 Amazon EKS 上运行一个\n公共 Web 应用程序。当应用程序在任何 5 分钟内从同一最终用户 IP 地址收到 10,000 个请求时，安\n全工程师必须向现有的 Amazon SNS 主题发送通知。\n 哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Configure CloudFront standard logging and CloudWatch Logs metric filters.", "cn": "配置 CloudFront 标准日志和 CloudWatch Logs 指标过滤器。"}, {"letter": "B", "en": "Configure VPC Flow Logs and CloudWatch Logs metric filters.", "cn": "配置 VPC 流日志和 CloudWatch Logs 指标过滤器。"}, {"letter": "C", "en": "Configure an AWS WAF web ACL with an ASN match rule and CloudWatch alarms.", "cn": "配置带有 ASN 匹配规则和 CloudWatch 警报的 AWS WAF Web ACL。"}, {"letter": "D", "en": "Configure an AWS WAF web ACL with a rate-based rule. Associate it with CloudFront. Create a\nCloudWatch alarm to notify SNS.", "cn": "配置带有基于速率规则的 AWS WAF Web ACL。将其与 CloudFront 关联。创建一个 CloudWatch 警报以通知 SNS。"}], "answer": "D", "explanation_en": "AWS WAF rate-based rules are designed specifically to track the number of requests from a single IP\naddress over a configurable time window. According to AWS Certified Security - Specialty guidance, ratebased rules integrate natively with CloudFront and emit CloudWatch metrics that can trigger alarms.\nCloudFront logs and VPC Flow Logs are not real-time detection tools. ASN match rules do not count\nrequest rates.", "explanation_cn": "基于速率的 AWS WAF 规则专门设计用于在可配置的时间窗口内跟踪来自单个 IP 地址的请求数\n量。根据 AWS 安全认证专家指南，基于速率的规则与 CloudFront 原生集成，并发出可触发警报的\nCloudWatch 指标。\nCloudFront 日志和 VPC 流日志不是实时检测工具。ASN 匹配规则不计入请求速率。"}, {"num": 83, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A security engineer receives a notice about suspicious activity from a Linux-based Amazon EC2 instance\nthat uses Amazon Elastic Block Store (Amazon EBS)-based storage. The instance is making connections to\nknown malicious addresses.\nThe instance is in a development account within a VPC that is in the us-east-1 Region. The VPC contains\nan internet gateway and has a subnet in us-east-1a and us-east-1b. Each subnet is associated with a route\ntable that uses the internet gateway as a default route. Each subnet also uses the default network ACL. The\nsuspicious EC2 instance runs within the us-east-1b subnet. During an initial investigation, a security engineer\ndiscovers that the suspicious instance is the only instance that runs in the subnet.\nWhich response will immediately mitigate the attack and help investigate the root cause?", "question_cn": "一名安全工程师收到来自一个基于 Linux 的 Amazon EC2 实例的可疑活动通知，该实例使用基于\nAmazon Elastic Block Store(Amazon EBS) 的存储。该实例正在连接到已知的恶意地址。\n该实例位于美国东部 1 区的一个 VPC 内的开发账户中。该 VPC 包含一个互联网网关，并在 us-east1a 和 us-east-1b 中有子网。每个子网都与一个使用互联网网关作为默认路由的路由表相关联。每个\n子网还使用默认网络 ACL。可疑的 EC2 实例在 us-east-1b 子网内运行。在初步调查中，一名安全工\n程师发现可疑实例是该子网中唯一运行的实例。\n哪种响应将立即缓解攻击并有助于调查根本原因？", "options": [{"letter": "A", "en": "Log in to the suspicious instance and use the netstat command to identify remote connections. Use\nthe IP addresses from these remote connections to create deny rules in the security group of the instance.\nInstall diagnostic tools on the instance for investigation. Update the outbound network ACL for the subnet\nin us-east-1b to explicitly deny all connections as the first rule during the investigation of the instance.", "cn": "登录到可疑实例并使用 netstat 命令识别远程连接。使用这些远程连接的 IP 地址在实例的安全组\n中创建拒绝规则。在实例上安装诊断工具进行调查。在调查实例期间，将 us-east-1b 子网的出站网\n络 ACL 更新为明确拒绝所有连接作为第一条规则。"}, {"letter": "B", "en": "Update the outbound network ACL for the subnet in us-east-1b to explicitly deny all connections as\nthe first rule. Replace the security group with a new security group that allows connections only from a\ndiagnostics security group. Update the outbound network ACL for the us-east-1b subnet to remove the deny\nall rule. Launch a new EC2 instance that has diagnostic tools. Assign the new security group to the new EC2\ninstance. Use the new EC2 instance to investigate the suspicious instance.", "cn": "将 us-east-1b 子网的出站网络 ACL 更新为明确拒绝所有连接作为第一条规则。用一个只允许来\n自诊断安全组的连接的新安全组替换原安全组。更新 us-east-1b 子网的出站网络 ACL 以删除拒绝\n所有连接的规则。启动一个具有诊断工具的新 EC2 实例。将新安全组分配给新的 EC2 实例。使用\n新的 EC2 实例调查可疑实例。"}, {"letter": "C", "en": "Ensure that the Amazon Elastic Block Store (Amazon EBS) volumes that are attached to the suspicious\nEC2 instance will not delete upon termination. Terminate the instance. Launch a new EC2 instance in useast-1a that has diagnostic tools. Mount the EBS volumes from the terminated instance for investigation.", "cn": "确保附加到可疑 EC2 实例的 Amazon Elastic Block Store(Amazon EBS) 卷在实例终止时不会被删\n除。终止该实例。在美国东部 1 区的 us-east-1a 中启动一个具有诊断工具的新 EC2 实例。挂载已终\n止实例的 EBS 卷进行调查。"}, {"letter": "D", "en": "Create an AWS WAF web ACL that denies traffic to and from the suspicious instance. Attach the AWS\nWAF web ACL to the instance to mitigate the attack. Log in to the instance and install diagnostic tools to\ninvestigate the instance.", "cn": "创建一个 AWS WAF 网络 ACL，拒绝与可疑实例的通信。将 AWS WAF 网络 ACL 附加到实例以\n缓解攻击。登录到实例并安装诊断工具以调查该实例。"}], "answer": "C", "explanation_en": "AWS incident response best practices emphasize immediate containment, preservation of evidence, and\nsafe forensic investigation. According to the AWS Certified Security - Specialty Study Guide, when an EC2\ninstance is suspected of compromise, security teams should avoid logging in to the instance or installing additional tools, as these actions can alter evidence and increase risk.\nTerminating the compromised instance after ensuring that its Amazon EBS volumes are preserved prevents further malicious activity immediately. By setting the EBS volumes to not delete on termination, all disk\ndata is retained for forensic analysis. Launching a new, clean EC2 instance in a different subnet or Availability Zone with preinstalled diagnostic tools allows investigators to safely attach and analyze the compromised\nvolumes without executing potentially malicious code.\n\n\nOption A introduces significant risk by logging in to the compromised instance and modifying security\ncontrols during active compromise. Option B delays containment and allows continued outbound traffic\nduring investigation steps. Option D is invalid because AWS WAF cannot be attached directly to Amazon EC2\ninstances and does not control outbound traffic.\nAWS documentation strongly recommends isolating or terminating compromised resources and performing offline analysis using detached storage volumes. This approach ensures immediate mitigation, preserves forensic integrity, and aligns with AWS incident response frameworks.", "explanation_cn": "AWS 事件响应最佳实践强调立即遏制、证据保存和安全的取证调查。根据《AWS 认证安全 - 专业\n考试指南》\n，当怀疑 EC2 实例受到入侵时，安全团队应避免登录该实例或安装额外工具，因为这些\n操作可能会改变证据并增加风险。\n在确保保留其 Amazon EBS 卷之后终止受入侵的实例可立即防止进一步的恶意活动。通过将 EBS\n卷设置为在终止时不删除，所有磁盘数据将被保留用于取证分析。在不同子网或可用区中使用预安\n装诊断工具启动一个新的、干净的 EC2 实例，使调查人员能够安全地附加并分析受入侵的卷，而无\n需执行潜在的恶意代码。\n选项 A 通过在活动入侵期间登录受入侵的实例并修改安全控制引入了重大风险。选项 B 延迟了遏\n制，并在调查步骤期间允许持续的出站流量。选项 D 无效，因为 AWS WAF 不能直接附加到 Amazon\nEC2 实例，并且不控制出站流量。\nAWS 文档强烈建议隔离或终止受入侵的资源，并使用分离的存储卷进行离线分析。这种方法可确\n保立即缓解，保留取证完整性，并符合 AWS 事件响应框架。"}, {"num": 84, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company has a VPC that has no internet access and has the private DNS hostnames option enabled. An\nAmazon Aurora database is running inside the VPC. A security engineer wants to use AWS Secrets Manager\nto automatically rotate the credentials for the Aurora database. The security engineer configures the Secrets\nManager default AWS Lambda rotation function to run inside the same VPC that the Aurora database uses.\nHowever, the security engineer determines that the password cannot be rotated properly because the Lambda\nfunction cannot communicate with the Secrets Manager endpoint.\n\nWhat is the MOST secure way that the security engineer can give the Lambda function the ability to\ncommunicate with the Secrets Manager endpoint?", "question_cn": "一家公司有一个没有互联网访问权限且启用了私有 DNS 主机名选项的 VPC。一个 Amazon Aurora\n数据库在该 VPC 内运行。一名安全工程师希望使用 AWS Secrets Manager 自动轮换 Aurora 数据库\n的凭证。该安全工程师将 Secrets Manager 默认的 AWS Lambda 轮换函数配置为在与 Aurora 数据库\n相同的 VPC 内运行。然而，该安全工程师确定密码无法正确轮换，因为 Lambda 函数无法与 Secrets\nManager 端点通信。\n安全工程师能够给予 Lambda 函数与 Secrets Manager 端点通信能力的最安全方法是什么？", "options": [{"letter": "A", "en": "Add a NAT gateway to the VPC to allow access to the Secrets Manager endpoint.", "cn": "向 VPC 添加一个 NAT 网关以允许访问 Secrets Manager 端点。"}, {"letter": "B", "en": "Add a gateway VPC endpoint to the VPC to allow access to the Secrets Manager endpoint.", "cn": "向 VPC 添加一个网关 VPC 端点以允许访问 Secrets Manager 端点。"}, {"letter": "C", "en": "Add an interface VPC endpoint to the VPC to allow access to the Secrets Manager endpoint.", "cn": "向 VPC 添加一个接口 VPC 端点以允许访问 Secrets Manager 端点。"}, {"letter": "D", "en": "Add an internet gateway for the VPC to allow access to the Secrets Manager endpoint.", "cn": "为 VPC 添加互联网网关，以允许访问 Secrets Manager 端点。"}], "answer": "C", "explanation_en": "AWS Secrets Manager is a regional service that is accessed through private AWS endpoints. In a VPC\nwithout internet access, AWS recommends using AWS PrivateLink through interface VPC endpoints to enable secure, private connectivity to supported AWS services. According to AWS Certified Security - Specialty\ndocumentation, interface VPC endpoints allow resources within a VPC to communicate with AWS services\nwithout traversing the public internet, NAT devices, or internet gateways.\n\n\nAn interface VPC endpoint for Secrets Manager creates elastic network interfaces (ENIs) within the VPC\nsubnets and assigns private IP addresses that route traffic directly to the Secrets Manager service. Because\nthe VPC has private DNS enabled, the standard Secrets Manager DNS hostname resolves to the private IP\naddresses of the interface endpoint, allowing the Lambda rotation function to communicate securely and\ntransparently.\nOption A introduces unnecessary complexity and expands the attack surface by allowing outbound internet access. Option B is incorrect because gateway VPC endpoints are supported only for Amazon S3 and\nAmazon DynamoDB. Option D violates the security requirement by exposing the VPC to the internet.\nAWS security best practices explicitly recommend interface VPC endpoints as the most secure connectivity method for private VPC workloads accessing AWS managed services.", "explanation_cn": "AWS Secrets Manager 是一项区域服务，通过专用的 AWS 端点进行访问。在没有互联网访问权限的\nVPC 中，AWS 建议通过接口 VPC 端点使用 AWS PrivateLink，以实现与受支持的 AWS 服务的安全、\n专用连接。根据 AWS Certified Security - Specialty 文档，接口 VPC 端点允许 VPC 内的资源与 AWS\n服务进行通信，而无需穿越公共互联网、NAT 设备或互联网网关。\nSecrets Manager 的接口 VPC 端点会在 VPC 子网内创建弹性网络接口 (ENI)，并分配直接将流量路\n由到 Secrets Manager 服务的专用 IP 地址。由于 VPC 启用了专用 DNS，标准的 Secrets Manager DNS\n主机名将解析为接口端点的专用 IP 地址，从而允许 Lambda 轮换函数进行安全且透明的通信。\n选项 A 通过允许出站互联网访问引入了不必要的复杂性并扩大了攻击面。选项 B 不正确，因为网\n关 VPC 端点仅支持用于 Amazon S3 和 Amazon DynamoDB。选项 D 通过将 VPC 暴露到互联网违\n反了安全要求。\nAWS 安全最佳实践明确建议将接口 VPC 端点作为私有 VPC 工作负载访问 AWS 托管服务的最安全\n连接方法。"}, {"num": 85, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company’s data scientists want to create artificial intelligence and machine learning (AI/ML) training\nmodels by using Amazon SageMaker. The training models will use large datasets in an Amazon S3 bucket.\nThe datasets contain sensitive information.\nOn average, the data scientists need 30 days to train models. The S3 bucket has been secured appropriately. The company’s data retention policy states that all data that is older than 45 days must be removed from\nthe S3 bucket.\nWhich action should a security engineer take to enforce this data retention policy?", "question_cn": "一家公司的数据科学家希望通过使用 Amazon SageMaker 创建人工智能和机器学习 (AI/ML) 训练\n模型。训练模型将使用 Amazon S3 存储桶中的大型数据集。这些数据集包含敏感信息。\n平均而言，数据科学家需要 30 天来训练模型。S3 存储桶已得到适当保护。该公司的数据保留策略\n规定，所有超过 45 天的数据必须从 S3 存储桶中删除。\n安全工程师应采取以下哪项行动来执行此数据保留策略？", "options": [{"letter": "A", "en": "Configure an S3 Lifecycle rule on the S3 bucket to delete objects after 45 days.", "cn": "在 S3 存储桶上配置 S3 生命周期规则，以在 45 天后删除对象。"}, {"letter": "B", "en": "Create an AWS Lambda function to check the last-modified date of the S3 objects and delete objects\nthat are older than 45 days. Create an S3 event notification to invoke the Lambda function for each PutObject\noperation.", "cn": "创建一个 AWS Lambda 函数，用于检查 S3 对象的最后修改日期，并删除超过 45 天的对象。创建\n一个 S3 事件通知，以便在每次 PutObject 操作时调用该 Lambda 函数。"}, {"letter": "C", "en": "Create an AWS Lambda function to check the last-modified date of the S3 objects and delete objects\nthat are older than 45 days. Create an Amazon EventBridge rule to invoke the Lambda function each month.", "cn": "创建一个 AWS Lambda 函数，用于检查 S3 对象的最后修改日期，并删除超过 45 天的对象。创建\n一个 Amazon EventBridge 规则，以便每月调用该 Lambda 函数。"}, {"letter": "D", "en": "Configure S3 Intelligent-Tiering on the S3 bucket to automatically transition objects to another storage\nclass.", "cn": "在 S3 存储桶上配置 S3 智能分层，以自动将对象转换到另一个存储类。"}], "answer": "A", "explanation_en": "Amazon S3 Lifecycle rules provide a native, fully managed mechanism to automatically transition or\ndelete objects based on their age. According to the AWS Certified Security - Specialty Official Study Guide, S3\nLifecycle policies are the recommended and most secure method for enforcing data retention requirements\nbecause they operate automatically, consistently, and without custom code.\nBy configuring a lifecycle rule to delete objects after 45 days, the company ensures that sensitive datasets\nare retained long enough to support the 30-day model training process while remaining compliant with the\ndata retention policy. Lifecycle rules are enforced by Amazon S3 itself and apply uniformly to all objects in\nthe bucket or to objects that match specific prefixes or tags.\nOption B and Option C introduce unnecessary operational complexity and risk by relying on custom\nLambda code and scheduling. These approaches are more error-prone, harder to audit, and less reliable than\na built-in S3 capability. Option D is incorrect because S3 Intelligent-Tiering manages storage cost optimization\nand does not delete data.\nAWS documentation explicitly states that S3 Lifecycle rules are the standard control for enforcing retention and deletion policies, particularly for sensitive data stored at scale.\nA MS Certified Security - Specialty Official Study Guide\n\n\nAmazon S3 Lifecycle Configuration Documentation\nAWS Data Protection Best Practices", "explanation_cn": "Amazon S3 生命周期规则提供了一种原生的、完全托管的机制，可根据对象的使用期限自动转换或\n删除对象。根据《AWS 认证安全 - 专业官方学习指南》\n，S3 生命周期策略是实施数据保留要求的推\n荐且最安全的方法，因为它们自动运行、一致且无需自定义代码。\n通过配置生命周期规则，以便在 45 天后删除对象，公司可确保敏感数据集保留足够长的时间以支\n持 30 天的模型训练过程，同时保持符合数据保留政策。生命周期规则由 Amazon S3 本身执行，并\n统一应用于存储桶中的所有对象或与特定前缀或标签匹配的对象。\n选项 B 和选项 C 通过依赖自定义 Lambda 代码和调度引入了不必要的操作复杂性和风险。这些方\n法比内置的 S3 功能更容易出错、更难审计且可靠性更低。选项 D 不正确，因为 S3 智能分层管理存\n储成本优化，不会删除数据。\nAWS 文档明确指出，S3 生命周期规则是实施保留和删除策略的标准控制，特别是对于大规模存储\n的敏感数据。\nA 《微软认证安全 - 专业官方学习指南》\nAmazon S3 生命周期配置文档\nAWS 数据保护最佳实践"}, {"num": 86, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A security engineer needs to implement AWS IAM Identity Center with an external identity provider (IdP).\nSelect and order the correct steps from the following list to meet this requirement. (Select and order THREE.)\n\nSteps (choose 3 and place in correct order):\n- Configure the external IdP as the identity source in IAM Identity Center.\n- Create an IAM role that has a trust policy that specifies the IdP's API endpoint.\n- Enable automatic provisioning in IAM Identity Center settings.\n- Enable automatic provisioning in the external IdP.\n- Obtain the SAML metadata from IAM Identity Center.\n- Obtain the SAML metadata from the external IdP.", "question_cn": "一名安全工程師需要使用外部身份提供商 (IdP) 來實施 AWS IAM Identity Center。\n從以下清單中選擇並排序正確的步驟以滿足此需求。（選擇並排序三個步驟。）\n\n選項（選 3 個並按正確順序排列）：\n- 在 IAM Identity Center 中將外部 IdP 配置為身份來源。\n- 建立具有指定 IdP API 端點信任策略的 IAM 角色。\n- 在 IAM Identity Center 設定中啟用自動佈建。\n- 在外部 IdP 中啟用自動佈建。\n- 從 IAM Identity Center 取得 SAML 中繼資料。\n- 從外部 IdP 取得 SAML 中繼資料。", "options": [{"letter": "A", "en": "Configure the external IdP as the identity source in IAM Identity Center.", "cn": "在 IAM Identity Center 中將外部 IdP 配置為身份來源。"}, {"letter": "B", "en": "Create an IAM role that has a trust policy that specifies the IdP's API endpoint.", "cn": "建立具有指定 IdP API 端點信任策略的 IAM 角色。"}, {"letter": "C", "en": "Enable automatic provisioning in IAM Identity Center settings.", "cn": "在 IAM Identity Center 設定中啟用自動佈建。"}, {"letter": "D", "en": "Enable automatic provisioning in the external IdP.", "cn": "在外部 IdP 中啟用自動佈建。"}, {"letter": "E", "en": "Obtain the SAML metadata from IAM Identity Center.", "cn": "從 IAM Identity Center 取得 SAML 中繼資料。"}, {"letter": "F", "en": "Obtain the SAML metadata from the external IdP.", "cn": "從外部 IdP 取得 SAML 中繼資料。"}], "answer": "Step1: Obtain the SAML metadata from IAM Identity Center → Step2: Obtain the SAML metadata from the external IdP → Step3: Configure the external IdP as the identity source in IAM Identity Center", "explanation_en": "Correct order:\nStep 1: Obtain the SAML metadata from IAM Identity Center (E)\nStep 2: Obtain the SAML metadata from the external IdP (F)\nStep 3: Configure the external IdP as the identity source in IAM Identity Center (A)\n\nExplanation:\n- First, obtain the SAML metadata (XML) from IAM Identity Center — this contains the SP (Service Provider) details needed by the external IdP.\n- Then, provide that metadata to the external IdP and obtain the external IdP's SAML metadata in return.\n- Finally, use the external IdP's metadata to configure it as the identity source in IAM Identity Center.", "explanation_cn": "正確步驟順序：\nStep 1: 從 IAM Identity Center 取得 SAML 中繼資料 (E)\nStep 2: 從外部 IdP 取得 SAML 中繼資料 (F)\nStep 3: 在 IAM Identity Center 中將外部 IdP 配置為身份來源 (A)\n\n說明：\n- 首先，從 IAM Identity Center 取得 SAML 中繼資料（XML），其中包含外部 IdP 所需的 SP（服務提供者）資訊。\n- 接著，將該中繼資料提供給外部 IdP，並從外部 IdP 取得其 SAML 中繼資料。\n- 最後，使用外部 IdP 的中繼資料，在 IAM Identity Center 中將其設定為身份來源。"}, {"num": 87, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company is attempting to conduct forensic analysis on an Amazon EC2 instance, but the company\nis unable to connect to the instance by using AWS Systems Manager Session Manager. The company has\ninstalled AWS Systems Manager Agent (SSM Agent) on the EC2 instance.\nThe EC2 instance is in a subnet in a VPC that does not have an internet gateway attached. The company\nhas associated a security group with the EC2 instance. The security group does not have inbound or outbound\nrules. The subnet’s network ACL allows all inbound and outbound traffic.\nWhich combination of actions will allow the company to conduct forensic analysis on the EC2 instance\nwithout compromising forensic data? (Select THREE.)\n)", "question_cn": "一家公司试图对 Amazon EC2 实例进行取证分析，但该公司无法使用 AWS Systems Manager 会话\n管理器连接到该实例。该公司已在 EC2 实例上安装了 AWS Systems Manager Agent(SSM Agent)。\n该 EC2 实例位于一个没有附加互联网网关的 VPC 子网中。该公司已将一个安全组与 EC2 实例关\n联。该安全组没有入站或出站规则。子网的网络访问控制列表允许所有入站和出站流量。\n以下哪些操作组合将允许该公司在不损害取证数据的情况下对 EC2 实例进行取证分析？(选择三项。", "options": [{"letter": "A", "en": "Update the EC2 instance security group to add a rule that allows outbound traffic on port 443 for\n0.0.0.0 /0.", "cn": "更新 EC2 实例安全组以添加一条规则，允许 0.0.0.0/0 通过端口 443 进行出站流量。"}, {"letter": "B", "en": "Update the EC2 instance security group to add a rule that allows inbound traffic on port 443 to the\nVPC’s CIDR range.", "cn": "更新 EC2 实例安全组以添加一条规则，允许端口 443 上的入站流量到 VPC 的 CIDR 范围。"}, {"letter": "C", "en": "Create an EC2 key pair. Associate the key pair with the EC2 instance.", "cn": "创建一个 EC2 密钥对。将密钥对与 EC2 实例关联。"}, {"letter": "D", "en": "Create a VPC interface endpoint for Systems Manager in the VPC where the EC2 instance is located.", "cn": "在 EC2 实例所在的 VPC 中为 Systems Manager 创建一个 VPC 接口端点。"}, {"letter": "E", "en": "Attach a security group to the VPC interface endpoint. Allow inbound traffic on port 443 to the VPC’s\nCIDR range.", "cn": "将一个安全组附加到 VPC 接口端点。允许端口 443 上的入站流量到 VPC 的 CIDR 范围。\nF. Create a VPC interface endpoint for the EC2 instance in the VPC where the EC2 instance is located.\nF. 在 EC2 实例所在的 VPC 中为该 EC2 实例创建一个 VPC 接口端点。"}], "answer": "A", "explanation_en": "AWS Systems Manager Session Manager requires secure outbound HTTPS connectivity from the EC2\nCreating a VPC interface endpoint for Systems Manager allows the SSM Agent to communicate securely\nwith the Systems Manager service. The endpoint must have an attached security group that allows inbound\ntraffic on port 443 from the VPC CIDR range. Additionally, the EC2 instance security group must allow\noutbound HTTPS traffic on port 443 so the agent can initiate connections.\nOption C is incorrect because creating or associating key pairs enables SSH access, which can alter forensic evidence and violates forensic best practices. Option B is unnecessary because Session Manager does not\nrequire inbound rules on the EC2 instance. Option F is invalid because EC2 does not use interface endpoints\nfor management connectivity.\nThis combination ensures secure, private access for forensic investigation while preserving evidence integrity and adhering to AWS incident response best practices.", "explanation_cn": "instance to Systems Manager endpoints. In a VPC without internet access, AWS Certified Security AWS Systems Manager 会话管理器要求从 EC2 实例到 Systems Manager 端点进行安全的出站 HTTPS\n连接。在没有互联网访问的 VPC 中，AWS 安全认证 Specialty documentation recommends using interface VPC endpoints to enable private connectivity without exposing the instance to the internet.\n专业文档建议使用接口 VPC 端点来实现专用连接，而无需将实例暴露到互联网。\n为 Systems Manager 创建 VPC 接口端点可使 SSM 代理与 Systems Manager 服务进行安全通信。该\n端点必须有一个附加的安全组，允许来自 VPC CIDR 范围的端口 443 上的入站流量。此外，EC2 实\n例安全组必须允许端口 443 上的出站 HTTPS 流量，以便代理可以发起连接。\n选项 C 不正确，因为创建或关联密钥对可启用 SSH 访问，这可能会改变取证证据并违反取证最佳\n实践。选项 B 不必要，因为会话管理器不需要 EC2 实例上的入站规则。选项 F 无效，因为 EC2 不\n使用接口端点进行管理连接。\n这种组合可确保在进行取证调查时实现安全、专用的访问，同时保持证据完整性并遵循 AWS 事件\n响应最佳实践。"}, {"num": 88, "category_en": "Detection", "category_cn": "检测", "question_en": "A company’s web application is hosted on Amazon EC2 instances running behind an Application Load\nBalancer (ALB) in an Auto Scaling group. An AWS WAF web ACL is associated with the ALB. AWS CloudTrail\nis enabled and stores logs in Amazon S3 and Amazon CloudWatch Logs.\nThe operations team has observed some EC2 instances reboot at random. After rebooting, all access\nlogs on the instances have been deleted. During an investigation, the operations team found that each reboot\nhappened just after a PHP error occurred on the new-user-creation.php file. The operations team needs to\nview log information to determine if the company is being attacked.\nWhich set of actions will identify the suspect attacker’s IP address for future occurrences?", "question_cn": "一家公司的 Web 应用程序托管在自动缩放组中的应用程序负载均衡器 (ALB) 后面运行的 Amazon\nEC2 实例上。一个 AWS WAF Web ACL 与 ALB 相关联。AWS CloudTrail 已启用，并将日志存储在\nAmazon S3 和 Amazon CloudWatch Logs 中。\n运营团队观察到一些 EC2 实例随机重启。重启后，实例上的所有访问日志都被删除。在调查过程\n中，运营团队发现每次重启都恰好发生在 new-user-creation.php 文件上出现 PHP 错误之后。运营\n团队需要查看日志信息以确定公司是否受到攻击。\n哪组操作将识别未来事件中可疑攻击者的 IP 地址？", "options": [{"letter": "A", "en": "Configure VPC Flow Logs on the subnet where the ALB is located and stream the data to CloudWatch.\nSearch for the new-user-creation.php occurrences in CloudWatch.", "cn": "在 ALB 所在的子网中配置 VPC 流日志，并将数据传输到 CloudWatch。在 CloudWatch 中搜索\nnew-user-creation.php 事件。"}, {"letter": "B", "en": "Configure the CloudWatch agent on the ALB and send application logs to CloudWatch Logs.", "cn": "在应用负载均衡器 (ALB) 上配置 CloudWatch 代理，并将应用程序日志发送到 CloudWatch Logs。"}, {"letter": "C", "en": "Configure the ALB to export access logs to an Amazon OpenSearch Service cluster and search for the\nnew-user-creation.php occurrences.", "cn": "配置 ALB 以将访问日志导出到 Amazon OpenSearch Service 集群，并搜索 new-user-creation.php\n的出现情况。"}, {"letter": "D", "en": "Configure the web ACL to send logs to Amazon Data Firehose, which delivers the logs to an S3 bucket.\nUse Amazon Athena to query the logs and find the new-user-creation.php occurrences.", "cn": "配置网络访问控制列表 (web ACL) 以将日志发送到 Amazon Data Firehose，后者将日志传输到\nS3 存储桶。使用 Amazon Athena 查询日志并查找 new-user-creation.php 的出现情况。"}], "answer": "D", "explanation_en": "AWS WAF logs capture detailed request-level information, including source IP address, request URI,\nheaders, and rule evaluation results. According to the AWS Certified Security - Specialty documentation,\nAWS WAF logging is a critical detection control when application-level attacks are suspected, especially when\nhost-based logs are unreliable or can be erased by attackers.\nBy configuring the AWS WAF web ACL to send logs to Amazon Data Firehose, the company ensures that\nall future requests are centrally captured and delivered to a durable storage service such as Amazon S3. Using\nAmazon Athena, the security team can query these logs to identify requests targeting specific application\npaths such as new-user-creation.php and extract the originating client IP addresses.\nOption A is incorrect because VPC Flow Logs operate at the network layer and do not capture HTTP\nrequest paths. Option B is invalid because ALBs do not support CloudWatch agents. Option C is viable but\n\n\nintroduces additional operational complexity and cost, making it less appropriate than the native WAF logging\nsolution.\nAWS documentation highlights AWS WAF logging combined with Athena as a best practice for forensic\nanalysis and attacker identification.\nAWS Certified Security - Specialty Official Study Guide\nAWS WAF Logging Documentation\nAmazon Athena User Guide\nAWS Detection and Monitoring Best Practices", "explanation_cn": "AWS WAF 日志捕获详细的请求级信息，包括源 IP 地址、请求 URI、标头和规则评估结果。根据\nAWS 认证安全 - 专业文档，当怀疑存在应用层攻击时，尤其是当基于主机的日志不可靠或可能被攻\n击者删除时，AWS WAF 日志记录是一种关键的检测控制措施。\n通过配置 AWS WAF 网络访问控制列表将日志发送到 Amazon Data Firehose，公司确保所有未来的\n请求都被集中捕获并传输到诸如 Amazon S3 之类的持久存储服务。使用 Amazon Athena，安全团\n队可以查询这些日志，以识别针对特定应用程序路径 (如 new-user-creation.php) 的请求，并提取原\n始客户端 IP 地址。\n选项 A 不正确，因为 VPC 流日志在网络层运行，不会捕获 HTTP 请求路径。选项 B 无效，因为 ALB\n不支持 CloudWatch 代理。选项 C 可行，但会引入额外的操作复杂性和成本，因此不如原生 WAF\n日志记录解决方案合适。\nAWS 文档强调将 AWS WAF 日志记录与 Athena 结合作为取证分析和攻击者识别的最佳实践。\nAWS 认证安全 - 专业官方学习指南\nAWS WAF 日志记录文档\nAmazon Athena 用户指南\nAWS 检测和监控最佳实践"}, {"num": 89, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company is operating an open-source software platform that is internet facing. The legacy software\nplatform no longer receives security updates. The software platform operates using Amazon Route 53 weighted\nload balancing to send traffic to two Amazon EC2 instances that connect to an Amazon RDS cluster. A recent\nreport suggests this software platform is vulnerable to SQL injection attacks, with samples of attacks provided.\nThe company’s security engineer must secure this system against SQL injection attacks within 24 hours. The\nsolution must involve the least amount of effort and maintain normal operations during implementation.\nWhat should the security engineer do to meet these requirements?", "question_cn": "一家公司正在运营一个面向互联网的开源软件平台。该遗留软件平台不再接收安全更新。该软件\n平台使用 Amazon Route 53 加权负载均衡将流量发送到两个连接到 Amazon RDS 集群的 Amazon\nEC2 实例。最近的一份报告表明，该软件平台容易受到 SQL 注入攻击，并提供了攻击样本。公司\n的安全工程师必须在 24 小时内保护此系统免受 SQL 注入攻击。该解决方案必须涉及最少的工作量，\n并在实施过程中保持正常运行。\n安全工程师应采取什么措施来满足这些要求？", "options": [{"letter": "A", "en": "Create an Application Load Balancer with the existing EC2 instances as a target group. Create an AWS\nWAF web ACL containing rules that protect the application from this attack, then apply it to the ALB. Test to\nensure the vulnerability has been mitigated, then redirect the Route 53 records to point to the ALB. Update\nsecurity groups on the EC2 instances to prevent direct access from the internet.", "cn": "使用现有的 EC2 实例作为目标组创建一个应用程序负载均衡器。创建一个包含保护应用程序免\n受此攻击的规则的 AWS WAF 网络访问控制列表 (web ACL)，然后将其应用于 ALB。进行测试以确\n保漏洞已得到缓解，然后重定向 Route 53 记录以指向 ALB。更新 EC2 实例上的安全组以防止来自\n互联网的直接访问。"}, {"letter": "B", "en": "Create an Amazon CloudFront distribution specifying one EC2 instance as an origin. Create an AWS\nWAF web ACL containing rules that protect the application from this attack, then apply it to the distribution.\nTest to ensure the vulnerability has been mitigated, then redirect the Route 53 records to point to CloudFront.", "cn": "创建一个指定一个 EC2 实例作为源的 Amazon CloudFront 分发。创建一个包含保护应用程序免\n受此攻击的规则的 AWS WAF 网络访问控制列表 (web ACL)，然后将其应用于该分发。进行测试以\n确保漏洞已得到缓解，然后重定向 Route 53 记录以指向 CloudFront。"}, {"letter": "C", "en": "Obtain the latest source code for the platform and make the necessary updates. Test the updated code\nto ensure that the vulnerability has been mitigated, then deploy the patched version of the platform to the\nEC2 instances.", "cn": "获取平台的最新源代码并进行必要的更新。测试更新后的代码以确保漏洞已得到缓解，然后将修\n补后的平台版本部署到 EC2 实例。"}, {"letter": "D", "en": "Update the security group that is attached to the EC2 instances, removing access from the internet\nto the TCP port used by the SQL database. Create an AWS WAF web ACL containing rules that protect the\napplication from this attack, then apply it to the EC2 instances.", "cn": "更新附加到 EC2 实例的安全组，取消从互联网对 SQL 数据库使用的 TCP 端口的访问。创建一个\n包含保护应用程序免受此攻击的规则的 AWS WAF 网络访问控制列表 (web ACL)，然后将其应用于\nEC2 实例。"}], "answer": "A", "explanation_en": "AWS WAF provides managed and custom rules that can immediately mitigate common web exploits\nsuch as SQL injection without modifying application code. According to AWS Certified Security - Specialty\ndocumentation, placing AWS WAF in front of an Application Load Balancer is a recommended rapid-response\ncontrol for legacy applications with known vulnerabilities.\nCreating an ALB in front of the existing EC2 instances allows seamless traffic migration. AWS WAF\nSQL injection rules can be deployed and tested without downtime. Updating Route 53 to point to the ALB\npreserves normal operations. Restricting EC2 security groups afterward prevents bypassing the WAF.\nOption B introduces CloudFront changes and single-origin testing, increasing complexity. Option C\ncannot be completed within 24 hours and risks downtime. Option D is invalid because AWS WAF cannot be\nattached directly to EC2 instances.", "explanation_cn": "AWS WAF 提供托管和自定义规则，可在不修改应用程序代码的情况下立即缓解常见的 Web 漏洞利\n用，如 SQL 注入。根据 AWS 认证安全 - 专业文档，在应用程序负载均衡器前面放置 AWS WAF 是\n针对具有已知漏洞的遗留应用程序的推荐快速响应控制措施。\n在现有 EC2 实例前面创建一个 ALB 允许无缝流量迁移。可以在不中断服务的情况下部署和测试\nAWS WAF SQL 注入规则。更新 Route 53 以指向 ALB 可保持正常操作。随后限制 EC2 安全组可防\n止绕过 WAF。\n选项 B 引入了 CloudFront 更改和单源测试，增加了复杂性。选项 C 无法在 24 小时内完成，并且有\n停机风险。选项 D 无效，因为 AWS WAF 不能直接附加到 EC2 实例。"}, {"num": 90, "category_en": "Detection", "category_cn": "检测", "question_en": "Notify when IAM roles are modified.", "question_cn": "在 IAM 角色被修改时发出通知。", "options": [{"letter": "A", "en": "Use Amazon Detective.", "cn": "使用 Amazon Detective。"}, {"letter": "B", "en": "Use EventBridge with CloudTrail events.", "cn": "使用 EventBridge 与 CloudTrail 事件。"}, {"letter": "C", "en": "Use CloudWatch metric filters.", "cn": "使用 CloudWatch 指标过滤器。"}, {"letter": "D", "en": "Use CloudWatch subscription filters.", "cn": "使用 CloudWatch 订阅过滤器。"}], "answer": "B", "explanation_en": "EventBridge natively consumes CloudTrail management events and provides near-real-time notifications.", "explanation_cn": "EventBridge 原生支持使用 CloudTrail 管理事件，并提供近实时通知。"}, {"num": 91, "category_en": "Identity and Access Management", "category_cn": "身份與存取管理", "question_en": "A company uses an organization in AWS Organizations and AWS IAM Identity Center to manage its\nAWS environment. The company configures IAM Identity Center to access the company’s on-premises Active Directory through a properly configured AD Connector. All the company’s employees are in an Active\nDirectory group named Cloud.\nThe employees can view and access nearly all the AWS accounts in the organization, and the employees\nhave the permissions that they require. However, the employees cannot access an account named Account", "question_cn": "## 问题编号:91 - [身份和访问管理]\n 一家公司在 AWS Organizations 和 AWS IAM Identity Center 中使用组织来管理其 AWS 环境。\n该公司将 IAM Identity Center 配置为通过正确配置的 AD 连接器访问公司的本地 Active Directory。\n公司所有员工都在一个名为 Cloud 的 Active Directory 组中。", "options": [{"letter": "A", "en": "The company verifies that Account A exists in the organization.\n\n\n 员工可以查看和访问组织中的几乎所有 AWS 账户，并且员工拥有所需的权限。但是，员工\n无法访问名为 Account A 的账户。公司确认 Account A 存在于组织中。\nWhat is the likely reason that the employees are unable to access Account A?\n 员工无法访问 Account A 的可能原因是什么？", "cn": "公司未将 Account A 添加到组织内的组织单位 (OU) 中。"}, {"letter": "B", "en": "The company has not synchronized the Cloud Active Directory group with the on-premises Active\nDirectory.", "cn": "公司尚未将 Cloud Active Directory 组与本地 Active Directory 同步。"}, {"letter": "C", "en": "The company did not assign the Cloud Active Directory group to Account A in IAM Identity Center\nwith a valid permission set.", "cn": "公司未在 IAM Identity Center 中使用有效的权限集将 Cloud Active Directory 组分配给\nAccount A。"}, {"letter": "D", "en": "The company applied an IAM permissions boundary to Account A that is denying access to the account.", "cn": "公司对 Account A 应用了 IAM 权限边界，拒绝访问该账户。"}], "answer": "C", "explanation_en": "Explanation\nIn AWS IAM Identity Center (formerly AWS Single Sign-On), users and groups do not automatically gain\naccess to all accounts in an AWS Organization simply because the accounts exist. Access is explicitly granted\nby assigning a principal (user or group) to a specific AWS account along with a permission set. Permission\nsets define the IAM policies that are provisioned into the target account as IAM roles.\n\n\nIn this scenario, employees in the Cloud Active Directory group can access nearly all AWS accounts,\nwhich confirms that AD Connector synchronization is functioning correctly, eliminating opt", "explanation_cn": "## 解释 \n在 AWS IAM Identity Center(以前称为 AWS Single Sign-On) 中，用户和组不会仅仅因为账户存在\n就自动获得对 AWS 组织中所有账户的访问权限。访问权限是通过将主体 (用户或组) 与权限集一起\n分配给特定的 AWS 账户来明确授予的。权限集定义了作为 IAM 角色 provisioned 到目标账户中的\nIAM 策略。"}, {"num": 92, "category_en": "Detection", "category_cn": "检测", "question_en": "A company has decided to move its fleet of Linux-based web server instances to an Amazon EC2 Auto\nScaling group. Currently, the instances are static and are launched manually. When an administrator needs\nto view log files, the administrator uses SSH to establish a connection to the instances and retrieves the logs\nmanually.\nThe company often needs to query the logs to produce results about application sessions and user issues.\nThe company does not want its new automatically scaling architecture to result in the loss of any log files\nwhen instances are scaled in.\n\n\nWhich combination of steps should a security engineer take to meet these requirements MOST costeffectively? (Select TWO.)", "question_cn": "一家公司决定将其基于 Linux 的 Web 服务器实例集群迁移到 Amazon EC2 自动缩放组。目前，这\n些实例是静态的，通过手动启动。当管理员需要查看日志文件时，管理员使用 SSH 建立与实例的连\n接并手动检索日志。\n该公司经常需要查询日志以生成有关应用程序会话和用户问题的结果。该公司不希望其新的自动\n缩放架构在实例缩小时导致任何日志文件丢失。\n安全工程师应采取哪些步骤组合，以最具成本效益的方式满足这些要求？(选择两项。)", "options": [{"letter": "A", "en": "Configure a cron job on the instances to forward the log files to Amazon S3 periodically.", "cn": "在实例上配置 cron 作业，以定期将日志文件转发到 Amazon S3。"}, {"letter": "B", "en": "Configure AWS Glue and Amazon Athena to query the log files.", "cn": "配置 AWS Glue 和 Amazon Athena 以查询日志文件。"}, {"letter": "C", "en": "Configure the Amazon CloudWatch agent on the instances to forward the logs to Amazon CloudWatch\nLogs.", "cn": "在实例上配置 Amazon CloudWatch 代理，以将日志转发到 Amazon CloudWatch Logs。"}, {"letter": "D", "en": "Configure Amazon CloudWatch Logs Insights to query the log files.", "cn": "配置 Amazon CloudWatch Logs Insights 以查询日志文件。"}, {"letter": "E", "en": "Configure the instances to write the logs to an Amazon Elastic File System (Amazon EFS) volume.", "cn": "配置实例将日志写入 Amazon Elastic File System(Amazon EFS) 卷。"}], "answer": "C", "explanation_en": "Amazon CloudWatch Logs is designed to collect, store, and analyze log data from ephemeral compute\nresources such as EC2 instances in Auto Scaling groups. According to the AWS Certified Security - Specialty\nStudy Guide, using the CloudWatch agent to stream logs off instances ensures log durability even when instances are terminated during scale-in events.\n\n\nCloudWatch Logs Insights provides a fully managed, serverless query engine that enables ad hoc querying, filtering, and aggregation of log data without requiring additional infrastructure. This directly satisfies\nthe requirement to query logs for application sessions and user troubleshooting.\nOption A introduces operational risk because logs could be lost between cron executions. Option B requires additional services and data pipelines, increasing cost and complexity. Option E adds storage cost and\nmanagement overhead and is not necessary for log analytics.\nAWS best practices recommend CloudWatch Logs and Logs Insights as the most cost-effective and scalable solution for centralized log retention and analysis in Auto Scaling environments.", "explanation_cn": "Amazon CloudWatch Logs 旨在收集、存储和分析来自自动缩放组中的 EC2 实例等临时计算资源的\n日志数据。根据《AWS 认证安全 - 专业指南》，使用 CloudWatch 代理将日志从实例流出可确保即\n使在缩小时实例终止的情况下日志的持久性。\nCloudWatch Logs Insights 提供了一个完全托管的无服务器查询引擎，可实现对日志数据的即席查\n询、过滤和聚合，而无需额外的基础设施。这直接满足了为应用程序会话查询日志和进行用户故障\n排除的要求。\n选项 A 带来了操作风险，因为日志可能在 cron 执行之间丢失。选项 B 需要额外的服务和数据管道，\n增加了成本和复杂性。选项 E 增加了存储成本和管理开销，并且对于日志分析来说并非必要。\nAWS 最佳实践推荐将 CloudWatch Logs 和 Logs Insights 作为自动缩放环境中集中日志保留和分析\n的最具成本效益和可扩展性的解决方案。"}, {"num": 93, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company runs a global ecommerce website using Amazon CloudFront. The company must block traffic\nfrom specific countries to comply with data regulations.\n\nWhich solution will meet these requirements MOST cost-effectively?", "question_cn": "一家公司使用 Amazon CloudFront 运行全球电子商务网站。该公司必须阻止来自特定国家/地区的\n流量以符合数据法规。\n哪种解决方案最具成本效益地满足这些要求？", "options": [{"letter": "A", "en": "Use AWS WAF IP match rules.", "cn": "使用 AWS WAF IP 匹配规则。"}, {"letter": "B", "en": "Use AWS WAF geo match rules.", "cn": "使用 AWS WAF 地理匹配规则。"}, {"letter": "C", "en": "Use CloudFront geo restriction to deny the countries.", "cn": "使用 CloudFront 地理限制来拒绝这些国家/地区。"}, {"letter": "D", "en": "Use geolocation headers in CloudFront.", "cn": "在 CloudFront 中使用地理位置标头。"}], "answer": "C", "explanation_en": "Amazon CloudFront includes a built-in geo restriction feature that allows content to be allowed or denied\nbased on the viewer’s country. According to AWS Certified Security - Specialty documentation, CloudFront\ngeo restriction is the most cost-effective method for country-based blocking because it does not require AWS\nWAF or additional rule processing.\nAWS WAF geo match rules incur additional cost and are more appropriate when advanced inspection or\nlayered security controls are required. IP-based blocking is impractical due to frequent IP changes. Geolocation headers do not enforce access control.\n\n\nCloudFront geo restriction is evaluated at the edge and efficiently blocks disallowed countries with minimal latency and cost.", "explanation_cn": "亚马逊云 Front(Amazon CloudFront) 包含一个内置的地理限制功能，该功能允许根据观众\n所在国家/地区允许或拒绝访问内容。根据 AWS 认证安全 - 专业文档，CloudFront 地理限制是基于\n国家/地区进行阻止的最具成本效益的方法，因为它不需要 AWS WAF 或额外的规则处理。\nAWS WAF 地理匹配规则会产生额外成本，并且在需要高级检查或分层安全控制时更适用。\n基于 IP 的阻止由于 IP 频繁更改而不切实际。地理位置标头不强制执行访问控制。\nCloudFront 地理限制在边缘进行评估，并以最小的延迟和成本有效地阻止不被允许的国\n家/地区。"}, {"num": 94, "category_en": "Detection", "category_cn": "偵測", "question_en": "A company needs to detect unauthenticated access to its Amazon Elastic Kubernetes Service (Amazon\nEKS) clusters. The solution must require no additional configuration of the existing EKS deployment.\nWhich solution will meet these requirements with the LEAST operational effort?", "question_cn": "## 问题编号:94 - [检测]\n 一家公司需要检测对其亚马逊弹性容器服务 (Amazon EKS) 集群的未经身份验证的访问。该\n解决方案必须不需要对现有 EKS 部署进行额外配置。\n 哪种解决方案将以最少的操作工作量满足这些要求？", "options": [{"letter": "A", "en": "Install a third-party security add-on.", "cn": "安装第三方安全插件。"}, {"letter": "B", "en": "Enable AWS Security Hub and monitor Kubernetes findings.", "cn": "启用 AWS 安全中心并监控 Kubernetes 发现。"}, {"letter": "C", "en": "Monitor CloudWatch Container Insights metrics for EKS.", "cn": "监控 EKS 的 CloudWatch 容器洞察指标。"}, {"letter": "D", "en": "Enable Amazon GuardDuty and use EKS Audit Log Monitoring.", "cn": "启用亚马逊 GuardDuty 并使用 EKS 审核日志监控。"
