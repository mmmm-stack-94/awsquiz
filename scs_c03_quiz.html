bases. Identify the snapshot that\nwas taken closest to 5 days ago at 3:14 PM and restore it.", "cn": "列出已对公司所有 RDS 数据库拍摄的所有快照。找出最接近 5 天前下午 3:14 拍摄的快照并进行\n恢复。"}, {"letter": "D", "en": "Identify the Regional cluster ARN for the database. Use the ARN to restore the Regional cluster by\nusing the restore to point in time feature. Set a target time 14 days ago.", "cn": "确定数据库的区域集群 ARN。使用该 ARN 通过时间点恢复功能恢复区域集群。设置目标时间为\n14 天前。"}], "answer": "A", "explanation_en": "Amazon RDS supports point-in-time recovery (PITR) using automated backups within the configured\nretention window. According to the AWS Certified Security - Specialty Study Guide, PITR allows recovery\nto any second within the retention period, making it the most precise recovery method following a security\nincident.\nBy restoring the database cluster to a point just before the attack occurred, such as 3:14 PM, the security\nengineer ensures that the restored database reflects the last known good state without including malicious\nchanges. This method is more accurate than restoring from snapshots, which are created at fixed intervals\nand may not align with the exact recovery time.\n\n\nOptions B and C rely on snapshot timing and may reintroduce compromised data. Option D restores to\nan arbitrary time and does not meet the requirement to recover to the last known good version.\nAWS documentation explicitly recommends point-in-time recovery for incident response scenarios that\nrequire precise restoration.", "explanation_cn": "亚马逊 RDS 支持在配置的保留期内使用自动备份进行时间点恢复 (PITR)。根据《AWS 认证安全 专业学习指南》，PITR 允许在保留期内恢复到任何一秒，使其成为安全事件后最精确的恢复方法。\n通过将数据库集群恢复到攻击发生前的某个时间点，如下午 3:14，安全工程师可确保恢复的数据库\n反映最后一个已知的良好状态，而不包括恶意更改。此方法比从按固定间隔创建且可能与确切恢复\n时间不一致的快照进行恢复更准确。\n选项 B 和 C 依赖于快照时间，可能会重新引入受损数据。选项 D 恢复到任意时间，不符合恢复到\n最后一个已知良好版本的要求。\nAWS 文档明确建议在需要精确恢复的事件响应场景中使用时间点恢复。"}, {"num": 46, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company is building a secure solution that relies on an AWS Key Management Service (AWS KMS) customer managed key. The company wants to allow AWS Lambda to use the KMS key. However, the company\nwants to prevent Amazon EC2 from using the key.\nWhich solution will meet these requirements?", "question_cn": "一家公司正在构建一个依赖 AWS 密钥管理服务 (AWS KMS) 客户管理密钥的安全解决方案。该公\n司希望允许 AWS Lambda 使用 KMS 密钥。然而，该公司希望阻止 Amazon EC2 使用该密钥。\n哪种解决方案能满足这些要求？", "options": [{"letter": "A", "en": "Use IAM explicit deny for EC2 instance profiles and allow for Lambda roles.", "cn": "对 EC2 实例配置文件使用 IAM 显式拒绝，并对 Lambda 角色使用允许。"}, {"letter": "B", "en": "Use a KMS key policy with kms:ViaService conditions to allow Lambda usage and deny EC2 usage.", "cn": "使用带有 kms:ViaService 条件的 KMS 密钥策略，以允许 Lambda 使用并拒绝 EC2 使用。"}, {"letter": "C", "en": "Use aws:SourceIp and aws:AuthorizedService condition keys in the KMS key policy.", "cn": "在 KMS 密钥策略中使用 aws:SourceIp 和 aws:AuthorizedService 条件键。"}, {"letter": "D", "en": "Use an SCP to deny EC2 and allow Lambda.", "cn": "使用 SCP 拒绝 EC2 并允许 Lambda。"}], "answer": "B", "explanation_en": "AWS KMS access control is primarily enforced through key policies (and optionally grants), and AWS recommends using key policy condition keys to restrict how keys can be used. The kms:ViaService condition key\nis specifically designed to restrict KMS API usage to requests that come through a particular AWS service endpoint in a specific Region. This is the most robust way to ensure a key can be used only via AWS Lambda (for\nexample, lambda..amazonaws.com) and not via Amazon EC2 (ec2.. amazonaws.com),\neven if IAM permissions exist elsewhere. By writing a key policy that uses the Lambda execution role as the\nprincipal and conditions on kms:ViaService, the company can tightly bind key usage to Lambda-originated\ncryptographic operations while preventing use through EC2 service paths. Option A is weaker because EC2\nis not the only way an IAM principal might use KMS, and relying on attaching explicit deny policies broadly\nis harder to manage and can miss principals. Option C is incorrect because aws: AuthorizedService is not the\ntypical mechanism for KMS service restriction, and SourceIp is unreliable for service-to-service calls. Option\nD is not ideal because SCPs do not provide fine-grained service-path restrictions for KMS usage and cannot\n”allow” beyond IAM; key policy controls still apply.", "explanation_cn": "AWS KMS 访问控制主要通过密钥策略 (以及可选的授权) 来实施，并且 AWS 建议使用密钥策略条件\n键来限制密钥的使用方式。kms:ViaService 条件键专门设计用于将 KMS API 的使用限制为通过特定\n区域中的特定 AWS 服务端点发出的请求。这是确保密钥只能通过 AWS Lambda(例如，lambda..amazonaws.com) 而不能通过 Amazon EC2(ec2..amazonaws.com) 使用的最可靠方法，\n即使其他地方存在 IAM 权限。选项 A 较弱，\n因为 EC2 不是 IAM 主体使用 KMS 的唯一方式，\n并且广泛\n依赖附加显式拒绝策略更难管理，并且可能会遗漏主体。选项 C 不正确，因为 aws:AuthorizedService\n不是 KMS 服务限制的典型机制，并且 SourceIp 对于服务到服务的调用不可靠。选项 D 不理想，因\n为 SCP 不能为 KMS 使用提供细粒度的服务路径限制，并且不能在 IAM 之外“允许”\n；密钥策略控\n制仍然适用。"}, {"num": 47, "category_en": "Detection", "category_cn": "检测", "question_en": "A company needs to scan all AWS Lambda functions for code vulnerabilities.", "question_cn": "一家公司需要扫描所有 AWS Lambda 函数的代码漏洞。", "options": [{"letter": "A", "en": "Use Amazon Macie.", "cn": "使用 Amazon Macie。"}, {"letter": "B", "en": "Enable Amazon Inspector Lambda scanning.", "cn": "启用 Amazon Inspector Lambda 扫描。"}, {"letter": "C", "en": "Use GuardDuty and Security Hub.", "cn": "使用 GuardDuty 和 Security Hub。"}, {"letter": "D", "en": "Use GuardDuty Lambda Protection.", "cn": "使用 GuardDuty Lambda 保护。"}], "answer": "B", "explanation_en": "Amazon Inspector provides native Lambda code vulnerability scanning. GuardDuty focuses on runtime\nthreats, not static code analysis.", "explanation_cn": "Amazon Inspector 提供原生的 Lambda 代码漏洞扫描。GuardDuty 专注于运行时威胁，而非静态代\n码分析。"}, {"num": 48, "category_en": "Detection", "category_cn": "检测", "question_en": "A security engineer needs to implement a solution to identify any sensitive data that is stored in an Amazon S3 bucket. The solution must report on sensitive data in the S3 bucket by using an existing Amazon\nSimple Notification Service (Amazon SNS) topic.\nWhich solution will meet these requirements with the LEAST implementation effort?", "question_cn": "一名安全工程师需要实施一种解决方案，以识别存储在 Amazon S3 存储桶中的任何敏感数据。该\n解决方案必须通过使用现有的 Amazon Simple Notification Service(Amazon SNS) 主题来报告 S3 存\n储桶中的敏感数据。\n哪种解决方案能够以最少的实施工作量满足这些要求？", "options": [{"letter": "A", "en": "Enable AWS Config. Configure AWS Config to monitor for sensitive data in the S3 bucket and to send\nnotifications to the SNS topic.", "cn": "启用 AWS Config。配置 AWS Config 以监控 S3 存储桶中的敏感数据并向 SNS 主题发送通知。"}, {"letter": "B", "en": "Create an AWS Lambda function to scan the S3 bucket for sensitive data that matches a pattern. Program the Lambda function to send notifications to the SNS topic.", "cn": "创建一个 AWS Lambda 函数，用于扫描 S3 存储桶中与模式匹配的敏感数据。对 Lambda 函数进\n行编程，使其向 SNS 主题发送通知。"}, {"letter": "C", "en": "Configure Amazon Macie to use managed data identifiers to identify and categorize sensitive data.\nCreate an Amazon EventBridge rule to send notifications to the SNS topic.", "cn": "配置 Amazon Macie 以使用托管数据标识符来识别和分类敏感数据。创建一个 Amazon EventBridge 规则，以向 SNS 主题发送通知。"}, {"letter": "D", "en": "Enable Amazon GuardDuty. Configure AWS CloudTrail S3 data events. Create an Amazon CloudWatch alarm that reacts to GuardDuty findings and sends notifications to the SNS topic.", "cn": "启用 Amazon GuardDuty。配置 AWS CloudTrail S3 数据事件。创建一个 Amazon CloudWatch 警\n报，该警报对 GuardDuty 的发现做出反应并向 SNS 主题发送通知。"}], "answer": "C", "explanation_en": "Amazon Macie is the AWS service designed specifically to discover, classify, and report sensitive data\nstored in Amazon S3. According to the AWS Certified Security - Specialty Study Guide, Macie uses machine\nlearning and managed data identifiers to automatically detect sensitive data types such as PII and financial\ninformation.\nMacie integrates natively with Amazon EventBridge, allowing findings to be routed to other services such\nas Amazon SNS with minimal configuration. Creating an EventBridge rule to forward Macie findings to an\nexisting SNS topic satisfies the notification requirement without custom code.\nOption A is invalid because AWS Config does not inspect object contents. Option B requires custom\ndevelopment and ongoing maintenance. Option D is incorrect because Amazon GuardDuty focuses on threat\ndetection, not sensitive data discovery.\n\n\nAWS documentation emphasizes Macie as the lowest-effort and most accurate solution for sensitive data\nidentification in S3.", "explanation_cn": "Amazon Macie 是专门为发现、分类和报告存储在 Amazon S3 中的敏感数据而设计的 AWS 服务。根\n据《AWS Certified Security - Specialty 学习指南》\n，Macie 使用机器学习和托管数据标识符来自动检\n测敏感数据类型，如个人身份信息 (PII) 和财务信息。\nMacie 与 Amazon EventBridge 原生集成，允许通过最少的配置将发现结果路由到其他服务，如\nAmazon SNS。创建一个 EventBridge 规则，将 Macie 的发现结果转发到现有的 SNS 主题，无需\n自定义代码即可满足通知要求。\n选项 A 无效，因为 AWS Config 不检查对象内容。选项 B 需要定制开发和持续维护。选项 D 不正确，\n因为 Amazon GuardDuty 专注于威胁检测，而非敏感数据发现。\nAWS 文档强调 Macie 是用于在 S3 中识别敏感数据的工作量最小且最准确的解决方案。"}, {"num": 49, "category_en": "Detection", "category_cn": "检测", "question_en": "An AWS Lambda function was misused to alter data, and a security engineer must identify who invoked\nthe function and what output was produced. The engineer cannot find any logs created by the Lambda function in Amazon CloudWatch Logs.\nWhich of the following explains why the logs are not available?", "question_cn": "一个 AWS Lambda 函数被滥用以更改数据，一名安全工程师必须确定是谁调用了该函数以及产生\n了什么输出。该工程师在亚马逊 CloudWatch Logs 中找不到 Lambda 函数创建的任何日志。\n以下哪项解释了日志不可用的原因？", "options": [{"letter": "A", "en": "The execution role for the Lambda function did not grant permissions to write log data to CloudWatch\nLogs.", "cn": "Lambda 函数的执行角色未授予将日志数据写入 CloudWatch Logs 的权限。"}, {"letter": "B", "en": "The Lambda function was invoked by using Amazon API Gateway, so the logs are not stored in CloudWatch Logs.", "cn": "Lambda 函数是通过使用亚马逊 API 网关调用的，因此日志未存储在 CloudWatch Logs 中。"}, {"letter": "C", "en": "The execution role for the Lambda function did not grant permissions to write to the Amazon S3\nbucket where CloudWatch Logs stores the logs.", "cn": "Lambda 函数的执行角色未授予写入 CloudWatch Logs 存储日志的亚马逊 S3 存储桶的权限。"}, {"letter": "D", "en": "The version of the Lambda function that was invoked was not current.", "cn": "调用的 Lambda 函数版本不是最新版本。"}], "answer": "A", "explanation_en": "AWS Lambda automatically sends function execution logs to Amazon CloudWatch Logs when logging is\nenabled in the function code. However, this logging capability depends on the Lambda execution role having\nthe appropriate permissions. According to the AWS Certified Security - Specialty Study Guide, the execution\nrole must include permissions such as logs:CreateLogGroup, logs:CreateLogStream, and logs:PutLogEvents.\nIf these permissions are missing, Lambda cannot create log groups or streams, and no execution logs will\nappear in CloudWatch Logs-even though the function was successfully invoked. This is the most common\nreason Lambda logs are unavailable during forensic investigations.\nOption B is incorrect because Lambda logs are stored in CloudWatch Logs regardless of whether the invocation source is API Gateway, EventBridge, or another AWS service. Option C is incorrect because CloudWatch Logs does not require direct S3 permissions from the Lambda execution role. Option D is irrelevant\nbecause Lambda versions do not affect logging behavior.\n\n\nAWS documentation emphasizes verifying execution role permissions as a first step when Lambda logs\nare missing.", "explanation_cn": "当在函数代码中启用日志记录时，AWS Lambda 会自动将函数执行日志发送到亚马逊 CloudWatch\nLogs。但是，此日志记录功能取决于 Lambda 执行角色是否具有适当的权限。根据 AWS 安全\n认证 - 专业版学习指南，执行角色必须包括诸如 logs:CreateLogGroup、logs:CreateLogStream 和\nlogs:PutLogEvents 等权限。\n如果缺少这些权限，Lambda 将无法创建日志组或流，并且即使函数被成功调用，CloudWatch Logs\n中也不会出现任何执行日志。这是在取证调查期间 Lambda 日志不可用的最常见原因。\n选项 B 不正确，因为无论调用源是 API 网关、事件桥接还是其他 AWS 服务，Lambda 日志都存储\n在 CloudWatch Logs 中。选项 C 不正确，因为 CloudWatch Logs 不需要 Lambda 执行角色的直接 S3\n权限。选项 D 不相关，因为 Lambda 版本不会影响日志记录行为。\nAWS 文档强调，当 Lambda 日志缺失时，首先要验证执行角色权限。"}, {"num": 50, "category_en": "Detection", "category_cn": "检测", "question_en": "A company needs centralized log monitoring with automatic detection across hundreds of AWS accounts.\nExams Prep\nWhich solution meets these requirements with the LEAST operational effort?", "question_cn": "一家公司需要在数百个 AWS 账户中进行集中式日志监控和自动检测。\n考试准备\n哪种解决方案以最少的操作工作量满足这些要求？", "options": [{"letter": "A", "en": "Designate a GuardDuty administrator account and enable protections.", "cn": "指定一个 GuardDuty 管理员账户并启用保护功能。"}, {"letter": "B", "en": "Centralize CloudWatch logs and use Inspector.", "cn": "集中 CloudWatch 日志并使用 Inspector。"}, {"letter": "C", "en": "Centralize CloudTrail logs and query with Athena.", "cn": "集中 CloudTrail 日志并使用 Athena 进行查询。"}, {"letter": "D", "en": "Stream logs to Kinesis and process with Lambda.", "cn": "将日志流式传输到 Kinesis 并使用 Lambda 进行处理。"}], "answer": "A", "explanation_en": "Amazon GuardDuty provides fully managed threat detection across accounts when configured with delegated administration. EKS and RDS protections enable workload-aware detection with minimal setup.\nOther solutions require custom pipelines and higher operational overhead.", "explanation_cn": "当配置委托管理时，Amazon GuardDuty 可跨账户提供全面托管的威胁检测。EKS 和 RDS 保护功\n能可通过最少的设置实现工作负载感知检测。\n其他解决方案需要自定义管道和更高的运营开销。"}, {"num": 51, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company uploads data files as objects into an Amazon S3 bucket. A vendor downloads the objects to\nperform data processing.\nA security engineer must implement a solution that prevents objects from residing in the S3 bucket for\nlonger than 72 hours.", "question_cn": "一家公司将数据文件作为对象上传到 Amazon S3 存储桶中。供应商下载这些对象以进行数据处理。\n一名安全工程师必须实施一种解决方案，防止对象在 S3 存储桶中停留超过 72 小时。", "options": [{"letter": "A", "en": "Configure S3 Versioning to expire object versions that have been in the bucket for 72 hours.", "cn": "配置 S3 版本控制，以使在存储桶中已存在 72 小时的对象版本过期。"}, {"letter": "B", "en": "Configure an S3 Lifecycle configuration rule on the bucket to expire objects after 72 hours.", "cn": "在存储桶上配置 S3 生命周期配置规则，以使对象在 72 小时后过期。"}, {"letter": "C", "en": "Use the S3 Intelligent-Tiering storage class and configure expiration after 72 hours.", "cn": "使用 S3 智能分层存储类并配置 72 小时后过期。"}, {"letter": "D", "en": "Generate presigned URLs that expire after 72 hours.", "cn": "生成 72 小时后过期的预签名 URL。"}], "answer": "B", "explanation_en": "Amazon S3 Lifecycle configuration rules are the native, automated mechanism for managing object retention and deletion. According to AWS Certified Security - Specialty documentation, lifecycle rules can be\nconfigured to expire objects based on the number of days since object creation. Once the expiration time is\nreached, Amazon S3 permanently deletes the objects without manual intervention.\n\n\nThis solution directly enforces a maximum retention period of 72 hours and ensures compliance regardless of whether the vendor downloads the data or not. Lifecycle rules are evaluated continuously by Amazon\nS3 and do not require scripts, cron jobs, or additional services, making them the most operationally efficient\nand cost-effective solution.\nS3 Versioning controls versions but does not enforce object deletion timelines. S3 Intelligent-Tiering\noptimizes storage cost but does not delete objects. Presigned URLs only control access duration and do not\nremove objects from storage.\nAWS explicitly recommends lifecycle policies for automated data retention enforcement.", "explanation_cn": "Amazon S3 生命周期配置规则是用于管理对象保留和删除的原生自动化机制。根据 AWS 安全认证 专业文档，生命周期规则可配置为根据对象创建后的天数使对象过期。一旦达到过期时间，Amazon\nS3 将永久删除对象，无需人工干预。\n此解决方案直接强制实施 72 小时的最大保留期，\n并确保无论供应商是否下载数据都符合规定。Amazon S3 会持续评估生命周期规则，不需要脚本、cron 作业或其他服务，使其成为运营效率最高且最\n具成本效益的解决方案。\nS3 版本控制可管理版本，但不强制实施对象删除时间线。S3 智能分层可优化存储成本，但不会删\n除对象。预签名 URL 仅控制访问持续时间，不会从存储中删除对象。\nAWS 明确建议使用生命周期策略来自动执行数据保留。"}, {"num": 52, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company uses AWS IAM Identity Center with SAML 2.0 federation. The company decides to change\nits federation source from one identity provider (IdP) to another. The underlying directory for both IdPs is\nActive Directory.\n\n\nWhich solution will meet this requirement?", "question_cn": "一家公司使用带有 SAML 2.0 联合身份验证的 AWS IAM Identity Center。该公司决定将其联合身份\n验证源从一个身份提供商 (IdP) 更改为另一个。两个 IdP 的基础目录都是 Active Directory。\n哪种解决方案可以满足此要求？", "options": [{"letter": "A", "en": "Disable all existing users and groups within IAM Identity Center that were part of the federation with\nthe original IdP.", "cn": "禁用 IAM Identity Center 中所有属于与原始 IdP 联合身份验证的现有用户和组。"}, {"letter": "B", "en": "Modify the attribute mappings within the IAM Identity Center trust relationship to match information\nthat the new IdP sends.", "cn": "修改 IAM Identity Center 信任关系中的属性映射，以匹配新 IdP 发送的信息。"}, {"letter": "C", "en": "Reconfigure all existing IAM roles in the company’s AWS accounts to explicitly trust the new IdP as\nthe principal.", "cn": "在公司的 AWS 账户中重新配置所有现有 IAM 角色，以明确信任新的 IdP 作为主体。"}, {"letter": "D", "en": "Confirm that the Network Time Protocol (NTP) clock skew is correctly set between IAM Identity\nCenter and the new IdP endpoints.", "cn": "确认 IAM Identity Center 和新 IdP 端点之间的网络时间协议 (NTP) 时钟偏差已正确设置。"}], "answer": "B", "explanation_en": "AWS IAM Identity Center relies on SAML assertions and attribute mappings to associate federated users\nwith identities, groups, and permission sets. According to the AWS Certified Security - Specialty documentation, when changing identity providers while maintaining the same underlying directory, existing users and\ngroup identities can be preserved by updating attribute mappings to align with the new IdP’s SAML assertions.\n\n\nBy modifying the attribute mappings, IAM Identity Center can correctly interpret usernames, group\nmemberships, and unique identifiers sent by the new IdP without requiring changes to AWS account roles or\npermission sets. This approach minimizes operational effort and avoids disruption to access management.\nOption A unnecessarily disables identities and causes access outages. Option C is incorrect because IAM\nIdentity Center abstracts role trust relationships, and roles do not directly trust the IdP. Option D is unrelated\nto federation source configuration and only affects authentication timing issues.\nAWS best practices recommend updating attribute mappings when switching IdPs that share the same\ndirectory source.", "explanation_cn": "AWS IAM Identity Center 依赖 SAML 断言和属性映射来将联合用户与身份、组和权限集相关联。根\n据 AWS 认证安全 - 专业版文档，在更改身份提供商同时保持相同的基础目录时，可以通过更新属\n性映射以与新 IdP 的 SAML 断言对齐来保留现有用户和组身份。\n通过修改属性映射，IAM Identity Center 可以正确解释新 IdP 发送的用户名、组成员身份和唯一标\n识符，而无需更改 AWS 账户角色或权限集。这种方法可将操作工作量降至最低，并避免对访问管\n理造成干扰。\n选项 A 不必要地禁用了身份并导致访问中断。选项 C 不正确，因为 IAM Identity Center 抽象了角\n色信任关系，并且角色不直接信任身份提供商 (IdP)。选项 D 与联合身份源配置无关，仅影响身份\n验证时间问题。\nAWS 最佳实践建议在切换共享相同目录源的身份提供商 (IdP) 时更新属性映射。"}, {"num": 53, "category_en": "Detection", "category_cn": "检测", "question_en": "A security engineer needs to implement a logging solution that captures detailed information about objects in an Amazon S3 bucket. The solution must include details such as the IAM identity that makes the\nrequest and the time the object was accessed. The data must be structured and available in near real time.\n\n\nWhich solution meets these requirements?", "question_cn": "一名安全工程师需要实施一种日志记录解决方案，以捕获有关 Amazon S3 存储桶中对象的详细信\n息。该解决方案必须包括发出请求的 IAM 身份以及对象被访问的时间等详细信息。数据必须是结\n构化的并且几乎实时可用。\n哪种解决方案满足这些要求？", "options": [{"letter": "A", "en": "Enable Amazon S3 server access logging on the S3 bucket. Create a new S3 bucket to store the logs.\nAnalyze the logs from the logging S3 bucket.", "cn": "在 S3 存储桶上启用 Amazon S3 服务器访问日志记录。创建一个新的 S3 存储桶来存储日志。分\n析来自日志记录 S3 存储桶的日志。"}, {"letter": "B", "en": "Enable AWS CloudTrail data event logging. Create a new S3 bucket to store the logs. Analyze the logs\nfrom the logging S3 bucket.", "cn": "启用 AWS CloudTrail 数据事件日志记录。创建一个新的 S3 存储桶来存储日志。分析来自日志记\n录 S3 存储桶的日志。"}, {"letter": "C", "en": "Configure AWS Config rules to log access to the objects stored in the S3 bucket.", "cn": "配置 AWS Config 规则以记录对存储在 S3 存储桶中的对象的访问。"}, {"letter": "D", "en": "Enable Amazon Macie to log access to the objects stored in the S3 bucket.", "cn": "启用 Amazon Macie 以记录对存储在 S3 存储桶中的对象的访问。"}], "answer": "B", "explanation_en": "AWS CloudTrail data event logging is the correct solution because it is specifically designed to capture\ndetailed, structured, and near-real-time API activity for Amazon S3 object-level operations. When S3 data\nevents are enabled, CloudTrail records actions such as GetObject, PutObject, and DeleteObject, along with\ncritical context including the IAM principal, source IP address, event time, request parameters, and response\nelements. These logs are delivered in JSON format, making them highly structured and suitable for security\nanalysis, SIEM integration, and automated detection workflows.\n\n\nAmazon S3 server access logging (option A) provides basic request-level information but does not include\nfull IAM identity context and is delivered with a significant delay, which does not meet the near-real-time\nrequirement. AWS Config (option C) focuses on resource configuration changes and compliance evaluation;\nit does not log object-level access events. Amazon Macie (option D) is a data security service that uses machine\nlearning to discover and classify sensitive data in S3 and generate findings for anomalous access patterns, but\nit is not a comprehensive access logging solution.\nAWS Security Specialty documentation clearly states that CloudTrail data events are the authoritative\nmechanism for auditing S3 object-level access with identity attribution and precise timestamps, making option\nB the correct and best-practice answer", "explanation_cn": "AWS CloudTrail 数据事件日志记录是正确的解决方案，因为它专门设计用于捕获 Amazon S3 对象\n级操作的详细、结构化和近实时 API 活动。启用 S3 数据事件后，CloudTrail 会记录诸如 GetObject、\nPutObject 和 DeleteObject 等操作，以及包括 IAM 主体、源 IP 地址、事件时间、请求参数和响应\n元素在内的关键上下文。这些日志以 JSON 格式交付，使其具有高度的结构化，适用于安全分析、\nSIEM 集成和自动检测工作流程。\n亚马逊 S3 服务器访问日志记录 (选项 A) 提供基本的请求级信息，但不包括完整的 IAM 身份上下\n文，并且延迟显著，不符合近实时要求。AWS 配置 (选项 C) 侧重于资源配置更改和合规性评估；它\n不记录对象级访问事件。亚马逊 Macie(选项 D) 是一种数据安全服务，使用机器学习来发现和分类\nS3 中的敏感数据，并生成异常访问模式的发现，但它不是一个全面的访问日志记录解决方案。\nAWS 安全专业文档明确指出，CloudTrail 数据事件是通过身份归因和精确时间戳审计 S3 对象级访\n问的权威机制，这使得选项 B 成为正确的最佳实践答案。"}, {"num": 54, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company is using AWS to run a long-running analysis process on data that is stored in Amazon S3\nbuckets. The process runs on a fleet of Amazon EC2 instances in an Auto Scaling group. The EC2 instances\nare deployed in a private subnet that does not have internet access.\nThe EC2 instances access Amazon S3 through an S3 gateway endpoint that has the default access policy.\nEach EC2 instance uses an instance profile role that allows s3:GetObject and s3:PutObject only for required\nS3 buckets.\n\n\nThe company learns that one or more EC2 instances are compromised and are exfiltrating data to an S3\nbucket that is outside the company’s AWS Organization. The processing job must continue to function.\nWhich solution will meet these requirements?", "question_cn": "一家公司正在使用 AWS 对存储在亚马逊 S3 存储桶中的数据运行一个长期分析过程。该过程在自动\n缩放组中的一组亚马逊 EC2 实例上运行。EC2 实例部署在没有互联网访问权限的专用子网中。\nEC2 实例通过具有默认访问策略的 S3 网关终结点访问亚马逊 S3。每个 EC2 实例使用一个实例配置\n文件角色，该角色仅允许对所需的 S3 存储桶进行 s3:GetObject 和 s3:PutObject 操作。\n该公司了解到一个或多个 EC2 实例已被入侵，并正在将数据泄露到公司 AWS 组织之外的一个 S3\n存储桶中。处理作业必须继续运行。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Update the policy on the S3 gateway endpoint to allow S3 actions only if aws:ResourceOrgId and aws:\nPrincipalOrgId match the company’s organization.", "cn": "更新 S3 网关终结点上的策略，仅在 aws:ResourceOrgId 和 aws:PrincipalOrgId 与公司组织匹配时\n才允许 S3 操作。"}, {"letter": "B", "en": "Update the instance profile role policy to require aws:ResourceOrgId.", "cn": "更新实例配置文件角色策略以要求 aws:ResourceOrgId。"}, {"letter": "C", "en": "Add a network ACL rule to block outbound traffic on port 443.", "cn": "添加网络访问控制列表 (ACL) 规则以阻止端口 443 上的出站流量。"}, {"letter": "D", "en": "Apply an SCP that restricts S3 actions using organization condition keys.", "cn": "应用一个使用组织条件键限制 S3 操作的服务控制策略 (SCP)。"}], "answer": "A", "explanation_en": "Amazon S3 gateway endpoints support endpoint policies that can restrict which S3 resources are accessible through the endpoint. According to AWS Certified Security - Specialty documentation, endpoint policies\nare evaluated in addition to IAM policies and are ideal for enforcing data exfiltration controls without breaking\nlegitimate workloads.\n\n\nBy updating the S3 gateway endpoint policy to require both aws:ResourceOrgId and aws:PrincipalOrgId\nto match the company’s AWS Organization, the security engineer ensures that EC2 instances can access only\nS3 buckets that belong to the organization. This immediately blocks exfiltration to external S3 buckets while\nallowing legitimate internal data access to continue uninterrupted.\nOption B is insufficient because IAM policies alone cannot prevent access when the endpoint allows it.\nOption C would break all S3 access and stop the processing job. Option D applies too broadly and can impact\nunrelated services across the account.\nAWS documentation highlights S3 VPC endpoint policies with organization condition keys as a best practice for preventing S3 data exfiltration in private VPC environments.\nExams Prep\nAWS Certified Security - Specialty Official Study Guide\nAmazon S3 VPC Endpoint Policy Documentation\nAWS Organizations Condition Keys Documentation", "explanation_cn": "亚马逊 S3 网关终结点支持终结点策略，该策略可以限制通过终结点可访问的 S3 资源。根据 AWS\n安全认证专业文档，除了 IAM 策略之外还会评估终结点策略，并且它非常适合在不中断合法工作\n负载的情况下实施数据泄露控制。\n通过更新 S3 网关终结点策略，要求 aws:ResourceOrgId 和 aws:PrincipalOrgId 都与公司的 AWS 组\n织匹配，安全工程师确保 EC2 实例只能访问属于该组织的 S3 存储桶。这立即阻止了向外部 S3 存储\n桶的泄露，同时允许合法的内部数据访问继续不受干扰。\n选项 B 是不够的，因为当终结点允许访问时，仅 IAM 策略无法阻止访问。选项 C 会中断所有 S3 访\n问并停止处理作业。选项 D 应用范围太广，可能会影响账户中的无关服务。\nAWS 文档强调将带有组织条件键的 S3 VPC 端点策略作为防止在专用 VPC 环境中进行 S3 数据泄露\n的最佳实践。\n考试准备\nAWS 安全认证 - 专业版官方学习指南\n亚马逊 S3 VPC 端点策略文档\nAWS 组织条件键文档"}, {"num": 55, "category_en": "Detection", "category_cn": "检测", "question_en": "A company is running its application on AWS. The company has a multi-environment setup, and each\nenvironment is isolated in a separate AWS account. The company has an organization in AWS Organizations\nto manage the accounts. There is a single dedicated security account for the organization. The company must\n\n\ncreate an inventory of all sensitive data that is stored in Amazon S3 buckets across the organization’s accounts.\nThe findings must be visible from a single location.\nWhich solution will meet these requirements?", "question_cn": "一家公司在 AWS 上运行其应用程序。该公司有一个多环境设置，\n每个环境都隔离在一个单独的 AWS\n账户中。该公司在 AWS 组织中有一个组织来管理这些账户。该组织有一个单一的专用安全账户。该\n公司必须创建一份组织账户中存储在亚马逊 S3 存储桶中的所有敏感数据的清单。调查结果必须能\n从一个单一位置查看。\n哪种解决方案能满足这些要求？", "options": [{"letter": "A", "en": "Set the security account as the delegated administrator for Amazon Macie and AWS Security Hub.\nEnable and configure Macie to publish sensitive data findings to Security Hub.", "cn": "将安全账户设置为亚马逊 Macie 和 AWS 安全中心的委托管理员。启用并配置 Macie 以将敏感数\n据调查结果发布到安全中心。"}, {"letter": "B", "en": "Set the security account as the delegated administrator for AWS Security Hub. In each account, configure Amazon Inspector to scan the S3 buckets for sensitive data. Publish sensitive data findings to Security\nHub.", "cn": "将安全账户设置为 AWS 安全中心的委托管理员。在每个账户中，配置亚马逊 Inspector 扫描 S3\n存储桶以查找敏感数据。将敏感数据调查结果发布到安全中心。"}, {"letter": "C", "en": "In each account, configure Amazon Inspector to scan the S3 buckets for sensitive data. Enable Amazon\nInspector integration with AWS Trusted Advisor. Publish sensitive data findings to Trusted Advisor.", "cn": "在每个账户中，配置亚马逊 Inspector 扫描 S3 存储桶以查找敏感数据。启用亚马逊 Inspector 与\nAWS 可信顾问的集成。将敏感数据调查结果发布到可信顾问。"}, {"letter": "D", "en": "In each account, enable and configure Amazon Macie to detect sensitive data. Enable Macie integration with AWS Trusted Advisor. Publish sensitive data findings to Trusted Advisor.", "cn": "在每个账户中，启用并配置亚马逊 Macie 以检测敏感数据。启用 Macie 与 AWS 可信顾问的集成。\n将敏感数据调查结果发布到可信顾问。"}], "answer": "A", "explanation_en": "Amazon Macie is the AWS service designed specifically to discover, classify, and inventory sensitive data\nstored in Amazon S3. According to the AWS Certified Security - Specialty Study Guide, Macie can be enabled\norganization-wide using AWS Organizations, with a delegated administrator account that centrally manages\nfindings across all member accounts.\nBy designating the security account as the delegated administrator for both Amazon Macie and AWS\nSecurity Hub, the company can centralize sensitive data findings in a single location. Macie automatically\nscans S3 buckets for sensitive data such as personally identifiable information (PII) and publishes findings to\nSecurity Hub for centralized visibility and reporting.\nOption B and C are incorrect because Amazon Inspector does not scan S3 objects for sensitive data.\nOption D is invalid because AWS Trusted Advisor does not ingest Macie sensitive data findings.\nAWS best practices recommend Amazon Macie with delegated administration and Security Hub integration for centralized sensitive data inventory across multi-account environments.", "explanation_cn": "亚马逊 Macie 是专门设计用于发现、分类和编目存储在亚马逊 S3 中的敏感数据的 AWS 服务。根据\nAWS 安全认证 - 专业版学习指南，Macie 可以使用 AWS 组织在全组织范围内启用，并通过一个委\n托管理员账户集中管理所有成员账户的调查结果。\n通过将安全账户指定为亚马逊 Macie 和 AWS 安全中心的委托管理员，公司可以将敏感数据调查结\n果集中在一个位置。Macie 会自动扫描 S3 存储桶以查找敏感数据，如个人身份信息 (PII)，并将调\n查结果发布到安全中心以实现集中可见性和报告。\n选项 B 和 C 不正确，因为 Amazon Inspector 不会扫描 S3 对象中的敏感数据。选项 D 无效，因为\nAWS Trusted Advisor 不会摄取 Macie 敏感数据发现结果。\nAWS 最佳实践建议将 Amazon Macie 与委托管理和 Security Hub 集成，以便在多账户环境中集中\n管理敏感数据清单。"}, {"num": 56, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company has a web application that reads from and writes to an Amazon S3 bucket. The company\nneeds to use AWS credentials to authenticate all S3 API calls to the S3 bucket.\nWhich solution will provide the application with AWS credentials to make S3 API calls?", "question_cn": "一家公司有一个读取和写入 Amazon S3 存储桶的 Web 应用程序。该公司需要使用 AWS 凭证对所\n有到 S3 存储桶的 S3 API 调用进行身份验证。\n哪种解决方案将为应用程序提供用于进行 S3 API 调用的 AWS 凭证？", "options": [{"letter": "A", "en": "Integrate with Cognito identity pools and use GetId to obtain AWS credentials.", "cn": "与 Cognito 身份池集成并使用 GetId 获取 AWS 凭证。"}, {"letter": "B", "en": "Integrate with Cognito identity pools and use AssumeRoleWithWebIdentity to obtain AWS credentials.", "cn": "与 Cognito 身份池集成并使用 AssumeRoleWithWebIdentity 获取 AWS 凭证。"}, {"letter": "C", "en": "Integrate with Cognito user pools and use the ID token to obtain AWS credentials.", "cn": "与 Cognito 用户池集成并使用 ID 令牌获取 AWS 凭证。"}, {"letter": "D", "en": "Integrate with Cognito user pools and use the access token to obtain AWS credentials.", "cn": "与 Cognito 用户池集成并使用访问令牌获取 AWS 凭证。"}], "answer": "B", "explanation_en": "Amazon Cognito identity pools are designed to provide temporary AWS credentials for applications by\nexchanging an authenticated identity token for AWS Security Token Service (STS) credentials. AWS Certified\nSecurity - Specialty guidance distinguishes between Cognito user pools (authentication) and identity pools\n(authorization to AWS resources). A user pool can authenticate a user and issue tokens, but an identity pool is\nrequired to obtain AWS credentials that can be used to sign AWS API requests, such as S3 API calls. The correct\nmechanism is for the application to use AssumeRoleWithWebIdentity through STS (which is the underlying\nfederation method used by identity pools) to receive temporary credentials for an IAM role that grants S3\npermissions. GetId alone does not provide credentials; it returns an identity identifier that is used as part of\nthe credential exchange flow. Options C and D are incorrect because user pool tokens are not AWS credentials\nand cannot directly sign S3 requests. The solution therefore must use identity pools to map users to IAM roles\nand retrieve temporary credentials, satisfying the requirement for authenticated API calls using short-lived\ncredentials.", "explanation_cn": "亚马逊认知身份池旨在通过将经过身份验证的身份令牌交换为 AWS 安全令牌服务 (STS) 凭证，为\n应用程序提供临时的 AWS 凭证。AWS 安全认证专家指南区分了认知用户池 (身份验证) 和身份池\n(对 AWS 资源的授权)。用户池可以对用户进行身份验证并颁发令牌，但需要身份池来获取可用于签\n署 AWS API 请求 (如 S3 API 调用) 的 AWS 凭证。正确的机制是应用程序通过 STS 使用 AssumeRoleWithWebIdentity(这是身份池使用的底层联合方法) 来接收授予 S3 权限的 IAM 角色的临时凭证。仅\nGetId 不会提供凭证；它返回一个身份标识符，该标识符用作凭证交换流程的一部分。选项 C 和 D\n不正确，因为用户池令牌不是 AWS 凭证，不能直接签署 S3 请求。因此，解决方案必须使用身份池\n将用户映射到 IAM 角色并检索临时凭证，以满足使用短期凭证进行身份验证的 API 调用的要求。"}, {"num": 57, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A healthcare company stores more than 1 million patient records in an Amazon S3 bucket. The patient\nrecords include personally identifiable information (PII). The S3 bucket contains hundreds of terabytes of\ndata.\n\n\nA security engineer receives an alert that was triggered by an Amazon GuardDuty Exfiltration:S3 /AnomalousBehavior finding. The security engineer confirms that an attacker is using temporary credentials that were\nobtained from a compromised Amazon EC2 instance that has s3:GetObject permissions for the S3 bucket. The\nattacker has begun downloading the contents of the bucket. The security engineer contacts a development\nteam. The development team will require 4 hours to implement and deploy a fix.\nThe security engineer must take immediate action to prevent the attacker from downloading more data\nfrom the S3 bucket.\nWhich solution will meet this requirement?", "question_cn": "一家医疗保健公司在一个亚马逊 S3 存储桶中存储了超过 100 万份患者记录。患者记录包含个人身\n份信息 (PII)。该 S3 存储桶包含数百太字节的数据。\n一名安全工程师收到了由亚马逊 GuardDuty 的 Exfiltration:S3 /AnomalousBehavior 发现触发的警\n报。安全工程师确认攻击者正在使用从一个被入侵的亚马逊 EC2 实例获取的临时凭证，该实例对\nS3 存储桶具有 s3:GetObject 权限。攻击者已开始下载存储桶的内容。安全工程师联系了一个开发团\n队。开发团队需要 4 小时来实施和部署修复程序。\n安全工程师必须立即采取行动，防止攻击者从 S3 存储桶下载更多数据。\n哪种解决方案将满足此要求？", "options": [{"letter": "A", "en": "Revoke the temporary session that is associated with the instance profile that is attached to the EC2\ninstance.", "cn": "撤销与附加到 EC2 实例的实例配置文件相关联的临时会话。"}, {"letter": "B", "en": "Quarantine the EC2 instance by replacing the existing security group with a new security group that\nhas no rules applied.", "cn": "通过用一个没有应用任何规则的新安全组替换现有安全组来隔离 EC2 实例。"}, {"letter": "C", "en": "Enable Amazon Macie on the S3 bucket. Configure the managed data identifiers for personally identifiable information (PII). Enable S3 Object Lock on objects that Macie flags.", "cn": "在 S3 存储桶上启用亚马逊 Macie。配置个人身份信息 (PII) 的托管数据标识符。对 Macie 标记的\n对象启用 S3 对象锁定。"}, {"letter": "D", "en": "Apply an S3 bucket policy temporarily. Configure the policy to deny read access for all principals to\nblock downloads while the development team address the vulnerability.", "cn": "临时应用一个 S3 存储桶策略。配置该策略以拒绝所有主体的读取访问权限，以便在开发团队解\n决漏洞时阻止下载。"}], "answer": "A", "explanation_en": "Amazon GuardDuty Exfiltration:S3/AnomalousBehavior findings indicate that S3 data access patterns\nare consistent with data exfiltration. In this scenario, the attacker is using temporary credentials obtained\nfrom an EC2 instance profile, which are issued by AWS Security Token Service (STS).\nAccording to AWS Certified Security - Specialty documentation, the fastest and most targeted remediation is to revoke the temporary session credentials associated with the compromised instance profile. This\ncan be accomplished by removing or modifying the IAM role permissions, detaching the instance profile,\nor stopping the instance, which immediately invalidates the temporary credentials and prevents further S3\naccess.\nOption B may limit outbound traffic but does not invalidate already issued credentials. Option C is a\ndetection and classification service and does not prevent active exfiltration. Option D would block all access\nto the bucket, including legitimate access, and is considered overly disruptive for incident containment.\nAWS incident response best practices emphasize credential revocation as the first containment step when\ncompromise of temporary credentials is confirmed.\n• AWS Certified Security - Specialty Official Study Guide\nAmazon GuardDuty User Guide - S3 Protection\n\n\nQ AWS STS and IAM Role Security Documentation\nAWS Incident Response Best Practices", "explanation_cn": "亚马逊 GuardDuty 数据外渗:S3/异常行为发现表明 S3 数据访问模式与数据外渗一致。在这种情况\n下，攻击者正在使用从 EC2 实例配置文件获取的临时凭证，这些凭证由 AWS 安全令牌服务 (STS)\n颁发。\n根据 AWS 安全认证专家文档，最快且最具针对性的补救措施是撤销与受损实例配置文件相关联的\n临时会话凭证。这可以通过移除或修改 IAM 角色权限、分离实例配置文件或停止实例来完成，这\n将立即使临时凭证失效并阻止对 S3 的进一步访问。\n选项 B 可能会限制出站流量，但不会使已颁发的凭证失效。选项 C 是一种检测和分类服务，不能阻\n止正在进行的数据外渗。选项 D 会阻止对存储桶的所有访问，包括合法访问，并且被认为对事件遏\n制过于具有破坏性。\nAWS 事件响应最佳实践强调，当确认临时凭证被泄露时，将凭证撤销作为首要的遏制步骤。\n• AWS 安全认证专家官方学习指南\n亚马逊 GuardDuty 用户指南 - S3 保护\nQ AWS STS 和 IAM 角色安全文档\nAWS 事件响应最佳实践"}, {"num": 58, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company has security requirements for Amazon Aurora MySQL databases regarding encryption, deletion protection, public access, and audit logging. The company needs continuous monitoring and real-time\nvisibility into compliance status.\nWhich solution will meet these requirements?", "question_cn": "一家公司对亚马逊 Aurora MySQL 数据库有关于加密、删除保护、公共访问和审计日志记录的安全\n要求。该公司需要对合规状态进行持续监控和实时可见性。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Use AWS Audit Manager with a custom framework.", "cn": "使用带有自定义框架的 AWS 审计管理器。"}, {"letter": "B", "en": "Enable AWS Config and use managed rules to monitor Aurora MySQL compliance.", "cn": "启用 AWS 配置并使用托管规则来监控 Aurora MySQL 的合规性。"}, {"letter": "C", "en": "Use AWS Security Hub configuration policies.", "cn": "使用 AWS 安全中心配置策略。"}, {"letter": "D", "en": "Use EventBridge and Lambda with custom metrics.", "cn": "使用 EventBridge 和带有自定义指标的 Lambda。"}], "answer": "B", "explanation_en": "AWS Config is the AWS service designed to continuously evaluate resource configurations against defined\nrules. According to the AWS Certified Security - Specialty Study Guide, AWS Config managed rules exist\nspecifically to check database encryption, public accessibility, deletion protection, and log exports for Amazon\nRDS and Aurora.\nAWS Config provides a real-time compliance timeline and displays the compliance state of each resource\nagainst each rule at any point in time. This granular visibility is required to assess ongoing compliance with\nsecurity policies.\nAudit Manager generates reports but does not provide continuous compliance monitoring. Security Hub\naggregates findings but does not track configuration drift. EventBridge and Lambda introduce unnecessary\ncomplexity.", "explanation_cn": "AWS Config 是一项 AWS 服务，旨在根据定义的规则持续评估资源配置。根据《AWS 认证安全 - 专\n业考试指南》，AWS Config 托管规则专门用于检查 Amazon RDS 和 Aurora 的数据库加密、公共可\n访问性、删除保护和日志导出。\nAWS Config 提供实时合规时间线，并在任何时间点显示每个资源相对于每个规则的合规状态。这\n种细粒度的可见性对于评估对安全策略的持续合规性是必需的。\nAudit Manager 生成报告，但不提供持续合规监控。Security Hub 汇总调查结果，但不跟踪配置漂\n移。EventBridge 和 Lambda 引入了不必要的复杂性。"}, {"num": 59, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company is running an application in the eu-west-1 Region. The application uses an AWS Key Management Service (AWS KMS) customer managed key to encrypt sensitive data. The company plans to deploy\nthe application in the eu-north-1 Region. A security engineer needs to implement a key management solution for the application deployment in the new Region. The security engineer must minimize changes to the\napplication code.\nWhich change should the security engineer make to the AWS KMS configuration to meet these requirements?", "question_cn": "一家公司在 eu-west-1 区域运行一个应用程序。该应用程序使用 AWS 密钥管理服务 (AWS KMS) 客\n户管理密钥来加密敏感数据。公司计划在 eu-north-1 区域部署该应用程序。一名安全工程师需要为\n新区域中的应用程序部署实施一个密钥管理解决方案。该安全工程师必须尽量减少对应用程序代\n码的更改。\n安全工程师应该对 AWS KMS 配置进行哪些更改以满足这些要求？", "options": [{"letter": "A", "en": "Update the key policies in eu-west-1. Point the application in eu-north-1 to use the same customer\nmanaged key as the application in eu-west-1.", "cn": "更新 eu-west-1 中的密钥策略。将 eu-north-1 中的应用程序指向与 eu-west-1 中的应用程序相同\n的客户管理密钥。"}, {"letter": "B", "en": "Allocate a new customer managed key to eu-north-1 to be used by the application that is deployed in\nthat Region.", "cn": "为 eu-north-1 分配一个新的客户管理密钥，供在该区域部署的应用程序使用。"}, {"letter": "C", "en": "Allocate a new customer managed key to eu-north-1. Create the same alias name for both keys. Configure the application deployment to use the key alias.", "cn": "为 eu-north-1 分配一个新的客户管理密钥。为两个密钥创建相同的别名。配置应用程序部署以使\n用密钥别名。"}, {"letter": "D", "en": "Allocate a new customer managed key to eu-north-1. Create an alias for eu–1. Change the application\ncode to point to the alias for eu–1.", "cn": "为 eu-north-1 分配一个新的客户管理密钥。为 eu-west-1 创建一个别名。更改应用程序代码以指\n向 eu-west-1 的别名。"}], "answer": "C", "explanation_en": "AWS KMS keys are regional resources and cannot be used across Regions. According to AWS Certified\nSecurity - Specialty documentation, applications that are deployed in multiple Regions should use regionspecific customer managed keys while referencing keys by alias instead of key ID.\nBy creating a new customer managed key in eu-north-1 and assigning it the same alias as the key in euwest- 1, the application code can continue to reference the alias without modification. Each Region resolves\nthe alias to the correct local key, ensuring encryption continues to function correctly.\nOption A is invalid because KMS keys are regional. Option B requires application changes. Option D\nintroduces unsupported alias patterns.\nAWS best practices recommend alias-based key references for multi-Region deployments.", "explanation_cn": "AWS KMS 密钥是区域资源，不能跨区域使用。根据 AWS 认证安全 - 专业文档，部署在多个区域的\n应用程序应使用特定区域的客户管理密钥，同时通过别名而不是密钥 ID 来引用密钥。\n通过在 eu-north-1 中创建一个新的客户管理密钥，并为其分配与 eu-west-1 中的密钥相同的别名，应\n用程序代码可以继续引用该别名而无需修改。每个区域将别名解析为正确的本地密钥，确保加密继\n续正常运行。\n选项 A 无效，因为 KMS 密钥是区域性的。选项 B 需要应用程序更改。选项 D 引入了不受支持的别\n名模式。\nAWS 最佳实践建议在多区域部署中使用基于别名的密钥引用。"}, {"num": 60, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company has several Amazon S3 buckets that do not enforce encryption in transit. A security engineer\nmust implement a solution that enforces encryption in transit for all the company’s existing and future S3\nbuckets.\nWhich solution will meet these requirements?", "question_cn": "一家公司有几个未强制实施传输加密的 Amazon S3 存储桶。一名安全工程师必须实施一种解决方\n案，为公司所有现有和未来的 S3 存储桶强制实施传输加密。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Enable AWS Config. Create a proactive AWS Config Custom Policy rule. Create a Guard clause to\nevaluate the S3 bucket policies to check for a value of True for the aws:SecureTransport condition key. If the\nAWS Config rule evaluates to NON_COMPLIANT, block resource creation.", "cn": "启用 AWS Config。创建一个主动的 AWS Config 自定义策略规则。创建一个 Guard 子句来评估\nS3 存储桶策略，以检查 aws:SecureTransport 条件键的值是否为 True。如果 AWS Config 规则评估\n为不符合，则阻止资源创建。"}, {"letter": "B", "en": "Enable AWS Config. Configure the s3-bucket-ssl-requests-only AWS Config managed rule and set\nthe rule trigger type to Hybrid. Create an AWS Systems Manager Automation runbook that applies a bucket\npolicy to deny requests when the value of the aws:SecureTransport condition key is False. Configure automatic\nremediation. Set the runbook as the target of the rule.", "cn": "启用 AWS Config。配置 s3-bucket-ssl-requests-only AWS Config 托管规则，并将规则触发类型设\n置为混合。创建一个 AWS Systems Manager 自动化运行手册，当 aws:SecureTransport 条件键的值\n为 False 时，应用一个存储桶策略来拒绝请求。配置自动修复。将运行手册设置为规则的目标。"}, {"letter": "C", "en": "Enable Amazon Inspector. Create a custom AWS Lambda rule. Create a Lambda function that applies\na bucket policy to deny requests when the value of the aws:SecureTransport condition key is False. Set the\nLambda function as the target of the rule.", "cn": "启用 Amazon Inspector。创建一个自定义 AWS Lambda 规则。创建一个 Lambda 函数，当\naws:SecureTransport 条件键的值为 False 时，应用一个存储桶策略来拒绝请求。将 Lambda 函数\n设置为规则的目标。"}, {"letter": "D", "en": "Create an AWS CloudTrail trail. Enable S3 data events on the trail. Create an AWS Lambda function\nthat applies a bucket policy to deny requests when the value of the aws:SecureTransport condition key is False.\nConfigure the CloudTrail trail to invoke the Lambda function.", "cn": "创建一条 AWS CloudTrail 跟踪。在该跟踪上启用 S3 数据事件。创建一个 AWS Lambda 函数，当\naws:SecureTransport 条件键的值为 False 时，该函数应用存储桶策略来拒绝请求。配置 CloudTrail\n跟踪以调用 Lambda 函数。"}], "answer": "B", "explanation_en": "To enforce encryption in transit for Amazon S3, AWS best practice is to require HTTPS (TLS) by using a bucket policy condition that denies any request where aws:SecureTransport is false. The requirement\nincludes both existing buckets and future buckets, so the control must continuously evaluate configuration\ndrift and automatically remediate. AWS Config is the service intended for continuous configuration compliance monitoring across resources, and AWS Config managed rules provide standardized checks with low\noperational overhead. The s3-bucket-ssl-requests-only managed rule evaluates whether S3 buckets enforce\nSSL-only requests, aligning directly with enforcing encryption in transit. Setting the trigger type to Hybrid\nensures evaluation both on configuration changes and periodically. Automatic remediation with an AWS Systems Manager Automation runbook allows the organization to apply or correct the bucket policy consistently\nat scale without manual work. This approach also supports governance by maintaining a measurable compliance status while actively fixing noncompliance. Option A is not the best fit because a ”proactive” custom\npolicy rule does not by itself remediate existing buckets and ”block resource creation” is not how AWS Config\nenforces controls. Option C is incorrect because Amazon Inspector is a vulnerability management service\nand does not govern S3 bucket transport policies. Option D is inefficient and indirect because CloudTrail data\nevents are not a compliance engine and would require custom processing.", "explanation_cn": "为 了 对 Amazon S3 实 施 传 输 中 加 密，AWS 的 最 佳 实 践 是 通 过 使 用 存 储 桶 策 略 条 件 来 要 求\nHTTPS(TLS)，该条件会拒绝任何 aws:SecureTransport 为 false 的请求。该要求涵盖现有存储桶和\n未来存储桶，因此控制必须持续评估配置漂移并自动进行补救。AWS Config 是用于跨资源进行持\n续配置合规性监控的服务，AWS Config 托管规则提供具有低操作开销的标准化检查。s3-bucket-sslrequests-only 托管规则评估 S3 存储桶是否仅强制执行 SSL 请求，这与实施传输中加密直接相关。将\n触发类型设置为混合模式可确保在配置更改时以及定期进行评估。使用 AWS Systems Manager 自\n动化运行手册进行自动补救，可使组织大规模一致地应用或纠正存储桶策略，而无需人工干预。这\n种方法还通过在积极修复不合规情况的同时保持可衡量的合规状态来支持治理。选项 A 不太合适，\n因为“主动”自定义策略规则本身不会补救现有存储桶，并且“阻止资源创建”不是 AWS Config 实\n施控制的方式。选项 C 不正确，因为 Amazon Inspector 是一个漏洞管理服务，不管理 S3 存储桶传\n输策略。选项 D 效率低下且间接，因为 CloudTrail 数据事件不是合规引擎，需要进行自定义处理。"}, {"num": 61, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company has a web application that reads from and writes to an Amazon S3 bucket. The company\nneeds to authenticate all S3 API calls with AWS credentials.\nWhich solution will provide the application with AWS credentials?", "question_cn": "一家公司有一个读取和写入 Amazon S3 存储桶的 Web 应用程序。该公司需要使用 AWS 凭证对所\n有 S3 API 调用进行身份验证。\n哪种解决方案将为应用程序提供 AWS 凭证？", "options": [{"letter": "A", "en": "Use Amazon Cognito identity pools and the GetId API.", "cn": "使用 Amazon Cognito 身份池和 GetId API。"}, {"letter": "B", "en": "Use Amazon Cognito identity pools and AssumeRoleWithWebIdentity.", "cn": "使用 Amazon Cognito 身份池和 AssumeRoleWithWebIdentity。"}, {"letter": "C", "en": "Use Amazon Cognito user pools with ID tokens.", "cn": "使用带有 ID 令牌的 Amazon Cognito 用户池。"}, {"letter": "D", "en": "Use Amazon Cognito user pools with access tokens.", "cn": "使用带有访问令牌的 Amazon Cognito 用户池。"}], "answer": "B", "explanation_en": "Amazon Cognito identity pools provide temporary AWS credentials by exchanging web identity tokens\nwith AWS STS using AssumeRoleWithWebIdentity. According to AWS Certified Security - Specialty documentation, this is the correct mechanism for granting applications AWS credentials.\nUser pools authenticate users but do not issue AWS credentials. Identity pools integrate with IAM roles\nand STS, enabling secure, temporary access to AWS services.", "explanation_cn": "亚马逊 Cognito 身份池通过使用 AssumeRoleWithWebIdentity 与 AWS STS 交换网络身份令牌来提\n供临时 AWS 凭证。根据 AWS 认证安全 - 专业文档，这是授予应用程序 AWS 凭证的正确机制。\n用户池用于对用户进行身份验证，但不颁发 AWS 凭证。身份池与 IAM 角色和 STS 集成，从而实现\n对 AWS 服务的安全临时访问。"}, {"num": 62, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company runs a web application on a fleet of Amazon EC2 instances that are in an Auto Scaling group.\nThe EC2 instances are in the same VPC subnet as other workloads.\nA security engineer deploys an Amazon GuardDuty detector in the same AWS Region as the EC2 instances and integrates GuardDuty with AWS Security Hub.\n\n\nThe security engineer needs to implement an automated solution to detect and appropriately respond to\nanomalous traffic patterns for the web application. The solution must comply with AWS best practices for\ninitial response to security incidents and must minimize disruption to the web application.\nWhich solution will meet these requirements?", "question_cn": "一家公司在处于自动缩放组中的一批 Amazon EC2 实例上运行一个 Web 应用程序。这些 EC2 实例\n与其他工作负载位于同一个 VPC 子网中。\n一名安全工程师在与 EC2 实例相同的 AWS 区域中部署了一个 Amazon GuardDuty 探测器，并将\nGuardDuty 与 AWS 安全中心集成。\n安全工程师需要实施一个自动化解决方案，以检测 Web 应用程序的异常流量模式并做出适当响应。\n该解决方案必须符合 AWS 对安全事件初始响应的最佳实践，并且必须尽量减少对 Web 应用程序的\n干扰。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Disable the EC2 instance profile credentials by using AWS Lambda.", "cn": "使用 AWS Lambda 禁用 EC2 实例配置文件凭证。"}, {"letter": "B", "en": "Create an Amazon EventBridge rule that invokes an AWS Lambda function when GuardDuty detects\nanomalous traffic. Configure the function to remove the affected instance from the Auto Scaling group and\nattach a restricted security group.", "cn": "创建一个亚马逊事件桥规则，当 GuardDuty 检测到异常流量时调用一个 AWS Lambda 函数。配\n置该函数以从自动缩放组中移除受影响的实例，并附加一个受限的安全组。"}, {"letter": "C", "en": "Update the subnet network ACL to block traffic from the detected source IP addresses.", "cn": "更新子网网络访问控制列表以阻止来自检测到的源 IP 地址的流量。"}, {"letter": "D", "en": "Send GuardDuty findings to Amazon SNS for email notification.", "cn": "将 GuardDuty 调查结果发送到 Amazon SNS 以进行电子邮件通知。"}], "answer": "B", "explanation_en": "AWS incident response best practices emphasize rapid containment with minimal blast radius. According to the AWS Certified Security - Specialty Official Study Guide, isolating a compromised resource while\nallowing the application to continue running is the preferred initial response.\n\n\nBy using Amazon EventBridge to detect GuardDuty findings related to anomalous traffic and invoking\na Lambda function, the security engineer can automatically remove the affected EC2 instance from the Auto\nScaling group and attach a restricted security group. This immediately isolates the instance while allowing\nAuto Scaling to launch a replacement instance, ensuring application availability.\nOption A is invalid because EC2 instance profiles do not use long-term access keys. Option C affects the\nentire subnet and could disrupt unrelated workloads. Option D provides notification only and does not meet\nthe requirement for automated response.\nAWS documentation explicitly recommends instance-level isolation using security groups as a best practice for initial incident containment.\nQ AWS Certified Security - Specialty Official Study Guide\nAmazon GuardDuty User Guide\nAWS Incident Response Best Practices", "explanation_cn": "AWS 事件响应最佳实践强调以最小的影响范围快速遏制。根据《AWS 认证安全 - 专业官方学习指\n南》，在允许应用程序继续运行的同时隔离受感染的资源是首选的初始响应措施。\n通过使用 Amazon EventBridge 检测与异常流量相关的 GuardDuty 发现并调用 Lambda 函数，安全\n工程师可以自动从自动缩放组中移除受影响的 EC2 实例并附加一个受限的安全组。这会立即隔离\n该实例同时允许自动缩放启动一个替换实例，确保应用程序的可用性。\n选项 A 无效，因为 EC2 实例配置文件不使用长期访问密钥。选项 C 会影响整个子网并可能扰乱无\n关的工作负载。选项 D 仅提供通知，不符合自动响应的要求。\nAWS 文档明确推荐使用安全组进行实例级隔离作为初始事件遏制的最佳实践。\nQ 《AWS 认证安全 - 专业官方学习指南》\n《Amazon GuardDuty 用户指南》\n《AWS 事件响应最佳实践》"}, {"num": 63, "category_en": "Detection", "category_cn": "检测", "question_en": "A security engineer needs to protect a public web application that runs in a VPC. The VPC hosts the origin\nfor an Amazon CloudFront distribution. The application has experienced multiple layer 7 DDoS attacks. An\nAWS WAF web ACL is associated with the CloudFront distribution. The web ACL contains one AWS managed\nrule to protect against known IP addresses that have bad reputations.\n\n\nThe security engineer must configure an automated solution that detects and mitigates layer 7 DDoS\nattacks in real time with no manual effort.\nWhich solution will meet these requirements?", "question_cn": "一名安全工程师需要保护在 VPC 中运行的公共 Web 应用程序。该 VPC 承载着 Amazon CloudFront\n分发的源站。该应用程序遭受了多次第 7 层 DDoS 攻击。一个 AWS WAF 网络访问控制列表 (ACL)\n与 CloudFront 分发相关联。该网络 ACL 包含一条 AWS 托管规则，用于防范声誉不佳的已知 IP 地\n址。\n安全工程师必须配置一个自动化解决方案，以实时检测并缓解第 7 层 DDoS 攻击，无需人工干预。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Enable AWS Shield Advanced on the CloudFront distribution. Configure alerts in Amazon CloudWatch for DDoS indicators.", "cn": "在 CloudFront 分发上启用 AWS Shield Advanced。在 Amazon CloudWatch 中为 DDoS 指标配置\n警报。"}, {"letter": "B", "en": "Enable AWS Shield Advanced and configure proactive engagement with the AWS DDoS Response\nTeam (DRT).", "cn": "启用 AWS Shield Advanced 并配置与 AWS DDoS 响应团队 (DRT) 的主动参与。"}, {"letter": "C", "en": "Deploy AWS Network Firewall in the VPC. Create security policies that detect DDoS indicators. Create\nan AWS Lambda function to automatically update the web ACL rules during an attack.", "cn": "在 VPC 中部署 AWS Network Firewall。创建检测 DDoS 指标的安全策略。创建一个 AWS Lambda\n函数，以便在攻击期间自动更新网络 ACL 规则。"}, {"letter": "D", "en": "Add a rate-based rule to the web ACL. Enable AWS Shield Advanced. Enable automatic application\nlayer DDoS mitigation on the CloudFront distribution.", "cn": "向网络访问控制列表 (Web ACL) 添加基于速率的规则。启用 AWS Shield Advanced。在 CloudFront\n分配上启用自动应用层 DDoS 缓解功能。"}], "answer": "D", "explanation_en": "Option D is the correct solution because it provides fully automated, real-time detection and mitigation\nof application-layer (Layer 7) DDoS attacks with no manual intervention. AWS Shield Advanced includes\nautomatic application layer DDoS mitigation when it is enabled for supported resources such as Amazon\nCloudFront distributions. This feature continuously monitors traffic patterns and, when an attack is detected,\nautomatically deploys AWS WAF rules to mitigate malicious requests.\nAdding a rate-based rule to the AWS WAF web ACL further strengthens protection by automatically\nblocking IP addresses that exceed a defined request threshold, which is a common characteristic of Layer\n7 DDoS attacks. This combination aligns directly with AWS best practices for protecting web applications\nagainst volumetric and application-layer threats.\nOption A only provides alerting and visibility but does not ensure automated mitigation. Option B includes proactive engagement with the AWS DDoS Response Team, which is valuable for complex or large-scale\nattacks but still involves human interaction and therefore does not meet the ”no manual effort” requirement.\nOption C introduces unnecessary complexity and is not recommended for protecting CloudFront-based applications against Layer 7 DDoS attacks.\nAWS Security Specialty documentation explicitly recommends AWS Shield Advanced with automatic\napplication layer DDoS mitigation and AWS WAF rate-based rules for fully automated, real-time protection\nof public web applications.", "explanation_cn": "选项 D 是正确的解决方案，因为它提供了完全自动化的实时检测和缓解应用层 (第 7 层)DDoS 攻击\n的功能，无需人工干预。启用 AWS Shield Advanced 后，对于诸如 Amazon CloudFront 分配等受支\n持的资源，它包括自动应用层 DDoS 缓解功能。此功能持续监控流量模式，并在检测到攻击时自动\n部署 AWS WAF 规则以缓解恶意请求。\n向 AWS WAF 网络访问控制列表 (Web ACL) 添加基于速率的规则，通过自动阻止超过定义请求阈值\n的 IP 地址进一步增强保护，这是第 7 层 DDoS 攻击的常见特征。这种组合直接符合 AWS 保护 Web\n应用程序免受流量和应用层威胁的最佳实践。\n选项 A 仅提供警报和可见性，但不能确保自动缓解。选项 B 包括与 AWS DDoS 响应团队的主动合\n作，这对于复杂或大规模攻击很有价值，但仍涉及人工交互，因此不符合“无需人工操作”的要求。\n选项 C 引入了不必要的复杂性，不建议用于保护基于 CloudFront 的应用程序免受第 7 层 DDoS 攻\n击。\nAWS 安全专业文档明确推荐使用具有自动应用层 DDoS 缓解功能的 AWS Shield Advanced 和基于\n速率的 AWS WAF 规则，以实现对公共 Web 应用程序的完全自动化实时保护。"}, {"num": 64, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company runs an online game on AWS. When players sign up for the game, their username and password credentials are stored in an Amazon Aurora database.\nThe number of users has grown to hundreds of thousands of players. The number of requests for password resets and login assistance has become a burden for the company’s customer service team.\nThe company needs to implement a solution to give players another way to log in to the game. The solution must remove the burden of password resets and login assistance while securely protecting each player’s\ncredentials.\nWhich solution will meet these requirements?", "question_cn": "一家公司在 AWS 上运行一款在线游戏。玩家注册游戏时，他们的用户名和密码凭证存储在 Amazon\nAurora 数据库中。\n用户数量已增长到数十万玩家。密码重置和登录协助请求的数量已成为公司客户服务团队的负担。\n该公司需要实施一种解决方案，为玩家提供另一种登录游戏的方式。该解决方案必须消除密码重置\n和登录协助的负担，同时安全地保护每个玩家的凭证。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "When a new player signs up, use an AWS Lambda function to automatically create an IAM access key\nand a secret access key.", "cn": "新玩家注册时，使用 AWS Lambda 函数自动创建 IAM 访问密钥和秘密访问密钥。"}, {"letter": "B", "en": "Migrate the player credentials from the Aurora database to AWS Secrets Manager.", "cn": "将玩家凭证从 Aurora 数据库迁移到 AWS Secrets Manager。"}, {"letter": "C", "en": "Configure Amazon Cognito user pools to federate access to the game with third-party identity providers\n(IdPs), such as social IdPs. Migrate the game’s authentication mechanism to Cognito.", "cn": "配置 Amazon Cognito 用户池，以便与第三方身份提供商 (IdP)(如社交 IdP) 联合访问游戏。将游\n戏的身份验证机制迁移到 Cognito。"}, {"letter": "D", "en": "Issue API keys to new and existing players and use Amazon API Gateway for authentication.", "cn": "向新老玩家颁发 API 密钥，并使用 Amazon API Gateway 进行身份验证。"}], "answer": "C", "explanation_en": "Amazon Cognito is a fully managed identity service that provides user authentication, authorization,\nand user management for web and mobile applications. According to AWS Certified Security - Specialty\ndocumentation, Cognito user pools are specifically designed to offload authentication responsibilities from\napplications while maintaining strong security controls.\nBy federating authentication with third-party identity providers (such as social IdPs), Cognito eliminates\nthe need for the company to manage user passwords directly. This dramatically reduces password reset requests and customer service overhead, while also improving security through industry-standard authentication mechanisms, including MFA and token-based access.\nOption A is insecure and incorrect because IAM access keys are not intended for end users. Option B\nsimply relocates password storage and does not reduce operational burden. Option D uses API keys, which\nare not designed for user authentication and provide no identity verification.\nAWS guidance clearly states that Amazon Cognito is the recommended service for scalable, secure user\nauthentication, especially when reducing password management complexity is a requirement.\nAWS Certified Security - Specialty Official Study Guide\nAmazon Cognito User Pools Documentation\n\n\nAWS IAM Security Best Practices", "explanation_cn": "Amazon Cognito 是一项完全托管的身份服务，为 Web 和移动应用程序提供用户身份验证、授权和\n用户管理。根据 AWS Certified Security - Specialty 文档，Cognito 用户池专门设计用于将身份验证\n职责从应用程序中卸载，同时保持强大的安全控制。\n通过与第三方身份提供商 (如社交身份提供商) 联合进行身份验证，Cognito 消除了公司直接管理\n用户密码的需求。这大大减少了密码重置请求和客户服务开销，同时还通过包括多因素身份验证\n(MFA) 和基于令牌的访问在内的行业标准身份验证机制提高了安全性。\n选项 A 不安全且不正确，因为 IAM 访问密钥不是供最终用户使用的。选项 B 只是重新定位了密码\n存储，并没有减轻运营负担。选项 D 使用 API 密钥，API 密钥不是为用户身份验证设计的，也不提\n供身份验证。\nAWS 指南明确指出，Amazon Cognito 是用于可扩展、安全的用户身份验证的推荐服务，特别是在\n需要降低密码管理复杂性的情况下。\nAWS Certified Security - Specialty 官方学习指南\nAmazon Cognito 用户池文档\nAWS IAM 安全最佳实践"}, {"num": 65, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A security engineer needs to prepare for a security audit of an AWS account.\nSelect the correct AWS resource from the following list to meet each requirement. (Select THREE.)\n\nRequirements:\n1. Automatically collect evidence from AWS CloudTrail, AWS Config, and AWS Security Hub for an assessment report.\n2. Determine which IAM principals within the AWS account have access to a specified resource.\n3. Download AWS security and compliance documents on demand.", "question_cn": "一名安全工程師需要為 AWS 帳戶的安全審計做準備。\n從以下清單中選擇正確的 AWS 資源以滿足每個需求。（選擇三項。）\n\n需求：\n1. 自動從 AWS CloudTrail、AWS Config 和 AWS Security Hub 收集證據以生成評估報告。\n2. 確定 AWS 帳戶中哪些 IAM 主體可以存取指定資源。\n3. 按需下載 AWS 安全性與合規文件。", "options": [{"letter": "A", "en": "AWS Artifact reports", "cn": "AWS Artifact 報告"}, {"letter": "B", "en": "AWS Audit Manager controls", "cn": "AWS Audit Manager 控制措施"}, {"letter": "C", "en": "AWS Config conformance packs", "cn": "AWS Config 合規性套件"}, {"letter": "D", "en": "AWS Config rules", "cn": "AWS Config 規則"}, {"letter": "E", "en": "Amazon Detective investigations", "cn": "Amazon Detective 調查"}, {"letter": "F", "en": "AWS IAM Access Analyzer internal access analyzers", "cn": "AWS IAM Access Analyzer 內部存取分析器"}], "answer": "AWS Audit Manager controls / AWS IAM Access Analyzer internal access analyzers / AWS Artifact reports", "explanation_en": "Matching:\n1. Automatically collect evidence from CloudTrail/Config/Security Hub → AWS Audit Manager controls\n   (Audit Manager automates evidence collection from these sources for assessment reports)\n\n2. Determine which IAM principals have access to a specified resource → AWS IAM Access Analyzer internal access analyzers\n   (IAM Access Analyzer analyzes resource policies to identify which principals can access resources)\n\n3. Download AWS security and compliance documents on demand → AWS Artifact reports\n   (AWS Artifact provides on-demand access to AWS security and compliance documentation)", "explanation_cn": "配對說明：\n1. 自動從 CloudTrail/Config/Security Hub 收集證據 → AWS Audit Manager controls\n   （Audit Manager 自動從這些來源收集證據用於評估報告）\n\n2. 確定哪些 IAM 主體可以存取指定資源 → AWS IAM Access Analyzer 內部存取分析器\n   （IAM Access Analyzer 分析資源政策，找出哪些主體可以存取資源）\n\n3. 按需下載 AWS 安全性與合規文件 → AWS Artifact reports\n   （AWS Artifact 提供按需存取 AWS 安全性與合規文件）"}, {"num": 66, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company has a large fleet of Amazon Linux 2 Amazon EC2 instances that run an application. The\napplication processes sensitive data and has the following compliance requirements:\n• No remote access management ports to the EC2 instances can be exposed internally or externally.\n• All remote session activity must be recorded in an audit log.\n• All remote access to the EC2 instances must be authenticated and authorized by AWS IAM Identity\nCenter.\nThe company’s DevOps team occasionally needs to connect to one of the EC2 instances to troubleshoot\nissues.\nWhich solution will provide remote access to the EC2 instances while meeting the compliance requirements?", "question_cn": "一家公司拥有大量运行应用程序的 Amazon Linux 2 Amazon EC2 实例。该应用程序处理敏感数据\n并具有以下合规要求:\n• EC2 实例的远程访问管理端口不得在内部或外部暴露。\n• 所有远程会话活动必须记录在审计日志中。\n• 对 EC2 实例的所有远程访问必须由 AWS IAM 身份中心进行身份验证和授权。\n该公司的 DevOps 团队偶尔需要连接到其中一个 EC2 实例以排除故障。\n哪种解决方案将在满足合规要求的同时提供对 EC2 实例的远程访问？", "options": [{"letter": "A", "en": "Grant access to the EC2 serial console at the account level.", "cn": "在账户级别授予对 EC2 串行控制台的访问权限。"}, {"letter": "B", "en": "Enable EC2 Instance Connect and configure security group rules.", "cn": "启用 EC2 实例连接并配置安全组规则。"}, {"letter": "C", "en": "Assign an EC2 instance role that allows access to AWS Systems Manager. Create an IAM policy that\ngrants access to Systems Manager Session Manager. Assign the policy to an IAM role of the DevOps team.", "cn": "分配一个允许访问 AWS Systems Manager 的 EC2 实例角色。创建一个授予对 Systems Manager\n会话管理器访问权限的 IAM 策略。将该策略分配给 DevOps 团队的 IAM 角色。"}, {"letter": "D", "en": "Use AWS Systems Manager Automation runbooks to open remote access ports.", "cn": "使用 AWS Systems Manager 自动化运行手册打开远程访问端口。"}], "answer": "C", "explanation_en": "AWS Systems Manager Session Manager provides secure, auditable, and portless access to EC2 instances.\nAccording to the AWS Certified Security - Specialty Study Guide, Session Manager allows administrators to\nconnect to instances without opening inbound SSH or RDP ports, fully satisfying strict compliance requirements.\nSession Manager integrates directly with AWS IAM Identity Center, ensuring that all access is authenticated and authorized using centralized identity management. Additionally, Session Manager automatically\nrecords session activity and can send logs to Amazon CloudWatch Logs or Amazon S3, providing a complete\naudit trail of all commands executed during a session.\nOption A (EC2 serial console) does not provide comprehensive auditing and is intended for recovery\nscenarios. Option B requires inbound network access and security group rules, violating the ”no exposed\nmanagement ports” requirement. Option D explicitly opens ports, which directly violates compliance constraints.\nAWS documentation clearly identifies Systems Manager Session Manager as the recommended solution\nfor secure, auditable, and identity-integrated instance access in regulated environments.\n\n\nAWS Certified Security - Specialty Official Study Guide\nAWS Systems Manager Session Manager Documentation\nAWS IAM Identity Center Best Practices", "explanation_cn": "AWS Systems Manager 会话管理器提供对 EC2 实例的安全、可审计且无端口的访问。根据《AWS\n认证安全 - 专业学习指南》\n，会话管理器允许管理员在不打开入站 SSH 或 RDP 端口的情况下连接到\n实例，完全满足严格的合规要求。\n会话管理器直接与 AWS IAM Identity Center 集成，确保所有访问都使用集中式身份管理进行身份\n验证和授权。此外，会话管理器会自动记录会话活动，并可以将日志发送到 Amazon CloudWatch\nLogs 或 Amazon S3，提供会话期间执行的所有命令的完整审计跟踪。\n选项 A(EC2 串行控制台) 不提供全面的审计，并且适用于恢复场景。选项 B 需要入站网络访问和安\n全组规则，违反了“无暴露管理端口”的要求。选项 D 明确打开端口，直接违反了合规约束。\nAWS 文档明确将 Systems Manager 会话管理器标识为受监管环境中安全、可审计且身份集成的实\n例访问的推荐解决方案。\n《AWS 认证安全 - 专业官方学习指南》\nAWS Systems Manager 会话管理器文档\nAWS IAM Identity Center 最佳实践"}, {"num": 67, "category_en": "Detection", "category_cn": "检测", "question_en": "A security engineer for a company is investigating suspicious traffic on a web application in the AWS\nCloud. The web application is protected by an Application Load Balancer (ALB) behind an Amazon CloudFront distribution. There is an AWS WAF web ACL associated with the ALB. The company stores AWS WAF\nlogs in an Amazon S3 bucket.\nThe engineer notices that all incoming requests in the AWS WAF logs originate from a small number of\nIP addresses that correspond to CloudFront edge locations. The security engineer must identify the source IP\naddresses of the clients that are initiating the suspicious requests.\nWhich solution will meet this requirement?", "question_cn": "一家公司的安全工程师正在调查 AWS 云中一个 Web 应用程序上的可疑流量。该 Web 应用程序由\n位于 Amazon CloudFront 分发后面的应用程序负载均衡器 (ALB) 保护。有一个与 ALB 关联的 AWS\nWAF Web ACL。该公司将 AWS WAF 日志存储在 Amazon S3 存储桶中。\n工程师注意到 AWS WAF 日志中的所有传入请求都来自与 CloudFront 边缘位置对应的少数 IP 地\n址。安全工程师必须识别发起可疑请求的客户端的源 IP 地址。\n哪种解决方案能满足此要求？", "options": [{"letter": "A", "en": "Enable VPC Flow Logs in the VPC where the ALB is deployed. Examine the source field to capture\nthe client IP addresses.", "cn": "在部署 ALB 的 VPC 中启用 VPC 流日志。检查源字段以捕获客户端 IP 地址。"}, {"letter": "B", "en": "Inspect the X-Forwarded-For header in the AWS WAF logs to determine the original client IP addresses.", "cn": "检查 AWS WAF 日志中的 X-Forwarded-For 标头，以确定原始客户端 IP 地址。"}, {"letter": "C", "en": "Modify the CloudFront distribution to disable ALB connection reuse. Examine the clientIp field in\nthe AWS WAF logs to identify the original client IP addresses.", "cn": "修改 CloudFront 分发以禁用 ALB 连接重用。检查 AWS WAF 日志中的 clientIp 字段以识别原始\n客户端 IP 地址。"}, {"letter": "D", "en": "Configure CloudFront to add a custom header named Client-IP to origin requests that are sent to the\nALB.", "cn": "配置 CloudFront，以便在发送到 ALB 的源请求中添加名为 Client-IP 的自定义标头。"}], "answer": "B", "explanation_en": "When Amazon CloudFront is used in front of an Application Load Balancer, CloudFront becomes the\nimmediate source of incoming requests to the ALB. As a result, AWS WAF logs record the CloudFront edge\nlocation IP addresses as the client IPs, not the original viewer IP addresses. This behavior is explicitly documented in the AWS Certified Security - Specialty Study Guide and the AWS WAF and CloudFront integration\ndocumentation.\nTo preserve the original client IP address, CloudFront automatically adds the X-Forwarded-For HTTP\nheader, which contains the IP address of the originating client followed by any proxy addresses involved in\nforwarding the request. AWS WAF logs include this header, making it the authoritative source for identifying\ntrue client IP addresses when CloudFront is used.\nOption A is incorrect because VPC Flow Logs capture network-level metadata and will only show CloudFront IP addresses, not the original client IPs. Option C is incorrect because disabling connection reuse does\n\n\nnot change how client IPs are logged in AWS WAF. Option D is unnecessary and unsupported as a requirement\nbecause CloudFront already provides the required information through standard headers.\nAWS documentation consistently states that X-Forwarded-For is the correct and supported mechanism\nfor tracing client IPs in CloudFront-protected applications.\nAWS Certified Security - Specialty Official Study Guide\nAWS WAF Developer Guide - Logging\nAmazon CloudFront Developer Guide - Request Headers", "explanation_cn": "当在应用程序负载均衡器前面使用 Amazon CloudFront 时，CloudFront 成为 ALB 传入请求的直接\n来源。因此，AWS WAF 日志将 CloudFront 边缘位置 IP 地址记录为客户端 IP，而不是原始查看者\nIP 地址。此行为在《AWS 认证安全 - 专业学习指南》和 AWS WAF 与 CloudFront 集成文档中有明\n确记录。\n为了保留原始客户端 IP 地址，CloudFront 会自动添加 X-Forwarded-For HTTP 标头，其中包含原始\n客户端的 IP 地址以及转发请求所涉及的任何代理地址。AWS WAF 日志包含此标头，使其成为在使\n用 CloudFront 时识别真正客户端 IP 地址的权威来源。\n选项 A 不正确，因为 VPC 流日志捕获网络级元数据，只会显示 CloudFront IP 地址，而不是原始客\n户端 IP。选项 C 不正确，因为禁用连接重用不会改变 AWS WAF 中客户端 IP 的记录方式。选项 D\n作为一项要求是不必要且不受支持的，因为 CloudFront 已经通过标准标头提供了所需信息。\nAWS 文档一直指出，X-Forwarded-For 是在 CloudFront 保护的应用程序中跟踪客户端 IP 的正确且\n受支持的机制。\n《AWS 认证安全 - 专业官方学习指南》\n《AWS WAF 开发者指南 - 日志记录》\n《Amazon CloudFront 开发者指南 - 请求标头》"}, {"num": 68, "category_en": "Detection", "category_cn": "检测", "question_en": "A company needs the ability to identify the root cause of security findings in an AWS account. The company has enabled VPC Flow Logs, Amazon GuardDuty, and AWS CloudTrail. The company must investigate\nany IAM roles that are involved in the security findings and must visualize the findings.\nWhich solution will meet these requirements?", "question_cn": "一家公司需要能够识别 AWS 账户中安全发现的根本原因。该公司已启用 VPC 流日志、Amazon\nGuardDuty 和 AWS CloudTrail。该公司必须调查与安全发现相关的任何 IAM 角色，并必须可视化\n这些发现。\n哪种解决方案能满足这些要求？", "options": [{"letter": "A", "en": "Use Amazon Detective to run investigations on the IAM roles and to visualize the findings.", "cn": "使用 Amazon Detective 对 IAM 角色进行调查并可视化调查结果。"}, {"letter": "B", "en": "Use Amazon Inspector to run investigations on the IAM roles and visualize the findings.", "cn": "使用 Amazon Inspector 对 IAM 角色进行调查并可视化调查结果。"}, {"letter": "C", "en": "Export GuardDuty findings to Amazon S3 and analyze them with Amazon Athena.", "cn": "将 GuardDuty 调查结果导出到 Amazon S3 并使用 Amazon Athena 进行分析。"}, {"letter": "D", "en": "Enable AWS Security Hub and use custom actions to investigate IAM roles.", "cn": "启用 AWS Security Hub 并使用自定义操作调查 IAM 角色。"}], "answer": "A", "explanation_en": "Amazon Detective is a managed service designed specifically to investigate and analyze security findings\nby automatically correlating data from Amazon GuardDuty, AWS CloudTrail, and VPC Flow Logs. According\nto the AWS Certified Security - Specialty Official Study Guide, Detective enables security teams to identify root\ncauses, anomalous behavior, and indicators of compromise through interactive visualizations.\nAmazon Detective allows investigators to pivot directly to IAM roles, users, and resources that are involved in GuardDuty findings. Detective builds behavior graphs and timelines that show API activity, network\ntraffic, and historical context, making it easier to understand how and why a security incident occurred.\nAmazon Inspector (Option B) focuses on vulnerability scanning of compute resources and does not investigate IAM behavior. Option C requires manual analysis and lacks native visualization. AWS Security Hub\n(Option D) aggregates findings but does not perform root-cause investigation or behavioral analysis.\n\n\nAWS documentation explicitly states that Amazon Detective is the recommended service for deep-dive\ninvestigations following GuardDuty alerts, especially when IAM roles are involved.\nAWS Certified Security - Specialty Official Study Guide\nAmazon Detective User Guide\nAmazon GuardDuty Integration Documentation", "explanation_cn": "Amazon Detective 是一项托管服务，专门用于通过自动关联来自 Amazon GuardDuty、AWS CloudTrail 和 VPC 流日志的数据来调查和分析安全调查结果。根据《AWS Certified Security - Specialty 官\n方学习指南》\n，Detective 使安全团队能够通过交互式可视化来识别根本原因、异常行为和受损指标。\nAmazon Detective 允许调查人员直接转向与 GuardDuty 调查结果相关的 IAM 角色、用户和资源。\nDetective 构建行为图和时间线，展示 API 活动、网络流量和历史背景，从而更易于理解安全事件是\n如何以及为何发生的。\nAmazon Inspector(选项 B) 专注于计算资源的漏洞扫描，并不调查 IAM 行为。选项 C 需要手动分析\n且缺乏原生可视化功能。AWS Security Hub(选项 D) 聚合调查结果，但不进行根本原因调查或行为\n分析。\nAWS 文档明确指出，Amazon Detective 是在 GuardDuty 警报后进行深入调查的推荐服务，尤其是\n在涉及 IAM 角色时。\n《AWS Certified Security - Specialty 官方学习指南》\nAmazon Detective 用户指南\nAmazon GuardDuty 集成文档"}, {"num": 69, "category_en": "Incident Response", "category_cn": "事件響應", "question_en": "A company operates an Amazon EC2 instance that is registered as a target of a Network Load Balancer\n(NLB). The NLB is associated with a security group. The security group allows inbound TCP traffic on port\n22 from 10.0.0.0/23.\nThe company maps the NLB to two subnets that share the same network ACL and route table. The route\ntable has a route for 0.0.0.0/0 to an internet gateway. The network ACL has one inbound rule that has a priority\nof 20 and that allows TCP traffic on port 22 from 10.0.0.0/16.\nA security engineer receives an alert that there is an unauthorized SSH session on the EC2 instance. The\nunauthorized session originates from 10.0.1.5. The company’s incident response procedure requires unauthorized SSH sessions to be immediately interrupted. The instance must remain running, and its memory must\nremain intact.\n\n\nWhich solution will meet these requirements?", "question_cn": "## 问题编号:69 - [事件响应]\n一家公司运营着一个注册为网络负载均衡器 (NLB) 目标的 Amazon EC2 实例。该 NLB 与一个安全\n组相关联。该安全组允许来自 10.0.0.0/23 的端口 22 上的入站 TCP 流量。\n 公司将网络负载均衡器 (NLB) 映射到两个共享相同网络访问控制列表 (ACL) 和路由表的子\n网。路由表有一条指向互联网网关的 0.0.0.0/0 路由。网络 ACL 有一条入站规则，其优先级为 20，允\n许来自 10.0.0.0/16 的 TCP 流量通过端口 22。\n 一名安全工程师收到一条警报，称 EC2 实例上存在未经授权的 SSH 会话。该未经授权的会\n话源自 10.0.1.5。公司的事件响应程序要求立即中断未经授权的 SSH 会话。实例必须保持运行，其\n内存必须保持完整。\n 哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Restart the EC2 instance from either the AWS Management Console or the AWS CLI.", "cn": "从 AWS 管理控制台或 AWS CLI 重新启动 EC2 实例。"}, {"letter": "B", "en": "Add a new inbound rule that has a priority of 10 to the network ACL to deny TCP traffic on port 22\nfrom 10.0.1.5.", "cn": "向网络 ACL 添加一条优先级为 10 的新入站规则，以拒绝来自 10.0.1.5 的端口 22 上的 TCP\n流量。"}, {"letter": "C", "en": "Remove the security group rule that allows inbound TCP traffic on port 22 from 10.0.0.0/16.", "cn": "删除允许来自 10.0.0.0/16 的端口 22 上的入站 TCP 流量的安全组规则。"}, {"letter": "D", "en": "Update the route table to remove the route to the internet gateway.", "cn": "更新路由表以删除指向互联网网关的路由。"}], "answer": "B", "explanation_en": "Explanation\nNetwork ACLs are stateless and are evaluated in order based on rule number, with lower rule numbers\ntaking precedence. According to AWS Certified Security - Specialty incident response guidance, network\nACLs can be used to immediately block traffic at the subnet level without restarting instances or modifying\ntheir runtime state.\nBy adding a deny rule with a lower priority number (10) that explicitly denies TCP traffic on port 22 from\nthe offending IP address (10.0.1.5), the unauthorized SSH session is immediately interrupted. This approach\nsatisfies the requirement to keep the instance running and to preserve memory for forensic analysis.", "explanation_cn": "## 解释 \n 网络 ACL 是无状态的，并且根据规则编号按顺序进行评估，较低的规则编号优先。根据 AWS\n认证安全 - 专业版事件响应指南，网络 ACL 可用于在子网级别立即阻止流量，而无需重新启动实例\n或修改其运行时状态。\n 通过添加一个优先级较低 (10) 的拒绝规"}, {"num": 70, "category_en": "Detection", "category_cn": "检测", "question_en": "Top IT Certification Prep Material\nA company is developing an application that runs across a combination of Amazon EC2 On-Demand\nInstances and Spot Instances. A security engineer needs to provide a logging solution that makes logs for all\ninstances available from a single location. The solution must allow only a specific set of users to analyze the\nlogs for event patterns. The users must be able to use SQL queries on the logs to perform root cause analysis.\n\n\nWhich solution will meet these requirements?", "question_cn": "顶级 IT 认证备考资料\n一家公司正在开发一个应用程序，该应用程序在亚马逊弹性计算云 (Amazon EC2) 按需实例和竞价\n型实例的组合上运行。一名安全工程师需要提供一种日志记录解决方案，使所有实例的日志都能从\n单个位置获取。该解决方案必须只允许特定的一组用户分析日志中的事件模式。用户必须能够对日\n志使用 SQL 查询来进行根本原因分析。\n哪种解决方案能满足这些要求？", "options": [{"letter": "A", "en": "Configure the EC2 instances to send application logs to a single Amazon CloudWatch Logs log group.\nAllow only specific users to access the log group. Use CloudWatch Logs Insights to query the log group.", "cn": "将 EC2 实例配置为将应用程序日志发送到单个亚马逊云观察日志 (Amazon CloudWatch Logs) 日\n志组。只允许特定用户访问该日志组。使用云观察日志洞察 (CloudWatch Logs Insights) 查询该日\n志组。"}, {"letter": "B", "en": "Configure the EC2 instances to send application logs to a single Amazon S3 bucket. Allow only specific\nusers to access the S3 bucket. Use Amazon CloudWatch Logs Insights to query the log files in the S3 bucket.", "cn": "将 EC2 实例配置为将应用程序日志发送到单个亚马逊 S3 存储桶。只允许特定用户访问该 S3 存\n储桶。使用亚马逊云观察日志洞察 (Amazon CloudWatch Logs Insights) 查询 S3 存储桶中的日志文\n件。"}, {"letter": "C", "en": "Configure each EC2 instance to send its application logs to its own specific Amazon CloudWatch Logs\nlog group. Allow only specific users to access the log groups. Use Amazon Athena to query all the log groups.", "cn": "将每个 EC2 实例配置为将其应用程序日志发送到其自己特定的亚马逊云观察日志 (Amazon\nCloudWatch Logs) 日志组。只允许特定用户访问这些日志组。使用亚马逊雅典娜 (Amazon Athena)\n查询所有日志组。"}, {"letter": "D", "en": "Configure the EC2 instances to send application logs to a single Amazon CloudWatch Logs log group.\nGrant Amazon Detective access to the log group. Allow only specific users to use Detective to analyze the\nlogs.", "cn": "将 EC2 实例配置为将应用程序日志发送到单个亚马逊云观察日志 (Amazon CloudWatch Logs)\n日志组。授予亚马逊侦探 (Amazon Detective) 对该日志组的访问权限。只允许特定用户使用侦探\n(Detective) 分析日志。"}], "answer": "A", "explanation_en": "Amazon CloudWatch Logs provides a centralized, scalable service for collecting and storing logs from\nAmazon EC2 instances, regardless of whether the instances are On-Demand or Spot Instances. According to\n\n\nthe AWS Certified Security - Specialty Official Study Guide, CloudWatch Logs is the recommended service for\ncentralized log aggregation and near-real-time analysis of application and system logs.\nBy configuring all EC2 instances to send logs to a single CloudWatch Logs log group, the security engineer\nensures that logs from all instances are available in one centralized location. Access to the log group can be\nrestricted by using IAM policies, ensuring that only authorized users can view and analyze the logs.\nCloudWatch Logs Insights provides a powerful query language with SQL-like syntax, enabling users to\nsearch, filter, aggregate, and analyze log data efficiently. This directly satisfies the requirement for SQL-style\nqueries to identify event patterns and perform root cause analysis without requiring data movement or additional services.\nOption B is incorrect because CloudWatch Logs Insights cannot query log files stored in Amazon S3.\nOption C is inefficient and operationally complex, as Athena cannot directly query CloudWatch Logs log\ngroups. Option D is invalid because Amazon Detective is designed for security investigations using GuardDuty\nfindings, not for general application log analysis.\nAWS documentation explicitly states that CloudWatch Logs combined with CloudWatch Logs Insights\nis the most efficient and secure approach for centralized log analysis in EC2-based architectures.\nA MS Certified Security - Specialty Official Study Guide\nExams Prep\n\n\nAmazon CloudWatch Logs Documentation\n• CloudWatch Logs Insights Query Guide", "explanation_cn": "亚马逊云观察日志 (Amazon CloudWatch Logs) 提供了一个集中式、可扩展的服务，用于从亚马逊\n弹性计算云 (Amazon EC2) 实例收集和存储日志，无论这些实例是按需实例还是竞价型实例。根据\n《AWS 认证安全 - 专业官方学习指南》\n，云观察日志 (CloudWatch Logs)
