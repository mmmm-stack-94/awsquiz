}], "answer": "D", "explanation_en": "Explanation\nAmazon GuardDuty provides managed threat detection and supports EKS protection features that analyze Kubernetes audit logs to detect suspicious activity, including unauthorized or unauthenticated access\nattempts. AWS Certified Security - Specialty documentation recommends GuardDuty for low-overhead detection because it is fully managed and does not require deploying agents or modifying application code.\nEKS Audit Log Monitoring is designed to consume and analyze relevant control plane audit events to identify\nanomalous or unauthorized actions against the cluster. Compared to third-party add-ons, GuardDuty reduces\noperational burden and remains fully within AWS managed services. Security Hub aggregates findings from\nservices like GuardDuty but does not itself perform th", "explanation_cn": "## 解释"}, {"num": 95, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company’s security team wants to receive email notification from AWS about any abuse reports regarding DoS attacks. A security engineer needs to implement a solution that will provide a near-real-time alert\nfor any abuse reports that AWS sends for the account. The security engineer already has created an Amazon\nSimple Notification Service (Amazon SNS) topic and has subscribed the security team’s email address to the\ntopic.\nWhat should the security engineer do next to meet these requirements?", "question_cn": "一家公司的安全团队希望从 AWS 接收有关任何拒绝服务 (DoS) 攻击滥用报告的电子邮件通知。安\n全工程师需要实施一种解决方案，该方案将为 AWS 针对该账户发送的任何滥用报告提供近乎实时\n的警报。安全工程师已经创建了一个亚马逊简单通知服务 (Amazon SNS) 主题，并已将安全团队的\n电子邮件地址订阅到该主题。\n为满足这些要求，安全工程师接下来应该做什么？", "options": [{"letter": "A", "en": "Use the AWS Trusted Advisor API and a scheduled Lambda function to detect AWS_ABUSE_DOS_REPORT\nnotifications.", "cn": "使用 AWS 可信顾问 API 和计划的 Lambda 函数来检测 AWS_ABUSE_DOS_REPORT 通知。"}, {"letter": "B", "en": "Create an Amazon EventBridge rule that uses AWS Health and identifies a specific event for AWS_ABUSE_DOS_REPOR\nConfigure the rule action to publish a message to the SNS topic.", "cn": "创建一个使用 AWS Health 的 Amazon EventBridge 规则，并为 AWS_ABUSE_DOS_REPORT 识\n别特定事件。配置规则操作以将消息发布到 SNS 主题。"}, {"letter": "C", "en": "Use the AWS Support API and a scheduled Lambda function to detect abuse report cases.", "cn": "使用 AWS 支持 API 和计划的 Lambda 函数来检测滥用报告案例。"}, {"letter": "D", "en": "Use AWS CloudTrail logs with metric filters to detect AWS_ABUSE_DOS_REPORT events.", "cn": "使用带有指标过滤器的 AWS CloudTrail 日志来检测 AWS_ABUSE_DOS_REPORT 事件。\nExams Prep\n\n\n考试准备"}], "answer": "B", "explanation_en": "AWS Health provides real-time visibility into events that affect AWS accounts, including abuse notifications such as AWS_ABUSE_DOS_REPORT. According to the AWS Certified Security - Specialty Study Guide,\nAWS Health events are natively integrated with Amazon EventBridge, enabling automated, near-real-time\nresponses without polling or custom code.\nBy creating an EventBridge rule that listens for AWS Health events related to abuse reports and configuring the rule to publish messages to an SNS topic, the security engineer ensures immediate notification to\nthe security team whenever AWS issues a DoS-related abuse report for the account.\nOption A and C rely on periodic polling using Lambda functions, which introduces latency and operational complexity. Option D is incorrect because CloudTrail does not log AWS abuse notifications.\nAWS documentation explicitly identifies AWS Health + EventBridge + SNS as the recommended architecture for near-real-time operational and security alerts originating from AWS.\nAWS Certified Security - Specialty Official Study Guide\nAWS Health User Guide\n\n\nAmazon EventBridge Documentation\nAWS Incident Response Best Practices", "explanation_cn": "AWS 健康服务提供对影响 AWS 账户的事件的实时可见性，包括诸如 AWS_ABUSE_DOS_REPORT\n等滥用通知。根据《AWS 认证安全 - 专业研究指南》，AWS 健康服务事件与 Amazon EventBridge\n原生集成，无需轮询或自定义代码即可实现自动化的近实时响应。\n 通过创建一个监听与滥用报告相关的 AWS Health 事件的 EventBridge 规则，并将该规则配\n置为向 SNS 主题发布消息，安全工程师确保每当 AWS 为该账户发布与 DoS 相关的滥用报告时，能\n立即通知安全团队。\n 选项 A 和 C 依赖于使用 Lambda 函数进行定期轮询，这会引入延迟和操作复杂性。选项 D\n不正确，因为 CloudTrail 不会记录 AWS 滥用通知。\nAWS 文档明确将 AWS Health + EventBridge + SNS 确定为源自 AWS 的近实时操作和安全警\n报的推荐架构。\nAWS 安全认证 - 专业版官方学习指南 \nAWS Health 用户指南 \n 亚马逊 EventBridge 文档 \nAWS 事件响应最佳实践"}, {"num": 96, "category_en": "Detection", "category_cn": "偵測", "question_en": "A security engineer wants to forward custom application-security logs from an Amazon EC2 instance to\nAmazon CloudWatch. The security engineer installs the CloudWatch agent on the EC2 instance and adds the\npath of the logs to the CloudWatch configuration file.\nHowever, CloudWatch does not receive the logs. The security engineer verifies that the awslogs service\nis running on the EC2 instance.\n\nWhat should the security engineer do next to resolve the issue?", "question_cn": "## 问题编号:96 - [检测]\n 一位安全工程师希望将来自 Amazon EC2 实例的自定义应用程序安全日志转发到 Amazon\nCloudWatch。安全工程师在 EC2 实例上安装了 CloudWatch 代理，并将日志路径添加到 CloudWatch\n配置文件中。\n 但是，CloudWatch 没有收到日志。安全工程师验证了 awslogs 服务在 EC2 实例上正在运行。\n 安全工程师接下来应该做什么来解决这个问题？", "options": [{"letter": "A", "en": "Add AWS CloudTrail to the trust policy of the EC2 instance. Send the custom logs to CloudTrail instead\nof CloudWatch.", "cn": "将 AWS CloudTrail 添加到 EC2 实例的信任策略中。将自定义日志发送到 CloudTrail 而不\n是 CloudWatch。"}, {"letter": "B", "en": "Add Amazon S3 to the trust policy of the EC2 instance. Configure the application to write the custom\nlogs to an S3 bucket that CloudWatch can use to ingest the logs.", "cn": "将 Amazon S3 添加到 EC2 实例的信任策略中。配置应用程序将自定义日志写入 CloudWatch 可以用来摄取日志的 S3 存储桶。"}, {"letter": "C", "en": "Add Amazon Inspector to the trust policy of the EC2 instance. Use Amazon Inspector instead of the\nCloudWatch agent to collect the custom logs.", "cn": "将 Amazon Inspector 添加到 EC2 实例的信任策略中。\n使用 Amazon Inspector 而不是 CloudWatch 代理来收集自定义日志。"}, {"letter": "D", "en": "Attach the CloudWatchAgentServerPolicy AWS managed policy to the EC2 instance role.", "cn": "将 CloudWatchAgentServerPolicy AWS 托管策略附加到 EC2 实例角色。"}], "answer": "D", "explanation_en": "The Amazon CloudWatch agent requires explicit IAM permissions to create log groups, create log streams,\nand put log events into Amazon CloudWatch Logs. According to the AWS Certified Security - Specialty Study\nGuide, the most common cause of CloudWatch agent log delivery failures is missing or insufficient IAM permissions on the EC2 instance role.\nThe CloudWatchAgentServerPolicy AWS managed policy provides the required permissions, including\nlogs: CreateLogGroup, logs:CreateLogStream, and logs:PutLogEvents. Attaching this policy to the EC2 instance role enables the CloudWatch agent to successfully deliver custom application logs without requiring\nchanges to the application or logging configuration.\nOptions A, B, and C are incorrect because CloudTrail, Amazon S3, and Amazon Inspector are not designed to ingest custom application logs from EC2 instances in this manner. AWS documentation clearly\nstates that IAM permissions must be granted to the EC2 role for CloudWatch Logs ingestion.\nThis approach aligns with AWS best practices for least privilege while ensuring reliable detection and\nmonitoring capabilities.", "explanation_cn": "Amazon CloudWatch 代理需要明确的 IAM 权限才能创建日志组、创建日志流以及将日志事件发送\n到 Amazon CloudWatch Logs。根据《AWS 认证安全 - 专业学习指南》，CloudWatch 代理日志传递\n失败的最常见原因是 EC2 实例角色上缺少或权限不足。\nCloudWatchAgentServerPolicy AWS 托 管 策 略 提 供 了 所 需 的 权 限， 包 括 logs:CreateLogGroup、\nlogs:CreateLogStream 和 logs:PutLogEvents。将此策略附加到 EC2 实例角色可使 CloudWatch 代理\n成功传递自定义应用程序日志，而无需更改应用程序或日志配置。\n选项 A、B 和 C 不正确，因为 CloudTrail、Amazon S3 和 Amazon Inspector 并非设计用于以这种方式\n从 EC2 实例摄取自定义应用程序日志。AWS 文档明确指出，必须向 EC2 角色授予用于 CloudWatch\nLogs 摄取的 IAM 权限。\n此方法符合 AWS 最小权限的最佳实践，同时确保可靠的检测和监控能力。"}, {"num": 97, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company must immediately disable compromised IAM users across all AWS accounts and collect all\nactions performed by the user in the last 7 days.\nWhich solution will meet these requirements?", "question_cn": "一家公司必须立即在所有 AWS 账户中禁用受感染的 IAM 用户，并收集该用户在过去 7 天内执行的\n所有操作。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Disable the IAM user and query CloudTrail logs in Amazon S3 using Athena.", "cn": "禁用 IAM 用户并使用 Athena 查询 Amazon S3 中的 CloudTrail 日志。"}, {"letter": "B", "en": "Remove IAM policies and query logs in Security Hub.", "cn": "删除 IAM 策略并在 Security Hub 中查询日志。"}, {"letter": "C", "en": "Remove permission sets and query logs using CloudWatch Logs Insights.", "cn": "删除权限集并使用 CloudWatch Logs Insights 查询日志。"}, {"letter": "D", "en": "Disable the user in IAM Identity Center and query the organizational event data store.", "cn": "在 IAM Identity Center 中禁用用户并查询组织事件数据存储。"}], "answer": "D", "explanation_en": "AWS IAM Identity Center centrally manages user access across an AWS Organization. Disabling the\nuser in Identity Center immediately revokes access to all AWS accounts. According to AWS Certified Security\n- Specialty documentation, organizational CloudTrail event data stores provide centralized, queryable access\nto all events across accounts.\nUsing CloudTrail Lake enables direct querying of activity without exporting logs. Disabling the user at\nthe Identity Center level ensures full containment.", "explanation_cn": "AWS IAM Identity Center 跨 AWS 组织集中管理用户访问权限。在 Identity Center 中禁用用户会立\n即撤销对所有 AWS 账户的访问权限。根据 AWS 认证安全 - 专业文档，组织级 CloudTrail 事件数据\n存储提供对跨账户所有事件的集中式、可查询访问。\n使用 CloudTrail Lake 可直接查询活动而无需导出日志。在 Identity Center 级别禁用用户可确保完\n全控制。"}, {"num": 98, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company that uses AWS Organizations is using AWS IAM Identity Center to administer access to AWS\naccounts. A security engineer is creating a custom permission set in IAM Identity Center. The company will\n\n\nuse the permission set across multiple accounts. An AWS managed policy and a customer managed policy\nare attached to the permission set. The security engineer has full administrative permissions and is operating\nin the management account.\nWhen the security engineer attempts to assign the permission set to an IAM Identity Center user who\nhas access to multiple accounts, the assignment fails.\nWhat should the security engineer do to resolve this failure?", "question_cn": "一家使用 AWS 组织的公司正在使用 AWS IAM Identity Center 来管理对 AWS 账户的访问。一名安\n全工程师正在 IAM Identity Center 中创建一个自定义权限集。该公司将在多个账户中使用此权限\n集。一个 AWS 托管策略和一个客户托管策略被附加到该权限集。该安全工程师拥有完全管理权限\n且在管理账户中操作。\n当安全工程师尝试将该权限集分配给有权访问多个账户的 IAM Identity Center 用户时，分配失败。\n安全工程师应采取什么措施来解决此失败问题？", "options": [{"letter": "A", "en": "Create the customer managed policy in every account where the permission set is assigned. Give the\ncustomer managed policy the same name and same permissions in each account.", "cn": "在分配权限集的每个账户中创建客户托管策略。在每个账户中为客户托管策略赋予相同的名称\n和相同的权限。"}, {"letter": "B", "en": "Remove either the AWS managed policy or the customer managed policy from the permission set.\nCreate a second permission set that includes the removed policy. Apply the permission sets separately to the\nuser.", "cn": "从权限集中移除 AWS 托管策略或客户托管策略。创建一个包含移除策略的第二个权限集。将权\n限集分别应用于用户。"}, {"letter": "C", "en": "Evaluate the logic of the AWS managed policy and the customer managed policy. Resolve any policy\nconflicts in the permission set before deployment.", "cn": "评估 AWS 托管策略和客户托管策略的逻辑。在部署前解决权限集中的任何策略冲突。"}, {"letter": "D", "en": "Do not add the new permission set to the user. Instead, edit the user’s existing permission set to include\nthe AWS managed policy and the customer managed policy.", "cn": "不要将新权限集添加到用户。相反，编辑用户现有的权限集以包含 AWS 托管策略和客户托管策\n略。"}], "answer": "A", "explanation_en": "AWS IAM Identity Center permission sets that include customer managed policies require those policies\nto exist in each target account. According to the AWS Certified Security - Specialty Study Guide, customer\nmanaged policies are account-scoped and are not automatically propagated across accounts by Identity Center.\nWhen assigning a permission set across multiple accounts, Identity Center attempts to attach the referenced customer managed policy in each account. If the policy does not exist, the assignment fails. Creating\nthe same customer managed policy with identical name and permissions in every target account resolves the\nissue.\nOption B increases complexity. Option C does not address the root cause. Option D violates Identity\nCenter management best practices.\nAWS documentation clearly states that customer managed policies must be present in all accounts where\npermission sets are applied.", "explanation_cn": "包含客户管理策略的 AWS IAM Identity Center 权限集要求这些策略存在于每个目标账户中。根据\n《AWS 认证安全 - 专业学习指南》\n，客户管理策略是账户范围的，不会由 Identity Center 自动跨账户\n传播。\n在跨多个账户分配权限集时，Identity Center 会尝试在每个账户中附加引用的客户管理策略。如果\n该策略不存在，则分配失败。在每个目标账户中创建具有相同名称和权限的相同客户管理策略可解\n决此问题。\n选项 B 会增加复杂性。选项 C 没有解决根本原因。选项 D 违反了 Identity Center 管理最佳实践。\nAWS 文档明确指出，客户管理策略必须存在于应用权限集的所有账户中。"}, {"num": 99, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company’s security engineer receives an abuse notification from AWS. The notification indicates that\nsomeone is hosting malware from the company’s AWS account. After investigation, the security engineer\nfinds a new Amazon S3 bucket that an IAM user created without authorization.\nWhich combination of steps should the security engineer take to MINIMIZE the consequences of this\ncompromise? (Select THREE.)", "question_cn": "一家公司的安全工程师收到来自 AWS 的滥用通知。通知表明有人正在从该公司的 AWS 账户托管\n恶意软件。经过调查，安全工程师发现了一个 IAM 用户未经授权创建的新 Amazon S3 存储桶。\n安全工程师应采取以下哪些步骤组合来最小化此妥协的后果？(选择三项。)", "options": [{"letter": "A", "en": "Encrypt all AWS CloudTrail logs.", "cn": "加密所有 AWS CloudTrail 日志。"}, {"letter": "B", "en": "Turn on Amazon GuardDuty.", "cn": "启用 Amazon GuardDuty。"}, {"letter": "C", "en": "Change the password for all IAM users.", "cn": "更改所有 IAM 用户的密码。"}, {"letter": "D", "en": "Rotate or delete all AWS access keys.", "cn": "轮换或删除所有 AWS 访问密钥。"}, {"letter": "E", "en": "Take snapshots of all Amazon Elastic Block Store (Amazon EBS) volumes.", "cn": "对所有亚马逊弹性块存储 (Amazon EBS) 卷进行快照。\nF. Delete any resources that are unrecognized or unauthorized.\nF. 删除任何无法识别或未经授权的资源。"}], "answer": "B", "explanation_en": "AWS incident response best practices emphasize rapid containment, credential revocation, and threat\ndetection to minimize the blast radius of a compromise. According to the AWS Certified Security - Specialty\nOfficial Study Guide, when unauthorized resources such as an Amazon S3 bucket hosting malware are discovered, immediate action must be taken to stop further misuse of the account and to prevent recurrence.\nRotating or deleting all AWS access keys (Option D) is a critical containment step. If an IAM user has been\ncompromised, any long-term credentials associated with that user must be revoked immediately to prevent\ncontinued unauthorized access. AWS guidance explicitly lists access key rotation or deletion as a first-response\naction for suspected credential compromise.\nDeleting unrecognized or unauthorized resources (Option F) directly removes the malicious infrastructure that is being abused. In this case, deleting the unauthorized S3 bucket immediately stops malware distribution and reduces reputational and compliance impact.\nTurning on Amazon GuardDuty (Option B) enables continuous threat detection by analyzing CloudTrail\nevents, VPC Flow Logs, and DNS logs. GuardDuty can identify additional malicious activity, compromised\ncredentials, or persistence mechanisms that the attacker may have established. AWS documentation recommends enabling GuardDuty during or immediately after an incident to detect ongoing or future threats.\nOption A does not reduce the impact of the current compromise. Option C is overly disruptive and not\nrecommended; credential rotation should be targeted. Option E is unnecessary because there is no indication\nthat EBS-backed compute resources are involved.\n\n\nAWS incident response guidance clearly prioritizes credential revocation, malicious resource removal,\nand threat detection to minimize consequences.\nAWS Certified Security - Specialty Official Study Guide\nAWS Incident Response Best Practices\nAmazon GuardDuty User Guide\nAWS IAM Security Best Practices", "explanation_cn": "AWS 事件响应最佳实践强调快速遏制、凭证撤销和威胁检测，以尽量减少安全漏洞的影响范围。根\n据《AWS 认证安全 - 专业官方学习指南》\n，当发现诸如托管恶意软件的亚马逊 S3 存储桶等未经授权\n的资源时，必须立即采取行动，以阻止对账户的进一步滥用并防止再次发生。\n轮换或删除所有 AWS 访问密钥 (选项 D) 是关键的遏制步骤。如果 IAM 用户已被入侵，则必须立即\n撤销与该用户相关的任何长期凭证，以防止持续的未经授权访问。AWS 指南明确将访问密钥轮换\n或删除列为对疑似凭证泄露的第一响应行动。\n删除无法识别或未经授权的资源 (选项 F) 直接移除了被滥用的恶意基础设施。在这种情况下，删除\n未经授权的 S3 存储桶可立即停止恶意软件传播，并减少声誉和合规影响。\n启用亚马逊 GuardDuty(选项 B) 可通过分析 CloudTrail 事件、VPC 流日志和 DNS 日志来实现持续\n威胁检测。GuardDuty 可以识别攻击者可能建立的其他恶意活动、受损凭证或持久化机制。AWS 文\n档建议在事件期间或之后立即启用 GuardDuty，以检测正在进行或未来的威胁。\n选项 A 不会降低当前安全漏洞的影响。选项 C 干扰性过大，不建议采用；凭证轮换应具有针对性。\n选项 E 没有必要，因为没有迹象表明涉及基于 EBS 的计算资源。\nAWS 事件响应指南明确将凭证撤销、恶意资源移除和威胁检测列为优先事项，以尽量减少后果。\n《AWS 认证安全 - 专业官方学习指南》\nAWS 事件响应最佳实践\n亚马逊 GuardDuty 用户指南\nAWS IAM 安全最佳实践"}, {"num": 100, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company’s developers are using AWS Lambda function URLs to invoke functions directly. The company must ensure that developers cannot configure or deploy unauthenticated functions in production accounts. The company wants to meet this requirement by using AWS Organizations. The solution must not\nrequire additional work for the developers.\nWhich solution will meet these requirements?", "question_cn": "一家公司的开发人员正在使用 AWS Lambda 函数 URL 直接调用函数。该公司必须确保开发人员不\n能在生产账户中配置或部署未经身份验证的函数。该公司希望通过使用 AWS Organizations 来满足\n此要求。该解决方案不得要求开发人员进行额外的工作。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Require the developers to configure all function URLs to support cross-origin resource sharing (CORS)\nwhen the functions are called from a different domain.", "cn": "要求开发人员在函数从不同域调用时配置所有函数 URL 以支持跨源资源共享 (CORS)。"}, {"letter": "B", "en": "Use an AWS WAF delegated administrator account to view and block unauthenticated access to function URLs in production accounts, based on the OU of accounts that are using the functions.", "cn": "使用 AWS WAF 委托管理员账户，根据使用函数的账户所在的 OU，查看并阻止对生产账户中函\n数 URL 的未经身份验证的访问。"}, {"letter": "C", "en": "Use SCPs to allow all lambda:CreateFunctionUrlConfig and lambda:UpdateFunctionUrlConfig actions that have a lambda:FunctionUrlAuthType condition key value of AWS_IAM.", "cn": "使 用 SCP 允 许 所 有 具 有 lambda:FunctionUrlAuthType 条 件 键 值 为 AWS_IAM 的\nlambda:CreateFunctionUrlConfig 和 lambda:UpdateFunctionUrlConfig 操作。"}, {"letter": "D", "en": "Use SCPs to deny all lambda:CreateFunctionUrlConfig and lambda:UpdateFunctionUrlConfig actions\nthat have a lambda:FunctionUrlAuthType condition key value of NONE.\nD.\n\n使用\n\nSCP\n\n拒绝所有具有\n\nlambda:FunctionUrlAuthType\n\n条件键值为\n\nNONE\n\n的\n\nlambda:CreateFunctionUrlConfig 和 lambda:UpdateFunctionUrlConfig 操作。\nExams Prep\n考试准备", "cn": "Use SCPs to deny all lambda:CreateFunctionUrlConfig and lambda:UpdateFunctionUrlConfig actions\nthat have a lambda:FunctionUrlAuthType condition key value of NONE.\nD.\n\n使用\n\nSCP\n\n拒绝所有具有\n\nlambda:FunctionUrlAuthType\n\n条件键值为\n\nNONE\n\n的\n\nlambda:CreateFunctionUrlConfig 和 lambda:UpdateFunctionUrlConfig 操作。\nExams Prep\n考试准备"}], "answer": "D", "explanation_en": "AWS Organizations service control policies (SCPs) are designed to enforce preventive guardrails across\naccounts without requiring application-level changes. According to the AWS Certified Security - Specialty\ndocumentation, SCPs can restrict specific API actions or require certain condition keys to enforce security\nstandards centrally. AWS Lambda function URLs support two authentication modes: AWS_IAM and NONE.\nWhen the authentication type is set to NONE, the function URL becomes publicly accessible, which introduces a significant security risk in production environments.\nBy using an SCP that explicitly denies the lambda:CreateFunctionUrlConfig and lambda: UpdateFunctionUrlConfig actions when the lambda:FunctionUrlAuthType condition key equals NONE, the organization\nensures that unauthenticated function URLs cannot be created or modified in production accounts. This enforcement occurs at the AWS Organizations level and applies automatically to all accounts within the specified\n\norganizational units (OUs). Developers are not required to change their workflows or add additional controls,\nsatisfying the requirement of no additional developer effort.\nOption A relates to browser-based access controls and does not provide authentication or authorization\nenforcement. Option B is not valid because AWS WAF cannot be attached directly to AWS Lambda function URLs. Option C is incorrect because SCPs do not grant permissions; they only limit permissions. AWS\ndocumentation clearly states that SCPs define maximum available permissions and are evaluated before IAM\npolicies.\nThis approach aligns with AWS best practices for centralized governance, least privilege, and preventive\nsecurity controls.", "explanation_cn": "AWS Organizations 服务控制策略 (SCP) 旨在跨账户实施预防性防护措施，而无需进行应用程序级\n别的更改。根据 AWS Certified Security - Specialty 文档，SCP 可以限制特定的 API 操作或要求某些\n条件键来集中执行安全标准。AWS Lambda 函数 URL 支持两种身份验证模式:AWS_IAM 和 NONE。\n当身份验证类型设置为 NONE 时，函数 URL 将变为公开可访问，这在生产环境中会带来重大安全\n风险。\n通 过 使 用 一 个 SCP， 当 lambda:FunctionUrlAuthType 条 件 键 等 于 NONE 时， 明 确 拒 绝\nlambda:CreateFunctionUrlConfig 和 lambda:UpdateFunctionUrlConfig 操 作， 组 织 可 以 确 保 在\n生产账户中无法创建或修改未经身份验证的函数 URL。此强制操作在 AWS Organizations 级别进\n行，并自动应用于指定组织单元 (OU) 内的所有账户。开发人员无需更改其工作流程或添加额外的\n控制，满足了不要求开发人员进行额外工作的要求。\n选项 A 涉及基于浏览器的访问控制，不提供身份验证或授权强制。选项 B 无效，因为 AWS WAF 不\n能直接附加到 AWS Lambda 函数 URL。选项 C 不正确，因为 SCP 不授予权限；它们仅限制权限。\nAWS 文档明确指出，SCP 定义最大可用权限，并在 IAM 策略之前进行评估。\n这种方法符合 AWS 关于集中治理、最小权限和预防性安全控制的最佳实践。"}, {"num": 101, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "CloudFormation stack deployments fail for some users due to permission inconsistencies.\n\n\nWhich combination of steps will ensure consistent deployments MOST securely? (Select THREE.)", "question_cn": "由于权限不一致，部分用户的 CloudFormation 堆栈部署失败。\n以下哪些步骤组合能最安全地确保一致的部署？(选择三项。)", "options": [{"letter": "A", "en": "Create a composite principal service role.", "cn": "创建一个复合主体服务角色。"}, {"letter": "B", "en": "Create a service role with cloudformation.amazonaws.com as the principal.", "cn": "创建一个以 cloudformation.amazonaws.com 为主体的服务角色。"}, {"letter": "C", "en": "Attach scoped policies to the service role.", "cn": "将范围限定的策略附加到服务角色。"}, {"letter": "D", "en": "Attach service ARNs in policy resources.", "cn": "在策略资源中附加服务 ARN。\nExams Prep\n考试准备"}, {"letter": "E", "en": "Update each stack to use the service role.", "cn": "更新每个堆栈以使用该服务角色。\nF. Allow iam:PassRole to the service role.\nF. 允许对服务角色使用 iam:PassRole。"}], "answer": "B", "explanation_en": "AWS best practices require CloudFormation to assume a dedicated service role. This ensures consistent\npermissions regardless of the user. Users must have iam:PassRole permission to pass the role. Updating stacks\nto use the service role enforces uniform deployment behavior.", "explanation_cn": "AWS 最佳实践要求 CloudFormation 使用专用服务角色。这可确保无论用户如何，权限都保持一致。\n用户必须具有 iam:PassRole 权限才能传递该角色。更新堆栈以使用服务角色可强制实施统一的部\n署行为。"}, {"num": 102, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company must inventory sensitive data across all Amazon S3 buckets in all accounts from a single\nsecurity account.", "question_cn": "一家公司必须从单个安全账户盘点所有账户中所有亚马逊 S3 存储桶中的敏感数据。", "options": [{"letter": "A", "en": "Delegate Amazon Macie and Security Hub administration.", "cn": "委托亚马逊 Macie 和安全中心管理。"}, {"letter": "B", "en": "Use Amazon Inspector with Security Hub.", "cn": "将亚马逊 Inspector 与安全中心一起使用。"}, {"letter": "C", "en": "Use Inspector with Trusted Advisor.", "cn": "将 Inspector 与可信顾问一起使用。"}, {"letter": "D", "en": "Use Macie with Trusted Advisor.", "cn": "将 Macie 与可信顾问一起使用。"}], "answer": "A", "explanation_en": "Amazon Macie is the AWS service designed to discover and classify sensitive data in S3. Delegated administration enables centralized visibility across an organization. Security Hub aggregates Macie findings for\na single-pane-of-glass view.\nInspector does not scan S3 data. Trusted Advisor is not a sensitive data discovery tool.", "explanation_cn": "亚马逊 Macie 是用于在 S3 中发现和分类敏感数据的 AWS 服务。委托管理可实现整个组织的集中可\n见性。安全中心聚合 Macie 的发现结果以提供单窗格视图。\nInspector 不扫描 S3 数据。可信顾问不是敏感数据发现工具。"}, {"num": 103, "category_en": "Detection", "category_cn": "检测", "question_en": "A company experienced a security incident caused by a vulnerable container image that was pushed from\nan external CI/CD pipeline into Amazon ECR.\nWhich solution will prevent vulnerable images from being pushed?", "question_cn": "一家公司经历了一次安全事件，该事件由一个易受攻击的容器镜像引起，该镜像从外部\nCI/CD 管道推送到亚马逊弹性容器镜像库 (Amazon ECR) 中。\n 哪种解决方案可以防止推送易受攻击的镜像？", "options": [{"letter": "A", "en": "Enable ECR enhanced scanning with Lambda blocking.", "cn": "使用 Lambda 阻止功能启用 ECR 增强扫描。"}, {"letter": "B", "en": "Use Amazon Inspector with EventBridge and Lambda.", "cn": "将亚马逊 Inspector 与 EventBridge 和 Lambda 结合使用。"}, {"letter": "C", "en": "Integrate Amazon Inspector into the CI/CD pipeline using SBOM generation and fail the pipeline on\ncritical findings.", "cn": "使用软件物料清单 (SBOM) 生成功能将亚马逊 Inspector 集成到 CI/CD 管道中，并在关键\n发现时使管道失败。"}, {"letter": "D", "en": "Enable basic continuous ECR scanning.", "cn": "启用基本的持续 ECR 扫描。"}], "answer": "C", "explanation_en": "Explanation\nAmazon Inspector provides native CI/CD integration capabilities that allow security checks to occur\nbefore container images are pushed to Amazon ECR. According to AWS Certified Security - Specialty documentation, Inspector does not block image pushes automatically. Instead, prevention must occur inside the\nCI/CD pipeline itself.\nBy generating a Software Bill of Materials (SBOM) using the Amazon Inspector SBOM generator and\nsubmitting it to Inspector for scanning, the pipeline can detect critical vulnerabilities before the image is\nuploaded. If vulnerabilities exceed policy thresholds, the pipeline fails, preventing deployment.", "explanation_cn": "## 解释 \n 亚马逊 Inspector 提供原生的 CI/CD 集成功能，允许在容器镜像推送到亚马逊 ECR 之前进\n行安全检查。根据 AWS 安全认证 - 专业版文档，Inspector 不会自动阻止镜像推送。相反，预防措\n施必须在 CI/CD 管道本身内部进行。\n 通过使用亚马逊 Inspec"}, {"num": 104, "category_en": "Data Protection", "category_cn": "數據保護", "question_en": "A company needs to follow security best practices to deploy resources from an AWS CloudFormation template. The CloudFormation template must be able to configure sensitive database credentials. The company\nalready uses AWS Key Management Service (AWS KMS) and AWS Secrets Manager.\nManager。\nWhich solution will meet the requirements?", "question_cn": "## 问题编号:104 - [数据保护]\n公司需要遵循安全最佳实践，以便从 AWS CloudFormation 模板部署资源。CloudFormation 模板必\n须能够配置敏感的数据库凭证。该公司已经在使用 AWS 密钥管理服务 (AWS KMS) 和 AWS Secrets\n哪种解决方案能满足要求？", "options": [{"letter": "A", "en": "Use a dynamic reference in the CloudFormation template to reference the database credentials in\nSecrets Manager.", "cn": "在 CloudFormation 模板中使用动态引用，以引用 Secrets Manager 中的数据库凭证。"}, {"letter": "B", "en": "Use a parameter in the CloudFormation template to reference the database credentials. Encrypt the\nCloudFormation template by using AWS KMS.", "cn": "在 CloudFormation 模板中使用参数来引用数据库凭证。使用 AWS KMS 对 CloudFormation 模板\n进行加密。"}, {"letter": "C", "en": "Use a SecureString parameter in the CloudFormation template to reference the database credentials\nin Secrets Manager.", "cn": "在 CloudFormation 模板中使用 SecureString 参数来引用 Secrets Manager 中的数据库凭证。"}, {"letter": "D", "en": "Use a SecureString parameter in the CloudFormation template to reference an encrypted value in AWS\nKMS.", "cn": "在 CloudFormation 模板中使用 SecureString 参数来引用 AWS KMS 中的加密值。"}], "answer": "A", "explanation_en": "AWS CloudFormation dynamic references provide a secure mechanism for retrieving sensitive values\nfrom AWS Secrets Manager at stack creation or update time. According to the AWS Certified Security - Specialty documentation, dynamic references ensure that sensitive data such as database credentials are never\nstored in plaintext in CloudFormation templates, parameters, stack metadata, or logs.\nWhen a dynamic reference to Secrets Manager is used, CloudFormation retrieves the secret value at\nruntime and passes it securely to the resource that requires it. The secret value is not exposed to users who\nview the template, stack, or change sets.\nOption B is insecure because parameters can be exposed through the CloudFormation console and APIs.\nOption C is incorrect because SecureString parameters are a feature of AWS Systems Manager Parameter\nStore, not Secrets Manager. Option D is invalid because KMS encrypts data but does not store secrets or\nmanage secret rotation.\n\n\nAWS best practices clearly state that CloudFormation dynamic references to Secrets Manager are the\nrecommended solution for securely handling sensitive configuration values.\n• AWS Certified Security - Specialty Official Study Guide\nAWS CloudFormation Security Best Practices\nAWS Secrets Manager Documentation", "explanation_cn": "AWS CloudFormation 动态引用提供了一种安全机制，\n用于在堆栈创建或更新时从 AWS Secrets Manager 检索敏感值。根据 AWS 认证安全 - 专业文档，动态引用可确保敏感数据 (如数据库凭证) 永远\n不会以明文形式存储在 CloudFormation 模板、参数、堆栈元数据或日志中。\n当使用对 Secrets Manager 的动态引用时，CloudFormation 在运行时检索机密值，并将其安全地传\n递给需要它的资源。机密值不会暴露给查看模板、堆栈或变更集的用户。\n选项 B 不安全，因为参数可以通过 CloudFormation 控制台和 API 暴露。选项 C 不正确，因为 SecureString 参数是 AWS 系统管理器参数存储的功能，而不是 Secrets Manager 的功能。选项 D 无效，\n因为 KMS 加密数据，但不存储机密或管理机密轮换。\nAWS 最佳实践明确指出，对 Secrets Manager 的 CloudFormation 动态引用是安全处理敏感配置值\n的推荐解决方案。\n• AWS 认证安全 - 专业官方学习指南\nAWS CloudFormation 安全最佳实践\nAWS Secrets Manager 文档"}, {"num": 105, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company has configured an organization in AWS Organizations for its AWS accounts. AWS CloudTrail\nis enabled in all AWS Regions.\nA security engineer must implement a solution to prevent CloudTrail from being disabled.\nWhich solution will meet this requirement?", "question_cn": "一家公司已在 AWS Organizations 中为其 AWS 账户配置了一个组织。所有 AWS 区域均启用\n了 AWS CloudTrail。\n 一名安全工程师必须实施一种解决方案，以防止 CloudTrail 被禁用。\n 哪种解决方案将满足此要求？", "options": [{"letter": "A", "en": "Enable CloudTrail log file integrity validation from the organization’s management account.", "cn": "从组织的管理账户启用 CloudTrail 日志文件完整性验证。"}, {"letter": "B", "en": "Enable server-side encryption with AWS KMS keys (SSE-KMS) for CloudTrail logs. Create a KMS key.\nAttach a policy to the key to prevent decryption of the logs.", "cn": "为 CloudTrail 日志启用使用 AWS KMS 密钥的服务器端加密 (SSE-KMS)。创建一个 KMS\n密钥。为该密钥附加一个策略以防止日志被解密。"}, {"letter": "C", "en": "Create a service control policy (SCP) that includes an explicit Deny rule for the cloudtrail:StopLogging\naction and the cloudtrail:DeleteTrail action. Attach the SCP to the root OU.", "cn": "创 建 一 个 服 务 控 制 策 略 (SCP)， 其 中 包 括 对 cloudtrail:StopLogging 操 作 和 cloudtrail:DeleteTrail 操作的显式拒绝规则。将 SCP 附加到根 OU。"}, {"letter": "D", "en": "Create IAM policies for all the company’s users to prevent the users from performing the DescribeTrails\naction and the GetTrailStatus action.", "cn": "为公司的所有用户创建 IAM 策略，以防止用户执行 DescribeTrails 操作和 GetTrailStatus\n操作。"}], "answer": "C", "explanation_en": "Explanation\nAWS CloudTrail is a foundational security service that records API activity and account events. According to the AWS Certified Security - Specialty Official Study Guide, the only way to centrally and reliably prevent\nCloudTrail from being disabled across multiple AWS accounts is by using AWS Organizations service control\npolicies (SCPs).\nSCPs define the maximum available permissions for all accounts in an organization or organizational\nunit. By creating an SCP with an explicit Deny for the cloudtrail:StopLogging and cloudtrail:DeleteTrail actions and attaching it to the root OU, the security engineer ensures that no principal in an", "explanation_cn": "## 解释 \nAWS CloudTrail 是一项基础安全服务，可记录 API 活动和账户事件。根据《AWS 认证安全\n- 专业官方学习指南》，在多个 AWS 账户中集中且可靠地防止 CloudTrail 被禁用的唯一方法是使用\nAWS Organizations 服务控制策略 (SCP)。"}, {"num": 106, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company runs an application on an Amazon EC2 instance. The application generates invoices and\nstores them in an Amazon S3 bucket. The instance profile that is attached to the instance has appropriate\naccess to the S3 bucket. The company needs to share each invoice with multiple clients that do not have AWS\ncredentials. Each client must be able to download only the client’s own invoices. Clients must download\ntheir invoices within 1 hour of invoice creation. Clients must use only temporary credentials to access the\ncompany’s AWS resources.\nWhich additional step will meet these requirements?", "question_cn": "一家公司在 Amazon EC2 实例上运行一个应用程序。该应用程序生成发票并将其存储在 Amazon\nS3 存储桶中。附加到实例的实例配置文件对 S3 存储桶具有适当的访问权限。公司需要与多个没有\nAWS 凭证的客户共享每张发票。每个客户必须只能下载该客户自己的发票。客户必须在发票创建\n后 1 小时内下载他们的发票。客户必须仅使用临时凭证来访问公司的 AWS 资源。\n哪一个额外步骤将满足这些要求？", "options": [{"letter": "A", "en": "Update the S3 bucket policy to ensure that clients that use pre-signed URLs have the S3:Get* permission and the S3:List* permission to access S3 objects in the bucket.", "cn": "更新 S3 存储桶策略，以确保使用预签名 URL 的客户具有访问存储桶中 S3 对象的 S3:Get* 权限\n和 S3:List* 权限。"}, {"letter": "B", "en": "Add a StringEquals condition to the IAM role policy for the EC2 instance profile. Configure the policy\ncondition to restrict access based on the s3:ResourceTag/ClientId tag of each invoice. Tag each generated\ninvoice with the ID of its corresponding client.", "cn": "为 EC2 实例配置文件的 IAM 角色策略添加一个 StringEquals 条件。配置策略条件以根据每张发\n票的 s3:ResourceTag/ClientId 标签限制访问。用其相应客户的 ID 标记每个生成的发票。"}, {"letter": "C", "en": "Update the script to use AWS Security Token Service (AWS STS) to obtain new credentials each time\nthe script runs by assuming a new role that has S3:GetObject permissions. Use the credentials to generate the\npre-signed URLs.", "cn": "更新脚本，以便每次脚本运行时使用 AWS 安全令牌服务 (AWS STS) 通过假定具有 S3:GetObject\n权限的新角色来获取新凭证。使用这些凭证生成预签名 URL。"}, {"letter": "D", "en": "Generate an access key and a secret key for an IAM user that has S3:GetObject permissions on the S3\nbucket. Embed the keys into the script. Use the keys to generate the pre-signed URLs.", "cn": "为在 S3 存储桶上具有 S3:GetObject 权限的 IAM 用户生成访问密钥和秘密密钥。将密钥嵌入脚本\n中。使用密钥生成预签名 URL。"}], "answer": "B", "explanation_en": "Amazon S3 pre-signed URLs grant temporary access based on the permissions of the principal that generates them. AWS Certified Security - Specialty documentation explains that fine-grained authorization can\nbe enforced by combining pre-signed URLs with IAM policy conditions.\n\n\nBy tagging each invoice object with a client identifier and adding a condition to the EC2 instance role\npolicy using s3:ResourceTag/ClientId, the role can generate pre-signed URLs only for objects associated with\na specific client. This ensures that each client can access only their own invoices, even though the URLs are\ntemporary and unauthenticated.\nOption A over-permissions clients. Option C is unnecessary because instance profiles already use temporary credentials. Option D violates AWS best practices by using long-term credentials.\nAWS recommends resource tagging with IAM policy conditions for scalable, secure access control.", "explanation_cn": "Amazon S3 预签名 URL 根据生成它们的主体的权限授予临时访问权限。AWS 认证安全 - 专业文档\n解释说，可以通过将预签名 URL 与 IAM 策略条件相结合来实施细粒度授权。\n通过用客户标识符标记每个发票对象，并使用 s3:ResourceTag/ClientId 向 EC2 实例角色策略添加一\n个条件，该角色只能为与特定客户相关联的对象生成预签名 URL。这确保了每个客户只能访问他\n们自己的发票，即使 URL 是临时的且未经身份验证。\n选项 A 给予客户过多权限。选项 C 是不必要的，因为实例配置文件已经使用临时凭证。选项 D 通\n过使用长期凭证违反了 AWS 最佳实践。\nAWS 建议使用带有 IAM 策略条件的资源标记来实现可扩展、安全的访问控制。"}, {"num": 107, "category_en": "Security Foundations and Governance", "category_cn": "安全基礎與治理", "question_en": "A company is implementing new compliance requirements to meet customer needs. According to the new requirements, the company must not use any Amazon RDS DB instances or DB clusters that lack encryption of the underlying storage. The company needs a solution that will generate an email alert when an unencrypted DB instance or DB cluster is created. The solution also must terminate the unencrypted DB instance or DB cluster.\nWhich solution will meet these requirements in the MOST operationally efficient manner?", "question_cn": "一家公司正在實施新的合規要求以滿足客戶需求。根據新要求，公司不得使用任何未對底層存儲進行加密的 Amazon RDS DB 實例或 DB 叢集。公司需要一個解決方案，能在未加密的 DB 實例或 DB 叢集被建立時發送電子郵件警報，同時也必須終止該未加密的 DB 實例或 DB 叢集。\n哪種解決方案能以最高的操作效率滿足這些要求？", "options": [{"letter": "A", "en": "Create an AWS Config managed rule to detect unencrypted RDS storage. Configure an automatic remediation action to publish messages to an Amazon Simple Notification Service (Amazon SNS) topic that includes an AWS Lambda function and an email delivery target as subscribers. Configure the Lambda function to delete the unencrypted resource.", "cn": "建立 AWS Config 受管規則以偵測未加密的 RDS 存儲。配置自動修復動作，向包含 AWS Lambda 函數和電子郵件傳遞目標作為訂閱者的 Amazon SNS 主題發布消息。配置 Lambda 函數刪除未加密的資源。"}, {"letter": "B", "en": "Create an AWS Config managed rule to detect unencrypted RDS storage. Configure a manual remediation action to invoke an AWS Lambda function. Configure the Lambda function to publish messages to an Amazon Simple Notification Service (Amazon SNS) topic and to delete the unencrypted resource.", "cn": "建立 AWS Config 受管規則以偵測未加密的 RDS 存儲。配置手動修復動作以調用 AWS Lambda 函數。配置 Lambda 函數向 Amazon SNS 主題發布消息，並刪除未加密的資源。"}, {"letter": "C", "en": "Create an Amazon EventBridge rule that evaluates RDS event patterns and is initiated by the creation of DB instances or DB clusters. Configure the rule to publish messages to an Amazon Simple Notification Service (Amazon SNS) topic that includes an AWS Lambda function and an email delivery target as subscribers. Configure the Lambda function to delete the unencrypted resource.", "cn": "建立 Amazon EventBridge 規則以評估 RDS 事件模式，並在 DB 實例或 DB 叢集建立時觸發。配置規則向包含 AWS Lambda 函數和電子郵件傳遞目標作為訂閱者的 Amazon SNS 主題發布消息。配置 Lambda 函數刪除未加密的資源。"}, {"letter": "D", "en": "Create an Amazon EventBridge rule that evaluates RDS event patterns and is initiated by the creation of DB instances or DB clusters. Configure the rule to invoke an AWS Lambda function. Configure the Lambda function to publish messages to an Amazon Simple Notification Service (Amazon SNS) topic and to delete the unencrypted resource.", "cn": "建立 Amazon EventBridge 規則以評估 RDS 事件模式，並在 DB 實例或 DB 叢集建立時觸發。配置規則調用 AWS Lambda 函數。配置 Lambda 函數向 Amazon SNS 主題發布消息，並刪除未加密的資源。"}], "answer": "A", "explanation_en": "AWS Config provides managed rules that continuously evaluate resource configurations against compliance requirements. The managed rule for encrypted RDS storage automatically detects DB instances and clusters that are created without encryption enabled.\nBy configuring automatic remediation, AWS Config can immediately invoke corrective actions without manual intervention. Integrating remediation with an Amazon SNS topic enables automated email notifications, while an AWS Lambda function can terminate the noncompliant resource. This creates a fully automated detect-alert-remediate workflow.\nOption B requires manual remediation, which increases operational effort and delays enforcement. Options C and D rely on Amazon EventBridge, which evaluates events rather than configuration state and does not provide continuous compliance monitoring.", "explanation_cn": "AWS Config 提供受管規則，可持續評估資源配置是否符合合規要求。針對 RDS 存儲加密的受管規則會自動偵測建立時未啟用加密的 DB 實例和叢集。\n透過配置自動修復動作，AWS Config 可以立即執行修正動作而無需人工介入。將修復動作與 Amazon SNS 主題整合，可實現自動電子郵件通知；同時 AWS Lambda 函數可以終止不合規的資源。這樣便建立了一個完全自動化的「偵測—警報—修復」工作流程。\n選項 B 需要手動修復，增加了操作負擔並延遲了執行。選項 C 和 D 依賴 Amazon EventBridge，它評估的是事件而非配置狀態，無法提供持續的合規性監控。"}, {"num": 108, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A security engineer needs to prepare Amazon EC2 instances for quarantine during a security incident.\nAWS Systems Manager Agent (SSM Agent) is installed, and a script exists to install and update forensic tools.\nWhich solution will quarantine EC2 instances during a security incident?", "question_cn": "安全事件发生期间，安全工程师需要准备将 Amazon EC2 实例进行隔离。已安装 AWS 系统管理器\n代理 (SSM 代理)，并且存在一个用于安装和更新取证工具的脚本。\n在安全事件期间，哪种解决方案会隔离 EC2 实例？", "options": [{"letter": "A", "en": "Track SSM Agent versions with AWS Config.", "cn": "使用 AWS 配置跟踪 SSM 代理版本。"}, {"letter": "B", "en": "Configure Session Manager to deny external connections.", "cn": "配置会话管理器以拒绝外部连接。"}, {"letter": "C", "en": "Store the script in Amazon S3 and grant read access.", "cn": "将脚本存储在亚马逊 S3 中并授予读取权限。"}, {"letter": "D", "en": "Configure IAM permissions for the SSM Agent to run the script as a Systems Manager Run Command\ndocument.", "cn": "为 SSM 代理配置 IAM 权限，以便将该脚本作为系统管理器运行命令文档来运行。"}], "answer": "D", "explanation_en": "AWS Systems Manager Run Command enables secure, remote execution of commands on EC2 instances\nwithout requiring network access or inbound ports. According to the AWS Certified Security - Specialty Study\nGuide, Run Command is a recommended mechanism for incident response actions such as installing forensic\ntools, collecting evidence, or applying quarantine controls.\nBy granting the SSM Agent permission to execute a predefined Run Command document, the security\nengineer can immediately run the quarantine script across affected instances. This approach supports automation, scalability, and auditability, all of which are critical during security incidents.\nOptions A, B, and C do not directly enforce quarantine or execute response actions. Tracking versions\nand storing scripts alone do not trigger incident response.\nAWS documentation highlights Systems Manager Run Command as a core capability for automated containment and investigation.", "explanation_cn": "AWS Systems Manager Run Command 可在无需网络访问或入站端口的情况下，在 EC2 实例上实现\n安全的远程命令执行。根据《AWS Certified Security - Specialty Study Guide》\n，Run Command 是事\n件响应操作 (如安装取证工具、收集证据或应用隔离控制) 的推荐机制。\n通过授予 SSM 代理执行预定义的运行命令文档的权限，安全工程师可以立即在受影响的实例上运\n行隔离脚本。这种方法支持自动化、可扩展性和可审计性，所有这些在安全事件期间都是至关重要\n的。\n选项 A、B 和 C 不会直接实施隔离或执行响应行动。仅跟踪版本和存储脚本不会触发事件响应。\nAWS 文档强调系统管理器运行命令是自动遏制和调查的核心功能。"}, {"num": 109, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company has a PHP-based web application that uses Amazon S3 as an object store for user files. The S3\nbucket is configured for server-side encryption with Amazon S3 managed keys (SSE-S3). New requirements\nmandate full control of encryption keys.\nWhich combination of steps must a security engineer take to meet these requirements? (Select THREE.)", "question_cn": "一家公司有一个基于 PHP 的 Web 应用程序，该应用程序使用 Amazon S3 作为用户文件的对象存\n储。S3 存储桶配置为使用 Amazon S3 托管密钥 (SSE-S3) 进行服务器端加密。新要求规定对加密密\n钥进行完全控制。\n安全工程师必须采取哪些步骤组合来满足这些要求？(选择三项。)", "options": [{"letter": "A", "en": "Create a new customer managed key in AWS Key Management Service (AWS KMS).", "cn": "在 AWS 密钥管理服务 (AWS KMS) 中创建一个新的客户管理密钥。"}, {"letter": "B", "en": "Change the SSE-S3 configuration on the S3 bucket to server-side encryption with customer-provided\nkeys (SSE-C).", "cn": "将 S3 存储桶上的 SSE-S3 配置更改为使用客户提供的密钥 (SSE-C) 进行服务器端加密。"}, {"letter": "C", "en": "Configure the PHP SDK to use the SSE-S3 key before upload.", "cn": "在上传之前配置 PHP SDK 使用 SSE-S3 密钥。"}, {"letter": "D", "en": "Create an AWS managed key for Amazon S3 in AWS KMS.", "cn": "在 AWS KMS 中为 Amazon S3 创建一个 AWS 托管密钥。"}, {"letter": "E", "en": "Change the SSE-S3 configuration on the S3 bucket to server-side encryption with AWS KMS managed\nkeys (SSE-KMS).", "cn": "将 S3 存储桶上的 SSE-S3 配置更改为使用 AWS KMS 托管密钥 (SSE-KMS) 进行服务器端加密。\nF. Change all the S3 objects in the bucket to use the new encryption key.\nF. 将存储桶中的所有 S3 对象更改为使用新的加密密钥。"}], "answer": "A", "explanation_en": "SSE-S3 uses AWS-managed keys and does not provide customer control. AWS Certified Security - Specialty documentation states that SSE-KMS with customer managed keys allows full control, auditing, and key\nrotation. The security engineer must first create a customer managed KMS key, then update the bucket to use\nSSE-KMS. Existing objects must be re-encrypted to ensure compliance.\nSSE-C requires the application to manage keys, increasing complexity and risk. AWS managed keys do\nnot meet the requirement for customer-controlled encryption.", "explanation_cn": "SSE-S3 使用 AWS 托管密钥，不提供客户控制。AWS 认证安全 - 专业版文档指出，使用客户管理密\n钥的 SSE-KMS 允许完全控制、审计和密钥轮换。安全工程师必须首先创建一个客户管理的 KMS 密\n钥，然后更新存储桶以使用 SSE-KMS。必须对现有对象重新加密以确保合规性。\nSSE-C 要求应用程序管理密钥，增加了复杂性和风险。AWS 托管密钥不符合客户控制加密的要求。"}, {"num": 110, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company runs a web application on a fleet of Amazon EC2 instances in an Auto Scaling group. Amazon GuardDuty and AWS Security Hub are enabled. The security engineer needs an automated response to\nanomalous traffic that follows AWS best practices and minimizes application disruption.\n\n\nWhich solution will meet these requirements?", "question_cn": "一家公司在自动缩放组中的一组亚马逊 EC2 实例上运行一个 Web 应用程序。启用了亚马逊 GuardDuty 和 AWS Security Hub。安全工程师需要对异常流量进行自动化响应，该响应要遵循 AWS 最佳\n实践并尽量减少应用程序中断。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Use EventBridge to disable the instance profile access keys.", "cn": "使用 EventBridge 禁用实例配置文件访问密钥。"}, {"letter": "B", "en": "Use EventBridge to invoke a Lambda function that removes the affected instance from the Auto Scaling\ngroup and isolates it with a restricted security group.", "cn": "使用 EventBridge 调用一个 Lambda 函数，该函数从自动缩放组中移除受影响的实例，并使用受\n限安全组将其隔离。\nExams Prep\n考试准备"}, {"letter": "C", "en": "Use Security Hub to update the subnet network ACL to block traffic.", "cn": "使用 Security Hub 更新子网网络 ACL 以阻止流量。"}, {"letter": "D", "en": "Send GuardDuty findings to Amazon SNS for email notification.", "cn": "将 GuardDuty 调查结果发送到亚马逊 SNS 进行电子邮件通知。"}], "answer": "B", "explanation_en": "AWS incident response best practices emphasize isolating compromised resources rather than immediately terminating them. According to AWS Certified Security - Specialty documentation, removing an instance\nfrom an Auto Scaling group prevents replacement loops, while applying a restrictive security group isolates\nthe instance for forensic analysis.\n\n\nUsing Amazon EventBridge to trigger an AWS Lambda function enables automated, consistent responses\nto GuardDuty findings. This approach minimizes disruption to the application because healthy instances\ncontinue serving traffic while the affected instance is isolated.\nDisabling credentials or modifying network ACLs can have broader impact on unrelated workloads. SNS\nnotifications alone do not provide response automation.\nAWS recommends isolate-and-investigate patterns for EC2 incident response.", "explanation_cn": "AWS 事件响应最佳实践强调隔离受感染的资源，而不是立即终止它们。根据 AWS 安全认证 - 专业\n版文档，从自动缩放组中移除实例可防止替换循环，同时应用限制性安全组可隔离实例以进行取证\n分析。\n使用亚马逊 EventBridge 触发 AWS Lambda 函数可对 GuardDuty 调查结果进行自动化、一致的响\n应。这种方法可将对应用程序的干扰降至最低，因为在隔离受影响的实例时，健康的实例会继续处\n理流量。\n禁用凭证或修改网络访问控制列表可能会对不相关的工作负载产生更广泛的影响。仅 SNS 通知不\n提供响应自动化。\nAWS 建议采用隔离和调查模式进行 EC2 事件响应。"}, {"num": 111, "category_en": "Detection", "category_cn": "检测", "question_en": "A company runs workloads in an AWS account. A security engineer observes some unusual findings in\nAmazon GuardDuty. The security engineer wants to investigate a specific IAM role and generate an investigation report. The report must contain details about anomalous behavior and any indicators of compromise.\n\n\nWhich solution will meet these requirements?", "question_cn": "一家公司在一个 AWS 账户中运行工作负载。一名安全工程师在亚马逊 GuardDuty 中观察到一些异\n常发现。该安全工程师想要调查一个特定的 IAM 角色并生成一份调查报告。该报告必须包含有关\n异常行为的详细信息以及任何妥协指标。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Use Amazon Detective to perform an investigation on the IAM role.", "cn": "使用亚马逊 Detective 对 IAM 角色进行调查。"}, {"letter": "B", "en": "Use AWS Audit Manager to create an assessment. Specify the IAM role. Run an assessment report.", "cn": "使用 AWS 审计管理器创建一个评估。指定 IAM 角色。运行评估报告。"}, {"letter": "C", "en": "Use Amazon Inspector to create an assessment. Specify the IAM role. Run an assessment report.", "cn": "使用亚马逊 Inspector 创建一个评估。指定 IAM 角色。运行评估报告。"}, {"letter": "D", "en": "Use Amazon Inspector to run an on-demand scan of the IAM role.", "cn": "使用亚马逊 Inspector 对 IAM 角色运行按需扫描。"}], "answer": "A", "explanation_en": "Amazon Detective is a purpose-built AWS service designed to analyze, investigate, and visualize security\ndata to help identify the root cause of suspicious or malicious activity. According to the AWS Certified Security\n- Specialty Official Study Guide, Amazon Detective directly integrates with Amazon GuardDuty findings, AWS\nCloudTrail logs, Amazon VPC Flow Logs, and Amazon EKS audit logs to automatically create behavior graphs\nand timelines.\nWhen GuardDuty generates findings related to anomalous activity, Amazon Detective enables security\nengineers to pivot directly to an investigation focused on a specific IAM role, user, or resource. Detective automatically correlates historical activity, identifies deviations from baseline behavior, and highlights indicators\nof compromise, such as unusual API calls, credential misuse, or suspicious network activity.\n\n\nAWS Audit Manager (Option B) is designed for compliance and audit evidence collection, not threat\ninvestigation. Amazon Inspector (Options C and D) is focused on vulnerability scanning of compute resources\nand does not analyze IAM behavior or GuardDuty findings.\nAWS documentation explicitly states that Amazon Detective is the recommended service for deep-dive\ninvestigations following GuardDuty alerts, providing enriched context and investigation reports for security\nincidents.\nAWS Certified Security - Specialty Official Study Guide\nAmazon Detective User Guide\nAmazon GuardDuty Integration Documentation", "explanation_cn": "亚马逊 Detective 是一项专门构建的 AWS 服务，旨在分析、调查和可视化安全数据，以帮助确定可\n疑或恶意活动的根本原因。根据 AWS 安全认证 - 《专业版官方学习指南》，亚马逊 Detective 直接\n与亚马逊 GuardDuty 的发现、AWS CloudTrail 日志、亚马逊 VPC 流日志和亚马逊 EKS 审计日志集\n成，以自动创建行为图和时间线。\n 当 GuardDuty 生成与异常活动相关的调查结果时，Amazon Detective 使安全工程师能够直\n接转向针对特定 IAM 角色、用户或资源的调查。Detective 会自动关联历史活动，识别与基线行为\n的偏差，并突出显示受攻击的指标，如异常的 API 调用、凭证滥用或可疑的网络活动。\nAWS Audit Manager(选项 B) 专为合规性和审计证据收集而设计，而非威胁调查。Amazon Inspector(选项 C 和 D) 专注于计算资源的漏洞扫描，\n不分析 IAM 行为或 GuardDuty 调查结果。\nAWS 文档明确指出，Amazon Detective 是在收到 GuardDuty 警报后进行深入调查的推荐服\n务，可为安全事件提供丰富的上下文和调查报告。\nAWS 安全认证 - 专业版官方学习指南 \nAmazon Detective 用户指南 \nAmazon GuardDuty 集成文档"}, {"num": 112, "category_en": "Incident Response", "category_cn": "事件響應", "question_en": "A security engineer for a company needs to design an incident response plan that addresses compromised\nIAM user account credentials. The company uses an organization in AWS Organizations and AWS IAM Identity Center to manage user access. The company uses a delegated administrator account to implement AWS\nSecurity Hub. The delegated administrator account contains an organizational trail in AWS CloudTrail that\nlogs all events to an Amazon S3 bucket. The company has also configured an organizational event data store\nthat captures all events from the trail.\nThe incident response plan must provide steps that the security engineer can take to immediately disable\nany compromised IAM user when the security engineer receives a notification of a security incident. The plan\n\n\nmust prevent the IAM user from being used in any AWS account. The plan must also collect all AWS actions\nthat the compromised IAM user performed across all accounts in the previous 7 days.\nWhich solution will meet these requirements?", "question_cn": "## 问题编号:112 - [事件响应]\n 一家公司的安全工程师需要设计一个事件响应计划，以应对 IAM 用户账户凭证被泄露的情\n况。该公司在 AWS Organizations 和 AWS IAM Identity Center 中使用一个组织来管理用户访问。该\n公司使用一个委托管理员账户来实施 AWS Security Hub。委托管理员账户在 AWS CloudTrail 中包\n含一个组织跟踪，将所有事件记录到一个 Amazon S3 存储桶中。该公司还配置了一个组织事件数\n据存储，用于捕获跟踪中的所有事件。\n 事件响应计划必须提供安全工程师在收到安全事件通知时可以立即采取的步骤，以禁用任\n何被泄露的 IAM 用户。该计划必须防止 IAM 用户在任何 AWS 账户中被使用。该计划还必须收集\n被泄露的 IAM 用户在过去 7 天内在所有账户中执行的所有 AWS 操作。\n 哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Disable the compromised IAM user in the organization management account. Use Amazon Athena\nto query the organizational CloudTrail logs in the S3 bucket for actions that the IAM user performed in the\nprevious 7 days.", "cn": "在组织管理账户中禁用被泄露的 IAM 用户。使用 Amazon Athena 查询 S3 存储桶中的组\n织 CloudTrail 日志，以获取 IAM 用户在过去 7 天内执行的操作。"}, {"letter": "B", "en": "Remove all IAM policies that are attached to the IAM user in the organization management account.\nUse AWS Security Hub to query the CloudTrail logs for actions that the IAM user performed in the previous\n7 days.", "cn": "在组织管理账户中删除附加到 IAM 用户的所有 IAM 策略。使用 AWS Security Hub 查询\nCloudTrail 日志，以获取 IAM 用户在过去 7 天内执行的操作。"}, {"letter": "C", "en": "Remove any permission sets that are assigned to the IAM user in IAM Identity Center. Use Amazon CloudWatch Logs Insights to query the CloudTrail logs in the S3 bucket for actions that the IAM user\nperformed in the previous 7 days.", "cn": "在 IAM Identity Center 中删除分配给 IAM 用户的任何权限集。使用 Amazon CloudWatch\nLogs Insights 查询 S3 存储桶中的 CloudTrail 日志，以获取 IAM 用户在过去 7 天内执行的操作。"}, {"letter": "D", "en": "Disable the IAM user’s access in IAM Identity Center. Use AWS CloudTrail to query the organizational\nevent data store for actions that the IAM user performed in the previous 7 days.", "cn": "在 IAM Identity Center 中禁用 IAM 用户的访问权限。使用 AWS CloudTrail 查询组织事件\n数据存储，以获取 IAM 用户在过去 7 天内执行的操作。"}], "answer": "D", "explanation_en": "Explanation\nWhen AWS IAM Identity Center is used to manage user access across an AWS Organization, Identity\nCenter is the authoritative control plane for enabling and disabling user access. According to the AWS Certified Security - Specialty Official Study Guide, disabling a user in IAM Identity Center immediately prevents\nthat user from accessing any AWS account or role that is assigned through permission sets, satisfying the\nrequirement to stop access organization-wide.\nDisabling an IAM user in a single account or removing attached policies (Options A and B) does not\nprevent access through IAM Iden", "explanation_cn": "## 解释 \n 当使用 AWS IAM Identity Center 跨 AWS 组织管理用户访问时，Identity Center 是用于启\n用和禁用用户访问的权威控制平面。根据《AWS 认证安全 - 专业官方学习指南》，在 IAM Identity\nCenter 中禁用用户会立即阻止该用户访问通过权限集分配的任何 AWS 账户或角色，满足在全组织\n范围内停止访问的要求。"}, {"num": 113, "category_en": "Data Protection", "category_cn": "數據保護", "question_en": "A company’s data scientists use Amazon SageMaker with datasets stored in Amazon S3. Data older than\n45 days must be removed according to policy.\nWhich action should enforce this policy?", "question_cn": "## 问题编号:113 - [数据保护]\n 一家公司的数据科学家使用 Amazon SageMaker 并将数据集存储在 Amazon S3 中。根据策\n略，必须删除超过 45 天的数据。\n 应采取哪种操作来实施此策略？", "options": [{"letter": "A", "en": "Configure an S3 Lifecycle rule to delete objects after 45 days.", "cn": "配置 S3 生命周期规则，以便在 45 天后删除对象。"}, {"letter": "B", "en": "Create a Lambda function triggered on object upload to delete old data.", "cn": "创建一个在对象上传时触发的 Lambda 函数，以删除旧数据。"}, {"letter": "C", "en": "Create a scheduled Lambda function to delete old objects monthly.", "cn": "创建一个每月删除旧对象的定时 Lambda 函数。"}, {"letter": "D", "en": "Configure S3 Intelligent-Tiering.", "cn": "配置 S3 智能分层。"}], "answer": "A", "explanation_en": "Amazon S3 Lifecycle rules are the native and most efficient way to enforce data retention policies. AWS\nCertified Security - Specialty documentation recommends lifecycle rules over custom automation to reduce\noperational complexity and failure risk.\nLifecycle rules automatically and reliably delete objects after a specified age, ensuring compliance without additional compute services. Lambda-based solutions increase cost and management overhead. IntelligentTiering manages storage cost, not data deletion.", "explanation_cn": "亚马逊 S3 生命周期规则是实施数据保留策略的原生且最有效的方式。AWS 安全认证 - 专业文档推\n荐使用生命周期规则而非自定义自动化，以降低操作复杂性和失败风险。\n生命周期规则会在指定时间后自动且可靠地删除对象，无需额外的计算服务即可确保合规。基于\nLambda 的解决方案会增加成本和管理开销。智能分层管理的是存储成本，而非数据删除。"}, {"num": 114, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A security engineer needs to configure DDoS protection for a Network Load Balancer (NLB) with an Elastic IP address. The security engineer wants to set up an AWS WAF web ACL with a rate-based rule statement\nto protect the NLB.\nThe security engineer needs to determine a rate limit that will not block legitimate traffic. The security\nengineer has configured the rule statement to aggregate based on the source IP address.\n\n\nHow should the security engineer configure the rule to protect the NLB?", "question_cn": "一名安全工程师需要为具有弹性 IP 地址的网络负载均衡器 (NLB) 配置 DDoS 防护。该安全工程师\n希望设置一个带有基于速率的规则语句的 AWS WAF 网络访问控制列表 (web ACL) 来保护 NLB。\n该安全工程师需要确定一个不会阻止合法流量的速率限制。该安全工程师已将规则语句配置为基\n于源 IP 地址进行聚合。\n该安全工程师应如何配置规则以保护 NLB？", "options": [{"letter": "A", "en": "Configure the rule to use the Count action.", "cn": "将规则配置为使用计数操作。"}, {"letter": "B", "en": "Configure the rule to use the Block action.", "cn": "将规则配置为使用阻止操作。"}, {"letter": "C", "en": "Configure the rule to use the Monitor action.", "cn": "将规则配置为使用监控操作。"}, {"letter": "D", "en": "Configure the rule to use the Allow action.", "cn": "将规则配置为使用允许操作。"}], "answer": "A", "explanation_en": "AWS WAF rate-based rules are designed to help protect applications and resources from traffic floods and\napplication-layer DDoS attacks by tracking the number of requests from individual source IP addresses over a\nrolling time window. According to the AWS Certified Security - Specialty Official Study Guide and AWS WAF\ndocumentation, rate-based rules can be configured with different actions, including Count, Block, and Allow.\nWhen a security engineer is determining an appropriate rate limit that will not block legitimate traffic,\nAWS best practices recommend initially configuring the rate-based rule with the Count action. The Count\naction allows AWS WAF to monitor and log requests that exceed the specified rate threshold without actively\nblocking them. This provides visibility into traffic patterns and enables the security engineer to analyze how\nthe rule would behave in production.\n\n\nBy using the Count action, the security engineer can safely evaluate whether legitimate users would be\naffected by the chosen rate limit. Once the engineer is confident that the threshold accurately distinguishes\nbetween normal traffic and malicious behavior, the action can later be changed to Block.\nOption B is incorrect because immediately blocking traffic without validation risks denying service to\nlegitimate users. Option C is invalid because AWS WAF does not have a Monitor action. Option D is incorrect\nbecause the Allow action does not enforce rate limiting.\nAWS documentation explicitly recommends starting rate-based rules in Count mode to fine-tune thresholds before enforcing blocks, especially for DDoS protection scenarios.\nAWS Certified Security - Specialty Official Study Guide\nAWS WAF Developer Guide - Rate-Based Rules\nAWS DDoS Resiliency Best Practices", "explanation_cn": "基于速率的 AWS WAF 规则旨在通过在滚动时间窗口内跟踪来自各个源 IP 地址的请求数量，帮助\n保护应用程序和资源免受流量洪泛和应用层 DDoS 攻击。根据《AWS 认证安全 - 专业官方学习指\n南》和 AWS WAF 文档，基于速率的规则可以配置不同的操作，包括计数、阻止和允许。\n当安全工程师确定一个不会阻止合法流量的适当速率限制时，AWS 最佳实践建议首先使用“计数”\n操作配置基于速率的规则。“计数”操作允许 AWS WAF 监控和记录超过指定速率阈值的请求，而\n不会主动阻止它们。这提供了对流量模式的可见性，并使安全工程师能够分析该规则在生产环境中\n的行为方式。\n通过使用计数操作，安全工程师可以安全地评估合法用户是否会受到所选速率限制的影响。一旦工\n程师确信该阈值能够准确区分正常流量和恶意行为，该操作稍后可以更改为阻止。\n选项 B 不正确，因为在没有验证的情况下立即阻止流量可能会导致拒绝向合法用户提供服务。选项\nC 无效，因为 AWS WAF 没有“监控”操作。选项 D 不正确，因为“允许”操作不强制执行速率限\n制。\nAWS 文档明确建议在基于计数模式下启动基于速率的规则，以便在实施阻止之前微调阈值，特别\n是对于 DDoS 保护场景。\nAWS 认证安全 - 专业官方学习指南\nAWS WAF 开发者指南 - 基于速率的规则\nAWS DDoS 弹性最佳实践"}, {"num": 115, "category_en": "Identity and Access Management", "category_cn": "身份与访问管理", "question_en": "A company is using AWS CloudTrail and Amazon CloudWatch to monitor resources in an AWS account.\nThe company’s developers have been using an IAM role in the account for the last 3 months.\n\n\nA security engineer needs to refine the customer managed IAM policy attached to the role to ensure that\nthe role provides least privilege access.\nWhich solution will meet this requirement with the LEAST effort?", "question_cn": "一家公司正在使用 AWS CloudTrail 和 Amazon CloudWatch 来监控一个 AWS 账户中的资源。在过\n去 3 个月里，该公司的开发人员一直在该账户中使用一个 IAM 角色。\n安全工程师需要完善附加到该角色的客户管理的 IAM 策略，以确保该角色提供最小权限访问。\n哪种解决方案能够以最小的工作量满足这一要求？", "options": [{"letter": "A", "en": "Implement AWS IAM Access Analyzer policy generation on the role.", "cn": "在该角色上实施 AWS IAM 访问分析器策略生成。"}, {"letter": "B", "en": "Implement AWS IAM Access Analyzer policy validation on the role.", "cn": "在该角色上实施 AWS IAM 访问分析器策略验证。"}, {"letter": "C", "en": "Search CloudWatch logs to determine the actions the role invoked and to evaluate the permissions.", "cn": "搜索 CloudWatch 日志以确定角色调用的操作并评估权限。"}, {"letter": "D", "en": "Use AWS Trusted Advisor to compare the policies assigned to the role against AWS best practices.", "cn": "使用 AWS 可信顾问将分配给该角色的策略与 AWS 最佳实践进行比较。"}], "answer": "A", "explanation_en": "AWS IAM Access Analyzer policy generation is specifically designed to help security engineers generate\nleast-privilege IAM policies based on actual usage recorded in AWS CloudTrail. According to the AWS Certified Security - Specialty documentation, policy generation analyzes historical CloudTrail data to identify the\nexact API actions and resources that a role has accessed over a specified time period.\nBecause the role has been actively used for three months, there is sufficient CloudTrail data for IAM\nAccess Analyzer to generate a refined customer managed policy automatically. This significantly reduces\n\n\nmanual effort and eliminates the need to analyze logs or infer permissions. The generated policy can be\nreviewed and attached directly to the role, ensuring least privilege access with minimal engineering effort.\nOption B only validates existing policies for security warnings and does not reduce permissions. Option\nC requires manual analysis of CloudWatch logs, which is time-consuming and error-prone. Option D does\nnot analyze real usage and cannot generate role-specific least privilege policies.\nAWS documentation explicitly recommends IAM Access Analyzer policy generation as the fastest and\nmost accurate method to refine IAM permissions based on observed behavior.", "explanation_cn": "AWS IAM 访问分析器策略生成专门设计用于帮助安全工程师根据 AWS CloudTrail 中记录的实际使\n用情况生成最小权限的 IAM 策略。根据 AWS 安全认证 - 专业文档，策略生成会分析历史 CloudTrail\n数据，以确定角色在指定时间段内访问的确切 API 操作和资源。\n由于该角色已被积极使用三个月，因此有足够的 CloudTrail 数据供 IAM 访问分析器自动生成优化\n的客户管理策略。这显著减少了人工工作量，并消除了分析日志或推断权限的需求。生成的策略可\n以直接审查并附加到角色，以最少的工程工作量确保最小权限访问。\n选项 B 仅验证现有策略的安全警告，并不会减少权限。选项 C 需要手动分析 CloudWatch 日志，既\n耗时又容易出错。选项 D 不分析实际使用情况，无法生成特定于角色的最小权限策略。\nAWS 文档明确推荐使用 IAM 访问分析器策略生成作为根据观察到的行为优化 IAM 权限的最快且\n最准确的方法。"}, {"num": 116, "category_en": "Detection", "category_cn": "检测", "question_en": "A company creates AWS Lambda functions from container images that are stored in Amazon Elastic Container Registry (Amazon ECR). The company needs to identify any software vulnerabilities in the container\nimages and any code vulnerabilities in the Lambda functions.\n\n\nWhich solution will meet these requirements?", "question_cn": "一家公司从存储在亚马逊弹性容器注册表 (Amazon ECR) 中的容器镜像创建 AWS Lambda 函数。该\n公司需要识别容器镜像中的任何软件漏洞以及 Lambda 函数中的任何代码漏洞。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Enable Amazon GuardDuty. Configure Amazon ECR scanning and Lambda code scanning in GuardDuty.", "cn": "启用亚马逊 GuardDuty。在 GuardDuty 中配置亚马逊 ECR 扫描和 Lambda 代码扫描。"}, {"letter": "B", "en": "Enable Amazon GuardDuty. Configure Runtime Monitoring and Lambda Protection in GuardDuty.", "cn": "启用亚马逊 GuardDuty。在 GuardDuty 中配置运行时监控和 Lambda 保护。"}, {"letter": "C", "en": "Enable Amazon Inspector. Configure Amazon ECR enhanced scanning and Lambda code scanning\nin Amazon Inspector.", "cn": "启用亚马逊 Inspector。在亚马逊 Inspector 中配置亚马逊 ECR 增强扫描和 Lambda 代码扫描。"}, {"letter": "D", "en": "Enable AWS Security Hub. Configure Runtime Monitoring and Lambda Protection in Security Hub.", "cn": "启用 AWS 安全中心。在安全中心配置运行时监控和 Lambda 保护。"}], "answer": "C", "explanation_en": "Amazon Inspector is the AWS service designed specifically for vulnerability management across compute\nworkloads, including Amazon ECR container images and AWS Lambda functions. According to the AWS\nCertified Security - Specialty documentation, Amazon Inspector provides automated vulnerability assessments for container images stored in ECR by performing enhanced image scanning that identifies common\nvulnerabilities and exposures (CVEs) in operating systems and application dependencies.\n\n\nInspector also supports Lambda code scanning to analyze function packages and container-based Lambda\nimages for known software vulnerabilities. Findings include severity ratings and remediation guidance, allowing security teams to identify and prioritize risks efficiently.\nAmazon GuardDuty focuses on threat detection using behavioral analysis and does not perform static\nvulnerability scanning of container images or Lambda code. AWS Security Hub aggregates findings from\nother services but does not perform scanning itself.\nAWS best practices recommend Amazon Inspector for vulnerability detection in container images and\nserverless workloads.", "explanation_cn": "Amazon Inspector 是一项专门为跨计算工作负载进行漏洞管理而设计的 AWS 服务，包括 Amazon\nECR 容器镜像和 AWS Lambda 函数。根据 AWS\n安全认证 - 专业文档，Amazon Inspector 通过执行增强的镜像扫描来识别操作系统和应用程序依赖\n项中的常见漏洞和暴露 (CVE)，从而为存储在 ECR 中的容器镜像提供自动漏洞评估。\nInspector 还支持 Lambda 代码扫描，以分析函数包和基于容器的 Lambda 镜像是否存在已知软件漏\n洞。结果包括严重程度评级和修复指南，使安全团队能够有效地识别风险并确定优先级。\nAmazon GuardDuty 专注于使用行为分析进行威胁检测，不执行容器镜像或 Lambda 代码的静态漏\n洞扫描。AWS 安全中心汇总来自其他服务的结果，但本身不执行扫描。\nAWS 最佳实践推荐使用 Amazon Inspector 进行容器镜像和无服务器工作负载中的漏洞检测。"}, {"num": 117, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company uses AWS to run a web application that manages ticket sales in several countries. The company recently migrated the application to an architecture that includes Amazon API Gateway, AWS Lambda,\nand Amazon Aurora Serverless. The company needs the application to comply with Payment Card Industry\nData Security Standard (PCI DSS) v4.0. A security engineer must generate a report that shows the effectiveness of the PCI DSS v4.0 controls that apply to the application. The company’s compliance team must be able\nto add manual evidence to the report.\n\n\nWhich solution will meet these requirements?", "question_cn": "一家公司使用 AWS 运行一个管理多个国家门票销售的 Web 应用程序。该公司最近将应用程序迁移\n到了一个包括 Amazon API Gateway、AWS Lambda 和 Amazon Aurora Serverless 的架构。该公司\n需要应用程序符合支付卡行业数据安全标准 (PCI DSS)v4.0。一名安全工程师必须生成一份报告，显\n示适用于该应用程序的 PCI DSS v4.0 控制措施的有效性。该公司的合规团队必须能够向报告中添加\n手动证据。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Enable AWS Trusted Advisor. Configure all the Trusted Advisor checks. Manually map the checks\nagainst the PCI DSS v4.0 standard to generate the report.", "cn": "启用 AWS 可信顾问。配置所有可信顾问检查。根据 PCI DSS v4.0 标准手动映射检查以生成报告。"}, {"letter": "B", "en": "Enable and configure AWS Config. Deploy the Operational Best Practices for PCI DSS conformance\npack in AWS Config. Use AWS Config to generate the report.", "cn": "启用并配置 AWS Config。在 AWS Config 中部署 PCI DSS 合规性包的操作最佳实践。使用\nAWS Config 生成报告。"}, {"letter": "C", "en": "Enable AWS Security Hub. Enable the Security Hub PCI DSS security standard. Use the AWS Management Console to download the report from the security standard.", "cn": "启用 AWS Security Hub。启用 Security Hub PCI DSS 安全标准。使用 AWS 管理控制台从\n安全标准中下载报告。"}, {"letter": "D", "en": "Create an AWS Audit Manager assessment that uses the AWS managed PCI DSS v4.0 standard framework. Add all evidence to the assessment. Generate the report in Audit Manager for download.", "cn": "创建一个使用 AWS 托管的 PCI DSS v4.0 标准框架的 AWS Audit Manager 评估。将所有证\n据添加到评估中。在 Audit Manager 中生成报告以供下载。"}], "answer": "D", "explanation_en": "AWS Audit Manager is specifically designed to help organizations continuously audit their AWS usage\nagainst compliance frameworks and generate audit-ready reports. According to AWS Certified Security - Specialty documentation, Audit Manager includes AWS managed frameworks for compliance standards, including PCI DSS v4.0.\n\n\nAudit Manager automatically collects evidence from AWS services such as API Gateway, Lambda, RDS,\nCloudTrail, and Config, and maps the evidence directly to PCI DSS controls. Importantly, Audit Manager\nallows compliance teams to upload and attach manual evidence, which is a key requirement in this scenario.\nOption C provides visibility into control status but does not support adding manual evidence. Option\nB evaluates configuration compliance but does not generate formal compliance reports. Option A requires\nextensive manual effort and is not aligned with PCI reporting workflows.\nAWS documentation positions Audit Manager as the authoritative service for compliance reporting and\naudit evidence management.", "explanation_cn": "AWS Audit Manager 专门设计用于帮助组织根据合规框架持续审核其 AWS 使用情况并生成\n可用于审核的报告。根据 AWS Certified Security - Specialty 文档，Audit Manager 包括用于合规标\n准的 AWS 托管框架，包括 PCI DSS v4.0。\nAudit Manager 会自动从 API Gateway、Lambda、RDS、CloudTrail 和 Config 等 AWS 服务中\n收集证据，并将证据直接映射到 PCI DSS 控制。重要的是，Audit Manager 允许合规团队上传和附\n加手动证据，这是此场景中的关键要求。\n 选项 C 提供对控制状态的可见性，但不支持添加手动证据。选项 B 评估配置合规性，但不\n生成正式的合规报告。选项 A 需要大量的人工操作，并且与 PCI 报告工作流程不一致。\nAWS 文档将 Audit Manager 定位为合规报告和审核证据管理的权威服务。"}, {"num": 118, "category_en": "Identity and Access Management", "category_cn": "身份與存取管理", "question_en": "A consultant agency needs to perform a security audit for a company’s production AWS account. Several\nconsultants need access to the account. The consultant agency already has its own AWS account. The com-\n\n\npany requires multi-factor authentication (MFA) for all access to its production account. The company also\nforbids the use of long-term credentials.\nWhich solution will provide the consultant agency with access that meets these requirements?", "question_cn": "问题编号:118 - [身份和访问管理]\n 一家咨询机构需要对一家公司的生产 AWS 账户进行安全审核。几名顾问需要访问该账户。\n该咨询机构已经有自己的 AWS 账户。该公司要求对其生产账户的所有访问都进行多因素身份验证\n(MFA)。该公司还禁止使用长期凭证。\n 哪种解决方案将为咨询机构提供满足这些要求的访问权限？", "options": [{"letter": "A", "en": "Create an IAM group. Create an IAM user for each consultant. Add each user to the group. Turn on\nMFA for each consultant.", "cn": "创建一个 IAM 组。为每位顾问创建一个 IAM 用户。将每个用户添加到该组。为每位顾问启用多\n因素身份验证 (MFA)。"}, {"letter": "B", "en": "Configure Amazon Cognito on the company’s production account to authenticate against the consultant agency’s identity provider (IdP). Add MFA to a Cognito user pool.", "cn": "在公司的生产账户上配置 Amazon Cognito，以便针对顾问机构的身份提供商 (IdP) 进行身份验\n证。向 Cognito 用户池添加 MFA。"}, {"letter": "C", "en": "Create an IAM role in the consultant agency’s AWS account. Define a trust policy that requires MFA.\nIn the trust policy, specify the company’s production account as the principal. Attach the trust policy to the\nrole.", "cn": "在顾问机构的 AWS 账户中创建一个 IAM 角色。定义一个需要 MFA 的信任策略。在信任策略中，\n将公司的生产账户指定为主体。将信任策略附加到该角色。"}, {"letter": "D", "en": "Create an IAM role in the company’s production account. Define a trust policy that requires MFA. In\nthe trust policy, specify the consultant agency’s AWS account as the principal. Attach the trust policy to the\nrole.", "cn": "在公司的生产账户中创建一个 IAM 角色。定义一个需要 MFA 的信任策略。在信任策略中，将顾\n问机构的 AWS 账户指定为主体。将信任策略附加到该角色。"}], "answer": "D", "explanation_en": "AWS best practices strongly discourage the use of long-term credentials and recommend cross-account\nIAM roles with temporary credentials for third-party access. According to the AWS Certified Security - Specialty Study Guide, creating an IAM role in the resource-owning account and allowing a trusted external AWS\naccount to assume that role is the recommended pattern for external access.\nBy creating the IAM role in the company’s production account and specifying the consultant agency’s\nAWS account as the trusted principal, the company retains full control over permissions. The trust policy can\nenforce MFA by using the aws:MultiFactorAuthPresent condition key, ensuring that all access requires MFA.\nAccess is granted through AWS Security Token Service (STS), which issues short-lived credentials.\nOption A violates the requirement to avoid long-term credentials. Option B is designed for application\nuser authentication, not AWS account access. Option C incorrectly places the role in the consultant’s account,\nreducing the company’s control over access.\nThis solution satisfies MFA enforcement, eliminates long-term credentials, and aligns with AWS thirdparty access best practices.", "explanation_cn": "AWS 最佳实践强烈不建议使用长期凭证，并建议使用带有临时凭证的跨账户 IAM 角色进行第三方\n访问。根据《AWS 认证安全 - 专业认证学习指南》\n，在拥有资源的账户中创建 IAM 角色并允许受信\n任的外部 AWS 账户承担该角色是外部访问的推荐模式。\n通过在公司的生产账户中创建 IAM 角色并将顾问机构的 AWS 账户指定为受信任主体，公司可以完\n全控制权限。信任策略可以使用 aws:MultiFactorAuthPresent 条件键来强制实施 MFA，确保所有访\n问都需要 MFA。通过 AWS 安全令牌服务 (STS) 授予访问权限，该服务会颁发短期凭证。\n选项 A 违反了避免使用长期凭证的要求。选项 B 是为应用程序用户身份验证设计的，而不是用于\nAWS 账户访问。选项 C 错误地将角色放置在顾问的账户中，从而减少了公司对访问的控制。\n此解决方案满足了 MFA 强制要求，消除了长期凭证，并符合 AWS 第三方访问最佳实践。"}, {"num": 119, "category_en": "Detection", "category_cn": "检测", "question_en": "A company has a single AWS account and uses an Amazon EC2 instance to test application code. The\ncompany recently discovered that the instance was compromised and was serving malware. Analysis showed\nthat the instance was compromised 35 days ago. A security engineer must implement a continuous monitoring solution that automatically notifies the security team by email for high severity findings as soon as\npossible.\nWhich combination of steps should the security engineer take to meet these requirements? (Select\nTHREE.)", "question_cn": "一家公司有一个单一的 AWS 账户，并使用 Amazon EC2 实例来测试应用程序代码。该公司最近发\n现该实例已被入侵并正在提供恶意软件。分析表明该实例在 35 天前被入侵。一名安全工程师必须\n实施一个持续监控解决方案，该方案一旦发现高严重性结果，就会尽快通过电子邮件自动通知安全\n团队。\n安全工程师应采取哪些步骤组合来满足这些要求？(选择三项。)", "options": [{"letter": "A", "en": "Enable AWS Security Hub in the AWS account.", "cn": "在 AWS 账户中启用 AWS 安全中心。"}, {"letter": "B", "en": "Enable Amazon GuardDuty in the AWS account.", "cn": "在 AWS 账户中启用亚马逊 GuardDuty。"}, {"letter": "C", "en": "Create an Amazon Simple Notification Service (Amazon SNS) topic. Subscribe the security team’s\nemail distribution list to the topic.", "cn": "创建一个亚马逊简单通知服务 (Amazon SNS) 主题。将安全团队的电子邮件分发列表订阅到该主\n题。"}, {"letter": "D", "en": "Create an Amazon Simple Queue Service (Amazon SQS) queue. Subscribe the security team’s email\ndistribution list to the queue.", "cn": "创建一个亚马逊简单队列服务 (Amazon SQS) 队列。将安全团队的电子邮件分发列表订阅到该队\n列。"}, {"letter": "E", "en": "Create an Amazon EventBridge rule for GuardDuty findings of high severity. Configure the rule to\npublish a message to the topic.", "cn": "为高严重性的 GuardDuty 调查结果创建一个亚马逊 EventBridge 规则。配置该规则以向主题发布\n消息。\n\n\nF. Create an Amazon EventBridge rule for Security Hub findings of high severity. Configure the rule to\npublish a message to the queue.\nF. 为高严重性的安全中心调查结果创建一个亚马逊 EventBridge 规则。配置该规则以向队列发布消\n息。\nExams Prep\n考试准备"}], "answer": "B", "explanation_en": "Amazon GuardDuty provides continuous threat detection for compromised instances by analyzing VPC\nFlow Logs, DNS logs, and CloudTrail events. According to AWS Certified Security - Specialty guidance, GuardDuty is the fastest service to enable for detecting malware and compromised EC2 instances.\nTo notify the security team, Amazon SNS provides a native email notification mechanism with minimal\nsetup. Amazon EventBridge integrates directly with GuardDuty findings and can filter based on severity.\nCreating an EventBridge rule that matches high severity GuardDuty findings and publishes to SNS ensures\nimmediate notification.\nSecurity Hub is not required for this use case and adds additional setup time. Amazon SQS does not\nsupport email subscriptions.", "explanation_cn": "亚马逊 GuardDuty 通过分析 VPC 流日志、DNS 日志和 CloudTrail 事件，为受感染的实例提供持续\n的威胁检测。根据 AWS 认证安全 - 专业指南，GuardDuty 是启用检测恶意软件和受感染的 EC2 实\n例最快的服务。\n为了通知安全团队，亚马逊 SNS 提供了一种设置最少的原生电子邮件通知机制。亚马逊 EventBridge\n直接与 GuardDuty 调查结果集成，并可以根据严重性进行过滤。创建一个与高严重性 GuardDuty\n调查结果匹配并发布到 SNS 的 EventBridge 规则可确保立即通知。\n此用例不需要安全中心，并且会增加额外的设置时间。亚马逊 SQS 不支持电子邮件订阅。"}, {"num": 120, "category_en": "Detection", "category_cn": "检测", "question_en": "A company’s security team wants to receive near-real-time email notifications about AWS abuse reports\nrelated to DoS attacks. An Amazon SNS topic already exists and is subscribed to by the security team.\nWhat should the security engineer do next?", "question_cn": "一家公司的安全团队希望接收与拒绝服务攻击相关的 AWS 滥用报告的近实时电子邮件通知。安全\n团队已经订阅了一个现有的 Amazon SNS 主题。\n安全工程师接下来应该怎么做？", "options": [{"letter": "A", "en": "Poll Trusted Advisor for abuse notifications by using a Lambda function.", "cn": "使用 Lambda 函数轮询可信顾问以获取滥用通知。"}, {"letter": "B", "en": "Create an Amazon EventBridge rule that matches AWS Health events for AWS_ABUSE_DOS_REPORT\nand publishes to SNS.", "cn": "创建一个 Amazon EventBridge 规则，该规则匹配 AWS_ABUSE_DOS_REPORT 的 AWS 健康事\n件并发布到 SNS。"}, {"letter": "C", "en": "Poll the AWS Support API for abuse cases by using a Lambda function.", "cn": "使用 Lambda 函数轮询 AWS 支持 API 以获取滥用案例。"}, {"letter": "D", "en": "Detect abuse reports by using CloudTrail logs and CloudWatch alarms.", "cn": "使用 CloudTrail 日志和 CloudWatch 警报检测滥用报告。"}], "answer": "B", "explanation_en": "AWS abuse notifications are delivered as AWS Health events. According to the AWS Certified Security Specialty Study Guide, Amazon EventBridge integrates natively with AWS Health and can be used to detect\nspecific event types such as AWS_ABUSE_DOS_REPORT in near real time.\n，\nAmazon EventBridge\nBy creating an EventBridge rule that filters for the abuse report event type and publishes directly to\nAmazon SNS, the solution remains fully managed, low latency, and cost effective.\nPolling APIs introduces delay and complexity. CloudTrail does not log abuse notifications. EventBridge\nwith AWS Health is the recommended mechanism for reacting to AWS service events.", "explanation_cn": "AWS 滥用通知作为 AWS 健康事件传递。根据《AWS 认证安全 - 专业学习指南》\n与 AWS 健康原生集成，可用于近实时检测特定事件类型，如 AWS_ABUSE_DOS_REPORT。\n通过创建一个过滤滥用报告事件类型并直接发布到 Amazon SNS 的 EventBridge 规则，该解决方案\n仍然是完全托管的、低延迟的且具有成本效益。\n轮询 API 会引入延迟和复杂性。CloudTrail 不会记录滥用通知。带有 AWS 健康的 EventBridge 是对\nAWS 服务事件做出反应的推荐机制。"}, {"num": 121, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company needs to build a code-signing solution using an AWS KMS asymmetric key and must store\nimmutable evidence of key creation and usage for compliance and audit purposes.\nWhich solution meets these requirements?", "question_cn": "一家公司需要使用 AWS KMS 非对称密钥构建代码签名解决方案，并且必须存储密钥创建和使用的\n不可变证据，以满足合规性和审计目的。\n哪种解决方案满足这些要求？", "options": [{"letter": "A", "en": "Create an Amazon S3 bucket with S3 Object Lock enabled. Create an AWS CloudTrail trail with log\nfile validation enabled for KMS events. Store logs in the bucket and grant auditors access.", "cn": "创建启用了 S3 对象锁定的 Amazon S3 存储桶。为 KMS 事件创建启用了日志文件验证的 AWS\nCloudTrail 跟踪。将日志存储在存储桶中并授予审计人员访问权限。"}, {"letter": "B", "en": "Log application events to Amazon CloudWatch Logs and export them.", "cn": "将应用程序事件记录到 Amazon CloudWatch Logs 并导出它们。"}, {"letter": "C", "en": "Capture KMS API calls using EventBridge and store them in DynamoDB.", "cn": "使用 EventBridge 捕获 KMS API 调用并将它们存储在 DynamoDB 中。"}, {"letter": "D", "en": "Track KMS usage with CloudWatch metrics and dashboards.", "cn": "使用 CloudWatch 指标和仪表板跟踪 KMS 使用情况。"}], "answer": "A", "explanation_en": "AWS CloudTrail provides authoritative records of KMS key creation, origin, and usage. Enabling log file\nvalidation ensures tamper detection. S3 Object Lock in compliance mode enforces immutability, which is a\ncore audit requirement cited in AWS Certified Security - Specialty materials.\nCloudWatch and DynamoDB do not provide immutable storage guarantees suitable for compliance evidence.", "explanation_cn": "AWS CloudTrail 提供 KMS 密钥创建、来源和使用的权威记录。启用日志文件验证可确保检测篡改。\n合规模式下的 S3 对象锁定强制实施不可变性，这是 AWS 认证安全 - 专业材料中引用的核心审计要\n求。\nCloudWatch 和 DynamoDB 不提供适用于合规证据的不可变存储保证。"}, {"num": 122, "category_en": "Detection", "category_cn": "检测", "question_en": "A company begins to use AWS WAF after experiencing an increase in traffic to the company’s public web\napplications. A security engineer needs to determine if the increase in traffic is because of application-layer\nattacks. The security engineer needs a solution to analyze AWS WAF traffic.\nWhich solution will meet this requirement?", "question_cn": "一家公司在其公共 Web 应用程序流量增加后开始使用 AWS WAF。一名安全工程师需要确定流量增\n加是否是由于应用层攻击造成的。该安全工程师需要一个解决方案来分析 AWS WAF 流量。\n哪种解决方案将满足此要求？", "options": [{"let
