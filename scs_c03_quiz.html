ter": "A", "en": "Send AWS WAF logs to AWS CloudTrail and analyze them with OpenSearch.", "cn": "将 AWS WAF 日志发送到 AWS CloudTrail 并使用 OpenSearch 进行分析。"}, {"letter": "B", "en": "Send AWS WAF logs to Amazon S3 and query them directly with OpenSearch.", "cn": "将 AWS WAF 日志发送到 Amazon S3 并使用 OpenSearch 直接查询它们。"}, {"letter": "C", "en": "Send AWS WAF logs to Amazon S3. Create an Amazon Athena table with partition projection. Use\nAthena to query the logs.", "cn": "将 AWS WAF 日志发送到 Amazon S3。创建一个带有分区投影的 Amazon Athena 表。使用 Athena\n查询日志。"}, {"letter": "D", "en": "Send AWS WAF logs to AWS CloudTrail and analyze them with Amazon Athena.", "cn": "将 AWS WAF 日志发送到 AWS CloudTrail 并使用 Amazon Athena 进行分析。"}], "answer": "C", "explanation_en": "AWS WAF supports logging of detailed HTTP request information, including source IP addresses, request\nURIs, headers, and rule evaluation results. According to the AWS Certified Security - Specialty documentation, Amazon S3 combined with Amazon Athena is the recommended and most cost-effective solution for ad\nhoc and forensic analysis of AWS WAF logs.\nBy configuring AWS WAF to deliver logs to Amazon S3 and using Athena with partition projection, the\nsecurity engineer can efficiently query large volumes of log data without maintaining partitions manually.\nThis enables rapid identification of application-layer attacks such as SQL injection, cross-site scripting, and\nbot activity.\nOptions A and D are incorrect because AWS WAF logs are not delivered to CloudTrail. Option B is invalid\nbecause OpenSearch cannot directly query data stored in S3 without ingestion or additional tooling.\nAWS documentation highlights S3 + Athena as a best practice for scalable, serverless analysis of AWS\nWAF logs.\n\n\nA AWS Certified Security - Specialty Official Study Guide\nAWS WAF Logging Documentation\nAmazon Athena Best Practices", "explanation_cn": "AWS WAF 支持记录详细的 HTTP 请求信息，包括源 IP 地址、请求 URI、标头和规则评估结果。根\n据 AWS 认证安全专家文档，亚马逊 S3 与亚马逊雅典娜相结合是对 AWS WAF 日志进行临时分析和\n取证分析的推荐且最具成本效益的解决方案。\n通过配置 AWS WAF 将日志传输到 Amazon S3，并使用带有分区投影的 Athena，安全工程师可以\n高效地查询大量日志数据，而无需手动维护分区。这使得能够快速识别诸如 SQL 注入、跨站脚本和\n机器人活动等应用层攻击。\n选项 A 和 D 不正确，因为 AWS WAF 日志不会传送到 CloudTrail。选项 B 无效，因为 OpenSearch\n在没有摄取或额外工具的情况下无法直接查询存储在 S3 中的数据。\nAWS 文档强调将 S3 + Athena 作为对 AWS WAF 日志进行可扩展的无服务器分析的最佳实践。\n一本《AWS 认证安全 - 专业认证官方学习指南》\nAWS WAF 日志记录文档\n亚马逊雅典娜最佳实践"}, {"num": 123, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company uses an organization in AWS Organizations to manage multiple AWS accounts. The company\nwants to centrally give users the ability to access Amazon Q Developer.\nWhich solution will meet this requirement?", "question_cn": "一家公司使用 AWS 组织中的组织来管理多个 AWS 账户。该公司希望集中授予用户访问 Amazon Q\nDeveloper 的权限。\n哪种解决方案能满足此要求？", "options": [{"letter": "A", "en": "Enable AWS IAM Identity Center and set up Amazon Q Developer as an AWS managed application.", "cn": "启用 AWS IAM 身份中心并将 Amazon Q Developer 设置为 AWS 托管应用程序。"}, {"letter": "B", "en": "Enable Amazon Cognito and create a new identity pool for Amazon Q Developer.", "cn": "启用 Amazon Cognito 并为 Amazon Q Developer 创建一个新的身份池。"}, {"letter": "C", "en": "Enable Amazon Cognito and set up Amazon Q Developer as an AWS managed application.", "cn": "启用 Amazon Cognito 并将 Amazon Q Developer 设置为 AWS 托管应用程序。"}, {"letter": "D", "en": "Enable AWS IAM Identity Center and create a new identity pool for Amazon Q Developer.", "cn": "启用 AWS IAM 身份中心并为 Amazon Q Developer 创建一个新的身份池。"}], "answer": "A", "explanation_en": "AWS IAM Identity Center is the recommended service for centrally managing workforce access across\nmultiple AWS accounts within an organization. According to AWS Certified Security - Specialty documentation, Amazon Q Developer integrates natively with IAM Identity Center as an AWS managed application.\nBy enabling IAM Identity Center and assigning Amazon Q Developer to users or groups, the company\ncan centrally control access using permission sets and organizational boundaries. This approach provides\ncentralized authentication, authorization, and auditing with minimal overhead.\nAmazon Cognito is intended for customer and application user authentication, not workforce access to\nAWS services. Identity pools are not applicable to IAM Identity Center integrations.\nAWS best practices clearly recommend IAM Identity Center for workforce access to AWS-managed applications.", "explanation_cn": "AWS IAM 身份中心是用于在组织内跨多个 AWS 账户集中管理员工访问权限的推荐服务。根据 AWS\n认证安全 - 专业文档，Amazon Q Developer 作为 AWS 托管应用程序与 IAM 身份中心原生集成。\n通过启用 IAM 身份中心并将 Amazon Q Developer 分配给用户或组，公司可以使用权限集和组织边\n界集中控制访问。这种方法以最小的开销提供集中式身份验证、授权和审核。\nAmazon Cognito 用于客户和应用程序用户身份验证，而不是员工对 AWS 服务的访问。身份池不适\n用于 IAM 身份中心集成。\nAWS 最佳实践明确推荐使用 IAM 身份中心来实现员工对 AWS 托管应用程序的访问。"}, {"num": 124, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company hosts its public website on Amazon EC2 instances behind an Application Load Balancer\n(ALB). The website is experiencing a global DDoS attack by a specific IoT device brand that has a unique user\nagent.\nA security engineer is creating an AWS WAF web ACL and will associate the web ACL with the ALB.\nThe security engineer must implement a rule statement as part of the web ACL to block the requests. The\nrule statement must mitigate the current attack and future attacks from these IoT devices without blocking\nrequests from customers.\nWhich rule statement will meet these requirements?", "question_cn": "一家公司在应用负载均衡器 (ALB) 后面的亚马逊 EC2 实例上托管其公共网站。该网站正遭受来自\n特定物联网设备品牌的全球分布式拒绝服务 (DDoS) 攻击，该品牌具有独特的用户代理。\n一名安全工程师正在创建一个 AWS WAF 网络访问控制列表 (web ACL)，并将该网络访问控制列表\n与 ALB 关联。安全工程师必须作为网络访问控制列表的一部分实施一个规则语句来阻止请求。该\n规则语句必须减轻当前攻击以及来自这些物联网设备的未来攻击，同时不阻止客户的请求。\n哪种规则语句将满足这些要求？", "options": [{"letter": "A", "en": "Use an IP set match rule statement that includes the IP address for IoT devices from the user agent.", "cn": "使用一个 IP 集匹配规则语句，该语句包括来自用户代理的物联网设备的 IP 地址。"}, {"letter": "B", "en": "Use a geographic match rule statement. Configure the statement to block countries that the IoT devices\nare located in.", "cn": "使用一个地理匹配规则语句。配置该语句以阻止物联网设备所在的国家。"}, {"letter": "C", "en": "Use a rate-based rule statement. Set a rate limit that is equal to the number of requests that are coming\nfrom the IoT devices.", "cn": "使用一个基于速率的规则语句。设置一个等于来自物联网设备的请求数量的速率限制。"}, {"letter": "D", "en": "Use a string match rule statement that includes details of the IoT device brand from the user agent.", "cn": "使用一个字符串匹配规则语句，该语句包括来自用户代理的物联网设备品牌的详细信息。"}], "answer": "D", "explanation_en": "AWS WAF allows security engineers to create string match rule statements that inspect specific parts\nof web requests, including HTTP headers such as the User-Agent header. According to the AWS Certified\nSecurity - Specialty Study Guide and AWS WAF documentation, string match rules are ideal for blocking\nrequests that contain known malicious identifiers, such as a distinctive user agent associated with a specific\nbot or IoT device brand.\nIn this scenario, the attack originates from a specific IoT device brand that uses a unique user agent. A\nstring match rule that inspects the User-Agent header can precisely block malicious requests while allowing\nlegitimate customer traffic to continue uninterrupted. This approach provides targeted mitigation for both\ncurrent and future attacks originating from the same device signature.\nOption A is incorrect because IP addresses cannot be derived from user agent strings, and IoT botnets\nfrequently rotate IP addresses, making IP-based blocking ineffective. Option B is incorrect because geographic\nblocking is overly broad and risks blocking legitimate customers in the same regions as the attacking devices.\nOption C is incorrect because rate-based rules limit request volume per IP address and do not specifically\nidentify malicious device signatures; legitimate high-traffic users could be unintentionally blocked.\nAWS documentation emphasizes that header inspection with string match conditions is a best practice\nfor mitigating attacks that use identifiable request characteristics such as custom user agents, especially in\nDDoS and bot mitigation scenarios.\n\n\nAWS Certified Security - Specialty Official Study Guide\nAWS WAF Developer Guide - Rule Statements\nAWS DDoS Resiliency Best Practices\nQ AWS Well-Architected Framework - Security Pillar", "explanation_cn": "AWS WAF 允许安全工程师创建字符串匹配规则语句，以检查 Web 请求的特定部分，包括诸如用户\n代理标头之类的 HTTP 标头。根据《AWS 认证安全 - 专业学习指南》和 AWS WAF 文档，字符串匹\n配规则非常适合阻止包含已知恶意标识符的请求，例如与特定机器人或物联网设备品牌相关联的独\n特用户代理。\n在这种情况下，攻击源自使用独特用户代理的特定物联网设备品牌。检查用户代理标头的字符串匹\n配规则可以精确地阻止恶意请求，同时允许合法的客户流量继续不受干扰。这种方法为源自相同设\n备签名的当前和未来攻击提供了有针对性的缓解措施。\n选项 A 不正确，因为无法从用户代理字符串中派生 IP 地址，并且物联网僵尸网络经常轮换 IP 地址，\n使得基于 IP 的阻止无效。选项 B 不正确，因为地理阻止过于宽泛，并且有在与攻击设备相同地区\n阻止合法客户的风险。选项 C 不正确，因为基于速率的规则限制每个 IP 地址的请求量，并且不能\n专门识别恶意设备签名；合法的高流量用户可能会被无意阻止。\nAWS 文档强调，使用字符串匹配条件进行标头检查是缓解使用可识别请求特征 (如自定义用户代\n理) 的攻击的最佳实践，特别是在 DDoS 和僵尸网络缓解场景中。\nAWS 认证安全 - 专业版官方学习指南\nAWS WAF 开发者指南 - 规则声明\nAWS DDoS 弹性最佳实践\n问 AWS 架构良好框架 - 安全支柱"}, {"num": 125, "category_en": "Detection", "category_cn": "检测", "question_en": "A company is using Amazon Macie, AWS Firewall Manager, Amazon Inspector, and AWS Shield Advanced in its AWS account. The company wants to receive alerts if a DDoS attack occurs against the account.\nWhich solution will meet this requirement?", "question_cn": "一家公司在其 AWS 账户中使用 Amazon Macie、AWS 防火墙管理器、Amazon Inspector 和 AWS\nShield Advanced。该公司希望在账户遭受 DDoS 攻击时收到警报。\n哪种解决方案能满足此要求？", "options": [{"letter": "A", "en": "Use Amazon Macie to detect an active DDoS event and create Amazon CloudWatch alarms that respond to Macie findings.", "cn": "使用 Amazon Macie 检测活跃的 DDoS 事件并创建响应 Macie 发现结果的 Amazon CloudWatch\n警报。"}, {"letter": "B", "en": "Use Amazon Inspector to review resources and invoke Amazon CloudWatch alarms for any resources\nthat are vulnerable to DDoS attacks.", "cn": "使用 Amazon Inspector 检查资源并为任何易受 DDoS 攻击的资源调用 Amazon CloudWatch 警\n报。"}, {"letter": "C", "en": "Create an Amazon CloudWatch alarm that monitors AWS Firewall Manager metrics for an active\nDDoS event.", "cn": "创建一个 Amazon CloudWatch 警报，用于监控 AWS 防火墙管理器中活跃 DDoS 事件的指标。"}, {"letter": "D", "en": "Create an Amazon CloudWatch alarm that monitors AWS Shield Advanced metrics for an active DDoS\nevent.", "cn": "创建一个 Amazon CloudWatch 警报，用于监控 AWS Shield Advanced 中活跃 DDoS 事件的指标。"}], "answer": "D", "explanation_en": "AWS Shield Advanced is the AWS-native managed service specifically designed to provide detection,\nmitigation, and visibility for Distributed Denial of Service (DDoS) attacks at both the network and application\nlayers. Shield Advanced integrates directly with Amazon CloudWatch by publishing DDoS-related metrics\nsuch as DDoSDetected, AttackVolume, and AttackVector, which can be monitored using CloudWatch alarms\nto trigger alerts in near real time. This makes option D the correct and fully supported solution.\nAmazon Macie focuses on discovering and protecting sensitive data (such as PII) in Amazon S3 using\nmachine learning and does not provide DDoS detection capabilities, making option A incorrect. Amazon\nInspector is a vulnerability management service that assesses EC2 instances, container images, and Lambda\nfunctions for software vulnerabilities and unintended network exposure; it does not detect live DDoS attacks,\nso option B is incorrect. AWS Firewall Manager is a centralized management service for configuring AWS\nWAF, Shield Advanced, and security groups across accounts, but it does not emit native DDoS detection metrics for alerting, which eliminates option C.\n\n\nAccording to AWS Security Specialty documentation, the recommended best practice for DDoS detection and alerting is to enable AWS Shield Advanced and configure Amazon CloudWatch alarms on Shield\nmetrics, optionally integrating with Amazon SNS for notifications and AWS Incident Manager for response\nautomation.", "explanation_cn": "AWS Shield Advanced 是 AWS 原生的托管服务，专门设计用于在网络和应用层为分布式拒绝服务\n(DDoS) 攻击提供检测、缓解和可见性。Shield Advanced 通过发布与 DDoS 相关的指标 (如 DDoSDetected、AttackVolume 和 AttackVector) 直接与 Amazon CloudWatch 集成，这些指标可使用 CloudWatch 警报进行监控，以近乎实时地触发警报。这使得选项 D 成为正确且完全受支持的解决方案。\nAmazon Macie 专注于使用机器学习在 Amazon S3 中发现和保护敏感数据 (如个人身份信息)，不提\n供 DDoS 检测功能，因此选项 A 不正确。Amazon Inspector 是一种漏洞管理服务，用于评估 EC2 实\n例、容器镜像和 Lambda 函数的软件漏洞和意外的网络暴露；它不检测实时 DDoS 攻击，所以选项\nB 不正确。AWS 防火墙管理器是一个集中管理服务，用于跨账户配置 AWS WAF、Shield Advanced\n和安全组，但它不会发出用于警报的原生 DDoS 检测指标，这排除了选项 C。\n根据 AWS 安全专业文档，针对 DDoS 检测和警报的推荐最佳实践是启用 AWS Shield Advanced 并\n在 Shield 指标上配置 Amazon CloudWatch 警报，还可选择与 Amazon SNS 集成以进行通知，并与\nAWS 事件管理器集成以实现响应自动化。"}, {"num": 126, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company is running a new workload across accounts in an organization in AWS Organizations. All\nrunning resources must have a tag of CostCenter, and the tag must have one of three approved values. The\ncompany must enforce this policy and must prevent any changes of the CostCenter tag to a non-approved\nvalue.\nWhich solution will meet these requirements?", "question_cn": "一家公司正在 AWS 组织中的多个账户上运行新工作负载。\n所有运行的资源都必须有一个 CostCenter\n标签，并且该标签必须具有三个批准值之一。公司必须执行此政策，并必须防止将 CostCenter 标签\n更改为未批准的值。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Use AWS Config custom policy rule and an SCP to deny non-approved aws:RequestTag/CostCenter\nvalues.", "cn": "使用 AWS Config 自定义策略规则和 SCP 来拒绝未批准的 aws:RequestTag/CostCenter 值。"}, {"letter": "B", "en": "Use CloudTrail + EventBridge + Lambda to block creation.", "cn": "使用 CloudTrail + EventBridge + Lambda 来阻止创建。"}, {"letter": "C", "en": "Enable tag policies, define allowed values, enforce noncompliant operations, and use an SCP to deny\ncreation when aws:RequestTag/CostCenter is null.", "cn": "启用标签策略，定义允许的值，强制不兼容操作，并在 aws:RequestTag/CostCenter 为空时使用\nSCP 来拒绝创建。"}, {"letter": "D", "en": "Enable tag policies and use EventBridge + Lambda to block changes.", "cn": "启用标签策略并使用 EventBridge + Lambda 来阻止更改。"}], "answer": "C", "explanation_en": "AWS Organizations tag policies are designed to standardize and govern tag keys and allowed values across\naccounts. AWS Certified Security - Specialty documentation describes tag policies as a governance mechanism\nthat helps enforce consistent tagging by specifying required tag keys and permitted values. To ensure every\nresource has the CostCenter tag at creation time, an SCP can deny create actions when aws: RequestTag/CostCenter is missing (null). This prevents resources from being created without the required tag. Tag policies\nthen define the three approved values and can be configured to enforce or report noncompliance depending on\nsupported services, ensuring that tag values remain within the allowed set and preventing drift to unapproved\nvalues. Compared with custom Lambda-based enforcement, this approach minimizes operational overhead\nand keeps enforcement within AWS native governance services. Option A partially addresses allowed values\nat request time but does not address ongoing governance as cleanly across many services. Option B is not\npreventive because Lambda runs after events and cannot reliably block all creations. Option D still relies on\ncustom logic and is not as operationally efficient as tag policies plus SCP guardrails.", "explanation_cn": "AWS 组织标签策略旨在跨账户标准化和管理标签键及允许的值。AWS 安全专业认证文档将标签策\n略描述为一种治理机制，通过指定所需的标签键和允许的值来帮助强制实施一致的标记。为确保每\n个资源在创建时都有 CostCenter 标签，当 aws:RequestTag/CostCenter 缺失 (为空) 时，SCP 可以拒\n绝创建操作。这可防止在没有所需标签的情况下创建资源。然后，标签策略定义三个批准的值，并\n可根据支持的服务配置为强制执行或报告不兼容性，确保标签值保持在允许的集合内，并防止漂移\n到未批准的值。与基于自定义 Lambda 的实施相比，此方法可最大限度地减少运营开销，并将实施\n保持在 AWS 原生治理服务范围内。选项 A 在请求时部分解决了允许的值，但在跨多个服务进行持\n续治理方面不够完善。选项 B 不是预防性的，因为 Lambda 在事件发生后运行，无法可靠地阻止所\n有创建。选项 D 仍然依赖自定义逻辑，并且在操作效率上不如标签策略加 SCP 护栏。"}];

// Special questions that use matching/ordering format
const SPECIAL_QS = [65, 86];

let mode = null;
let currentIdx = 0;
let answered = false;
let selectedOpt = null;
let shuffled = false;
let categoryFilter = 'all';
let filteredQs = [];
let examAnswers = {};
let examCurrentIdx = 0;

const app = document.getElementById('app');

function showToast(msg, duration) {
  duration = duration || 2000;
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, duration);
}

function getCategories() {
  const cats = {};
  QUESTIONS.forEach(function(q) {
    if (!cats[q.category_en]) cats[q.category_en] = q.category_cn || q.category_en;
  });
  return cats;
}

function getFilteredQuestions() {
  let qs = QUESTIONS.filter(function(q) { return q.answer; });
  if (categoryFilter !== 'all') qs = qs.filter(function(q) { return q.category_en === categoryFilter; });
  if (shuffled) qs = qs.slice().sort(function() { return Math.random() - 0.5; });
  return qs;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isSpecial(q) {
  return SPECIAL_QS.indexOf(q.num) >= 0;
}

function showModeSelect() {
  mode = null;
  const total = QUESTIONS.filter(function(q) { return q.answer; }).length;
  app.innerHTML = '<div class="mode-screen">' +
    '<div class="mode-title">AWS SCS-C03 考試練習</div>' +
    '<div class="mode-sub">選擇練習模式 &middot; 共 ' + total + ' 道題目</div>' +
    '<div class="mode-cards">' +
      '<div class="mode-card" onclick="startStudy()">' +
        '<div class="mode-icon">📖</div>' +
        '<div class="mode-name">複習模式</div>' +
        '<div class="mode-desc">一題一題瀏覽，附中英文對照、答案及解析，可篩選類別、隨機出題。</div>' +
      '</div>' +
      '<div class="mode-card" onclick="startExam()">' +
        '<div class="mode-icon">🎯</div>' +
        '<div class="mode-name">測驗模式</div>' +
        '<div class="mode-desc">模擬考試環境，完成後顯示成績及正確率，並可逐題查看錯題詳解。</div>' +
      '</div>' +
    '</div>' +
  '</div>';
  document.getElementById('headerStats').textContent = '共 ' + total + ' 題';
}

function buildCatSelect() {
  const cats = getCategories();
  let opts = '<option value="all">所有類別</option>';
  Object.keys(cats).sort().forEach(function(en) {
    opts += '<option value="' + escHtml(en) + '"' + (categoryFilter===en?' selected':'') + '>' + escHtml(cats[en]) + ' / ' + escHtml(en) + '</option>';
  });
  return opts;
}

// ============ STUDY MODE ============
function startStudy() {
  mode = 'study'; currentIdx = 0; answered = false; selectedOpt = null;
  filteredQs = getFilteredQuestions(); renderStudy();
}

function renderStudy() {
  filteredQs = getFilteredQuestions();
  if (!filteredQs.length) { app.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px">此類別沒有題目</p>'; return; }
  const q = filteredQs[currentIdx];
  const total = filteredQs.length;
  const pct = Math.round((currentIdx + 1) / total * 100);
  const special = isSpecial(q);

  document.getElementById('headerStats').textContent = '複習模式 · ' + (currentIdx+1) + ' / ' + total;

  let optionsHtml = '';
  if (special) {
    // For special questions, just show options as read-only list
    q.options.forEach(function(opt) {
      const cnPart = (opt.cn && opt.cn !== opt.en) ? '<div class="opt-cn">' + escHtml(opt.cn) + '</div>' : '';
      optionsHtml += '<div class="option disabled">' +
        '<div class="opt-row"><span class="opt-letter">' + opt.letter + '</span>' +
        '<div><div class="opt-en">' + escHtml(opt.en) + '</div>' + cnPart + '</div></div></div>';
    });
  } else {
    q.options.forEach(function(opt) {
      const cnPart = (opt.cn && opt.cn !== opt.en) ? '<div class="opt-cn">' + escHtml(opt.cn) + '</div>' : '';
      optionsHtml += '<div class="option" id="opt-' + opt.letter + '" onclick="selectStudyOpt(\'' + opt.letter + '\')">' +
        '<div class="opt-row"><span class="opt-letter">' + opt.letter + '</span>' +
        '<div><div class="opt-en">' + escHtml(opt.en) + '</div>' + cnPart + '</div></div></div>';
    });
  }

  const catBadge = (q.category_cn && q.category_cn !== q.category_en)
    ? '<span class="badge badge-cat">' + escHtml(q.category_cn) + '</span><span class="badge badge-cat" style="color:var(--text2);border-color:var(--border)">' + escHtml(q.category_en) + '</span>'
    : '<span class="badge badge-cat">' + escHtml(q.category_en) + '</span>';
  const specialBadge = special ? '<span class="badge badge-special">配對 / 排序題</span>' : '';
  const specialNote = special ? '<div class="special-note">⚠️ 此題為配對或排序特殊題型，請直接查看答案與解析。</div>' : '';

  const showAnswerBtn = special
    ? '<button class="btn btn-primary" onclick="showStudyAnswer()">查看答案與解析</button>'
    : '<button class="btn btn-primary" onclick="showStudyAnswer()">顯示答案</button>';

  app.innerHTML =
    '<div class="settings-bar">' +
      '<label>類別：</label><select onchange="setCategoryFilter(this.value)">' + buildCatSelect() + '</select>' +
      '<button class="btn btn-ghost ' + (shuffled?'shuffle-on':'') + '" onclick="toggleShuffle()">' + (shuffled?'🔀 隨機中':'🔀 隨機') + '</button>' +
      '<button class="btn btn-ghost" style="margin-left:auto" onclick="showModeSelect()">← 返回</button>' +
    '</div>' +
    '<div class="progress-wrap">' +
      '<div class="progress-info"><span>第 ' + (currentIdx+1) + ' 題 / 共 ' + total + ' 題</span><span>' + pct + '%</span></div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '</div>' +
    '<div class="q-card">' +
      '<div class="q-meta"><span class="badge badge-num">Q' + q.num + '</span>' + catBadge + specialBadge + '</div>' +
      '<div class="q-en">' + escHtml(q.question_en) + '</div>' +
      (q.question_cn ? '<div class="q-cn">' + escHtml(q.question_cn) + '</div>' : '') +
      specialNote +
      '<div class="options" id="options">' + optionsHtml + '</div>' +
      '<div class="answer-box" id="answerBox">' +
        '<div class="answer-label">正確答案</div>' +
        '<div class="answer-correct">' + escHtml(q.answer) + '</div>' +
        (q.explanation_en ? '<div class="exp-en">' + escHtml(q.explanation_en) + '</div>' : '') +
        (q.explanation_cn ? '<div class="exp-cn">' + escHtml(q.explanation_cn) + '</div>' : '') +
      '</div>' +
      '<div class="btn-row" id="btnRow">' +
        showAnswerBtn +
        '<button class="btn btn-ghost" onclick="prevStudy()"' + (currentIdx===0?' disabled':'') + '>← 上一題</button>' +
        '<button class="btn btn-orange" onclick="nextStudy()">' + (currentIdx===total-1?'完成 ✓':'下一題 →') + '</button>' +
      '</div>' +
    '</div>';
}

function selectStudyOpt(letter) {
  if (answered) return;
  document.querySelectorAll('.option').forEach(function(el) { el.classList.remove('selected'); });
  document.getElementById('opt-' + letter).classList.add('selected');
  selectedOpt = letter;
}

function showStudyAnswer() {
  const q = filteredQs[currentIdx];
  answered = true;
  if (!isSpecial(q)) {
    const correctLetters = q.answer.split(',').map(function(s) { return s.trim(); });
    document.querySelectorAll('.option').forEach(function(el) {
      el.classList.add('disabled');
      const letter = el.id.replace('opt-', '');
      if (correctLetters.indexOf(letter) >= 0) el.classList.add('correct');
      else if (el.classList.contains('selected')) el.classList.add('wrong');
    });
  }
  document.getElementById('answerBox').classList.add('show');
  const total = filteredQs.length;
  document.getElementById('btnRow').innerHTML =
    '<button class="btn btn-ghost" onclick="prevStudy()"' + (currentIdx===0?' disabled':'') + '>← 上一題</button>' +
    '<button class="btn btn-orange" onclick="nextStudy()">' + (currentIdx===total-1?'完成 ✓':'下一題 →') + '</button>';
}

function prevStudy() { if (currentIdx > 0) { currentIdx--; answered = false; selectedOpt = null; renderStudy(); } }
function nextStudy() {
  if (currentIdx < filteredQs.length - 1) { currentIdx++; answered = false; selectedOpt = null; renderStudy(); }
  else { showToast('🎉 已完成所有題目！'); showModeSelect(); }
}
function setCategoryFilter(val) { categoryFilter = val; currentIdx = 0; answered = false; selectedOpt = null; renderStudy(); }
function toggleShuffle() { shuffled = !shuffled; currentIdx = 0; answered = false; selectedOpt = null; renderStudy(); }

// ============ EXAM MODE ============
function startExam() {
  mode = 'exam'; categoryFilter = 'all';
  filteredQs = getFilteredQuestions(); examAnswers = {}; examCurrentIdx = 0; renderExam();
}

function renderExam() {
  const q = filteredQs[examCurrentIdx];
  const total = filteredQs.length;
  const answeredCount = Object.keys(examAnswers).length;
  const prevAns = examAnswers[examCurrentIdx];
  const special = isSpecial(q);

  document.getElementById('headerStats').textContent = '測驗模式 · ' + answeredCount + '/' + total + ' 已作答';

  let optionsHtml = '';
  if (special) {
    q.options.forEach(function(opt) {
      const cnPart = (opt.cn && opt.cn !== opt.en) ? '<div class="opt-cn">' + escHtml(opt.cn) + '</div>' : '';
      optionsHtml += '<div class="option disabled"><div class="opt-row"><span class="opt-letter">' + opt.letter + '</span>' +
        '<div><div class="opt-en">' + escHtml(opt.en) + '</div>' + cnPart + '</div></div></div>';
    });
  } else {
    q.options.forEach(function(opt) {
      const isSel = prevAns && prevAns.selected === opt.letter;
      const cnPart = (opt.cn && opt.cn !== opt.en) ? '<div class="opt-cn">' + escHtml(opt.cn) + '</div>' : '';
      optionsHtml += '<div class="option' + (isSel?' selected':'') + '" id="opt-' + opt.letter + '" onclick="selectExamOpt(\'' + opt.letter + '\')">' +
        '<div class="opt-row"><span class="opt-letter">' + opt.letter + '</span>' +
        '<div><div class="opt-en">' + escHtml(opt.en) + '</div>' + cnPart + '</div></div></div>';
    });
  }

  const specialBadge = special ? '<span class="badge badge-special">配對 / 排序題</span>' : '';
  const specialNote = special ? '<div class="special-note">⚠️ 此題為配對/排序特殊題型。請閱讀後點「此題已讀」繼續。</div>' : '';
  const nextBtn = special
    ? '<button class="btn btn-orange" onclick="markSpecialDone()">此題已讀 →</button>'
    : '<button class="btn btn-orange" onclick="nextExam()">' + (examCurrentIdx===total-1?'完成測驗 →':'下一題 →') + '</button>';

  app.innerHTML =
    '<div class="settings-bar">' +
      '<span style="color:var(--text2);font-size:13px">🎯 測驗模式 · 選擇答案後繼續，完成後查看成績</span>' +
      '<button class="btn btn-ghost" style="margin-left:auto" onclick="confirmQuitExam()">結束測驗</button>' +
    '</div>' +
    '<div class="progress-wrap">' +
      '<div class="progress-info"><span>第 ' + (examCurrentIdx+1) + ' 題 / 共 ' + total + ' 題</span><span>已作答 ' + answeredCount + ' 題</span></div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.round((examCurrentIdx+1)/total*100) + '%"></div></div>' +
    '</div>' +
    '<div class="q-card">' +
      '<div class="q-meta"><span class="badge badge-num">Q' + q.num + '</span>' +
        '<span class="badge badge-cat">' + escHtml(q.category_cn || q.category_en) + '</span>' + specialBadge + '</div>' +
      '<div class="q-en">' + escHtml(q.question_en) + '</div>' +
      (q.question_cn ? '<div class="q-cn">' + escHtml(q.question_cn) + '</div>' : '') +
      specialNote +
      '<div class="options">' + optionsHtml + '</div>' +
      '<div class="nav-row">' +
        '<button class="btn btn-ghost" onclick="prevExam()"' + (examCurrentIdx===0?' disabled':'') + '>← 上一題</button>' +
        nextBtn +
      '</div>' +
    '</div>';
}

function markSpecialDone() {
  // Mark special question as "seen" and skip in scoring
  examAnswers[examCurrentIdx] = { selected: 'SPECIAL', correct: true, correctAnswer: 'SPECIAL', q: filteredQs[examCurrentIdx], qIdx: examCurrentIdx };
  nextExam();
}

function selectExamOpt(letter) {
  document.querySelectorAll('.option').forEach(function(el) { el.classList.remove('selected'); });
  document.getElementById('opt-' + letter).classList.add('selected');
  const q = filteredQs[examCurrentIdx];
  const correctLetters = q.answer.split(',').map(function(s) { return s.trim(); });
  examAnswers[examCurrentIdx] = { selected: letter, correct: correctLetters.indexOf(letter) >= 0, correctAnswer: q.answer, q: q, qIdx: examCurrentIdx };
}

function prevExam() { if (examCurrentIdx > 0) { examCurrentIdx--; renderExam(); } }
function nextExam() {
  if (examCurrentIdx < filteredQs.length - 1) { examCurrentIdx++; renderExam(); }
  else { showExamResult(); }
}
function confirmQuitExam() {
  const bar = document.querySelector('.settings-bar');
  if (!bar) return;
  if (document.getElementById('quitConfirm')) return;
  const hasAnswers = Object.keys(examAnswers).length > 0;
  const div = document.createElement('div');
  div.id = 'quitConfirm';
  div.style.cssText = 'display:flex;align-items:center;gap:8px;background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.4);border-radius:8px;padding:8px 14px;font-size:13px;width:100%;margin-top:8px;flex-wrap:wrap;';
  const resultBtn = hasAnswers
    ? '<button class="btn" style="padding:6px 14px;font-size:13px;background:var(--aws-orange);color:#000;" onclick="showExamResult()">查看目前成績</button>'
    : '';
  div.innerHTML =
    '<span style="color:#e74c3c;flex:1">確定要結束測驗嗎？</span>' +
    '<button class="btn btn-ghost" style="padding:6px 14px;font-size:13px;" onclick="document.getElementById(\'quitConfirm\').remove()">取消</button>' +
    resultBtn +
    '<button class="btn" style="padding:6px 14px;font-size:13px;background:#e74c3c;color:#fff;" onclick="showModeSelect()">回首頁</button>';
  bar.appendChild(div);
}

function showExamResult() {
  const total = filteredQs.length;
  const answeredCount = Object.keys(examAnswers).length;
  const scorable = Object.values(examAnswers).filter(function(a) { return a.selected !== 'SPECIAL'; });
  const correctCount = scorable.filter(function(a) { return a.correct; }).length;
  const wrongCount = scorable.length - correctCount;
  const specialCount = answeredCount - scorable.length;
  const unanswered = total - answeredCount;
  const pct = scorable.length > 0 ? Math.round(correctCount / scorable.length * 100) : 0;

  let emoji = '😰';
  if (pct >= 90) emoji = '🏆';
  else if (pct >= 75) emoji = '🎉';
  else if (pct >= 60) emoji = '👍';
  else if (pct >= 40) emoji = '📚';

  document.getElementById('headerStats').textContent = '測驗結果 · ' + correctCount + '/' + scorable.length + ' 正確';

  // ── Category breakdown ──
  const catExpected = {
    'Data Protection': 20,
    'Incident Response': 23,
    'Infrastructure Security': 17,
    'Security Foundations and Governance': 18,
    'Identity and Access Management': 15,
    'Detection': 33
  };
  const catCn = {
    'Data Protection': '數據保護',
    'Incident Response': '事件響應',
    'Infrastructure Security': '基礎設施安全',
    'Security Foundations and Governance': '安全基礎與治理',
    'Identity and Access Management': '身份與存取管理',
    'Detection': '偵測'
  };

  // Build per-category stats from answers
  const catStats = {};
  scorable.forEach(function(a) {
    const cat = a.q.category_en;
    if (!catStats[cat]) catStats[cat] = { total: 0, correct: 0, wrong: 0 };
    catStats[cat].total++;
    if (a.correct) catStats[cat].correct++;
    else catStats[cat].wrong++;
  });

  // Build category rows HTML
  let catRowsHtml = '';
  const catOrder = ['Data Protection','Incident Response','Infrastructure Security','Security Foundations and Governance','Identity and Access Management','Detection'];
  catOrder.forEach(function(cat) {
    const s = catStats[cat] || { total: 0, correct: 0, wrong: 0 };
    const expected = catExpected[cat] || '?';
    const cn = catCn[cat] || cat;
    const catPct = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
    const barColor = catPct >= 75 ? 'var(--green)' : catPct >= 50 ? 'var(--aws-orange)' : 'var(--red)';
    catRowsHtml +=
      '<div class="cat-row">' +
        '<div class="cat-name">' +
          '<span class="cat-cn">' + escHtml(cn) + '</span>' +
          '<span class="cat-en">' + escHtml(cat) + '</span>' +
        '</div>' +
        '<div class="cat-bar-wrap">' +
          '<div class="cat-bar" style="width:' + catPct + '%;background:' + barColor + '"></div>' +
        '</div>' +
        '<div class="cat-nums">' +
          '<span class="cat-correct">✓ ' + s.correct + '</span>' +
          '<span class="cat-wrong">✗ ' + s.wrong + '</span>' +
          '<span class="cat-total">/ ' + s.total + ' 題</span>' +
          '<span class="cat-pct" style="color:' + barColor + '">' + catPct + '%</span>' +
        '</div>' +
      '</div>';
  });

  // Wrong questions list
  const wrongItems = Object.values(examAnswers).filter(function(a) { return !a.correct && a.selected !== 'SPECIAL'; });
  let wrongListHtml = '';
  wrongItems.forEach(function(a) {
    wrongListHtml +=
      '<div class="review-item" onclick="reviewExamQ(' + a.qIdx + ')">' +
        '<span class="review-icon">❌</span>' +
        '<span class="review-qnum">Q' + a.q.num + '</span>' +
        '<span class="review-q">' + escHtml(a.q.question_en.substring(0, 80)) + '...</span>' +
        '<span class="review-ans wrong">你: ' + a.selected + ' / 正解: ' + a.correctAnswer + '</span>' +
      '</div>';
  });

  const unansweredHtml = unanswered > 0
    ? '<div class="result-stat"><div class="stat-val" style="color:var(--text2)">' + unanswered + '</div><div class="stat-lbl">未作答</div></div>' : '';
  const specialHtml = specialCount > 0
    ? '<div class="result-stat"><div class="stat-val" style="color:#c39bd3">' + specialCount + '</div><div class="stat-lbl">配對題(不計分)</div></div>' : '';

  app.innerHTML =
    // ── Score card ──
    '<div class="result-screen">' +
      '<div class="result-emoji">' + emoji + '</div>' +
      '<div class="result-score">' + pct + '%</div>' +
      '<div class="result-label">正確率</div>' +
      '<div class="result-grid">' +
        '<div class="result-stat"><div class="stat-val" style="color:var(--text3)">' + total + '</div><div class="stat-lbl">總題數</div></div>' +
        '<div class="result-stat"><div class="stat-val stat-green">' + correctCount + '</div><div class="stat-lbl">答對</div></div>' +
        '<div class="result-stat"><div class="stat-val stat-red">' + wrongCount + '</div><div class="stat-lbl">答錯</div></div>' +
        unansweredHtml + specialHtml +
      '</div>' +
      '<div class="btn-row" style="justify-content:center;margin-top:8px">' +
        '<button class="btn btn-orange" onclick="startExam()">再測一次</button>' +
        '<button class="btn btn-ghost" onclick="showModeSelect()">回首頁</button>' +
      '</div>' +
    '</div>' +

    // ── Category breakdown ──
    '<div class="cat-breakdown">' +
      '<div class="section-title">📊 各類別成績分析</div>' +
      catRowsHtml +
    '</div>' +

    // ── Wrong list ──
    (wrongListHtml
      ? '<div class="review-list">' +
          '<div class="section-title">❌ 錯題複習（共 ' + wrongCount + ' 題，點擊查看詳解）</div>' +
          wrongListHtml +
        '</div>'
      : '<div style="text-align:center;padding:24px;color:var(--green);font-size:16px;font-weight:600">🎊 全部答對！太厲害了！</div>');
}

function reviewExamQ(idx) {
  const q = filteredQs[idx];
  const ans = examAnswers[idx];
  const correctLetters = q.answer.split(',').map(function(s) { return s.trim(); });
  document.getElementById('headerStats').textContent = '錯題複習 · Q' + q.num;

  let optionsHtml = '';
  q.options.forEach(function(opt) {
    let cls = 'disabled';
    if (correctLetters.indexOf(opt.letter) >= 0) cls += ' correct';
    else if (ans && ans.selected === opt.letter) cls += ' wrong';
    const cnPart = (opt.cn && opt.cn !== opt.en) ? '<div class="opt-cn">' + escHtml(opt.cn) + '</div>' : '';
    optionsHtml += '<div class="option ' + cls + '"><div class="opt-row"><span class="opt-letter">' + opt.letter + '</span>' +
      '<div><div class="opt-en">' + escHtml(opt.en) + '</div>' + cnPart + '</div></div></div>';
  });

  app.innerHTML =
    '<div class="settings-bar"><button class="btn btn-ghost" onclick="showExamResult()">← 返回成績</button></div>' +
    '<div class="q-card">' +
      '<div class="q-meta"><span class="badge badge-num">Q' + q.num + '</span>' +
        '<span class="badge badge-cat">' + escHtml(q.category_cn || q.category_en) + '</span>' +
        '<span class="badge" style="background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.3)">你選了 ' + (ans?ans.selected:'未作答') + ' · 正解 ' + q.answer + '</span>' +
      '</div>' +
      '<div class="q-en">' + escHtml(q.question_en) + '</div>' +
      (q.question_cn ? '<div class="q-cn">' + escHtml(q.question_cn) + '</div>' : '') +
      '<div class="options">' + optionsHtml + '</div>' +
      '<div class="answer-box show" style="margin-top:16px">' +
        '<div class="answer-label">正確答案</div>' +
        '<div class="answer-correct">' + escHtml(q.answer) + '</div>' +
        (q.explanation_en ? '<div class="exp-en">' + escHtml(q.explanation_en) + '</div>' : '') +
        (q.explanation_cn ? '<div class="exp-cn">' + escHtml(q.explanation_cn) + '</div>' : '') +
      '</div>' +
    '</div>';
}

showModeSelect();
</script>
</body>
</html>
