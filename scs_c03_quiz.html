AM 角色的活动会话可防止 EC2 实例继续访问 AWS 服务。更新 S3 存储桶策略以明确拒绝\nIAM 角色的访问权限可确保立即生效，即使临时凭证仍被缓存。从实例配置文件中删除 IAM 角色\n可进一步防止颁发新的凭证。\n选项 A 和 D 涉及大规模的数据移动或重新加密，既耗时又操作成本高。选项 B 依赖于网络级控制，\n无法防止通过 AWS 专用端点进行访问。\nAWS 指南明确建议，在活动事件期间，凭证撤销和基于策略的拒绝是最快的遏制步骤。"}, {"num": 21, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company has an encrypted Amazon Aurora DB cluster in the us-east-1 Region. The DB cluster is encrypted with an AWS Key Management Service (AWS KMS) customer managed key. To meet compliance\nrequirements, the company needs to copy a DB snapshot to the us-west-1 Region. However, when the company tries to copy the snapshot to us-west-1, the company cannot access the key that was used to encrypt the\noriginal database.\n\n\nWhat should the company do to set up the snapshot in us-west-1 with proper encryption?", "question_cn": "一家公司在美国东部 1 区有一个加密的 Amazon Aurora 数据库集群。该数据库集群使用 AWS 密钥\n管理服务 (AWS KMS) 客户管理密钥进行加密。为了满足合规要求，公司需要将数据库快照复制到\n美国西部 1 区。但是，当公司尝试将快照复制到美国西部 1 区时，无法访问用于加密原始数据库的\n密钥。\n公司应如何在具有适当加密的美国西部 1 区设置快照？", "options": [{"letter": "A", "en": "Use AWS Secrets Manager to store the customer managed key in us-west-1 as a secret. Use this secret\nto encrypt the snapshot in us-west-1.", "cn": "使用 AWS Secrets Manager 将客户管理密钥作为机密存储在美国西部 1 区。使用此机密在美国西\n部 1 区加密快照。"}, {"letter": "B", "en": "Create a new customer managed key in us-west-1. Use this new key to encrypt the snapshot in us-west1.", "cn": "在美国西部 1 区创建一个新的客户管理密钥。使用此新密钥在美国西部 1 区加密快照。"}, {"letter": "C", "en": "Create an IAM policy that allows access to the customer managed key in us-east-1. Specify arn:aws:\nkms:us-west-1:* as the principal.", "cn": "创建一个 IAM 策略，允许访问美国东部 1 区的客户管理密钥。指定 arn:aws: kms:us-west-1:* 作\n为主体。"}, {"letter": "D", "en": "Create an IAM policy that allows access to the customer managed key in us-east-1. Specify arn:aws:rds:\nus-west-1:* as the principal.", "cn": "创建一个 IAM 策略，允许访问美国东部 1 区的客户管理密钥。指定 arn:aws:rds: us-west-1:* 作为\n主体。"}], "answer": "B", "explanation_en": "AWS Key Management Service (KMS) customer managed keys are regional resources. According to the\nAWS Certified Security - Specialty Official Study Guide and KMS documentation, a KMS key created in one\nAWS Region cannot be used directly in another Region. When copying an encrypted Amazon Aurora DB\nsnapshot across Regions, the destination Region must have access to a KMS key that exists in that Region.\n\n\nBecause the original KMS key resides in us-east-1, it cannot be accessed or referenced in us-west-1. The\ncorrect and supported approach is to create a new customer managed KMS key in us-west-1 and specify that\nkey when performing the cross-Region snapshot copy. Amazon RDS automatically decrypts the snapshot\nusing the source Region key and re-encrypts it using the destination Region key during the copy process.\nOption A is invalid because KMS keys cannot be stored or transferred through AWS Secrets Manager.\nOptions C and D are incorrect because IAM policies cannot grant cross-Region usage of a KMS key; KMS\nenforces strict regional boundaries regardless of IAM permissions.\nAWS documentation clearly states that cross-Region encrypted snapshot copies require a KMS key in the\ndestination Region, making this approach mandatory for compliance and encryption continuity.\nAWS Certified Security - Specialty Official Study Guide\nAWS Key Management Service Developer Guide\nAmazon Aurora Security Documentation", "explanation_cn": "AWS 密钥管理服务 (KMS) 客户管理密钥是区域资源。根据《AWS 认证安全 - 专业官方学习指南》\n和 KMS 文档，在一个 AWS 区域中创建的 KMS 密钥不能直接在另一个区域中使用。当跨区域复制\n加密的 Amazon Aurora 数据库快照时，目标区域必须能够访问该区域中存在的 KMS 密钥。\n由于原始 KMS 密钥位于美国东部 - 1 区域，因此在美西 - 1 区域中无法访问或引用它。正确且受支\n持的方法是在美西 - 1 区域中创建一个新的客户管理 KMS 密钥，并在执行跨区域快照复制时指定\n该密钥。在复制过程中，Amazon RDS 会使用源区域密钥自动解密快照，并使用目标区域密钥重新\n加密它。\n选项 A 无效，因为 KMS 密钥不能通过 AWS Secrets Manager 存储或传输。选项 C 和 D 不正确，因\n为 IAM 策略不能授予 KMS 密钥的跨区域使用权限；无论 IAM 权限如何，KMS 都强制执行严格的\n区域边界。\nAWS 文档明确指出，跨区域加密快照复制需要目标区域中的 KMS 密钥，因此这种方法对于合规性\n和加密连续性是必需的。\n《AWS 认证安全 - 专业官方学习指南》\n《AWS 密钥管理服务开发者指南》\n《Amazon Aurora 安全文档》"}, {"num": 22, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company uses AWS Organizations to manage an organization that consists of three workload OUs:\nProduction, Development, and Testing. The company uses AWS CloudFormation templates to define and\n\n\ndeploy workload infrastructure in AWS accounts that are associated with the OUs. Different SCPs are attached\nto each workload OU.\nThe company successfully deployed a CloudFormation stack update to workloads in the Development\nOU and the Testing OU. When the company uses the same CloudFormation template to deploy the stack\nupdate in an account in the Production OU, the update fails. The error message reports insufficient IAM\npermissions.\nWhat is the FIRST step that a security engineer should take to troubleshoot this issue?", "question_cn": "一家公司使用 AWS Organizations 来管理一个由三个工作负载组织单元 (OU) 组成的组织: 生产、开\n发和测试。该公司使用 AWS CloudFormation 模板来定义和部署与这些 OU 相关联的 AWS 账户中\n的工作负载基础设施。不同的服务控制策略 (SCP) 附加到每个工作负载 OU。\n该公司成功地将 CloudFormation 堆栈更新部署到了开发 OU 和测试 OU 中的工作负载。当该公司\n使用相同的 CloudFormation 模板在生产 OU 中的一个账户中部署堆栈更新时，更新失败。错误消\n息报告 IAM 权限不足。\n安全工程师应采取的解决此问题的第一步是什么？", "options": [{"letter": "A", "en": "Review the AWS CloudTrail logs in the account in the Production OU. Search for any failed API calls\nfrom CloudFormation during the deployment attempt.", "cn": "查看生产 OU 中账户的 AWS CloudTrail 日志。在部署尝试期间搜索来自 CloudFormation 的任何\n失败的 API 调用。"}, {"letter": "B", "en": "Remove all the SCPs that are attached to the Production OU. Rerun the CloudFormation stack update\nto determine if the SCPs were preventing the CloudFormation API calls.", "cn": "删除附加到生产 OU 的所有 SCP。重新运行 CloudFormation 堆栈更新以确定 SCP 是否阻止了\nCloudFormation API 调用。"}, {"letter": "C", "en": "Confirm that the role used by CloudFormation has sufficient permissions to create, update, and delete\nthe resources that are referenced in the CloudFormation template.", "cn": "确认 CloudFormation 使用的角色具有足够的权限来创建、更新和删除 CloudFormation 模板中\n引用的资源。"}, {"letter": "D", "en": "Make all the SCPs that are attached to the Production OU the same as the SCPs that are attached to\nthe Testing OU.", "cn": "使附加到生产组织单元 (OU) 的所有服务控制策略 (SCP) 与附加到测试 OU 的 SCP 相同。"}], "answer": "A", "explanation_en": "AWS CloudTrail provides a record of all API calls made in an AWS account, including calls initiated by\nAWS CloudFormation. According to the AWS Certified Security - Specialty Study Guide, CloudTrail is the\nprimary source for troubleshooting authorization failures because it records denied actions and the policy\ntype that caused the denial, including service control policies.\nReviewing CloudTrail logs allows a security engineer to identify which specific API calls failed during the\nCloudFormation deployment and whether the denial was caused by an SCP, an IAM policy, or a permission\nboundary. This evidence-based approach is the recommended first step before making any configuration\nchanges.\nOption B is unsafe and violates governance best practices by removing SCPs in production. Option C may\nbe necessary later, but it does not identify whether SCPs are the root cause. Option D introduces unnecessary\nrisk and bypasses the purpose of differentiated controls across OUs.\nAWS documentation emphasizes observing and validating before modifying security controls, making\nCloudTrail log analysis the correct initial troubleshooting step.", "explanation_cn": "AWS CloudTrail 提供了 AWS 账户中所有 API 调用的记录，包括由 AWS CloudFormation 发起的调\n用。根据《AWS 认证安全 - 专业认证学习指南》，CloudTrail 是排查授权失败问题的主要来源，因\n为它记录了被拒绝的操作以及导致拒绝的策略类型，包括服务控制策略。\n查看 CloudTrail 日志可使安全工程师确定在 CloudFormation 部署期间哪些特定的 API 调用失败，\n以及拒绝是由 SCP、IAM 策略还是权限边界导致的。这种基于证据的方法是在进行任何配置更改之\n前推荐的第一步。\n选项 B 不安全，并且通过在生产环境中删除 SCP 违反了治理最佳实践。选项 C 稍后可能有必要，但\n它无法确定 SCP 是否是根本原因。选项 D 引入了不必要的风险，并绕过了跨组织单元进行差异化\n控制的目的。\nAWS 文档强调在修改安全控制之前进行观察和验证，这使得 CloudTrail 日志分析成为正确的初始\n故障排除步骤。"}, {"num": 23, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company runs an internet-accessible application on several Amazon EC2 instances that run Windows\nServer. The company used an instance profile to configure the EC2 instances. A security team currently\naccesses the VPC that hosts the EC2 instances by using an AWS Site-to-Site VPN tunnel from an on-premises\noffice.\nThe security team issues a policy that requires all external access to the VPC to be blocked in the event of\na security incident. However, during an incident, the security team must be able to access the EC2 instances\nto obtain forensic information on the instances.\nWhich solution will meet these requirements?", "question_cn": "一家公司在运行 Windows Server 的多个 Amazon EC2 实例上运行一个可通过互联网访问的应用程\n序。该公司使用实例配置文件来配置 EC2 实例。安全团队目前通过从本地办公室使用 AWS 站点到\n站点 VPN 隧道来访问承载 EC2 实例的 VPC。\n安全团队发布了一项策略，要求在发生安全事件时阻止对 VPC 的所有外部访问。但是，在事件期\n间，安全团队必须能够访问 EC2 实例以获取有关这些实例的取证信息。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Install EC2 Instance Connect on the EC2 instances. Update the IAM policy for the IAM role to grant\nthe required permissions. Use the AWS CLI to open a tunnel to connect to the instances.", "cn": "在 EC2 实例上安装 EC2 实例连接。更新 IAM 角色的 IAM 策略以授予所需权限。使用 AWS CLI\n打开隧道以连接到实例。"}, {"letter": "B", "en": "Install EC2 Instance Connect on the EC2 instances. Configure the instances to permit access to the\nec2- instance-connect command user. Use the AWS Management Console to connect to the EC2 instances.", "cn": "在 EC2 实例上安装 EC2 实例连接。将实例配置为允许访问 ec2-实例-连接命令用户。使用 AWS\n管理控制台连接到 EC2 实例。"}, {"letter": "C", "en": "Create an EC2 Instance Connect endpoint in the VPC. Configure an appropriate security group to\nallow access between the EC2 instances and the endpoint. Use the AWS CLI to open a tunnel to connect to\nthe instances.", "cn": "在 VPC 中创建一个 EC2 实例连接端点。配置适当的安全组以允许在 EC2 实例和端点之间进行访\n问。使用 AWS CLI 打开隧道以连接到实例。"}, {"letter": "D", "en": "Create an EC2 Instance Connect endpoint in the VPC. Configure an appropriate security group to\nallow access between the EC2 instances and the endpoint. Use the AWS Management Console to connect to\nthe EC2 instances.", "cn": "在 VPC 中创建一个 EC2 实例连接端点。配置适当的安全组以允许在 EC2 实例和端点之间进行访\n问。使用 AWS 管理控制台连接到 EC2 实例。"}], "answer": "D", "explanation_en": "EC2 Instance Connect endpoints provide secure, private connectivity to EC2 instances without requiring public IP addresses, inbound internet access, or VPN connectivity. According to AWS Certified Security\n- Specialty documentation, Instance Connect endpoints are designed specifically for incident response and\nsecure administrative access scenarios.\nBy deploying an EC2 Instance Connect endpoint in the VPC, the security team can block all external\nnetwork access while still maintaining controlled access to EC2 instances through the AWS Management\nConsole. The endpoint uses AWS-managed infrastructure and private connectivity, and access is authorized\nusing IAM policies and instance profiles.\n\n\nOptions A and B rely on direct EC2 Instance Connect installation and network paths that may still depend\non external access. Option C is incorrect because tunneling is not required when using the console-based\nInstance Connect endpoint.\nThis solution enables forensic access during incidents without reopening external network paths, aligning with AWS incident response best practices.", "explanation_cn": "EC2 实例连接端点提供对 EC2 实例的安全、专用连接，无需公共 IP 地址、入站互联网访问或 VPN\n连接。根据 AWS 安全认证 - 专业文档，实例连接端点专为事件响应和安全管理访问场景而设计。\n通过在 VPC 中部署 EC2 实例连接端点，安全团队可以阻止所有外部网络访问，同时仍通过 AWS\n管理控制台保持对 EC2 实例的受控访问。该端点使用 AWS 管理的基础设施和专用连接，并且使用\nIAM 策略和实例配置文件进行访问授权。\n选项 A 和 B 依赖于直接安装 EC2 实例连接以及可能仍依赖外部访问的网络路径。选项 C 不正确，\n因为使用基于控制台的实例连接端点时不需要隧道。\n此解决方案可在事件期间实现取证访问，而无需重新打开外部网络路径，符合 AWS 事件响应最佳\n实践。"}, {"num": 24, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company’s security engineer receives an alert that indicates that an unexpected principal is accessing\na company-owned Amazon Simple Queue Service (Amazon SQS) queue. All the company’s accounts are\nwithin an organization in AWS Organizations. The security engineer must implement a mitigation solution\nthat minimizes compliance violations and investment in tools that are outside of AWS.\n\n\nWhat should the security engineer do to meet these requirements?", "question_cn": "公司的安全工程师收到一条警报，表明有一个意外的主体正在访问公司拥有的亚马逊简单队列服务\n(Amazon SQS) 队列。公司的所有账户都在 AWS 组织中的一个组织内。安全工程师必须实施一种缓\n解解决方案，以尽量减少合规违规情况，并减少对 AWS 外部工具的投资。\n安全工程师应采取什么措施来满足这些要求？", "options": [{"letter": "A", "en": "Create security groups that only accept inbound traffic from the CIDR blocks of all the VPCs in the\norganization. Attach the security groups to all the SQS queues in all the VPCs in the organization.", "cn": "创建安全组，使其仅接受来自组织中所有 VPC 的 CIDR 块的入站流量。将这些安全组附加到组\n织中所有 VPC 中的所有 SQS 队列。"}, {"letter": "B", "en": "In all the VPCs in the organization, adjust the network ACLs to only accept inbound traffic from the\nCIDR blocks of all the VPCs in the organization. Attach the network ACLs to all the subnets in all the VPCs\nin the organization.", "cn": "在组织中的所有 VPC 中，调整网络 ACL，使其仅接受来自组织中所有 VPC 的 CIDR 块的入站流\n量。将这些网络 ACL 附加到组织中所有 VPC 中的所有子网。"}, {"letter": "C", "en": "Create interface VPC endpoints for Amazon SQS in all the VPCs in the organization. Set the aws:\nSourceVpce condition to the VPC endpoint identifier on the SQS policy. Add the aws:PrincipalOrgId condition\nto the VPC endpoint policy.", "cn": "在组织中的所有 VPC 中为 Amazon SQS 创建接口 VPC 端点。在 SQS 策略上将 aws:SourceVpce\n条件设置为 VPC 端点标识符。在 VPC 端点策略中添加 aws:PrincipalOrgId 条件。"}, {"letter": "D", "en": "Use a cloud access security broker (CASB) to maintain a list of managed resources. Configure the\nCASB to check the API and console access against that list on a web proxy.", "cn": "使用云访问安全代理 (CASB) 维护托管资源列表。配置 CASB 以在 Web 代理上根据该列表检查\nAPI 和控制台访问。"}], "answer": "C", "explanation_en": "Amazon SQS is an AWS-managed service and does not operate within customer VPCs. Therefore, security groups and network ACLs cannot be used to control access to SQS, making options A and B invalid.\nAccording to AWS Certified Security - Specialty documentation, the recommended approach to securely access AWS services from within a VPC is through interface VPC endpoints (AWS PrivateLink).\n\n\nBy creating interface VPC endpoints for Amazon SQS, the company ensures that traffic to SQS stays\nwithin the AWS network and does not traverse the public internet. Adding an SQS resource policy with the\naws:SourceVpce condition restricts access so that only requests originating from the specified VPC endpoint\nare allowed. Additionally, using the aws:PrincipalOrgId condition ensures that only principals belonging to\nthe same AWS Organization can access the queue.\nOption D introduces an external tool, increasing cost and compliance complexity, which directly violates\nthe requirement to minimize investment outside AWS.\nAWS documentation clearly identifies VPC endpoints combined with IAM condition keys as a best practice for securing service access in multi-account environments.\nAWS Certified Security - Specialty Official Study Guide\nAmazon SQS Security Best Practices\nAWS Organizations Documentation\nQ AWS PrivateLink User Guide", "explanation_cn": "Amazon SQS 是一项由 AWS 管理的服务，不在客户 VPC 内运行。因此，安全组和网络 ACL 不能用\n于控制对 SQS 的访问，这使得选项 A 和 B 无效。根据 AWS Certified Security - Specialty 文档，从\nVPC 内部安全访问 AWS 服务的推荐方法是通过接口 VPC 端点 (AWS PrivateLink)。\n通过为 Amazon SQS 创建接口 VPC 端点，公司确保到 SQS 的流量保持在 AWS 网络内，不会穿越公\n共互联网。添加带有 aws:SourceVpce 条件的 SQS 资源策略可限制访问，以便仅允许来自指定 VPC\n端点的请求。此外，使用 aws:PrincipalOrgId 条件可确保只有属于同一 AWS 组织的主体才能访问队\n列。\n选项 D 引入了一个外部工具，增加了成本和合规复杂性，这直接违反了将 AWS 外部投资降至最低\n的要求。\nAWS 文档明确将 VPC 端点与 IAM 条件键结合起来，作为在多账户环境中保护服务访问的最佳实\n践。\nAWS Certified Security - Specialty 官方学习指南\nAmazon SQS 安全最佳实践\nAWS Organizations 文档\nQ AWS PrivateLink 用户指南"}, {"num": 25, "category_en": "Identity and Access Management", "category_cn": "身份和访问管理", "question_en": "A company uses several AWS CloudFormation stacks to handle the deployment of a suite of applications.\nThe leader of the company’s application development team notices that the stack deployments fail with permission errors when some team members try to deploy the stacks. However, other team members can deploy\nthe stacks successfully.\nThe team members access the account by assuming a role that has a specific set of permissions. All team\nmembers have permissions to perform operations on the stacks.\nWhich combination of steps will ensure consistent deployment of the stacks MOST securely? (Select\nTHREE.)", "question_cn": "一家公司使用多个 AWS CloudFormation 堆栈来处理一组应用程序的部署。该公司应用程序\n开发团队的负责人注意到，当一些团队成员尝试部署堆栈时，堆栈部署因权限错误而失败。然而，\n其他团队成员可以成功部署堆栈。\n 团队成员通过承担具有特定权限集的角色来访问账户。所有团队成员都有权对堆栈执行操\n作。\n 以下哪些步骤组合将最安全地确保堆栈的一致部署？(选择三项。)", "options": [{"letter": "A", "en": "Create a service role that has a composite principal that contains each service that needs the necessary\npermissions.", "cn": "创建一个具有复合主体的服务角色，该复合主体包含需要必要权限的每个服务。"}, {"letter": "B", "en": "Create a service role that has cloudformation.amazonaws.com as the service principal.", "cn": "创建一个以 cloudformation.amazonaws.com 作为服务主体的服务角色。"}, {"letter": "C", "en": "Add policies that reference each CloudFormation stack ARN.", "cn": "添加引用每个 CloudFormation 堆栈 ARN 的策略。"}, {"letter": "D", "en": "Add policies that reference the ARNs of each AWS service that requires permissions.", "cn": "添加引用每个需要权限的 AWS 服务的 ARN 的策略。"}, {"letter": "E", "en": "Update each stack to use the service role.", "cn": "更新每个堆栈以使用该服务角色。\nF. Add a policy to each member role to allow the iam:PassRole action for the service role.\nF. 向每个成员角色添加一个策略，以允许对服务角色执行 iam:PassRole 操作。"}], "answer": "B", "explanation_en": "AWS CloudFormation supports the use of a service role, which allows CloudFormation to assume a dedicated IAM role to create and manage resources on behalf of users. According to the AWS Certified Security Specialty Study Guide, using a service role is the most secure and consistent way to ensure predictable stack\ndeployments when users have varying permission sets.\nBy creating a service role with cloudformation.amazonaws.com as the trusted service principal (Option\nB), CloudFormation - not individual users - assumes responsibility for resource creation. Updating each stack\nto explicitly use this service role (Option E) ensures that all deployments use the same permission set, eliminating inconsistencies.\nGranting the team members permission to pass the service role via iam:PassRole (Option F) is required\nso that CloudFormation can assume the role during stack operations. This approach adheres to the principle\nof least privilege and prevents users from gaining direct access to elevated permissions.\nComposite principals (Option A) are unnecessary and insecure. Referencing stack ARNs (Option C) does\nnot solve the root cause. While Option D reflects good policy design, it is implicit in creating the service role\nand is not a required standalone step.\nAWS documentation clearly identifies CloudFormation service roles combined with iam:PassRole as best\npractice for secure, consistent infrastructure deployments.\n\n\nAWS Certified Security - Specialty Official Study Guide\nQ AWS CloudFormation Service Role Documentation\nQ AWS IAM Best Practices", "explanation_cn": "AWS CloudFormation 支持使用服务角色，这允许 CloudFormation 承担一个专用的 IAM 角\n色，以便代表用户创建和管理资源。根据《AWS 认证安全 - 专业指南》，当用户具有不同的权限集\n时，使用服务角色是确保可预测的堆栈部署的最安全和一致的方法。\n 通过创建一个以 cloudformation.amazonaws.com 作为可信服务主体的服务角色 (选项 B)，是\nCloudFormation 而不是单个用户负责资源创建。更新每个堆栈以明确使用此服务角色 (选项 E) 可\n确保所有部署使用相同的权限集，消除不一致性。\n 授予团队成员通过 iam:PassRole 传递服务角色的权限 (选项 F) 是必要的，以便 CloudFormation 可以在堆栈操作期间承担该角色。这种方法遵循最小权限原则，并防止用户直接获得提升的权\n限。\n 复合主体 (选项 A) 是不必要且不安全的。引用堆栈 ARN(选项 C) 不能解决根本原因。虽然\n选项 D 反映了良好的策略设计，但它在创建服务角色时是隐含的，不是必需的独立步骤。\nAWS 文档明确将 CloudFormation 服务角色与 iam:PassRole 结合起来，作为安全、一致的基\n础设施部署的最佳实践。\nAWS 安全认证 - 专业版官方学习指南\n问:AWS 云 Formation 服务角色文档\n问:AWS IAM 最佳实践"}, {"num": 26, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company is planning to migrate its applications to AWS in a single AWS Region. The company’s applications will use a combination of Amazon EC2 instances, Elastic Load Balancing (ELB) load balancers, and\nAmazon S3 buckets. The company wants to complete the migration as quickly as possible. All the applications\nmust meet the following requirements:\n• Data must be encrypted at rest.\n• Data must be encrypted in transit.\n• Endpoints must be monitored for anomalous network traffic.\nWhich combination of steps should a security engineer take to meet these requirements with the LEAST\neffort? (Select THREE.)", "question_cn": "一家公司计划将其应用程序迁移到单个 AWS 区域。该公司的应用程序将结合使用亚马逊 EC2 实例、\n弹性负载均衡 (ELB) 负载均衡器和亚马逊 S3 存储桶。公司希望尽快完成迁移。所有应用程序必须\n满足以下要求:\n• 数据必须在静止时加密。\n• 数据必须在传输时加密。\n• 必须监控端点的异常网络流量。\n安全工程师应采取哪些步骤组合，以最少的工作量满足这些要求？(选择三项。)", "options": [{"letter": "A", "en": "Install the Amazon Inspector agent on EC2 instances by using AWS Systems Manager Automation.", "cn": "使用 AWS 系统管理器自动化在 EC2 实例上安装亚马逊 Inspector 代理。"}, {"letter": "B", "en": "Enable Amazon GuardDuty in all AWS accounts.", "cn": "在所有 AWS 账户中启用亚马逊 GuardDuty。"}, {"letter": "C", "en": "Create VPC endpoints for Amazon EC2 and Amazon S3. Update VPC route tables to use only the\nsecure VPC endpoints.", "cn": "为亚马逊 EC2 和亚马逊 S3 创建 VPC 端点。更新 VPC 路由表以仅使用安全的 VPC 端点。"}, {"letter": "D", "en": "Configure AWS Certificate Manager (ACM). Configure the load balancers to use certificates from\nACM.", "cn": "配置 AWS 证书管理器 (ACM)。配置负载均衡器以使用 ACM 中的证书。"}, {"letter": "E", "en": "Use AWS Key Management Service (AWS KMS) for key management. Create an S3 bucket policy to\ndeny any PutObject command with a condition for x-amz-meta-side-encryption.", "cn": "使用 AWS 密钥管理服务 (AWS KMS) 进行密钥管理。创建一个 S3 存储桶策略，以在 x-amz-metaside-encryption 条件下拒绝任何 PutObject 命令。\nF. Use AWS Key Management Service (AWS KMS) for key management. Create an S3 bucket policy to\ndeny any PutObject command with a condition for x-amz-server-side-encryption.\nF. 使用 AWS 密钥管理服务 (AWS KMS) 进行密钥管理。创建一个 S3 存储桶策略，以在 x-amz-serverside-encryption 条件下拒绝任何 PutObject 命令。"}], "answer": "B", "explanation_en": "Amazon GuardDuty provides continuous monitoring for anomalous and malicious network activity by\nanalyzing VPC Flow Logs, DNS logs, and CloudTrail events. Enabling GuardDuty across accounts requires\nminimal configuration and immediately satisfies the requirement to monitor endpoints for anomalous network traffic, as described in the AWS Certified Security - Specialty Study Guide.\n\n\nEncrypting data in transit for applications behind Elastic Load Balancing is most efficiently achieved\nby using AWS Certificate Manager (ACM). ACM provisions and manages TLS certificates automatically, and\nintegrating ACM with ELB enables encrypted communication without manual certificate management.\nFor encryption at rest in Amazon S3, AWS best practices recommend enforcing server-side encryption\nusing AWS KMS. An S3 bucket policy that denies PutObject requests unless the x-amz-server-side-encryption\ncondition is present ensures that all uploaded objects are encrypted at rest using KMS-managed keys. This\nprovides strong encryption guarantees with minimal operational effort.\nOption A is unnecessary because Amazon Inspector focuses on vulnerability assessment, not encryption\nor network anomaly detection. Option C adds network complexity and is not required to meet the stated\nrequirements. Option E is incorrect because x-amz-meta-side-encryption is not a valid enforcement mechanism.", "explanation_cn": "Amazon GuardDuty 通过分析 VPC 流日志、DNS 日志和 CloudTrail 事件，对异常和恶意网络活动\n进行持续监控。如 AWS 认证安全 - 专业版学习指南中所述，跨账户启用 GuardDuty 只需最少的配\n置，并能立即满足监控端点有无异常网络流量的要求。\n对于弹性负载均衡后面的应用程序，通过使用 AWS 证书管理器 (ACM) 来就地加密数据最为高效。\nACM 会自动提供和管理 TLS 证书，将 ACM 与 ELB 集成可实现加密通信，而无需手动管理证书。\n对于 Amazon S3 中的静态加密，AWS 最佳实践建议使用 AWS KMS 强制执行服务器端加密。除非\n存在 x-amz-server-side-encryption 条件，否则拒绝 PutObject 请求的 S3 存储桶策略可确保所有上传\n的对象都使用 KMS 管理的密钥进行静态加密。这只需最少的操作工作量就能提供强大的加密保证。\n选项 A 没有必要，因为 Amazon Inspector 专注于漏洞评估，而非加密或网络异常检测。选项 C 会\n增加网络复杂性，且不符合既定要求。选项 E 不正确，因为 x-amz-meta-side-encryption 不是有效\n的强制机制。"}, {"num": 27, "category_en": "Detection", "category_cn": "检测", "question_en": "A company is planning to deploy a new log analysis environment. The company needs to analyze logs\nfrom multiple AWS services in near real time. The solution must provide the ability to search the logs and\nmust send alerts to an existing Amazon Simple Notification Service (Amazon SNS) topic when specific logs\nmatch detection rules.\nWhich solution will meet these requirements?", "question_cn": "一家公司计划部署一个新的日志分析环境。该公司需要近乎实时地分析来自多个 AWS 服务的日志。\n该解决方案必须具备搜索日志的能力，并且当特定日志匹配检测规则时，必须向现有的 Amazon\nSimple Notification Service(Amazon SNS) 主题发送警报。\n哪种解决方案能满足这些要求？", "options": [{"letter": "A", "en": "Analyze the logs by using Amazon OpenSearch Service. Search the logs from the OpenSearch API.\nUse OpenSearch Service Security Analytics to match logs with detection rules and to send alerts to the SNS\ntopic.", "cn": "使用 Amazon OpenSearch Service 分析日志。通过 OpenSearch API 搜索日志。使用 OpenSearch\nService 安全分析功能将日志与检测规则进行匹配，并向 SNS 主题发送警报。"}, {"letter": "B", "en": "Analyze the logs by using AWS Security Hub. Search the logs from the Findings page in Security Hub.\nCreate custom actions to match logs with detection rules and to send alerts to the SNS topic.", "cn": "使用 AWS 安全中心分析日志。在安全中心的“发现”页面搜索日志。创建自定义操作，将日志\n与检测规则进行匹配，并向 SNS 主题发送警报。"}, {"letter": "C", "en": "Analyze the logs by using Amazon CloudWatch Logs. Use a subscription filter to match logs with\ndetection rules and to send alerts to the SNS topic. Search the logs manually by using CloudWatch Logs\nInsights.", "cn": "使用 Amazon CloudWatch Logs 分析日志。使用订阅过滤器将日志与检测规则进行匹配，并向\nSNS 主题发送警报。通过 CloudWatch Logs Insights 手动搜索日志。"}, {"letter": "D", "en": "Analyze the logs by using Amazon QuickSight. Search the logs by listing the query results in a dashboard. Run queries to match logs with detection rules and to send alerts to the SNS topic.", "cn": "使用 Amazon QuickSight 分析日志。通过在仪表板中列出查询结果来搜索日志。运行查询以将\n日志与检测规则进行匹配，并向 SNS 主题发送警报。"}], "answer": "A", "explanation_en": "Amazon OpenSearch Service is designed for near real-time log ingestion, indexing, and search across\nlarge volumes of data. According to the AWS Certified Security - Specialty Study Guide, OpenSearch supports\nadvanced log analytics use cases and integrates with OpenSearch Security Analytics, which provides prebuilt\nand custom detection rules.\nSecurity Analytics can continuously evaluate incoming logs from multiple AWS services and generate\nalerts when detection rules are matched. These alerts can be forwarded to Amazon SNS with minimal configuration. OpenSearch also provides powerful search and query capabilities through APIs and dashboards.\nOption C supports detection but lacks advanced correlation and scalable search capabilities. Option B is\nnot a log analytics service. Option D is a visualization service and does not support real-time detection.\nAWS guidance recommends OpenSearch Service for centralized, near real-time log analysis and alerting.", "explanation_cn": "Amazon OpenSearch Service 专为近乎实时的日志摄取、\n索引和跨大量数据的搜索而设计。\n根据《AWS\n认证安全 - 专业指南》\n，OpenSearch 支持高级日志分析用例，并与 OpenSearch Security Analytics 集\n成，后者提供预建和自定义检测规则。\n安全分析可以持续评估来自多个 AWS 服务的传入日志，并在检测规则匹配时生成警报。这些警报\n可以通过最少的配置转发到 Amazon SNS。OpenSearch 还通过 API 和仪表板提供强大的搜索和查\n询功能。\n选项 C 支持检测，但缺乏高级关联和可扩展搜索功能。选项 B 不是日志分析服务。选项 D 是可视\n化服务，不支持实时检测。\nAWS 指南推荐使用 OpenSearch Service 进行集中式、近乎实时的日志分析和警报。"}, {"num": 28, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A security engineer needs to control access to data that is encrypted with an AWS Key Management\nService (AWS KMS) customer managed key. The security engineer also needs to use additional authenticated\ndata (AAD) to prevent tampering with ciphertext.\nWhich solution will meet these requirements?", "question_cn": "一名安全工程师需要控制对使用 AWS 密钥管理服务 (AWS KMS) 客户管理密钥加密的数据的访问。\n该安全工程师还需要使用额外的认证数据 (AAD) 来防止对密文的篡改。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Pass the key alias to AWS KMS when calling the Encrypt and Decrypt API actions.", "cn": "在调用 Encrypt 和 Decrypt API 操作时将密钥别名传递给 AWS KMS。"}, {"letter": "B", "en": "Use IAM policies to restrict access to the Encrypt and Decrypt API actions.", "cn": "使用 IAM 策略来限制对 Encrypt 和 Decrypt API 操作的访问。"}, {"letter": "C", "en": "Use the kms:EncryptionContext condition key when defining IAM policies for the customer managed\nkey.", "cn": "在为客户管理密钥定义 IAM 策略时使用 kms:EncryptionContext 条件键。"}, {"letter": "D", "en": "Use key policies to restrict access to the appropriate IAM groups.", "cn": "使用密钥策略来限制对适当 IAM 组的访问。"}], "answer": "C", "explanation_en": "AWS KMS supports additional authenticated data (AAD) through the use of encryption context. According to the AWS Certified Security - Specialty documentation, encryption context is a set of key-value pairs that\nis cryptographically bound to the ciphertext. Any attempt to decrypt the data must include the same encryption context, or decryption will fail. This mechanism protects against ciphertext tampering and unauthorized\nreuse.\nThe kms:EncryptionContext condition key allows security engineers to enforce the use of specific encryption context values in IAM or key policies. By defining conditions that require particular encryption context\nattributes, access to encrypted data can be tightly controlled and bound to specific applications, environments,\nor workflows.\nOption A does not provide integrity protection. Option B controls access but does not enforce the use of\nAAD. Option D restricts administrative access but does not address encryption context enforcement.\nAWS documentation explicitly states that encryption context combined with policy conditions is the recommended method to implement authenticated encryption and fine-grained access control with KMS.", "explanation_cn": "AWS KMS 通过使用加密上下文支持额外的认证数据 (AAD)。根据 AWS 认证安全 - 专业文档，加密\n上下文是一组与密文进行加密绑定的键值对。任何解密数据的尝试都必须包含相同的加密上下文，\n否则解密将失败。此机制可防止密文篡改和未经授权的重用。\nkms:EncryptionContext 条件键允许安全工程师在 IAM 或密钥策略中强制使用特定的加密上下文\n值。通过定义要求特定加密上下文属性的条件，可以严格控制对加密数据的访问，并将其绑定到特\n定的应用程序、环境或工作流程。\n选项 A 不提供完整性保护。选项 B 控制访问，但不强制使用 AAD。选项 D 限制管理访问，但不涉\n及加密上下文强制实施。\nAWS 文档明确指出，加密上下文与策略条件相结合是使用 KMS 实现认证加密和细粒度访问控制的\n推荐方法。"}, {"num": 29, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company’s security engineer receives an abuse notification from AWS indicating that malware is being\nhosted from the company’s AWS account. The security engineer discovers that an IAM user created a new\nAmazon S3 bucket without authorization.\nWhich combination of steps should the security engineer take to MINIMIZE the consequences of this\ncompromise? (Select THREE.)", "question_cn": "一家公司的安全工程师收到 AWS 的滥用通知，表明恶意软件正从该公司的 AWS 账户托管。安全工\n程师发现一名 IAM 用户未经授权创建了一个新的 Amazon S3 存储桶。\n安全工程师应采取以下哪些步骤组合来最小化此安全漏洞的后果？(选择三项。)", "options": [{"letter": "A", "en": "Encrypt all AWS CloudTrail logs.", "cn": "加密所有 AWS CloudTrail 日志。"}, {"letter": "B", "en": "Turn on Amazon GuardDuty.", "cn": "启用亚马逊 GuardDuty。"}, {"letter": "C", "en": "Change the password for all IAM users.", "cn": "更改所有 IAM 用户的密码。"}, {"letter": "D", "en": "Rotate or delete all AWS access keys.", "cn": "轮换或删除所有 AWS 访问密钥。"}, {"letter": "E", "en": "Take snapshots of all Amazon Elastic Block Store (Amazon EBS) volumes.", "cn": "对所有亚马逊弹性块存储 (Amazon EBS) 卷进行快照。\nF. Delete any resources that are unrecognized or unauthorized.\nF. 删除任何无法识别或未经授权的资源。"}], "answer": "B", "explanation_en": "AWS incident response guidance emphasizes immediate containment, credential invalidation, and removal of malicious resources. According to the AWS Certified Security - Specialty documentation, compromised credentials must be rotated or deleted immediately to prevent further unauthorized actions. Rotating\nor deleting access keys directly mitigates ongoing abuse.\nDeleting unrecognized or unauthorized resources, such as the malicious S3 bucket, removes the active\nthreat and limits further damage. Enabling Amazon GuardDuty provides continuous monitoring and helps\nidentify additional compromised resources or malicious behavior that may not yet be visible.\nChanging passwords for all IAM users is disruptive and unnecessary if compromise scope is limited.\nEncrypting CloudTrail logs does not reduce active impact. Taking EBS snapshots is primarily for forensic\ninvestigation, not immediate consequence minimization.\nAWS best practices recommend GuardDuty activation, credential rotation, and removal of malicious resources as first-response actions.", "explanation_cn": "AWS 事件响应指南强调立即遏制、凭证失效以及删除恶意资源。根据 AWS 认证安全 - 专业文档，必\n须立即轮换或删除受损凭证，以防止进一步的未经授权操作。直接轮换或删除访问密钥可直接减轻\n持续的滥用行为。\n删除无法识别或未经授权的资源，例如恶意的 S3 存储桶，可消除当前威胁并限制进一步的损害。启\n用亚马逊 GuardDuty 可提供持续监控，并有助于识别可能尚未显现的其他受损资源或恶意行为。\n如果受影响范围有限，更改所有 IAM 用户的密码具有破坏性且没有必要。加密 CloudTrail 日志并\n不能减少当前影响。对 EBS 卷进行快照主要用于取证调查，而非立即将影响降至最低。\nAWS 最佳实践建议将激活 GuardDuty、轮换凭证以及删除恶意资源作为首要响应行动。"}, {"num": 30, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company uses AWS IAM Identity Center to manage access to its AWS accounts. The accounts are in\nan organization in AWS Organizations. A security engineer needs to set up delegated administration of IAM\nIdentity Center in the organization’s management account.\nWhich combination of steps should the security engineer perform in IAM Identity Center before configuring delegated administration? (Select THREE.)", "question_cn": "一家公司使用 AWS IAM Identity Center 来管理对其 AWS 账户的访问。这些账户位于 AWS Organizations 中的一个组织内。一名安全工程师需要在该组织的管理账户中设置 IAM Identity Center 的\n委托管理。\n在配置委托管理之前，安全工程师应在 IAM Identity Center 中执行哪些步骤组合？(选择三项。)", "options": [{"letter": "A", "en": "Grant least privilege access to the organization’s management account.", "cn": "授予对该组织管理账户的最小权限访问。"}, {"letter": "B", "en": "Create a new IAM Identity Center directory in the organization’s management account.", "cn": "在该组织的管理账户中创建一个新的 IAM Identity Center 目录。"}, {"letter": "C", "en": "Set up a second AWS Region in the organization’s management account.", "cn": "在该组织的管理账户中设置第二个 AWS 区域。"}, {"letter": "D", "en": "Create permission sets for use only in the organization’s management account.", "cn": "创建仅在该组织的管理账户中使用的权限集。"}, {"letter": "E", "en": "Create IAM users for use only in the organization’s management account.", "cn": "创建仅在该组织的管理账户中使用的 IAM 用户。\nF. Create user assignments only in the organization’s management account.\n\n\nF. 仅在该组织的管理账户中创建用户分配。"}], "answer": "B", "explanation_en": "AWS IAM Identity Center delegated administration requires foundational configuration to be completed\nin the organization’s management account before delegation. According to the AWS Certified Security - Specialty documentation, IAM Identity Center must be enabled with a directory in the management account\nbefore any delegation can occur.\nIdentity Center。\nPermission sets must be created in the management account because they define the permissions that will\nlater be delegated to member accounts. Additionally, user assignments must initially exist in the management\naccount to establish baseline access control before delegation is configured.\nOption A is too generic and not a required prerequisite step. Option C is unrelated to Identity Center\ndelegation. Option E is incorrect because IAM Identity Center uses identities from its directory or external\nIdPs, not IAM users.\nAWS guidance clearly outlines directory creation, permission set definition, and initial user assignments\nas mandatory preparatory steps for delegated administration.", "explanation_cn": "AWS IAM Identity Center 委托管理需要在委托之前在组织的管理账户中完成基础配置。根据 AWS\nCertified Security - Specialty 文档，在进行任何委托之前，必须在管理账户中使用一个目录启用 IAM\n必须在管理账户中创建权限集，因为它们定义了稍后将委托给成员账户的权限。此外，在配置委托\n之前，用户分配必须最初存在于管理账户中，以建立基线访问控制。\n选项 A 过于笼统，不是必需的先决步骤。选项 C 与 Identity Center 委托无关。选项 E 不正确，因为\nIAM Identity Center 使用其目录或外部 IdP 中的身份，而不是 IAM 用户。\nAWS 指南明确概述了目录创建、权限集定义和初始用户分配是委托管理的强制性准备步骤。"}, {"num": 31, "category_en": "Detection", "category_cn": "检测", "question_en": "A company must capture AWS CloudTrail data events and must retain the logs for 7 years. The logs must\nbe immutable and must be available to be searched by complex queries. The company also needs to visualize\nthe data from the logs.\nWhich solution will meet these requirements MOST cost-effectively?", "question_cn": "一家公司必须捕获 AWS CloudTrail 数据事件，并且必须将日志保留 7 年。日志必须是不可变的，并\n且必须可供通过复杂查询进行搜索。该公司还需要可视化日志中的数据。\n哪种解决方案最具成本效益地满足这些要求？", "options": [{"letter": "A", "en": "Create a CloudTrail Lake data store. Implement CloudTrail Lake dashboards to visualize and query\nthe results.", "cn": "创建一个 CloudTrail Lake 数据存储。实施 CloudTrail Lake 仪表板以可视化和查询结果。"}, {"letter": "B", "en": "Use the CloudTrail Event History feature in the AWS Management Console. Visualize and query the\nresults in the console.", "cn": "使用 AWS 管理控制台中的 CloudTrail 事件历史记录功能。在控制台中可视化和查询结果。"}, {"letter": "C", "en": "Send the CloudTrail logs to an Amazon S3 bucket. Provision a persistent Amazon EMR cluster that\nhas access to the S3 bucket. Enable S3 Object Lock on the S3 bucket. Use Apache Spark to perform queries.\nUse Amazon QuickSight for visualizations.", "cn": "将 CloudTrail 日志发送到 Amazon S3 存储桶。配置一个可访问该 S3 存储桶的持久 Amazon EMR\n集群。在 S3 存储桶上启用 S3 对象锁定。使用 Apache Spark 执行查询。使用 Amazon QuickSight 进\n行可视化。"}, {"letter": "D", "en": "Send the CloudTrail logs to a log group in Amazon CloudWatch Logs. Set the CloudWatch Logs stream\nto send the data to an Amazon OpenSearch Service domain. Enable cold storage for the OpenSearch Service\ndomain. Use OpenSearch Dashboards for visualizations and queries.", "cn": "将 CloudTrail 日志发送到 Amazon CloudWatch Logs 中的日志组。设置 CloudWatch Logs 流以将\n数据发送到 Amazon OpenSearch Service 域。为 OpenSearch Service 域启用冷存储。使用 OpenSearch\nDashboards 进行可视化和查询。"}], "answer": "A", "explanation_en": "AWS CloudTrail Lake is purpose-built to store, query, and analyze CloudTrail events, including data\nevents, without requiring additional infrastructure. The AWS Certified Security - Specialty documentation\nexplains that CloudTrail Lake provides immutable event storage with configurable retention periods, including multiyear retention, which satisfies long-term compliance requirements such as 7-year retention. Events\nare stored in an append-only, immutable format managed by AWS, reducing operational complexity.\nCloudTrail Lake supports SQL-based queries for complex analysis directly against the event data, eliminating the need to export logs to other services for querying. Additionally, CloudTrail Lake includes built-in\ndashboards and integrations that enable visualization of event trends and patterns without standing up separate analytics or visualization platforms.\nOption B is invalid because CloudTrail Event History only retains events for up to 90 days and does not\nsupport long-term retention or advanced querying. Option C introduces high operational overhead and cost\nby requiring persistent Amazon EMR clusters and additional services. Option D incurs ongoing ingestion,\nindexing, and storage costs for OpenSearch Service over a 7-year period, making it less cost-effective than\nCloudTrail Lake.\n\n\nAWS documentation positions CloudTrail Lake as the most cost-effective and operationally efficient solution for long-term, queryable CloudTrail event storage and visualization.", "explanation_cn": "AWS CloudTrail Lake 专为存储、查询和分析 CloudTrail 事件 (包括数据事件) 而构建，无需额外的\n基础设施。AWS 认证安全 - 专业文档解释说，CloudTrail Lake 提供具有可配置保留期的不可变事件\n存储，包括多年保留，这满足了诸如 7 年保留等长期合规要求。事件以由 AWS 管理的仅追加、不\n可变格式存储，降低了操作复杂性。\nCloudTrail Lake 支持直接针对事件数据进行基于 SQL 的复杂分析查询，无需将日志导出到其他服\n务进行查询。此外，CloudTrail Lake 包括内置仪表板和集成，可在不搭建单独的分析或可视化平台\n的情况下可视化事件趋势和模式。\n选项 B 无效，因为 CloudTrail 事件历史记录仅保留事件最多 90 天，不支持长期保留或高级查询。选\n项 C 通过需要持久的 Amazon EMR 集群和其他服务引入了高操作开销和成本。选项 D 在 7 年期间\n会产生 OpenSearch Service 的持续摄取、索引和存储成本，使其不如 CloudTrail Lake 具有成本效\n益。\nAWS 文档将 CloudTrail Lake 定位为用于长期、可查询的 CloudTrail 事件存储和可视化的最具成本\n效益和操作效率的解决方案。"}, {"num": 32, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A security engineer needs to prepare a company’s Amazon EC2 instances for quarantine during a security\nincident. The AWS Systems Manager Agent (SSM Agent) has been deployed to all EC2 instances. The security\nengineer has developed a script to install and update forensics tools on the EC2 instances.\nWhich solution will quarantine EC2 instances during a security incident?", "question_cn": "一名安全工程师需要在安全事件期间准备将公司的 Amazon EC2 实例进行隔离。AWS 系统管理器\n代理 (SSM 代理) 已部署到所有 EC2 实例。该安全工程师已开发了一个脚本，用于在 EC2 实例上安\n装和更新取证工具。\n哪种解决方案将在安全事件期间隔离 EC2 实例？", "options": [{"letter": "A", "en": "Create a rule in AWS Config to track SSM Agent versions.", "cn": "在 AWS Config 中创建一条规则来跟踪 SSM 代理版本。"}, {"letter": "B", "en": "Configure Systems Manager Session Manager to deny all connection requests from external IP addresses.", "cn": "将系统管理器会话管理器配置为拒绝来自外部 IP 地址的所有连接请求。"}, {"letter": "C", "en": "Store the script in Amazon S3 and grant read access to the instance profile.", "cn": "将脚本存储在 Amazon S3 中，并向实例配置文件授予读取权限。"}, {"letter": "D", "en": "Configure IAM permissions for the SSM Agent to run the script as a predefined Systems Manager Run\nCommand document.", "cn": "为 SSM 代理配置 IAM 权限，以便将该脚本作为预定义的系统管理器运行命令文档运行。"}], "answer": "D", "explanation_en": "AWS Systems Manager Run Command enables security engineers to remotely and securely execute\nscripts on EC2 instances without requiring SSH or inbound network access. According to AWS Certified\nSecurity - Specialty incident response guidance, Run Command is a foundational tool for instance quarantine\nand forensic preparation.\nBy configuring IAM permissions that allow the SSM Agent to execute a predefined Run Command document, the security engineer can rapidly deploy forensic tools, disable services, or modify system configurations\nacross affected EC2 instances during an incident. This approach aligns with AWS best practices for containment and evidence preservation, while maintaining auditability through Systems Manager logs.\nOption A only provides visibility, not quarantine capability. Option B restricts access but does not allow\nforensic tooling. Option C enables access to the script but does not execute it.\nAWS documentation emphasizes that Systems Manager Run Command is the recommended mechanism\nfor incident response automation and quarantine actions on EC2 instances.\n\n\nAWS Certified Security - Specialty Official Study Guide\nAWS Systems Manager Run Command Documentation\nAWS Incident Response Best Practices", "explanation_cn": "AWS 系统管理器运行命令使安全工程师能够在无需 SSH 或入站网络访问的情况下，在 EC2 实例上\n远程且安全地执行脚本。根据 AWS 认证安全 - 专业版事件响应指南，运行命令是用于实例隔离和\n取证准备的基础工具。\n通过配置允许 SSM 代理执行预定义运行命令文档的 IAM 权限，安全工程师可以在事件期间快速在\n受影响的 EC2 实例上部署取证工具、禁用服务或修改系统配置。此方法符合 AWS 关于遏制和证据\n保存的最佳实践，同时通过系统管理器日志保持可审计性。\n选项 A 仅提供可见性，不具备隔离功能。选项 B 限制了访问，但不允许进行取证工具操作。选项 C\n允许访问脚本，但不执行它。\nAWS 文档强调，系统管理器运行命令是用于 EC2 实例事件响应自动化和隔离操作的推荐机制。\nAWS 安全认证 - 专业版官方学习指南\nAWS 系统管理器运行命令文档\nAWS 事件响应最佳实践"}, {"num": 33, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company’s application team needs a new AWS Key Management Service (AWS KMS) customer managed key to use with Amazon S3. The company’s security policy requires separate keys for different AWS\nservices to limit security exposure.\nHow can a security engineer limit the KMS customer managed key to work with only Amazon S3?", "question_cn": "一家公司的应用程序团队需要一个新的 AWS 密钥管理服务 (AWS KMS) 客户管理密钥来与 Amazon\nS3 配合使用。该公司的安全策略要求为不同的 AWS 服务使用单独的密钥，以限制安全风险。\n安全工程师如何限制 KMS 客户管理密钥仅与 Amazon S3 配合使用？", "options": [{"letter": "A", "en": "Configure the key policy to allow only Amazon S3 to perform the kms:Encrypt action.", "cn": "将密钥策略配置为仅允许 Amazon S3 执行 kms:Encrypt 操作。"}, {"letter": "B", "en": "Configure the key policy to allow KMS actions only when the value for the kms:ViaService condition\nkey matches the Amazon S3 service name.", "cn": "将密钥策略配置为仅在 kms:ViaService 条件键的值与 Amazon S3 服务名称匹配时才允许 KMS 操\n作。"}, {"letter": "C", "en": "Configure the application’s IAM role policy to allow Amazon S3 to perform the iam:PassRole action.", "cn": "将应用程序的 IAM 角色策略配置为允许 Amazon S3 执行 iam:PassRole 操作。"}, {"letter": "D", "en": "Configure the application’s IAM role policy to allow only S3 operations when the operations are combined with the KMS customer managed key.", "cn": "将应用程序的 IAM 角色策略配置为仅在操作与 KMS 客户管理密钥结合时才允许 S3 操作。\nExams Prep\n考试准备"}], "answer": "B", "explanation_en": "AWS KMS provides condition keys that can be used to tightly scope how and where a customer managed\nkey can be used. According to the AWS Certified Security - Specialty Study Guide, the kms:ViaService condition key is specifically designed to restrict key usage to requests that originate from a particular AWS service\nin a specific Region.\nBy configuring the key policy to allow KMS cryptographic operations only when kms:ViaService equals\ns3. .amazonaws.com, the security engineer ensures that the key can be used exclusively by Amazon\nS3. Even if other IAM principals have permissions to use the key, the key cannot be used by other services\nsuch as Amazon EC2, Amazon RDS, or AWS Lambda.\nOption A is incorrect because AWS services do not assume identities in key policies. Options C and D\nmodify IAM role policies, which do not control how a KMS key is used by AWS services. AWS documentation\nclearly states that service-level restrictions must be enforced at the KMS key policy level using condition keys.\nThis approach enforces strong separation of duties and limits blast radius, which aligns with AWS security\nbest practices.", "explanation_cn": "AWS KMS 提供了条件键，可用于严格限定客户管理密钥的使用方式和位置。根据 AWS 安全认证 专业版学习指南，kms:ViaService 条件键专门设计用于将密钥使用限制为源自特定区域中特定 AWS\n服务的请求。\n通过将密钥策略配置为仅在 kms:ViaService 等于 s3..amazonaws.com 时才允许 KMS 加密\n操作，安全工程师确保该密钥只能由 Amazon S3 使用。即使其他 IAM 主体有权使用该密钥，其他\n服务 (如 Amazon EC2、Amazon RDS 或 AWS Lambda) 也无法使用该密钥。\n选项 A 不正确，因为 AWS 服务在密钥策略中不承担身份。选项 C 和 D 修改了 IAM 角色策略，而\n这并不能控制 AWS 服务如何使用 KMS 密钥。AWS 文档明确指出，必须在 KMS 密钥策略级别使用\n条件键来实施服务级限制。\n此方法强制实施严格的职责分离并限制影响范围，这与 AWS 安全最佳实践保持一致。"}, {"num": 34, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company has a large fleet of Amazon Linux 2 Amazon EC2 instances that run an application processing sensitive data. Compliance requirements include no exposed management ports, full session logging,\nand authentication through AWS IAM Identity Center. DevOps engineers occasionally need access for troubleshooting.\nWhich solution will provide remote access while meeting these requirements?", "question_cn": "一家公司拥有大量运行处理敏感数据应用程序的 Amazon Linux 2 Amazon EC2 实例。合规要求包\n括无暴露的管理端口、完整的会话日志记录以及通过 AWS IAM 身份中心进行身份验证。DevOps 工\n程师偶尔需要访问权限进行故障排除。\n哪种解决方案在满足这些要求的同时提供远程访问？", "options": [{"letter": "A", "en": "Grant access to the EC2 serial console and allow IAM role access.", "cn": "授予对 EC2 串行控制台的访问权限并允许 IAM 角色访问。"}, {"letter": "B", "en": "Enable EC2 Instance Connect and configure security groups accordingly.", "cn": "启用 EC2 实例连接并相应地配置安全组。"}, {"letter": "C", "en": "Assign an EC2 instance role that allows access to AWS Systems Manager. Create an IAM policy that\ngrants access to Systems Manager Session Manager and assign it to an IAM Identity Center role.", "cn": "分配一个允许访问 AWS Systems Manager 的 EC2 实例角色。创建一个授予对 Systems Manager\n会话管理器访问权限的 IAM 策略，并将其分配给一个 IAM 身份中心角色。"}, {"letter": "D", "en": "Use Systems Manager Automation to temporarily open remote access ports.", "cn": "使用 Systems Manager 自动化临时打开远程访问端口。"}], "answer": "C", "explanation_en": "AWS Systems Manager Session Manager provides secure, auditable shell access to EC2 instances without\nopening inbound ports. According to AWS Certified Security - Specialty guidance, Session Manager records\nall session activity to CloudWatch Logs or Amazon S3 and integrates with IAM Identity Center for centralized\nauthentication.\nThis solution meets all requirements: no exposed ports, full audit logging, and identity-based access\ncontrol. EC2 Instance Connect and serial console access do not integrate with Identity Center and may expose\nmanagement paths.", "explanation_cn": "AWS Systems Manager 会话管理器提供对 EC2 实例的安全、可审计的外壳访问，而无需打开入站\n端口。根据《AWS 认证安全 - 专业指南》，会话管理器将所有会话活动记录到 CloudWatch Logs 或\nAmazon S3，并与 IAM 身份中心集成以进行集中身份验证。\n此解决方案满足所有要求: 无暴露端口、完整的审计日志记录以及基于身份的访问控制。EC2 实例\n连接和串行控制台访问不与身份中心集成，可能会暴露管理路径。"}, {"num": 35, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company runs an application on a fleet of Amazon EC2 instances. The application is accessible to users\naround the world. The company associates an AWS WAF web ACL with an Application Load Balancer (ALB)\nthat routes traffic to the EC2 instances.\nA security engineer is investigating a sudden increase in traffic to the application. The security engineer\ndiscovers a significant amount of potentially malicious requests coming from hundreds of IP addresses in two\ncountries. The security engineer wants to quickly limit the potentially malicious requests but does not want\nto prevent legitimate users from accessing the application.\nWhich solution will meet these requirements?", "question_cn": "一家公司在一批 Amazon EC2 实例上运行一个应用程序。该应用程序可供全球用户访问。公司将一\n个 AWS WAF 网络访问控制列表与一个将流量路由到 EC2 实例的应用程序负载均衡器 (ALB) 相关\n联。\n一名安全工程师正在调查该应用程序流量的突然增加。该安全工程师发现来自两个国家数百个 IP\n地址的大量潜在恶意请求。该安全工程师希望快速限制潜在恶意请求，但又不想阻止合法用户访问\n该应用程序。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Use AWS WAF to implement a rate-based rule for all incoming requests.", "cn": "使用 AWS WAF 为所有传入请求实施基于速率的规则。"}, {"letter": "B", "en": "Use AWS WAF to implement a geographical match rule to block all incoming traffic from the two\ncountries.", "cn": "使用 AWS WAF 实施地理匹配规则以阻止来自这两个国家的所有传入流量。"}, {"letter": "C", "en": "Edit the ALB security group to include a geographical match rule to block all incoming traffic from\nthe two countries.", "cn": "编辑 ALB 安全组以包括地理匹配规则，以阻止来自这两个国家的所有传入流量。"}, {"letter": "D", "en": "Add deny rules to the ALB security group that prohibit incoming requests from the IP addresses.", "cn": "向 ALB 安全组添加拒绝规则，禁止来自这些 IP 地址的传入请求。"}], "answer": "A", "explanation_en": "AWS WAF rate-based rules are specifically designed to protect applications from traffic floods and distributed attacks that originate from large numbers of IP addresses. According to the AWS Certified Security\n- Specialty Official Study Guide, rate-based rules automatically track the number of requests coming from\nindividual IP addresses and temporarily block IPs that exceed a defined threshold.\nIn this scenario, the malicious traffic originates from hundreds of IP addresses across two countries,\nmixed with legitimate user traffic. A rate-based rule allows the security engineer to limit excessive request\nrates without fully blocking access from entire geographic regions, ensuring that legitimate users can still\naccess the application.\nOption B is incorrect because geographic match rules block all traffic from selected countries, which\nwould deny access to legitimate users and violate the stated requirement. Option C is invalid because security\ngroups do not support geographic filtering. Option D is not scalable, as manually blocking hundreds of IP\naddresses is operationally inefficient and ineffective against rapidly changing attacker IPs.\nAWS documentation emphasizes that rate-based rules are the recommended first-line mitigation for sudden traffic spikes and potential application-layer DDoS attacks when business continuity must be preserved.\nAWS Certified Security - Specialty Official Study Guide\n• AWS WAF Developer Guide - Rate-Based Rules\n\n\nAWS DDoS Resiliency Best Practices", "explanation_cn": "AWS WAF 基于速率的规则专门设计用于保护应用程序免受来自大量 IP 地址的流量洪泛和分布式\n攻击。根据《AWS 安全认证 - 专业版官方学习指南》\n，基于速率的规则会自动跟踪来自各个 IP 地址\n的请求数量，并临时阻止超过定义阈值的 IP。\n在这种情况下，恶意流量来自两个国家的数百个 IP 地址，与合法用户流量混合在一起。基于速率\n的规则允许安全工程师限制过高的请求速率，而不会完全阻止来自整个地理区域的访问，确保合法\n用户仍然可以访问该应用程序。\n选项 B 不正确，因为地理匹配规则会阻止来自选定国家/地区的所有流量，这将拒绝合法用户的访\n问并违反既定要求。选项 C 无效，因为安全组不支持地理过滤。选项 D 不可扩展，因为手动阻止数\n百个 IP 地址在操作上效率低下，并且对于快速变化的攻击者 IP 无效。\nAWS 文档强调，\n当必须保持业务连续性时，\n基于速率的规则是应对突发流量高峰和潜在应用层 DDoS\n攻击的推荐一线缓解措施。\nAWS 安全认证 - 专业版官方学习指南\n• AWS WAF 开发者指南 - 基于速率的规则\nAWS DDoS 弹性最佳实践"}, {"num": 36, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A security engineer has designed a VPC to segment private traffic from public traffic. The VPC includes\ntwo Availability Zones. Each Availability Zone contains one public subnet and one private subnet. Three\nroute tables exist: one for the public subnets and one for each private subnet.\nThe security engineer discovers that all four subnets are routing traffic through the internet gateway that\nis attached to the VPC.\nWhich combination of steps should the security engineer take to remediate this scenario? (Select TWO.)", "question_cn": "一位安全工程师设计了一个 VPC，用于将私有流量与公共流量进行隔离。该 VPC 包括两个可用区。\n每个可用区包含一个公共子网和一个私有子网。存在三个路由表: 一个用于公共子网，一个用于每\n个私有子网。\n安全工程师发现所有四个子网都通过附加到 VPC 的互联网网关路由流量。\n安全工程师应采取以下哪些步骤组合来纠正这种情况？(选择两项。)", "options": [{"letter": "A", "en": "Verify that a NAT gateway has been provisioned in the public subnet in each Availability Zone.", "cn": "验证在每个可用区的公共子网中是否已配置 NAT 网关。"}, {"letter": "B", "en": "Verify that a NAT gateway has been provisioned in the private subnet in each Availability Zone.", "cn": "验证在每个可用区的私有子网中是否已配置 NAT 网关。"}, {"letter": "C", "en": "Modify the route tables for the public subnets to add a local route to the VPC CIDR range.", "cn": "修改公共子网的路由表，以添加到 VPC CIDR 范围的本地路由。"}, {"letter": "D", "en": "Modify the route tables for the private subnets to route 0.0.0.0/0 to the NAT gateway in the public\nsubnet of the same Availability Zone.", "cn": "修改私有子网的路由表，将 0.0.0.0/0 路由到同一可用区公共子网中的 NAT 网关。"}, {"letter": "E", "en": "Modify the route tables for the private subnets to route 0.0.0.0/0 to the internet gateway.", "cn": "修改私有子网的路由表，将 0.0.0.0/0 路由到互联网网关。"}], "answer": "A", "explanation_en": "AWS networking best practices require private subnets to access the internet only through NAT gateways\nlocated in public subnets. According to the AWS Certified Security - Specialty Study Guide, NAT gateways\nmust be provisioned in public subnets and used as the default route for outbound traffic from private subnets.\nVerifying NAT gateways in each Availability Zone ensures high availability and fault tolerance. Updating\nthe private subnet route tables to send 0.0.0.0/0 traffic to the NAT gateway prevents direct internet access while\nallowing outbound connectivity.\nRouting private subnet traffic directly to an internet gateway violates subnet isolation principles. NAT\ngateways must never be placed in private subnets.", "explanation_cn": "AWS 网络最佳实践要求专用子网仅通过位于公共子网中的 NAT 网关访问互联网。根据《AWS 认证\n安全 - 专业学习指南》，NAT 网关必须在公共子网中进行配置，并用作专用子网出站流量的默认路\n由。\n在每个可用区中验证 NAT 网关可确保高可用性和容错能力。更新专用子网路由表，将 0.0.0.0/0 流\n量发送到 NAT 网关，可防止直接访问互联网，同时允许出站连接。\n将专用子网流量直接路由到互联网网关违反了子网隔离原则。NAT 网关绝不能放置在专用子网中。"}, {"num": 37, "category_en": "Data Protection", "category_cn": "数据保护", "question_en": "A company has an encrypted Amazon Aurora DB cluster in the us-east-1 Region that uses an AWS KMS\ncustomer managed key. The company must copy a DB snapshot to the us-west-1 Region but cannot access\nthe encryption key across Regions.\nWhat should the company do to properly encrypt the snapshot in us-west-1?", "question_cn": "一家公司在美国东部 1 区有一个使用 AWS KMS 客户管理密钥加密的亚马逊 Aurora 数据库集群。该\n公司必须将数据库快照复制到美国西部 1 区，但无法跨区域访问加密密钥。\n该公司应如何在美国西部 1 区正确加密快照？", "options": [{"letter": "A", "en": "Store the customer managed key in AWS Secrets Manager in us-west-1.", "cn": "将客户管理密钥存储在美国西部 1 区的 AWS Secrets Manager 中。"}, {"letter": "B", "en": "Create a new customer managed key in us-west-1 and use it to encrypt the snapshot.", "cn": "在美国西部 1 区创建一个新的客户管理密钥，并使用它来加密快照。"}, {"letter": "C", "en": "Create an IAM policy to allow access to the key in us-east-1 from us-west-1.", "cn": "创建一个 IAM 策略，允许从美国西部 1 区访问美国东部 1 区的密钥。"}, {"letter": "D", "en": "Create an IAM policy that allows RDS in us-west-1 to access the key in us-east-1.", "cn": "创建一个 IAM 策略，允许美国西部 1 区的 RDS 访问美国东部-1 区的密钥。"}], "answer": "B", "explanation_en": "AWS KMS keys are strictly regional resources. According to AWS Certified Security - Specialty documentation, a KMS key created in one Region cannot be used to encrypt or decrypt data in another Region. This\nincludes encrypted RDS and Aurora snapshots.\n\n\nWhen copying an encrypted snapshot to a different Region, the destination Region must have its own\nKMS key. AWS automatically re-encrypts the snapshot using the specified KMS key in the destination Region\nduring the copy operation.\nOptions C and D are invalid because IAM policies cannot extend a KMS key’s scope across Regions.\nOption A is incorrect because Secrets Manager does not store or manage KMS keys themselves.\nAWS best practices require creating a new customer managed key in the target Region and using it during\nthe snapshot copy process.", "explanation_cn": "AWS KMS 密钥是严格的区域资源。根据 AWS 认证安全 - 专业文档，在一个区域中创建的\nKMS 密钥不能用于加密或解密另一个区域中的数据。这包括加密的 RDS 和 Aurora 快照。\n 将加密快照复制到不同区域时，目标区域必须有自己的 KMS 密钥。在复制操作期间，AWS\n会自动使用目标区域中指定的 KMS 密钥对快照进行重新加密。\n 选项 C 和 D 无效，因为 IAM 策略不能跨区域扩展 KMS 密钥的范围。选项 A 不正确，因为\nSecrets Manager 本身不存储或管理 KMS 密钥。\nAWS 最佳实践要求在目标区域中创建一个新的客户管理密钥，并在快照复制过程中使用它。"}, {"num": 38, "category_en": "Identity and Access Management", "category_cn": "身份與存取管理", "question_en": "A security engineer discovers that a company’s user passwords have no required minimum length. The\ncompany uses the following identity providers (IdPs):\n(IdP):\n• AWS Identity and Access Management (IAM) federated with on-premises Active Directory\n• Amazon Cognito user pools that contain the user database for an AWS Cloud application\nWhich combination of actions should the security engineer take to implement a required minimum password length? (Select TWO.)", "question_cn": "问题编号:38 - [身份和访问管理]\n 一名安全工程师发现公司用户密码没有所需的最小长度。该公司使用以下身份提供商\n- 与本地 Active Directory 联合的 AWS 身份和访问管理 (IAM)\n- 包含 AWS 云应用程序用户数据库的 Amazon Cognito 用户池 \n 安全工程师应采取哪些操作组合来实施所需的最小密码长度？(选择两项。)", "options": [{"letter": "A", "en": "Update the password length policy in the IAM configuration.", "cn": "更新 IAM 配置中的密码长度策略。"}, {"letter": "B", "en": "Update the password length policy in the Amazon Cognito configuration.", "cn": "更新 Amazon Cognito 配置中的密码长度策略。"}, {"letter": "C", "en": "Update the password length policy in the on-premises Active Directory configuration.", "cn": "在本地 Active Directory 配置中更新密码长度策略。"}, {"letter": "D", "en": "Create an SCP in AWS Organizations to enforce minimum password length.", "cn": "在 AWS Organizations 中创建一个服务控制策略 (SCP) 以强制实施最小密码长度。"}, {"letter": "E", "en": "Create an IAM policy with a minimum password length condition.", "cn": "创建一个带有最小密码长度条件的 IAM 策略。"}], "answer": "B", "explanation_en": "Password policies are enforced at the identity provider where authentication occurs. According to the\nAWS Certified Security - Specialty Study Guide, when IAM is federated with an external identity provider\nsuch as on-premises Active Directory, IAM does not manage or enforce password policies. Instead, password\nrequirements such as minimum length must be enforced directly in Active Directory Group Policy Objects.\nAmazon Cognito user pools maintain their own user directory and authentication logic. Cognito provides configurable password policies, including minimum length, complexity, and expiration. To enforce a\nminimum password length for application users, the Cognito user pool password policy must be updated.\nIAM password policies apply only to IAM users that authenticate directly with IAM and do not affect\nfederated users or Cognito users. SCPs and IAM policies cannot enforce password length requirements.", "explanation_cn": "密码策略在进行身份验证的身份提供商处实施。根据《AWS 认证安全 - 专业版学习指南》\n，当 IAM\n与外部身份提供商 (如本地 Active Directory) 联合时，IAM 不会管理或实施密码策略。相反，诸如\n最小长度之类的密码要求必须直接在 Active Directory 组策略对象中实施。\nAmazon Cognito 用户池维护自己的用户目录和身份验证逻辑。Cognito 提供可配置的密码策略, 包\n括最小长度、复杂性和过期时间。要为应用程序用户强制实施最小密码长度，必须更新 Cognito 用\n户池密码策略。\nIAM 密码策略仅适用于直接通过 IAM 进行身份验证的 IAM 用户，不会影响联合用户或 Cognito 用\n户。服务控制策略 (SCP) 和 IAM 策略无法强制实施密码长度要求。"}, {"num": 39, "category_en": "Detection", "category_cn": "检测", "question_en": "A company’s web application runs on Amazon EC2 instances behind an Application Load Balancer\n(ALB) in an Auto Scaling group. An AWS WAF web ACL is associated with the ALB. Instance logs are lost\nafter reboots. The operations team suspects malicious activity targeting a specific PHP file.\n\nWhich set of actions will identify the suspect attacker’s IP address for future occurrences?", "question_cn": "一家公司的 Web 应用程序在自动缩放组中的应用程序负载均衡器 (ALB) 后面的 Amazon EC2 实例\n上运行。一个 AWS WAF Web ACL 与 ALB 相关联。重启后实例日志丢失。运营团队怀疑存在针对\n特定 PHP 文件的恶意活动。\n哪组操作将识别出未来事件中可疑攻击者的 IP 地址？", "options": [{"letter": "A", "en": "Configure VPC Flow Logs and search for PHP file activity.", "cn": "配置 VPC 流日志并搜索 PHP 文件活动。"}, {"letter": "B", "en": "Install the CloudWatch agent on the ALB and export application logs.", "cn": "在应用负载均衡器 (ALB) 上安装 CloudWatch 代理并导出应用程序日志。"}, {"letter": "C", "en": "Export ALB access logs to Amazon OpenSearch Service and search them.", "cn": "将 ALB 访问日志导出到 Amazon OpenSearch Service 并进行搜索。"}, {"letter": "D", "en": "Configure the web ACL to send logs to Amazon Kinesis Data Firehose. Deliver logs to Amazon S3 and\nquery them with Amazon Athena.", "cn": "配置网络访问控制列表 (web ACL) 以将日志发送到 Amazon Kinesis Data Firehose。将日志传输\n到 Amazon S3 并使用 Amazon Athena 进行查询。"}], "answer": "D", "explanation_en": "AWS WAF logs contain detailed request-level information, including source IP addresses, requested\nURIs, and rule matches. According to AWS Certified Security - Specialty guidance, enabling AWS WAF logging provides the most reliable and tamper-resistant method to investigate web-based attacks, especially when\ninstance-level logs are unavailable.\n\n\nBy streaming WAF logs through Amazon Kinesis Data Firehose to Amazon S3, the company ensures\ndurable, centralized log storage that is independent of EC2 lifecycle events. Amazon Athena can then query\nthe logs efficiently to identify repeated requests to the new-user-creation.php endpoint and extract attacker IP\naddresses.\nVPC Flow Logs do not capture HTTP-level details. ALB access logs alone may not capture blocked requests. WAF logs provide the best forensic visibility for future detection.", "explanation_cn": "AWS WAF 日志包含详细的请求级信息，包括源 IP 地址、请求的 URI 和规则匹配情况。根据 AWS\n认证安全 - 专业指南，启用 AWS WAF 日志记录提供了最可靠且防篡改的方法来调查基于网络的攻\n击，尤其是在实例级日志不可用时。\n通过将 WAF 日志通过 Amazon Kinesis Data Firehose 传输到 Amazon S3，公司确保了持久、集中的\n日志存储，该存储独立于 EC2 生命周期事件。然后，Amazon Athena 可以高效地查询日志，以识别\n对 new-user-creation.php 端点的重复请求并提取攻击者的 IP 地址。\nVPC 流日志不会捕获 HTTP 级别的详细信息。仅 ALB 访问日志可能无法捕获被阻止的请求。WAF\n日志为未来的检测提供了最佳的取证可见性。"}, {"num": 40, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A security engineer has designed a VPC to segment private traffic from public traffic. The VPC includes\ntwo Availability Zones. The security engineer has provisioned each Availability Zone with one private subnet\nand one public subnet. The security engineer has created three route tables for use with the environment.\nOne route table is for the public subnets, and two route tables are for the private subnets (one route table for\nthe private subnet in each Availability Zone).\n\n\nThe security engineer discovers that all four subnets are attempting to route traffic out through the internet gateway that is attached to the VPC.\nWhich combination of steps should the security engineer take to remediate this scenario? (Select TWO.)", "question_cn": "一位安全工程师设计了一个 VPC，用于将私有流量与公共流量进行分段。该 VPC 包括两个可用区。\n安全工程师为每个可用区配置了一个专用子网和一个公共子网。安全工程师创建了三个路由表供\n该环境使用。一个路由表用于公共子网，两个路由表用于专用子网 (每个可用区的专用子网各一个\n路由表)。\n安全工程师发现所有四个子网都试图通过附加到 VPC 的互联网网关将流量路由出去。\n安全工程师应采取以下哪些步骤组合来纠正这种情况？(选择两项。)", "options": [{"letter": "A", "en": "Verify that a NAT gateway has been provisioned in the public subnet in each Availability Zone.", "cn": "验证在每个可用区的公共子网中是否已配置 NAT 网关。"}, {"letter": "B", "en": "Verify that a NAT gateway has been provisioned in the private subnet in each Availability Zone.", "cn": "验证在每个可用区的专用子网中是否已配置 NAT 网关。"}, {"letter": "C", "en": "Modify the route tables that are associated with each of the public subnets. Create a new route for\nlocal destinations to the VPC CIDR range.", "cn": "修改与每个公共子网关联的路由表。为本地目标创建一条指向 VPC CIDR 范围的新路由。"}, {"letter": "D", "en": "Modify the route tables that are associated with each of the private subnets. Create a new route for\nthe destination 0.0.0.0/0. Specify the NAT gateway in the public subnet of the same Availability Zone as the\ntarget of the route.", "cn": "修改与每个专用子网关联的路由表。为目标 0.0.0.0/0 创建一条新路由。将与目标路由处于同一\n可用区的公共子网中的 NAT 网关指定为路由目标。"}, {"letter": "E", "en": "Modify the route tables that are associated with each of the private subnets. Create a new route for the\ndestination 0.0.0.0/0. Specify the internet gateway as the target of the route.", "cn": "修改与每个专用子网关联的路由表。为目标 0.0. 去 0/0 创建一条新路由。将互联网网关指定为路\n由目标。"}], "answer": "A", "explanation_en": "In a properly segmented VPC architecture, public subnets route internet-bound traffic to an internet\ngateway, while private subnets route outbound internet traffic through a NAT gateway that resides in a public\n\nsubnet. According to the AWS Certified Security - Specialty Official Study Guide and Amazon VPC documentation, private subnets must never have a direct route to an internet gateway.\nThe issue described indicates that private subnets are incorrectly routing traffic directly to the internet\ngateway. To remediate this, a NAT gateway must be provisioned in each public subnet to ensure high availability across Availability Zones. This satisfies the requirement that private resources can initiate outbound\nconnections without being directly reachable from the internet.\nNext, the route tables associated with the private subnets must be updated so that the default route (0.0.0.0\n/0) points to the NAT gateway in the same Availability Zone. This ensures proper traffic flow and prevents\ncross-AZ dependencies.\nOption B is incorrect because NAT gateways must reside in public subnets. Option C is unnecessary\nbecause local routes to the VPC CIDR range are automatically created. Option E is explicitly insecure, as it\nwould reintroduce direct internet gateway access from private subnets.\nAWS documentation consistently identifies NAT gateways plus correct private subnet routing as the standard design for secure VPC segmentation.\nAWS Certified Security - Specialty Official Study Guide\nAmazon VPC Route Table Documentation\n• AWS Well-Architected Framework - Security Pillar", "explanation_cn": "在正确分段的 VPC 架构中，公共子网将发往互联网的流量路由到互联网网关，而专用子网则通过\n位于公共子网中的 NAT 网关将出站互联网流量路由出去。根据《AWS 认证安全 - 专业官方学习指\n南》和亚马逊 VPC 文档，专用子网绝不能有直接通往互联网网关的路由。\n所描述的问题表明专用子网将流量错误地直接路由到互联网网关。为了解决这个问题，必须在每个\n公共子网中配置 NAT 网关，以确保跨可用区的高可用性。这满足了私有资源可以发起出站连接而\n无需从互联网直接访问的要求。\n接下来，必须更新与专用子网关联的路由表，以便默认路由 (0.0.0.0 /0) 指向同一可用区中的 NAT\n网关。这可确保正确的流量流动并防止跨可用区依赖。\n选项 B 不正确，因为 NAT 网关必须位于公共子网中。选项 C 不必要，因为会自动创建到 VPC CIDR\n范围的本地路由。选项 E 明显不安全，因为它会重新引入专用子网对互联网网关的直接访问。\nAWS 文档始终将 NAT 网关加上正确的专用子网路由标识为安全 VPC 分段的标准设计。\n《AWS 认证安全 - 专业官方学习指南》\n亚马逊 VPC 路由表文档\n• AWS 架构良好的框架 - 安全支柱"}, {"num": 41, "category_en": "Security Foundations and Governance", "category_cn": "安全基础与治理", "question_en": "A company uses AWS Organizations and has an SCP at the root that prevents sharing resources with\nexternal accounts. The company now needs to allow only the marketing account to share resources externally\nwhile preventing all other accounts from doing so. All accounts are in the same OU.\nWhich solution will meet these requirements?", "question_cn": "一家公司使用 AWS Organizations，并且在根级别有一个服务控制策略 (SCP)，该策略阻止与外部账\n户共享资源。该公司现在需要仅允许营销账户在外部共享资源，同时阻止所有其他账户这样做。所\n有账户都在同一个组织单元 (OU) 中。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Create a new SCP in the marketing account to explicitly allow sharing.", "cn": "在营销账户中创建一个新的 SCP 以明确允许共享。"}, {"letter": "B", "en": "Edit the existing SCP to add a condition that excludes the marketing account.", "cn": "编辑现有的 SCP，添加一个排除营销账户的条件。"}, {"letter": "C", "en": "Edit the SCP to include an Allow statement for the marketing account.", "cn": "编辑 SCP 以包含针对营销账户的“允许”语句。"}, {"letter": "D", "en": "Use a permissions boundary in the marketing account.", "cn": "在营销账户中使用权限边界。"}], "answer": "B", "explanation_en": "Service control policies (SCPs) define the maximum available permissions for accounts and are evaluated as guardrails. AWS Certified Security - Specialty documentation states SCPs are typically used to apply\norganization-wide restrictions, and exceptions are commonly handled by using conditions (for example, excluding specific accounts) or by structuring OUs differently. Because all accounts are in the same OU and\n\n\nthe company must continue blocking external sharing for everyone except one account, modifying the existing SCP to exclude the marketing account is the most direct solution. An SCP attached at the root affects\nall accounts unless conditions narrow its scope. Adding a condition that excludes the marketing account allows that account to retain the ability to share resources externally while the SCP continues to block sharing\nfor other accounts. Option A is not feasible because account-level SCPs cannot override a deny applied by a\nparent SCP; explicit denies always win. Option C misunderstands SCP behavior because SCPs do not grant\npermissions; they only limit. Option D is an IAM control that cannot override an organization-level deny.\nTherefore, the only secure, scalable option is to modify the existing SCP with an exception condition for the\nmarketing account.", "explanation_cn": "服务控制策略 (SCP) 定义了账户的最大可用权限，并作为防护栏进行评估。AWS 认证安全 - 专业文\n档指出，SCP 通常用于应用全组织范围的限制，并且通常通过使用条件 (例如，排除特定账户) 或通\n过不同地构建组织单元 (OU) 来处理例外情况。由于所有账户都在同一个 OU 中，并且公司必须继\n续阻止除一个账户之外的所有人进行外部共享，因此修改现有 SCP 以排除营销账户是最直接的解\n决方案。附加到根的 SCP 会影响所有账户，除非条件缩小其范围。添加一个排除营销账户的条件允\n许该账户保留外部共享资源的能力，而 SCP 继续阻止其他账户进行共享。选项 A 不可行，因为账\n户级 SCP 不能覆盖父 SCP 应用的拒绝；显式拒绝始终有效。选项 C 误解了 SCP 的行为，因为 SCP\n不授予权限；它们只进行限制。选项 D 是一个 IAM 控制，不能覆盖组织级的拒绝。因此，唯一安\n全、可扩展的选项是为营销账户修改现有 SCP 并添加例外条件。"}, {"num": 42, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company has AWS accounts in an organization in AWS Organizations. An Amazon S3 bucket in one\naccount is publicly accessible. A security engineer must remove public access and ensure the bucket cannot\nbe made public again.\n\n\nWhich solution will meet these requirements?", "question_cn": "一家公司在 AWS 组织中有多个 AWS 账户。其中一个账户中的一个 Amazon S3 存储桶是公开可访\n问的。一名安全工程师必须移除公共访问权限，并确保该存储桶不能再次被设置为公开。\n哪种解决方案将满足这些要求？", "options": [{"letter": "A", "en": "Enforce KMS encryption and deny s3:GetObject by SCP.", "cn": "实施 KMS 加密并通过 SCP 拒绝 s3:GetObject。"}, {"letter": "B", "en": "Enable PublicAccessBlock and deny s3:GetObject by SCP.", "cn": "启用公共访问阻止并通过 SCP 拒绝 s3:GetObject。"}, {"letter": "C", "en": "Enable PublicAccessBlock and deny s3:PutPublicAccessBlock by SCP.", "cn": "启用公共访问阻止并通过 SCP 拒绝 s3:PutPublicAccessBlock。"}, {"letter": "D", "en": "Enable Object Lock governance and deny s3:PutPublicAccessBlock by SCP.", "cn": "启用对象锁定治理并通过 SCP 拒绝 s3:PutPublicAccessBlock。"}], "answer": "C", "explanation_en": "Amazon S3 Block Public Access provides centralized controls to prevent public access through bucket\npolicies and ACLs. AWS Certified Security - Specialty guidance recommends enabling Block Public Access\nto reduce accidental exposure and to enforce guardrails that override public grants. Enabling Block Public\nAccess on the bucket removes current public exposure when combined with correcting policies/ACLs and\nprevents future misconfiguration. To ensure the bucket cannot be made public again, the security engineer\nmust prevent principals from disabling Block Public Access. An SCP that denies s3:PutPublicAccessBlock\nprevents changes that would remove or weaken the PublicAccessBlock configuration, enforcing the guardrail\nacross the OU or account. Options A and D do not directly address public exposure control. Option B denies\nobject reads but does not ensure public access cannot be re-enabled; it also does not address the root misconfiguration pathways and could disrupt legitimate access patterns. Option C specifically combines the correct\npreventive control (PublicAccessBlock) with organizational enforcement to stop future reversal.", "explanation_cn": "Amazon S3 阻止公共访问提供集中控制，以防止通过存储桶策略和 ACL 进行公共访问。AWS 安全\n认证专家指南建议启用阻止公共访问，以减少意外暴露并实施覆盖公共授予的护栏。在存储桶上启\n用阻止公共访问并结合纠正策略/ACL 时，可消除当前的公共暴露，并防止未来的配置错误。为确保\n存储桶不会再次公开，安全工程师必须防止主体禁用阻止公共访问。拒绝 s3:PutPublicAccessBlock\n的 SCP 可防止删除或削弱公共访问阻止配置的更改，从而在组织单位 (OU) 或账户中实施护栏。选\n项 A 和 D 未直接解决公共暴露控制问题。选项 B 拒绝对象读取，但不能确保公共访问不会重新启\n用；它也未解决根本的配置错误途径，可能会扰乱合法的访问模式。选项 C 特别将正确的预防控制\n(公共访问阻止) 与组织强制相结合，以阻止未来的逆转。"}, {"num": 43, "category_en": "Infrastructure Security", "category_cn": "基础设施安全", "question_en": "A company is running a containerized application on an Amazon Elastic Container Service (Amazon\nECS) cluster that uses AWS Fargate. The application runs as several ECS services.\nThe ECS services are in individual target groups for an internet-facing Application Load Balancer (ALB).\nThe ALB is the origin for an Amazon CloudFront distribution. An AWS WAF web ACL is associated with the\nCloudFront distribution.\nWeb clients access the ECS services through the CloudFront distribution. The company learns that the\nweb clients can bypass the web ACL and can access the ALB directly.\n\n\nWhich solution will prevent the web clients from directly accessing the ALB?", "question_cn": "一家公司在使用 AWS Fargate 的 Amazon 弹性容器服务 (Amazon ECS) 集群上运行容器化应用程\n序。该应用程序作为多个 ECS 服务运行。\nECS 服务位于面向互联网的应用程序负载均衡器 (ALB) 的各个目标组中。ALB 是 Amazon CloudFront 分发的源。一个 AWS WAF 网络 ACL 与 CloudFront 分发相关联。\nWeb 客户端通过 CloudFront 分发访问 ECS 服务。公司了解到 Web 客户端可以绕过网络 ACL 并直\n接访问 ALB。\n哪种解决方案将阻止 Web 客户端直接访问 ALB？", "options": [{"letter": "A", "en": "Create an AWS PrivateLink endpoint and set it as the CloudFront origin.", "cn": "创建一个 AWS PrivateLink 端点并将其设置为 CloudFront 源。"}, {"letter": "B", "en": "Create a new internal ALB and delete the internet-facing ALB.", "cn": "创建一个新的内部 ALB 并删除面向 Internet 的 ALB。"}, {"letter": "C", "en": "Modify the ALB listener rules to allow only CloudFront IP ranges.", "cn": "修改 ALB 监听器规则，仅允许 CloudFront IP 范围。"}, {"letter": "D", "en": "Add a custom X-Shared-Secret header in CloudFront and configure the ALB listener rules to allow\nrequests only when the header value matches.", "cn": "在 CloudFront 中添加自定义 X-Shared-Secret 标头，并配置 ALB 监听器规则，仅在标头值匹配时\n允许请求。"}], "answer": "D", "explanation_en": "When an internet-facing ALB is used as a CloudFront origin, it remains directly accessible unless additional access controls are enforced. According to AWS Certified Security - Specialty guidance, CloudFront IP\nallow lists alone are insufficient, because CloudFront IP ranges change and are not guaranteed to be exclusive.\nThe recommended and most secure approach is to configure CloudFront to send a custom origin header\n(such as X-Shared-Secret) with a secret value on every request to the origin. The ALB listener rules are then\n\n\nconfigured to forward traffic only when the header exists and matches the expected value. Requests that\nattempt to bypass CloudFront will not include this header and will be denied.\nOption A is invalid because CloudFront does not support PrivateLink origins. Option B introduces unnecessary architectural changes and is not required. Option C is brittle and operationally risky due to changing\nIP ranges.\nAWS documentation explicitly recommends custom origin headers as the best practice to ensure that\nonly CloudFront can access an internet-facing ALB when AWS WAF is attached at the CloudFront layer.\n3 AWS Certified Security - Specialty Official Study Guide\n• Amazon CloudFront Origin Security Documentation\nAWS WAF and ALB Integration Guidance", "explanation_cn": "当将面向 Internet 的 ALB 用作 CloudFront 源时，除非实施额外的访问控制，否则它仍可直接访问。\n根据 AWS 认证安全 - 专业指南，仅 CloudFront IP 允许列表是不够的，因为 CloudFront IP 范围会\n变化且不能保证是唯一的。\n推荐且最安全的方法是配置 CloudFront 在每次向源发送请求时都发送一个带有秘密值的自定义源\n标头 (如 X-Shared-Secret)。然后配置 ALB 监听器规则，仅在标头存在且与预期值匹配时才转发流\n量。试图绕过 CloudFront 的请求将不包含此标头并将被拒绝。\n选项 A 无效，因为 CloudFront 不支持 PrivateLink 源。选项 B 引入了不必要的架构更改，不是必需\n的。选项 C 由于 IP 范围的变化而脆弱且操作风险大。\nAWS 文档明确建议使用自定义源标头作为最佳实践，以确保在 CloudFront 层附加 AWS WAF 时，只\n有 CloudFront 可以访问面向 Internet 的 ALB。\n3 AWS 认证安全 - 专业官方学习指南\n• 亚马逊 CloudFront 源安全文档\nAWS WAF 与 ALB 集成指南"}, {"num": 44, "category_en": "Detection", "category_cn": "检测", "question_en": "A company requires a specific software application to be installed on all new and existing Amazon EC2\ninstances across an AWS Organization. SSM Agent is installed and active.\nHow can the company continuously monitor deployment status of the software application?", "question_cn": "一家公司要求在 AWS 组织中的所有新的和现有的 Amazon EC2 实例上安装特定的软件应用程序。\nSSM 代理已安装并处于活动状态。\n该公司如何持续监控软件应用程序的部署状态？", "options": [{"letter": "A", "en": "Use AWS Config organization-wide with the ec2-managedinstance-applications-required managed\nrule and specify the application name.", "cn": "在全组织范围内使用 AWS 配置以及“ec2 - managedinstance - applications - required”托管规则，\n并指定应用程序名称。"}, {"letter": "B", "en": "Use approved AMIs rule organization-wide.", "cn": "在全组织范围内使用批准的 AMI 规则。"}, {"letter": "C", "en": "Use Distributor package and review output.", "cn": "使用分发器包并查看输出。"}, {"letter": "D", "en": "Use Systems Manager Application Manager inventory filtering.", "cn": "使用系统管理器应用程序管理器库存筛选。"}], "answer": "A", "explanation_en": "Continuous monitoring requires an always-on compliance service that evaluates resources over time.\nAWS Config provides managed rules that assess configuration state and compliance continuously. AWS Certified Security - Specialty guidance highlights AWS Config for continuous compliance across accounts and\nregions when used with AWS Organizations. The ec2-managedinstance-applications-required managed rule\nevaluates whether specified software is installed on managed instances, leveraging Systems Manager inventory /managed instance status. By enabling AWS Config organization-wide and deploying this managed rule\nacross all accounts, the company can continuously evaluate both existing and newly launched instances for\nrequired application presence. This provides a consistent compliance dashboard and history of compliance\nchanges. Option D can provide inventory lists, but it is not a compliance rule engine that flags noncompliance\nwith the same governance reporting and remediation pathways. Options B and C are operational approaches\nbut do not provide continuous compliance state across the organization.", "explanation_cn": "持续监控需要一个始终开启的合规服务，该服务会随着时间推移评估资源。AWS 配置提供了托管\n规则，可持续评估配置状态和合规性。AWS 认证安全 - 专业指南强调，当与 AWS 组织一起使用时，\nAWS 配置可用于跨账户和区域进行持续合规。\n“ec2 - managedinstance - applications - required”托\n管规则利用系统管理器库存/托管实例状态评估指定软件是否安装在托管实例上。通过在全组织范\n围内启用 AWS 配置并在所有账户中部署此托管规则，公司可以持续评估现有和新启动的实例是否\n存在所需应用程序。这提供了一致的合规仪表板和合规更改历史记录。选项 D 可以提供库存列表，\n但它不是一个合规规则引擎，无法通过相同的治理报告和补救途径标记不合规情况。选项 B 和 C 是\n操作方法，但不能提供整个组织的持续合规状态。"}, {"num": 45, "category_en": "Incident Response", "category_cn": "事件响应", "question_en": "A company recently experienced a malicious attack on its cloud-based environment. The company successfully contained and eradicated the attack. A security engineer is performing incident response work. The\nsecurity engineer needs to recover an Amazon RDS database cluster to the last known good version. The\ndatabase cluster is configured to generate automated backups with a retention period of 14 days. The initial\nattack occurred 5 days ago at exactly 3:15 PM.\nWhich solution will meet this requirement?", "question_cn": "一家公司最近在其基于云的环境中遭受了恶意攻击。公司成功遏制并消除了攻击。一名安全工程师\n正在进行事件响应工作。该安全工程师需要将 Amazon RDS 数据库集群恢复到最后一个已知的正\n常版本。数据库集群配置为生成自动备份，保留期为 14 天。初始攻击发生在 5 天前的下午 3:15。\n哪种解决方案将满足此要求？", "options": [{"letter": "A", "en": "Identify the Regional cluster ARN for the database. Use the ARN to restore the Regional cluster by\nusing the restore to point in time feature. Set a target time 5 days ago at 3:14 PM.", "cn": "确定数据库的区域集群 ARN。使用该 ARN 通过“恢复到时间点”功能恢复区域集群。设置目标\n时间为 5 天前的下午 3:14。"}, {"letter": "B", "en": "Identify the Regional cluster ARN for the database. List snapshots that have been taken of the cluster.\nRestore the database by using the snapshot that has a creation time that is closest to 5 days ago at 3:14 PM.", "cn": "确定数据库的区域集群 ARN。列出已为该集群拍摄的快照。使用创建时间最接近 5 天前下午 3:14\n的快照恢复数据库。"}, {"letter": "C", "en": "List all snapshots that have been taken of all the company’s RDS data
